<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TalentMaster — Valmennuspäällikkö</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0F17;
  --bg2:    #111827;
  --bg3:    #1A2235;
  --card:   #1E2A3D;
  --border: #263347;
  --text:   #E8EDF5;
  --muted:  #8A9BB5;
  --muted2: #5A6A82;
  --teal:   #00D4AA;
  --blue:   #4B9EFF;
  --amber:  #F59E0B;
  --red:    #F87171;
  --green:  #34D399;
  --purple: #A78BFA;

  --taka:   #4B9EFF;
  --etu:    #34D399;
  --sivu:   #F59E0B;
  --kierto: #F87171;
  --sm:     #A78BFA;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#sLogin {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.login-box {
  width: 340px; text-align: center;
}
.login-logo { font-family: 'Bebas Neue'; font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
.login-title { font-family: 'Bebas Neue'; font-size: 36px; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
.pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--border); transition: all .15s; }
.pin-dot.filled { background: var(--teal); border-color: var(--teal); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.pin-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-family: 'Bebas Neue'; font-size: 24px; padding: 14px;
  cursor: pointer; transition: all .1s;
}
.pin-btn:active { transform: scale(.94); background: var(--card); }
.pin-err { font-size: 12px; color: var(--red); height: 18px; }
.pin-demo { margin-top: 16px; }
.pin-demo button {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--teal); font-size: 12px; padding: 8px 16px; cursor: pointer;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ── TOPBAR ── */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-logo { font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: 2px; color: var(--muted); }
.topbar-title { font-family: 'Bebas Neue'; font-size: 20px; color: var(--text); flex: 1; }
.seura-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Sans'; font-size: 13px; padding: 6px 10px;
  cursor: pointer;
}
.logout-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer;
}

/* ── NAV TABS ── */
.nav-tabs {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; padding: 0 20px; overflow-x: auto;
}
.nav-tab {
  padding: 12px 16px; font-size: 13px; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s;
}
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

/* ── CONTENT ── */
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }

/* ── METRIC CARDS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.metric-value { font-family: 'Bebas Neue'; font-size: 32px; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; font-weight: 600; }

/* ── TWO COLUMN ── */
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

/* ── JOUKKUE ROW ── */
.joukkue-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s;
}
.joukkue-row:last-child { border-bottom: none; }
.joukkue-row:hover { background: rgba(255,255,255,.02); border-radius: 8px; padding-left: 8px; }
.joukkue-name { font-size: 13px; font-weight: 500; min-width: 110px; }
.joukkue-meta { font-size: 11px; color: var(--muted2); min-width: 60px; }
.mini-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.mini-bar-row { display: flex; align-items: center; gap: 6px; }
.mini-bar-track { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.mini-bar-label { font-size: 10px; color: var(--muted2); width: 28px; text-align: right; }
.delta-badge { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── KETJU EXPLAINER ── */
.ketju-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.ketju-card { background: var(--bg3); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
.ketju-code { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 8px; }
.ketju-plain { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.ketju-field { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.ketju-bars { display: flex; flex-direction: column; gap: 5px; }
.ketju-bar-row { display: flex; align-items: center; gap: 8px; }
.ketju-bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ketju-bar-fill { height: 100%; border-radius: 3px; }
.ketju-age { font-size: 10px; color: var(--muted2); min-width: 46px; }
.ketju-score { font-size: 11px; font-weight: 500; min-width: 24px; text-align: right; }

/* ── INSIGHT BOX ── */
.insight { background: rgba(0,212,170,.07); border: 1px solid rgba(0,212,170,.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
.insight-label { font-size: 10px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.insight.warn { background: rgba(245,158,11,.07); border-color: rgba(245,158,11,.2); }
.insight.warn .insight-label { color: var(--amber); }

/* ── SEURA COMPARISON TABLE ── */
.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table th { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .5px; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.comp-table td { padding: 9px 8px; border-bottom: 1px solid rgba(38,51,71,.5); vertical-align: middle; }
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: rgba(255,255,255,.02); }
.chain-pill { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; }

/* ── ALERT ROWS ── */
.alert-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.alert-item:last-child { border-bottom: none; }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
</style>
</head>

// Laske pelaajan tavoitetaso yhdessä testissä
// palauttaa: { taso: 1-5, ymparisto: 'alle'/'tasolla'/'yli', raja: numero }
function laskeTavoitetaso(testiNimi, arvo, ikavuosi, sukupuoli) {
  var sp = (sukupuoli === 'female') ? 'tytöt' : 'pojat';
  var testiData = EERIKKILA_NORMIT[sp] && EERIKKILA_NORMIT[sp][testiNimi];
  if (!testiData) return null;
  
  var ika = Math.floor(ikavuosi);
  if (ika < 10) ika = 10;
  if (ika > 19) ika = 19;
  
  var rajat = testiData.tasot[ika];
  if (!rajat) return null;
  
  var alas = testiData.alas;
  
  if (testiData.kolmiportainen) {
    // T2/T3 raja: rajat[0]=T3-raja, rajat[1]=T2-raja
    if (alas) {
      if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo <= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    } else {
      if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo >= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    }
  }
  
  // 5-portainen: rajat = [T3, T4, T5, ref]
  // alempi=parempi: T3 = yläarvo, T4 < T3, T5 < T4
  if (alas) {
    if (arvo <= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo <= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo <= (rajat[0] * 1.05) ? 2 : 1, raja: rajat[0] };
  } else {
    if (arvo >= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo >= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo >= (rajat[0] * 0.95) ? 2 : 1, raja: rajat[0] };
  }
}

// Laske kansallinen tavoitetaso (T3+) kaikista testeistä
// Palloliiton kriteeri: saavutettu jos max 2 testiä alle T3
function laskeKansallinenTavoitetaso(mittaukset, ikavuosi, sukupuoli) {
  var testit = ['Nopeus 5m','Nopeus 10m','Nopeus 30m','Ketteryys','SM-pallo','Kevennyshyppy','Syöttäminen'];
  var tulokset = [];
  var alleT3 = 0;
  
  testit.forEach(function(t) {
    var arvo = mittaukset[t];
    if (arvo == null) return;
    var tulos = laskeTavoitetaso(t, arvo, ikavuosi, sukupuoli);
    if (!tulos) return;
    tulokset.push({ testi: t, arvo: arvo, taso: tulos.taso, raja: tulos.raja });
    if (tulos.taso < 3) alleT3++;
  });
  
  // Palloliiton ehto: kansallisella tavoitetasolla jos max 2 testiä alle T3
  var kansallinen = tulokset.length >= 3 && alleT3 <= 2;
  
  return {
    tulokset: tulokset,
    kansallinen: kansallinen,
    alleT3: alleT3,
    testejaYhteensa: tulokset.length
  };
}

var TM_SUUNTA = {"Nopeus 5m": true, "Nopeus 10m": true, "Nopeus 30m": true, "Ketteryys": true, "SM ilman palloa": true, "SM-pallo": true, "Kevennyshyppy": false, "Syottaminen": true};

function haePalloliittoNormi(testi, arvo, sukup, ika) {
  var data = TM_PALLOLIITTO[sukup];
  if (!data || !data[testi]) return null;
  var prefix = sukup === "male" ? "P" : "T";
  var v = Math.min(19, Math.max(10, Math.floor(ika)));
  var key = prefix + v;
  var t = data[testi][key];
  if (!t) return null;
  var alas = TM_SUUNTA[testi] !== false;
  var taso;
  if (alas) {
    if (arvo <= t.t5) taso = 5;
    else if (arvo <= t.t4) taso = 4;
    else if (arvo <= t.t3) taso = 3;
    else if (arvo <= t.t2) taso = 2;
    else taso = 1;
  } else {
    if (arvo >= t.t5) taso = 5;
    else if (arvo >= t.t4) taso = 4;
    else if (arvo >= t.t3) taso = 3;
    else if (arvo >= t.t2) taso = 2;
    else taso = 1;
  }
  var t3val = (t.t3 !== null && t.t3 !== undefined) ? t.t3 : t.t4;
  return { taso: taso, tavoitetasolla: taso >= 3, t3: t3val, t5: t.t5, alas: alas };
}

function laskeNormitasoProfiili(fys_historia, sukup, ikaKrono) {
  if (!fys_historia || !fys_historia.length) return null;
  var TESTIT = ["SM-pallo", "SM ilman palloa", "Nopeus 10m", "Nopeus 30m", "Kevennyshyppy"];
  var viimeisin = fys_historia[fys_historia.length - 1].mittaukset || {};
  var tulokset = [], tavoite_n = 0, tehty_n = 0;
  TESTIT.forEach(function(t) {
    var v = viimeisin[t];
    if (v == null) return;
    var r = haePalloliittoNormi(t, v, sukup, ikaKrono);
    if (!r) return;
    tehty_n++;
    if (r.tavoitetasolla) tavoite_n++;
    tulokset.push({ testi: t, arvo: v, taso: r.taso, tavoitetasolla: r.tavoitetasolla, t3: r.t3, alas: r.alas });
  });
  if (tehty_n < 3) return null;
  var alle_normin = tehty_n - tavoite_n;
  return {
    tavoitetasolla: alle_normin <= 2,
    normi_pct: Math.round(tavoite_n / tehty_n * 100),
    normi_n: tavoite_n, tehty_n: tehty_n,
    alle_normin: alle_normin, tulokset: tulokset
  };
}

function laskeNormitasoSeuralle(s) {
  var n = 0, tavoite = 0, kehitysalueet = {};
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika < 12 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var profii = laskeNormitasoProfiili(fys, p.sukupuoli, ika);
      if (!profii) return;
      n++;
      if (profii.tavoitetasolla) tavoite++;
      profii.tulokset.forEach(function(t) {
        if (!t.tavoitetasolla)
          kehitysalueet[t.testi] = (kehitysalueet[t.testi] || 0) + 1;
      });
    });
  });
  if (n < 5) return null;
  var pct = Math.round(tavoite / n * 100);
  var ka = Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  return { pct: pct, tavoite: tavoite, n: n, tavoitetasolla: pct >= 66, kehitysalueet: ka };
}


// ── PIKAKIRJAUS — localStorage-pohjainen kenttähavainnointi ──
// Tallentaa: seura + joukkue + päivämäärä + innostavuus + liikkuminen + toimenpide

function _pikaKey(seura, jnimi) {
  return 'pika_' + seura.replace(/\s/g,'_') + '_' + jnimi.replace(/\s/g,'_');
}

function haePikaKirjaukset(seura, jnimi) {
  // Palauttaa listan kaikista kirjauksista (max 20 viimeistä)
  try {
    var raw = localStorage.getItem(_pikaKey(seura, jnimi));
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function tallennaKirjaus(seura, jnimi, inno, liike, toimenpide, valmentaja, rooli) {
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  kirjaukset.unshift({
    pvm: new Date().toISOString(),
    inno: inno,
    liike: liike,
    toimenpide: toimenpide,
    valmentaja: valmentaja || '',
    rooli: rooli || 'joukkuevalmentaja'
  });
  // Säilytetään max 20 kirjausta per joukkue
  if (kirjaukset.length > 20) kirjaukset = kirjaukset.slice(0, 20);
  try {
    localStorage.setItem(_pikaKey(seura, jnimi), JSON.stringify(kirjaukset));
  } catch(e) { console.warn('localStorage täynnä'); }
}

function viimeisinKirjaus(seura, jnimi) {
  var k = haePikaKirjaukset(seura, jnimi);
  return k.length ? k[0] : null;
}

function kirjausPaiviatten(pvm) {
  // Kuinka monta päivää sitten kirjaus tehtiin
  if (!pvm) return 999;
  return Math.floor((Date.now() - new Date(pvm).getTime()) / 86400000);
}

function liikenneValo(seura, jnimi) {
  var v = viimeisinKirjaus(seura, jnimi);
  if (!v) return { col: 'var(--muted)', label: 'Ei kirjauksia', paivat: 999 };
  var d = kirjausPaiviatten(v.pvm);
  if (d <= 14)  return { col: 'var(--green)', label: d === 0 ? 'Tänään' : d + 'pv sitten', paivat: d };
  if (d <= 30)  return { col: 'var(--amber)', label: d + 'pv sitten', paivat: d };
  return { col: 'var(--red)', label: d + 'pv sitten', paivat: d };
}

// Laske kausikohtainen harjoitteluseuranta-aktiivisuus yhdelle joukkueelle
// Palauttaa: viikot joissa kirjauksia, inno-keskiarvo, liike-keskiarvo,
//            arvio Palloliiton 3pv/vko-kriteerin suunnasta
function laskeKausiAktiivisuus(seura, jnimi) {
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  if (!kirjaukset.length) return null;

  // Ryhmitä kirjaukset viikon tarkkuudella (ISO-viikkonumero)
  function isoViikko(dateStr) {
    var d = new Date(dateStr);
    var jan4 = new Date(d.getFullYear(), 0, 4);
    var startOfWeek = new Date(jan4);
    startOfWeek.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
    return Math.floor((d - startOfWeek) / (7 * 24 * 3600 * 1000));
  }

  var viikot = new Set();
  var innoSumma = 0, liikeSumma = 0, n = 0;
  kirjaukset.forEach(function(k) {
    viikot.add(k.pvm.slice(0,4) + '_' + isoViikko(k.pvm)); // vuosi_viikko
    if (k.inno) { innoSumma += k.inno; liikeSumma += k.liike || 0; n++; }
  });

  var viikoissa = viikot.size;
  var innoKa  = n ? Math.round(innoSumma / n * 10) / 10 : null;
  var liikeKa = n ? Math.round(liikeSumma / n * 10) / 10 : null;

  // Palloliiton 3pv/vko tarkoittaa käytännössä noin 12 viikkoa/kuukausi
  // Kirjaustiheys on suuntaa-antava indikaattori: ei suora mittaus mutta kertoo
  // onko valmentaja seurannut aktiivisesti. Kynnys: 3 viikkoa/kuukausi = hyvä.
  var kuukausia = Math.max(1, Math.round(kirjaukset.length / 2)); // karkea arvio
  var viikoissaKuussa = Math.round(viikoissa / Math.max(1, kuukausia) * 10) / 10;
  var aktiivisuusTaso = viikoissa >= 10 ? 'hyvä' : viikoissa >= 5 ? 'kehittyvä' : 'vähäinen';

  return {
    kirjauksia: kirjaukset.length,
    viikoissa:  viikoissa,
    innoKa:     innoKa,
    liikeKa:    liikeKa,
    taso:       aktiivisuusTaso
  };
}

// Laske koko seuran harjoitteluseuranta-yhteenveto Palloliiton kriteeriä varten
function laskeSeuranHarjoitteluseuranta(seura) {
  var s = _seuraData[seura];
  if (!s) return { lkm: 0, pct: 0, ok: false };
  var yhteensa = 0, joukkueitaSeurannassa = 0;
  Object.keys(s.joukkueet).forEach(function(jnimi) {
    var akt = laskeKausiAktiivisuus(seura, jnimi);
    if (akt && akt.kirjauksia > 0) {
      yhteensa += akt.kirjauksia;
      if (akt.taso !== 'vähäinen') joukkueitaSeurannassa++;
    }
  });
  var joukkueet_n = Object.keys(s.joukkueet).length;
  var pct = joukkueet_n ? Math.round(joukkueitaSeurannassa / joukkueet_n * 100) : 0;
  return { lkm: yhteensa, joukkueitaSeurannassa: joukkueitaSeurannassa,
           joukkueet_n: joukkueet_n, pct: pct, ok: yhteensa >= 150 };
}

    h += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Historia</div>';
    kirjaukset.slice(1, 4).forEach(function(k) {
      var d = new Date(k.pvm).toLocaleDateString("fi-FI");
      var iCol = k.inno >= 8 ? 'var(--green)' : k.inno >= 6 ? 'var(--amber)' : 'var(--red)';

      h += '<span style="font-size:11px">Inno <strong style="color:' + iCol + '">' + k.inno + '</strong> · Liike <strong style="color:' + lCol + '">' + k.liike + '</strong></span>';
      h += '</div>';

      h += '</div>';
    });
    h += '</div>';
  }

  document.getElementById('pikaBody').innerHTML = h;
  document.getElementById('pikaModal').style.display = 'flex';
}

function valitseRooli(btn, rooliId) {
  var parent = btn.parentElement;
  parent.querySelectorAll('button').forEach(function(b) {
    var isThis = b.dataset.rooli === rooliId;
    b.style.border = isThis ? '1px solid var(--teal)' : '1px solid var(--border)';
    b.style.background = isThis ? 'rgba(0,212,170,.12)' : 'var(--bg3)';
    b.style.color = isThis ? 'var(--teal)' : 'var(--muted)';
    if (isThis) b.classList.add('rooli-aktiv');
    else b.classList.remove('rooli-aktiv');
  });
}

function tallennaPika(jnimi) {
  var inno = parseInt(document.getElementById('innoSlider').value);
  var liike = parseInt(document.getElementById('liikeSlider').value);
  var toimenpide = document.getElementById('toimenpide').value.trim();
  var valmentaja = (document.getElementById('valmentajaNimi') || {}).value || '';
  var rooliEl = document.querySelector('.rooli-aktiv');
  var rooli = rooliEl ? rooliEl.dataset.rooli : 'joukkuevalmentaja';
  tallennaKirjaus(_aktivSeura, jnimi, inno, liike, toimenpide, valmentaja, rooli);
  suljePika();
  renderJoukkueet(); // päivitä liikennevalot
}

function suljePika() {
  document.getElementById('pikaModal').style.display = 'none';
}


// ── TALENTTIPELAAJAT — localStorage-pohjainen nimeäminen ──
// Avain: 'talentit_<seura>_<kausi>' → Set of player IDs
// Kausi = '2025' (nykyinen, voidaan laajentaa)

function _talentKey(seura) {
  return 'talentit_' + seura.replace(/\s+/g,'_') + '_2025';
}

function haeTalentit(seura) {
  try {
    var raw = localStorage.getItem(_talentKey(seura));
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function tallennaталентit(seura, idSet) {
  try {
    localStorage.setItem(_talentKey(seura), JSON.stringify([...idSet]));
  } catch(e) { console.warn('localStorage virhe'); }
}

function onTalentti(seura, pid) {
  return haeTalentit(seura).has(pid);
}

function merkitseTalentti(seura, pid) {
  var set = haeTalentit(seura);
  if (set.has(pid)) {
    set.delete(pid);
  } else {
    set.add(pid);
  }
  tallennaталентit(seura, set);
}

// ── RENDER: Talentit-välilehti ──
function renderTalentit() {
  var s = _seuraData[_aktivSeura];

  var NYKY_KAUSI = 2026; // testaushetki — rajaa 12-15v

  var kaikki1215 = [];

        // Kehityspisteet — kausi

        var delta = null;
        if (hist.length >= 2) {
          var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
          var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});

        var latestOvr = ovrFromKetjut((hist[hist.length-1]&&(hist[hist.length-1].results||{}).ketjut)||{});
        kaikki1215.push({

        });

    // Normitasostatuksen mukaan: tavoitetasolla > kehittyy > tarkkailu
    var aS = a.profii ? (a.profii.tavoitetasolla ? 2 : a.profii.normi_pct >= 45 ? 1 : 0) : -1;
    var bS = b.profii ? (b.profii.tavoitetasolla ? 2 : b.profii.normi_pct >= 45 ? 1 : 0) : -1;
    if (bS !== aS) return bS - aS;
    return (b.ovr||0) - (a.ovr||0);

  var nimetyt = kaikki1215.filter(function(x){ return x.isTalentti; });

        ? 'background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.3);color:var(--teal)'
        : 'background:var(--bg3);border:1px solid var(--border);color:var(--muted)';

      oh += (x.isTalentti ? '⭐' : '+') + '</button>';
      oh += '</div>';

      oh += '</div>';
    });

    oh += '</div>';
    return oh;
  }

  h += renderOsio(osioNimetyt, '⭐ Nimetyt talenttipelaajat', true);

function aggregateData(lookup) {
  var seurat = {};
  Object.values(lookup).forEach(function(p) {
    var s = p.seura || 'Tuntematon';
    var j = p.joukkue || 'Tuntematon';
    if (!seurat[s]) seurat[s] = { pelaajia:0, testeja:0, joukkueet:{} };
    seurat[s].pelaajia++;
    if (!seurat[s].joukkueet[j]) seurat[s].joukkueet[j] = {
      pelaajia:0, testeja:0, ketjut:{}, deltat:[], gems:0,
      fys:{}, pelaajatLista:[]
    };
    var jd = seurat[s].joukkueet[j];
    jd.pelaajia++;
    jd.pelaajatLista.push(p);
    // Kerää testidatumeja syntymävuosiarvion laskemiseksi
    if (!jd._pvmList) jd._pvmList = [];
    if (!jd._ikaList) jd._ikaList = [];
    (p.fys_historia||[]).forEach(function(fh){ if(fh.date) jd._pvmList.push(parseInt(fh.date.substring(0,4))); });
    var bika = (p.bioIka||{}).krono; if(bika) jd._ikaList.push(bika);
    var hist = p.qs_historia || [];
    jd.testeja += hist.length;
    seurat[s].testeja += hist.length;
    hist.forEach(function(qs) {
      var k = (qs.results||{}).ketjut||{};
      Object.keys(k).forEach(function(kn) {
        if (!jd.ketjut[kn]) jd.ketjut[kn] = [];
        jd.ketjut[kn].push(k[kn].pisteet||0);
      });
      if ((qs.results||{}).gem) jd.gems++;
    });
    if (hist.length >= 2) {
      var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (f && l) jd.deltat.push(l-f);
    }
    (p.fys_historia||[]).forEach(function(fh) {
      Object.keys(fh.mittaukset||{}).forEach(function(mk) {
        var v = fh.mittaukset[mk];
        if (v != null) {
          if (!jd.fys[mk]) jd.fys[mk] = [];
          jd.fys[mk].push(v);
        }
      });
    });
  });
  // Laske keskiarvot
  Object.values(seurat).forEach(function(s) {
    Object.values(s.joukkueet).forEach(function(j) {
      j.avgKetjut = {};
      Object.keys(j.ketjut).forEach(function(k) {
        var arr = j.ketjut[k];
        j.avgKetjut[k] = arr.length ? Math.round(avg(arr)*10)/10 : null;
      });
      j.avgDelta = j.deltat.length ? Math.round(avg(j.deltat)*100)/100 : null;
      j.avgFys = {};
      Object.keys(j.fys).forEach(function(k) {
        j.avgFys[k] = Math.round(avg(j.fys[k])*100)/100;
      });
      j.avgOvr = ovrFromObj(j.avgKetjut);
      // Laske syntymävuosiarvio mediaanitestivuosi - mediaanikrono
      if (j._pvmList && j._pvmList.length && j._ikaList && j._ikaList.length) {
        var pvmS = j._pvmList.slice().sort(); var ikaS = j._ikaList.slice().sort();
        var medPvm = pvmS[Math.floor(pvmS.length/2)];
        var medIka = ikaS[Math.floor(ikaS.length/2)];
        j.syntymaVuosi = Math.round(medPvm - medIka);
      } else { j.syntymaVuosi = null; }
    });
  });
  return seurat;
}

function avg(arr) { return arr.reduce(function(a,b){return a+b;},0)/arr.length; }
function ovrFromKetjut(k) {
  var vals = Object.values(k).map(function(v){return v.pisteet||0;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}
function ovrFromObj(k) {
  var vals = Object.values(k).filter(function(v){return v!=null;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}

function renderYleiskuva() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;
  var joukkueet = Object.values(s.joukkueet);

  // Laskenta
  var kehittyvat = joukkueet.filter(function(j){ return j.avgDelta!=null&&j.avgDelta>=0.5; }).length;
  var laskussa   = joukkueet.filter(function(j){ return j.avgDelta!=null&&j.avgDelta<-0.5; }).length;

  // Paras kehittyjä koko seurassa
  var kaikkiP = [];
  joukkueet.forEach(function(j) {
    (j.pelaajatLista||[]).forEach(function(p) {
      var hist = p.qs_historia||[];
      if (hist.length >= 2) {
        var o1 = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
        var o2 = ovrFromKetjut((hist[hist.length-2].results||{}).ketjut||{});
        var delta = (o1&&o2) ? Math.round((o1-o2)*100)/100 : null;
        kaikkiP.push({p:p, j:j, delta:delta});
      }
    });
  });
  var paras = kaikkiP.filter(function(x){ return x.delta>0; })
    .sort(function(a,b){ return (b.delta||0)-(a.delta||0); })[0];

  // Aktiivisuus ja talentit
  var hS = (typeof laskeSeuranHarjoitteluseuranta==='function')
    ? laskeSeuranHarjoitteluseuranta(_aktivSeura) : {lkm:0};
  var talentSet = (typeof haeTalentit==='function') ? haeTalentit(_aktivSeura) : new Set();
  var nTalentit = talentSet ? talentSet.size : 0;
  var krit6 = (typeof laskeKriteeri6==='function') ? laskeKriteeri6(s) : {pct:0,kehittyvat:0,n:0};

  // Odottavat asiat
  var odottavat = [];
  joukkueet.forEach(function(j) {
    if (j.avgDelta!==null && j.avgDelta<-0.5) {
      var jNimi = (j.pelaajatLista&&j.pelaajatLista[0]&&j.pelaajatLista[0].joukkue)||'—';
      odottavat.push({teksti: jNimi + ' — kehitys hidastunut. Tapaa valmentaja tällä viikolla.'});
    }
  });
  if (hS.lkm < 10 && joukkueet.length > 0)
    odottavat.push({teksti: 'Valmentajien kirjauksia on vähän — muistuta heitä tällä viikolla.'});

  // UI
  var h = '';
  var tunti = new Date().getHours();

  h += '<div style="font-size:12px;color:var(--muted2);margin-bottom:3px">'+terv+' — seuran tilanne tänään</div>';
  h += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;letter-spacing:.5px">'+_aktivSeura+'</div>';
  h += '</div>';

  // ═══ KERROS 1: SEURAN PULSSI ═══
  var k6col  = krit6.pct>=60?'var(--green)':krit6.pct>=40?'var(--amber)':'var(--red)';
  var aktCol = hS.lkm>=20?'var(--green)':hS.lkm>=10?'var(--amber)':'var(--red)';
  var talCol = nTalentit>=20?'var(--green)':nTalentit>=10?'var(--amber)':'var(--muted)';
  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">';
  h += ylKPI('📈', krit6.pct+'%', 'kehittyy johdonmukaisesti', k6col, krit6.kehittyvat+'/'+krit6.n+' pelaajaa');
  h += ylKPI('📝', hS.lkm, 'kirjausta kaudella', aktCol, 'valmentajien havainnot');
  h += ylKPI('⭐', nTalentit, 'talenttia ohjelmassa', talCol, 'yksilöllinen kehityssuunnitelma');

  if (odottavat.length===0)
    h += ylKoho('🎯', 'Seura on hyvässä vireessä', 'Johdonmukaisuus on tärkein tekijä — jatka samaan malliin');
  h += '</div></div>';

  // ═══ KERROS 3: ODOTTAVAT ASIAT ═══

      var jN = (j.pelaajatLista&&j.pelaajatLista[0]&&j.pelaajatLista[0].joukkue)||j.nimi||'—';

      h += '</div>';
    });
  h += '</div></div>';
  document.getElementById('tabYleiskuva').innerHTML = h;
}

  h += '<div style="font-size:11px;color:var(--muted2)">Naputa joukkuetta → analyysi</div>';
  h += '</div>';

  // Korttiruudukko — 2 saraketta mobiilissa, 3 leveällä
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">';

  joukkueet.forEach(function(entry) {
    var jnimi = entry[0], j = entry[1];
    var dc = statusColor(j.avgDelta);
    var dl = j.avgDelta != null ? (j.avgDelta >= 0 ? '+' : '') + j.avgDelta.toFixed(1) : '—';
    var ovr = j.avgOvr ? j.avgOvr.toFixed(1) : '—';
    var ovrCol = j.avgOvr >= 7 ? 'var(--green)' : j.avgOvr >= 5 ? 'var(--amber)' : 'var(--red)';

    // Löydä pääketju (vahvin)
    var ketjuEntries = Object.entries(j.avgKetjut).sort(function(a,b){return b[1]-a[1];});
    var paak = ketjuEntries[0];  // vahvin
    var muut = ketjuEntries.slice(1); // loput

    h += '<div onclick="avaaJoukkue(\''+jnimi+'\')" ';

    h += 'onmouseenter="this.style.borderColor=\'var(--teal)\'" onmouseleave="this.style.borderColor=\'var(--border)\'">';

    // Otsikkorivi: nimi + delta-badge
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
    h += '<div>';
    var syntymaLabel = j.syntymaVuosi ? ' <span style="font-size:10px;color:var(--muted2);font-weight:400">('+j.syntymaVuosi+')</span>' : '';
    h += '<div style="font-size:13px;font-weight:600;color:var(--text)">'+jnimi+syntymaLabel+'</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">'+j.pelaajia+'p · '+j.testeja+' testiä</div>';
    h += '</div>';
    // Delta-badge
    h += '<div style="font-size:11px;color:'+dc+';font-weight:600;background:rgba(0,0,0,.3);';
    h += 'border-radius:6px;padding:2px 7px">'+dl+'</div>';
    h += '</div>';

    // OVR iso numero
    h += '<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:12px">';
    h += '<div style="font-family:\\"Bebas Neue\\";font-size:48px;line-height:1;color:'+ovrCol+'">'+ovr+'</div>';
    h += '<div style="font-size:12px;color:var(--muted2)">OVR</div>';
    h += '</div>';

    // Pääketju — vahvin, isompi bari
    if (paak) {
      var pkm = KETJU[paak[0]] || { plain: paak[0], vari: 'var(--muted)' };
      var pkCol = paak[1] >= 7 ? pkm.vari : paak[1] >= 5 ? 'var(--amber)' : 'var(--red)';
      h += '<div style="margin-bottom:10px">';
      h += '<div style="display:flex;justify-content:space-between;margin-bottom:3px">';
      h += '<span style="font-size:11px;color:var(--muted2)">'+pkm.plain+'</span>';
      h += '<span style="font-size:12px;font-weight:700;color:'+pkCol+'">'+paak[1]+'</span>';
      h += '</div>';
      h += '<div style="height:5px;background:var(--bg);border-radius:3px;overflow:hidden">';
      h += '<div style="height:100%;width:'+Math.round(paak[1]*10)+'%;background:'+pkCol+';border-radius:3px"></div>';
      h += '</div>';
      h += '</div>';
    }

    // Muut ketjut — väripisteet rivillä
    h += '<div style="display:flex;gap:6px;align-items:center">';
    muut.forEach(function(e) {
      var km = KETJU[e[0]] || { vari: 'var(--muted)' };
      var col = e[1] >= 7 ? km.vari : e[1] >= 5 ? 'var(--amber)' : 'var(--red)';
      h += '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">';
      h += '<div style="width:8px;height:8px;border-radius:50%;background:'+col+'"></div>';
      h += '<div style="font-size:9px;color:var(--muted2)">'+e[1]+'</div>';
      h += '</div>';
    });
    h += '</div>'; // muut-ketjut

    // Liikennevalo + kausiaktiivisuus + pikakirjaus-nappi
    var lv = liikenneValo(_aktivSeura, jnimi);
    var akt = laskeKausiAktiivisuus(_aktivSeura, jnimi);

    // Liikennevalo-rivi
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)">';
    h += '<div style="display:flex;align-items:center;gap:6px">';
    h += '<div style="width:8px;height:8px;border-radius:50%;background:'+lv.col+'"></div>';
    h += '<div style="font-size:10px;color:var(--muted2)">'+lv.label+'</div>';
    // Kausiaktiivisuus-badge liikennevalon rinnalla
    if (akt) {
      var aktCol = akt.taso==='hyvä'?'var(--green)':akt.taso==='kehittyvä'?'var(--amber)':'var(--muted)';
      h += '<div style="font-size:10px;color:'+aktCol+';background:rgba(0,0,0,.2);border-radius:5px;padding:2px 6px;margin-left:4px">';
      h += akt.viikoissa+'vk · '+akt.kirjauksia+'krt';
      if (akt.innoKa) h += ' · inno '+akt.innoKa;
      h += '</div>';
    }
    h += '</div>';
    h += '<button onclick="avaaKirjaus(this.dataset.j,event)" data-j="'+jnimi+'" ';
    h += 'style="font-size:11px;color:var(--teal);background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);';
    h += 'border-radius:8px;padding:4px 10px;cursor:pointer;font-family:\"DM Sans\"">+ Kirjaus</button>';
    h += '</div>';

    h += '</div>'; // kortti
  });

  h += '</div>'; // grid
  h += '</div>'; // card
  document.getElementById('tabJoukkueet').innerHTML = h;
}

          focus: 'Räjähtävyyden säilyttäminen',

    kierto: ['Medicinepallo heitot (EX_MED_HEITTO)', 'Rotaatiosyötöt (EX_ROT_SYOTTO)', 'Laukausvolyymiharjoittelu (EX_LAUKAUS)'],

    sivu:   ['Lateraalijuoksu + suunnanmuutos (EX_LATERAL)', 'Sivuttaishypyt (EX_SIVU_HYPPY)', 'Nilkkaharjoittelu (EX_NILKKA)'],
    etu:    ['Kevennyshypyt (EX_CMJ)', 'Plyometriikka (EX_PLYO)', 'Kyykkyvoima (EX_KYYKKY)'],

  var ikaryhmät = {};
  Object.values(s.joukkueet).forEach(function(j) {
    var jnimi = (j.pelaajatLista[0] && j.pelaajatLista[0].joukkue) || '';
    var match = jnimi.match(/[PT](\d{2})/);
    if (!match) return;
    var vuosi = parseInt('20' + match[1]);
    var ika = new Date().getFullYear() - vuosi;
    var ikaKey = 'U' + ika;
    if (!ikaryhmät[ikaKey]) ikaryhmät[ikaKey] = { ketjut: {}, ika: ika };
    Object.keys(j.avgKetjut).forEach(function(k) {
      if (j.avgKetjut[k] == null) return;
      if (!ikaryhmät[ikaKey].ketjut[k]) ikaryhmät[ikaKey].ketjut[k] = [];
      ikaryhmät[ikaKey].ketjut[k].push(j.avgKetjut[k]);
    });
  });
  Object.values(ikaryhmät).forEach(function(ig) {
    ig.avgKetjut = {};
    Object.keys(ig.ketjut).forEach(function(k) {
      ig.avgKetjut[k] = ig.ketjut[k].length
        ? Math.round(avg(ig.ketjut[k]) * 10) / 10 : null;

    h += '<div>';
    h += '<div style="font-size:15px;font-weight:700;color:' + km.vari + '">' + km.plain + '</div>';

    h += '</div>';
    // Ikäikkuna-badge
    h += '<div style="text-align:right;flex-shrink:0;margin-left:12px">';

      h += '</div>';
    }

    // Ikäluokkapalkit
    h += '<div style="margin-bottom:10px">';
    var hasMissing = false;
    ikaJarjestetty.forEach(function(ikaKey) {
      var ig = ikaryhmät[ikaKey];
      var arvo = ig.avgKetjut[kn];
      if (arvo == null) { hasMissing = true; return; }
      var pct = Math.round((arvo / 100) * 100); // 0-100 asteikko
      var col = arvo >= 70 ? 'var(--green)' : arvo >= 45 ? 'var(--amber)' : 'var(--red)';
      var statusTeksti = arvo >= 70 ? 'Hyvä' : arvo >= 45 ? 'Kehittyvä' : 'Kehityskohde';

      // Onko tämä ikäluokka kriittisessä iässä tälle ketjulle?
      var ikaInt = ig.ika;
      var ikaParts = (ik.paras || '').match(/(\d+)–(\d+)/);
      var kriittinen = ikaParts && ikaInt >= parseInt(ikaParts[1]) && ikaInt <= parseInt(ikaParts[2]);

      }
      h += '</div>';
    });
    if (hasMissing) {
      h += '<div style="font-size:10px;color:var(--muted);font-style:italic">Osalla ikäluokista ei dataa.</div>';
    }
    h += '</div>'; // ikäluokkapalkit

    // ── PROGRESSIOAIKAJANA — kolme kehitysvaihetta per ketju ─────────────
    // HPP ELITE -harjoitekirjasto (Excel, 53 harjoitetta) antaa tarkemmat ohjeet.
    // Tässä näytetään pedagoginen polku ja selkokieliset harjoite-esimerkit.
    if (ik.progressio) {
      h += '<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,.07);padding-top:12px">';

      // Otsikkorivi + HPP ELITE -viite

// ── PALLOLIITON KRITEERI 6 -LASKENTA ─────────────────────────
function laskeKriteeri6(s) {
  // Palloliiton hyväksymä tapa: OVR kehittynyt ensimmäisestä viimeiseen testiin
  // Ikäikkuna 10-15v, min 2 testiä, kokonaisia kalenterivuosia
  var seuranta = [], kehittyvat = 0;
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      var hist = p.qs_historia || [];
      if (ika < 10 || ika > 15) return;
      if (hist.length < 2) return;
      var first = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var last  = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (!first || !last) return;
      seuranta.push(last - first);
      if (last > first) kehittyvat++;
    });
  });
  var pct = seuranta.length ? Math.round(kehittyvat/seuranta.length*100) : 0;
  return { pct: pct, kehittyvat: kehittyvat, n: seuranta.length };
}

// Laskee seuran talenttipelaajien normitasojakauman (12-15v)
// Palloliiton kriteeri kori 1+2: 66% tavoitetasolla
function laskeNormitasoSeuralle(s) {
  if(typeof laskeNormitasoProfiili !== 'function') return null;
  var n=0, tavoite=0, alle=[], kehitysalueet={};
  var TESTIT=['SM-pallo','SM ilman palloa','Nopeus 10m','Nopeus 30m','Ketteryys','Kevennyshyppy','Syöttäminen'];

  Object.values(s.joukkueet).forEach(function(j){
    j.pelaajatLista.forEach(function(p){
      var ika=(p.bioIka&&p.bioIka.krono)||0;
      if(ika<12||ika>15) return;
      var fys=p.fys_historia||[];
      if(!fys.length) return;

      var profii=laskeNormitasoProfiili(fys, p.sukupuoli, ika);
      if(!profii) return;
      n++;
      if(profii.tavoitetasolla) tavoite++;
      else alle.push({nimi:p.etunimi+' '+p.sukunimi, pct:profii.normi_pct});

      // Kerää kehitysalueet — mitkä testit useimmiten alle normin
      profii.tulokset.forEach(function(t){
        if(!t.ok){
          kehitysalueet[t.testi]=(kehitysalueet[t.testi]||0)+1;
        }
      });
    });
  });

  if(n<5) return null;
  var pct=Math.round(tavoite/n*100);
  // Järjestä kehitysalueet — eniten esiintyvä ensin
  var ka=Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  return { pct:pct, tavoite:tavoite, n:n, tavoitetasolla:pct>=66,
           kehitysalueet:ka, heikoimmat:alle.slice(0,5) };
}

// PIN → oletuskori — vaihdettavissa lennossa
var PL_PIN_KORI = { '5555': '2', '6666': '1', '7777': '2', '8888': '1' };
var _aktivKori = '2'; // oletusarvo

function renderSeuratavoitteet() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;

  // Aseta aktiviinen kori PIN:n mukaan jos ei ole jo asetettu
  var pinDefault = PL_PIN_KORI[_vpPin] || '2';
  if (!localStorage.getItem('kori_' + _aktivSeura)) {
    _aktivKori = pinDefault;
  } else {
    _aktivKori = localStorage.getItem('kori_' + _aktivSeura) || pinDefault;
  }

  var kori = PL_KORIT[_aktivKori];
  if (!kori) return;

  // Laske datalähtöiset arvot
  var krit6     = laskeKriteeri6(s);
  var normData  = (typeof laskeNormitasoSeuralle === 'function') ? laskeNormitasoSeuralle(s) : null;
  var talentSet = haeTalentit(_aktivSeura);
  var nTalentit = talentSet ? talentSet.size : 0;

  // Pikakirjaukset: käytä laskeSeuranHarjoitteluseuranta-funktiota
  var _hSeuranta = laskeSeuranHarjoitteluseuranta(_aktivSeura);
  var pikaLkm = _hSeuranta.lkm;

  // Arvojen resolver — palauttaa {arvo, pct, ok} per mittari
  function laskeMittari(mittari, kynnys_ok) {
    if (!mittari) return { arvo: null, pct: null, ok: false, teksti: 'Ei dataa TM:ssä' };
    if (mittari === 'krit6')
      return { arvo: krit6.pct, pct: krit6.pct, ok: krit6.pct >= kynnys_ok,
               teksti: krit6.pct + '% pelaajista kehittyy (' + krit6.n + 'p)' };
    if (mittari === 'normitaso_pct')
      return normData
        ? { arvo: normData.pct, pct: normData.pct, ok: normData.pct >= kynnys_ok,
            teksti: normData.pct + '% tasolla 3+ (' + normData.n + 'p)' }
        : { arvo: null, pct: null, ok: false, teksti: 'Ei normidataa' };
    if (mittari === 'talentit')
      return { arvo: nTalentit, pct: Math.min(100, Math.round(nTalentit / kynnys_ok * 100)),
               ok: nTalentit >= kynnys_ok,
               teksti: nTalentit + ' nimettyä talenttipelaajaa' };
    if (mittari === 'pikakirjaukset')
      return { arvo: pikaLkm, pct: Math.min(100, Math.round(pikaLkm / kynnys_ok * 100)),
               ok: pikaLkm >= kynnys_ok,
               teksti: pikaLkm + ' kirjattua valmentajahavainnointia' };
    if (mittari === 'harjoitteluseuranta')
      return { arvo: null, pct: null, ok: false, teksti: 'Seurataan seuraavassa versiossa' };
    return { arvo: null, pct: null, ok: false, teksti: '—' };
  }

  // ── UI RAKENTAMINEN ────────────────────────────────────────────────────
  var h = '';

  // HEADER: korin valinta ja tietoa korista
  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">';
  h += '<div>';
  h += '<div class="card-title" style="margin:0">Palloliiton seuratuki — ' + kori.nimi + '</div>';
  h += '<div style="font-size:11px;color:var(--muted2);margin-top:3px">' + kori.kuvaus + '</div>';
  h += '</div>';
  // Korinvaihto-napit
  h += '<div style="display:flex;gap:4px">';
  ['1','2','3'].forEach(function(k) {
    var active = k === _aktivKori;
    var kv = PL_KORIT[k];
    h += '<button onclick="vaihdaKori(\'' + k + '\')" ';
    h += 'style="padding:5px 12px;border-radius:8px;border:1px solid ' + kv.vari + ';';
    h += 'background:' + (active ? kv.vari : 'transparent') + ';';
    h += 'color:' + (active ? '#000' : kv.vari) + ';';
    h += 'font-family:\\"DM Sans\\";font-size:12px;font-weight:600;cursor:pointer">';
    h += kv.nimi + '</button>';
  });
  h += '</div></div>';

  // Simulaattorikonteksti — eri korille voi simuloida mihin asti täytetään
  var onNykyKori = (_aktivKori === pinDefault);
  if (!onNykyKori) {
    h += '<div style="padding:8px 12px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);';
    h += 'border-radius:10px;margin-bottom:12px;font-size:11px;color:var(--amber)">';
    h += '🔭 <strong>Simulaatiotila:</strong> Katso kuinka lähellä seuranne on ' + kori.nimi + ':n kriteereitä. ';
    h += 'Puuttuvat kriteerit näkyvät punaisina — ne ovat kehityspolun seuraavat askeleet.';
    h += '</div>';
  }

  // Tukisumma-badge
  h += '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;';
  h += 'background:rgba(0,0,0,.2);border-radius:10px;margin-bottom:16px">';
  h += '<span style="font-size:11px;color:var(--muted2)">Tukisumma:</span>';
  h += '<span style="font-family:\\"Bebas Neue\\";font-size:20px;color:' + kori.vari + '">' + kori.tuki + '</span>';
  h += '</div>';

  // ── VP:N VAIKUTUSALUE — toimintakriteerit ──────────────────────────────
  var vpKriteerit = kori.kriteerit.filter(function(k2) { return k2.vp_vaikutus; });
  var okCount = 0, totalVP = vpKriteerit.length;

  h += '<div style="font-size:11px;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:10px">';
  h += '✅ Valmennuspäällikön vastuualue (' + totalVP + ' kriteeriä)</div>';

  vpKriteerit.forEach(function(kr) {
    var m = laskeMittari(kr.tm_mittari, kr.kynnys_ok);
    var col = m.ok ? 'var(--green)' : m.pct !== null && m.pct >= 50 ? 'var(--amber)' : 'var(--red)';
    var bgCol = m.ok ? 'rgba(52,211,153,.06)' : m.pct !== null && m.pct >= 50 ? 'rgba(245,158,11,.06)' : 'rgba(248,113,113,.06)';
    var statusIcon = m.ok ? '✅' : m.arvo === null ? '⬜' : '❌';
    if (m.ok) okCount++;

    h += '<div style="background:' + bgCol + ';border-radius:12px;padding:11px 14px;margin-bottom:8px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">';
    h += '<div style="display:flex;gap:8px;align-items:center">';
    h += '<span style="font-size:16px">' + kr.icon + '</span>';
    h += '<div>';
    h += '<div style="font-size:12px;font-weight:600">' + kr.nimi + '</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">' + kr.kuvaus + '</div>';
    h += '</div></div>';
    h += '<div style="text-align:right;flex-shrink:0;margin-left:10px">';
    h += '<div style="font-size:18px">' + statusIcon + '</div>';
    if (m.arvo !== null) {
      h += '<div style="font-family:\\"Bebas Neue\\";font-size:20px;line-height:1;color:' + col + '">';
      h += m.arvo + '<span style="font-size:11px;color:var(--muted2)">' + kr.yksikko + '</span>';
      h += '</div>';
    }
    h += '</div></div>';

    // Progress bar
    if (m.pct !== null) {
      h += '<div style="position:relative;height:5px;background:var(--bg);border-radius:3px;overflow:visible;margin-bottom:4px">';
      h += '<div style="height:100%;width:' + m.pct + '%;background:' + col + ';border-radius:3px"></div>';
      // Kynnysviiva
      var kynnysPct = Math.min(100, Math.round(kr.kynnys_ok / (kr.kynnys_hyva || kr.kynnys_ok) * 100));
      h += '<div style="position:absolute;top:-3px;left:' + Math.min(95,kynnysPct) + '%;width:2px;height:11px;background:var(--amber)"></div>';
      h += '</div>';
    }
    h += '<div style="font-size:11px;color:' + col + ';font-weight:500">' + m.teksti + '</div>';
    h += '</div>';
  });

  // Yhteenveto VP-kriteereistä
  var vpPct = Math.round(okCount / totalVP * 100);
  var vpCol = vpPct >= 80 ? 'var(--green)' : vpPct >= 50 ? 'var(--amber)' : 'var(--red)';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;';
  h += 'padding:10px 14px;background:var(--bg3);border-radius:10px;margin-top:4px">';
  h += '<span style="font-size:12px;color:var(--muted2)">VP-kriteerit täyttynyt</span>';
  h += '<span style="font-family:\\"Bebas Neue\\";font-size:24px;color:' + vpCol + '">' + okCount + '/' + totalVP + '</span>';
  h += '</div>';
  h += '</div>'; // header card

  // ── SEURATASON KRITEERIT — FYI ─────────────────────────────────────────
  var seuraKrit = kori.kriteerit.filter(function(k2) { return !k2.vp_vaikutus; });
  if (seuraKrit.length) {
    h += '<div class="card" style="margin-bottom:14px;border-color:rgba(255,255,255,.06)">';
    h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">';
    h += '🏛️ Seuratason kriteerit (hallitus & toiminnanjohtaja)</div>';
    h += '<div style="font-size:11px;color:var(--muted2);margin-bottom:12px;line-height:1.6">';
    h += 'Nämä kriteerit ovat hallituksen ja toiminnanjohtajan vastuulla. ';
    h += 'Valmennuspäällikkö tuottaa evidenssin urheilullisiin kriteereihin, mutta ';
    h += 'rahoituspäätökseen liittyvät tekijät ovat johdon vastuulla.';
    h += '</div>';
    seuraKrit.forEach(function(kr) {
      h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">';
      h += '<span style="font-size:14px;opacity:.6">' + kr.icon + '</span>';
      h += '<div>';
      h += '<div style="font-size:12px;color:var(--muted)">' + kr.nimi + '</div>';
      if (kr.kuvaus) h += '<div style="font-size:10px;color:var(--muted2)">' + kr.kuvaus + '</div>';
      h += '</div></div>';
    });
    h += '</div>';
  }

  // ── NORMITASOANALYYSI ─────────────────────────────────────────────────
  // Upotetaan tähän se mitä aiemmin oli renderNormitasot:ssa
  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Normitasoanalyysi — Palloliiton viralliset tasot 1–5</div>';
  h += '<div style="font-size:11px;color:var(--muted2);margin-bottom:12px">Eerikkilä / Palloliitto 2024 · % pelaajista saavuttaa tason 3 (kansallinen tavoitetaso)</div>';

  // Laske per testi per ikäluokka — kompakti versio
  var VERT_TESTIT = [
    { testi: 'Nopeus 10m',       alas: true  },
    { testi: 'Nopeus 30m',       alas: true  },
    { testi: 'SM ilman palloa',  alas: true  },
    { testi: 'SM-pallo',         alas: true  },
    { testi: 'Kevennyshyppy',    alas: false },
  ];

  var ikaData = {};
  ['P10','P11','P12','P13','P14','P15'].forEach(function(ik) { ikaData[ik] = {}; });
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika < 10 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var mitat = fys[fys.length-1].mittaukset || {};
      var ikaKey = 'P' + Math.min(15, Math.max(10, Math.floor(ika)));
      VERT_TESTIT.forEach(function(tm2) {
        var v = mitat[tm2.testi];
        if (v == null) return;
        if (!ikaData[ikaKey][tm2.testi]) ikaData[ikaKey][tm2.testi] = [];
        ikaData[ikaKey][tm2.testi].push(v);
      });
    });
  });

  var hasData = false;
  ['P10','P11','P12','P13','P14','P15'].forEach(function(ikaKey) {
    var rivit = [];
    VERT_TESTIT.forEach(function(tm2) {
      var vals = ikaData[ikaKey][tm2.testi] || [];
      if (vals.length < 3) return;
      var t3obj = (TM_PALLOLIITTO['male'][tm2.testi] || {})[ikaKey];
      if (!t3obj || t3obj.t3 == null) return;
      var t3 = t3obj.t3;
      var sorted = vals.slice().sort(function(a,b){return a-b;});
      var med = sorted[Math.floor(sorted.length/2)];
      var okN = vals.filter(function(v){ return tm2.alas ? v<=t3 : v>=t3; }).length;
      var okPct = Math.round(okN/vals.length*100);
      rivit.push({ testi: tm2.testi, med: med, t3: t3, okPct: okPct, n: vals.length });
    });
    if (!rivit.length) return;
    hasData = true;

    var kokonPct = Math.round(rivit.reduce(function(a,r){return a+r.okPct;},0)/rivit.length);
    var headerCol = kokonPct>=66?'var(--green)':kokonPct>=40?'var(--amber)':'var(--red)';

    h += '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:6px">';
    h += '<div style="font-size:12px;font-weight:600">' + ikaKey + '</div>';
    h += '<div style="font-size:11px;color:' + headerCol + ';font-weight:600">' + kokonPct + '% tasolla 3+</div>';
    h += '</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px">';
    rivit.forEach(function(r) {
      var col = r.okPct>=66?'var(--green)':r.okPct>=40?'var(--amber)':'var(--red)';
      h += '<div style="background:var(--bg3);border-radius:8px;padding:6px 8px">';
      h += '<div style="font-size:10px;color:var(--muted2);margin-bottom:2px">' + r.testi + '</div>';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<span style="font-size:12px;font-weight:600;color:' + col + '">' + r.okPct + '%</span>';
      h += '<span style="font-size:10px;color:var(--muted2)">' + r.med + ' / ' + r.t3 + '</span>';
      h += '</div></div>';
    });
    h += '</div></div>';
  });

  if (!hasData) {
    h += '<div style="font-size:12px;color:var(--muted2);text-align:center;padding:16px">Ei normidataa 10–15v pelaajille</div>';
  }
  h += '</div>'; // normitaso card

  document.getElementById('tabSeuratavoitteet').innerHTML = h;
}

function toggleProgressio(baseId, activeVi, clickedBtn, activeVari) {
  var container = clickedBtn.parentElement;
  var buttons = container.querySelectorAll('button');
  buttons.forEach(function(btn, bi) {
    var el = document.getElementById(baseId + '_' + bi);
    var isNowActive = bi === activeVi;
    var btnVari = btn.dataset.vari || 'var(--teal)';
    btn.style.border  = isNowActive ? '1.5px solid ' + btnVari : '1.5px solid rgba(255,255,255,.08)';
    btn.style.background = isNowActive ? btnVari + '18' : 'var(--bg3)';
    // Teksti: vaihenimi (11px bold) + focus (10px muted)
    var nameEl = btn.querySelector('div:first-child');
    var focusEl = btn.querySelector('div:last-child');
    if (nameEl) nameEl.style.color = isNowActive ? btnVari : 'var(--muted)';
    if (focusEl) focusEl.style.color = isNowActive ? 'rgba(255,255,255,.6)' : 'var(--muted)';
    if (el) el.style.display = isNowActive ? 'block' : 'none';
  });
}

function vpTKOptInMuuta(tyyppi, seuraKoodi) {

  }

    h += '✓ Tällä hetkellä ' + (onAnonyymi ? 'päällä' : 'näkyy') + ' — voit sammuttaa alla.</div>';

  h += '<button onclick="vpTKOptInAseta(\'' + avain + '\',\'kylla\')" ';

  h += '</button>';

  h += '<button onclick="vpTKOptInAseta(\'' + avain + '\',\'ei\')" ';
  h += 'style="padding:10px;border-radius:10px;border:1px solid var(--border);';
  h += 'background:transparent;color:var(--muted2);font-size:13px;cursor:pointer;">';
  h += onAnonyymi ? 'Pois — emme osallistu' : 'Piilotettu — emme halua näkyä';

// Simulaatiodata (pieni versio — vain mediaanit ja top10-rajat per ikäluokka)
// Perustuu samaan dataan kuin Masterissa
var VP_TK_REFERENSSIT = {
  P8:  { mediaani:120, top10:97  }, P9:  { mediaani:102, top10:82  },
  P10: { mediaani:130, top10:105 }, P11: { mediaani:118, top10:95  },
  P12: { mediaani:95,  top10:77  }, P13: { mediaani:88,  top10:71  },
  T8:  { mediaani:132, top10:107 }, T9:  { mediaani:114, top10:92  },
  T10: { mediaani:143, top10:115 }, T11: { mediaani:132, top10:107 },
  T12: { mediaani:108, top10:87  }, T13: { mediaani:100, top10:81  }
};

// Laske prosenttipiste yksinkertaisella lineaarisella interpolaatiolla
// (tarkempi versio on Masterissa, tässä riittää karkea arvio VP:tä varten)
function vpProsenttipiste(kokonaisaika, avain) {
  var ref = VP_TK_REFERENSSIT[avain];
  if (!ref) return null;
  if (kokonaisaika <= ref.top10)  return 92; // top 10%
  if (kokonaisaika <= ref.mediaani) {
    // Interpoloi top10-rajan ja mediaanin välillä → 50–92%
    var t = (ref.mediaani - kokonaisaika) / (ref.mediaani - ref.top10);
    return Math.round(50 + t * 42);
  }
  // Alle mediaanin: 0–50%
  var heikkoRaja = ref.mediaani * 1.35; // karkea arvio pronssitason alapuolesta
  var t2 = Math.max(0, (heikkoRaja - kokonaisaika) / (heikkoRaja - ref.mediaani));
  return Math.round(t2 * 50);
}

    { ikoni: '🎯',
      otsikko: 'Tuttuusharha on suurin yksittäinen virhelähde',
      teksti: 'Valmentaja, joka tuntee pelaajan, arvostaa hyviä hetkiä tutulta pelaajalta enemmän kuin samanlaiset hetket vieraalta. Lund & Söderström 2017: päätökset perustuvat "kokonaisvaikutelmaan", ei analyysiin. Tähän ei auta parempi valmentaja — se vaatii ulkopuolisen arvioijan.',
      vari: 'var(--red)' },
    { ikoni: '📊',
      otsikko: 'Yksimielisyys on heikoin juuri niissä pelaajissa, joista se on tärkein',
      teksti: 'Guildhe 2022: pää- ja apuvalmentajan inter-rater agreement on korkea parhaimpien ja heikoimpien kohdalla — mutta heikoin keskitasolla. Juuri sieltä late bloomerit ja Hidden Gemit löytyvät. Yhden arvioijan arvio näistä pelaajista on tieteellisesti epäluotettava.',
      vari: 'var(--amber)' },
    { ikoni: '⭐',
      otsikko: 'Talenttivalmentajan rooli on erilainen kuin joukkuevalmentajan',
      teksti: 'Joukkuevalmentaja näkee pelaajan suhteessa omaan joukkueeseensa. Talenttivalmentaja näkee pelaajan suhteessa seuran kaikkiin ikäluokan pelaajiin — ja käy katsomassa nimenomaan tiettyä dimensiota tietyssä tilanteessa. Nämä tuottavat erilaista, toisiaan täydentävää informaatiota.',
      vari: 'var(--teal)' }
  ];

  kaksArvReason.forEach(function(r) {
    h += '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)">';
    h += '<div style="font-size:22px;flex-shrink:0;padding-top:2px">' + r.ikoni + '</div>';
    h += '<div>';
    h += '<div style="font-size:12px;font-weight:600;color:' + r.vari + ';margin-bottom:3px">' + r.otsikko + '</div>';
    h += '<div style="font-size:11px;color:var(--muted2);line-height:1.6">' + r.teksti + '</div>';
    h += '</div></div>';
  });
  h += '</div>';

  // ── OSA 2: ROOLIJAKO ────────────────────────────────────────────────────
  h += '<div style="margin-bottom:20px">';
  h += '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">2 · Roolijako — kuka tekee mitä</div>';

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';

  // Joukkuevalmentaja-kortti
  h += '<div style="background:var(--bg3);border-radius:12px;padding:12px 14px">';
  h += '<div style="font-size:12px;font-weight:600;color:var(--amber);margin-bottom:8px">👤 Joukkuevalmentaja</div>';
  h += '<div style="font-size:11px;color:var(--muted2);line-height:1.7">';
  h += '• Arvioi 1–2 dimensiota per harjoitus/peli<br>';
  h += '• Tuntee pelaajan arjen — motivaatio, asenne, ihmissuhteet<br>';
  h += '• Ei tee talentti<b>päätöksiä</b> yksin<br>';
  h += '• Raportoi havaintonsa VP:lle tai talenttivalmentajalle<br>';
  h += '• Käy ensin läpi tämä materiaali VP:n kanssa';
  h += '</div></div>';

  // Talenttivalmentaja/VP-kortti
  h += '<div style="background:var(--bg3);border-radius:12px;padding:12px 14px;border:1px solid rgba(0,212,170,.2)">';
  h += '<div style="font-size:12px;font-weight:600;color:var(--teal);margin-bottom:8px">⭐ Talenttivalmentaja / VP</div>';
  h += '<div style="font-size:11px;color:var(--muted2);line-height:1.7">';
  h += '• Arvioi samat dimensiot itsenäisesti — ei näe valmentajan pisteitä ensin<br>';
  h += '• Käy 3–4× kaudessa katsomassa nimenomaan talenttipelaajia<br>';
  h += '• Vertaa pelaajaa seuran kaikkiin ikäluokan pelaajiin<br>';
  h += '• Tekee talenttiohjelma-päätökset yhdessä VP:n kanssa<br>';
  h += '• Hälytys kun arvioijien näkemykset eroavat selvästi → lisähavainnointi';
  h += '</div></div>';
  h += '</div>'; // grid

  h += '<div style="padding:10px 14px;background:rgba(0,212,170,.06);border-radius:10px;border:1px solid rgba(0,212,170,.2)">';
  h += '<div style="font-size:11px;color:var(--teal);font-weight:600;margin-bottom:3px">📋 Prosessi ennen ensimmäistä havainnointia</div>';
  h += '<div style="font-size:11px;color:var(--muted2);line-height:1.7">';
  h += '1. VP tai talenttivalmentaja käy tämän koulutusmateriaalin läpi joukkuevalmentajan kanssa (20–30 min). ';
  h += '2. Molemmat tekevät koearvioin samasta pelaajasta — ensin itsenäisesti, sitten verrataan. ';
  h += '3. Käydään läpi erot: mistä ne johtuivat? Mitä kukin tarkalleen havainnoi? ';
  h += '4. Vasta tämän jälkeen valmentaja alkaa syöttää arvioita järjestelmään. ';
  h += '5. Ensimmäinen varsinainen arvio tehdään yhdessä — VP tai TaV seuraa vierellä.';
  h += '</div></div>';
  h += '</div>'; // roolijako

  // ── OSA 3: ADAR-DIMENSIOT YKSITYISKOHTAISESTI ──────────────────────────
  h += '<div style="margin-bottom:20px">';
  h += '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">3 · Havainnointikohteet — mitä tarkalleen kirjataan</div>';
  h += '<div style="font-size:11px;color:var(--muted2);margin-bottom:12px">Arvioi max 2 dimensiota per harjoitus. Älä arvioi kaikkia kerralla — se heikentää reliabiliteettia (Johnston 2025).</div>';

  var adarKoulutus = [
    { kirjain: 'A', nimi: 'Assess — Pre-scanning', vari: '#60a5fa',
      mita: 'Katsoiko pelaaja ympäristöä ENNEN kuin pallo tuli hänelle?',
      miksi: 'Triggs 2025 (55 tutkimusta): pre-scanning on tärkein yksittäinen havaittava PCS-taito. Savelsbergh: eliitit tekevät 2.7× enemmän skannaustoimintoja kuin sub-eliitti. Tätä voi harjoitella — ja sen voi nähdä.',
      miten: 'Valitse ennen harjoitusta 3 pelaajaa joita seuraat. Merkitse tikkimerkeillä: joka kerta kun pelaaja liikkuu pallottomana ja katsoo ympärilleen → yksi merkki. Laskee myös katsotko kohti omaa palloa vai tilaa.',
      taso: [
        { n: 1, kuvaus: 'Katsoo palloa. Ei liikettä pallottomana. Kääntyy yllättyneenä vastustajaan.' },
        { n: 2, kuvaus: 'Skannaa satunnaisesti. Ei systemaattista. Välillä hyvät, välillä ei.' },
        { n: 3, kuvaus: 'Pää liikkuu selvästi ennen kosketusta. Tietää jo mihin menee.' }
      ],
      harha: 'Isä-valmentaja-harha: jos tuntee pelaajan hyvin, muistaa hyvät skannaustilanteet ja unohtaa huonot. Korjaus: merkitse KAIKKI tilanteet, ei vain erikoisia.' },

    { kirjain: 'D', nimi: 'Decide — Päätösnopeus ja -laatu', vari: '#fbbf24',
      mita: 'Tekeekö oikean ratkaisun oikeaan aikaan?',
      miksi: 'Williams & Ward 2007: eliitit eivät reagoi nopeammin — he anticipoivat aiemmin. Ero ei ole reaktioajassa vaan tiedonkäsittelyssä. Väärä ratkaisu nopeasti = 1. Oikea ratkaisu myöhään = 2. Oikea ratkaisu ajallaan = 3.',
      miten: 'Seuraa 4v2 rondo tai pienpeli. Merkitse joka kerta: 1) oikea/väärä ratkaisu, 2) ajoitus (ennen kuin tilanne pakotti vai sen jälkeen). Häviö-% rondossa on numeerinen mittari tälle.',
      taso: [
        { n: 1, kuvaus: 'Hidas tai toistuvasti väärä valinta paineessa. Menettää pallon yrittäessään liikaa.' },
        { n: 2, kuvaus: 'Tekee oikean ratkaisun mutta ei "ajallaan" — tila on jo mennyt.' },
        { n: 3, kuvaus: 'Anticipoi. Syöttää ennen kuin vastustaja on vielä päättänyt puolustaa.' }
      ],
      harha: 'Halo-efekti: nopea pelaaja arvioidaan päätöksentekijäksi vaikka ratkaisut olisivat vääriä. Korjaus: arvioi ratkaisu erikseen nopeudesta.' },

    { kirjain: 'A', nimi: 'Act — Toteutus paineessa', vari: '#34d399',
      mita: 'Pysyykö tekninen laatu kun vastustaja on alle metrin päässä?',
      miksi: 'Liikanen & Törmä 2025: SM-pallo +8% erotteli ammattilaisiksi yltäneet. TSI kertoo saman numeerisesti: pallon pitäisi hidastaa pelaajaa alle 1s. Tekninen laatu paineessa on harjoiteltavissa — mutta se vaatii systemaattista dual-task-harjoittelua.',
      miten: 'Merkitse 1v1-tilanteet tai rondo-tilanteet: 1) tekniikka romahti, 2) laatu kärsi mutta selvisi, 3) laatu säilyi täysin. TSI-tulos tukee tätä arviota numerona.',
      taso: [
        { n: 1, kuvaus: 'Tekninen laatu romahtaa paineessa. Pallo häviää tai suoritus on ylipitkä.' },
        { n: 2, kuvaus: 'Kohtuullinen. Ei täysin luotettava — vaihtelee tilanteen mukaan.' },
        { n: 3, kuvaus: 'Laatu säilyy. Ensikosketus avaa. Ei palaa lähettäjälle.' }
      ],
      harha: 'Nykysuorituksen harha: hyvä päivä vaikuttaa koko arvioon. Korjaus: arvioi 3 sessiosta, käytä keskiarvoa.' },

    { kirjain: 'R', nimi: 'Recover — Virheestä palautuminen', vari: '#c084fc',
      mita: 'Mitä pelaaja tekee heti pallonmenetyksen tai virheen jälkeen?',
      miksi: 'Johnston & Baker 2025: error recovery -nopeus on uusin lupaava potentiaalin indikaattori. Pelaaja joka palautuu nopeasti virheestä osoittaa psykologista joustavuutta — tätä ei voi helposti harjoitella pois, se on sisäinen ominaisuus. Tämä on myös se dimensio jota nuori valmentaja aliarvioi eniten.',
      miten: 'Seuraa pallonmenetyksiä. Merkitse: 1) pysähtyy tai jää paikoilleen, 2) reagoi mutta hitaasti tai turhautuneena, 3) välitön positiivinen reaktio — hakee pallon tai aseman alle 2 sekunnissa.',
      taso: [
        { n: 1, kuvaus: 'Pysähtyy, turhautuu tai menee poteroihin. Seuraava suoritus kärsii.' },
        { n: 2, kuvaus: 'Reagoi virheen jälkeen, mutta hitaasti. Saattaa mutista tai pudistaa päätä.' },
        { n: 3, kuvaus: 'Välitön positiivinen reaktio. Hakee pallon tai aseman alle 2 sekunnissa.' }
      ],
      harha: 'Sekvenssivaikutus: huono palautuminen ennen viimeistä suoritusta vaikuttaa koko arvioon. Korjaus: merkitse KAIKKI virheet, ei vain viimeisiä.' }
  ];

  adarKoulutus.forEach(function(dim, idx2) {
    h += '<div style="margin-bottom:14px;border:1px solid var(--border);border-left:3px solid ' + dim.vari + ';border-radius:0 12px 12px 0;padding:12px 14px">';

    // Otsikko
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
    h += '<div style="font-family:\\"Bebas Neue\\";font-size:28px;color:' + dim.vari + ';line-height:1">' + dim.kirjain + '</div>';
    h += '<div>';
    h += '<div style="font-size:13px;font-weight:700">' + dim.nimi + '</div>';
    h += '<div style="font-size:11px;color:var(--muted2);font-style:italic">' + dim.mita + '</div>';
    h += '</div></div>';

    // Miksi tärkeä
    h += '<div style="font-size:11px;color:var(--muted2);line-height:1.6;margin-bottom:8px;padding:8px 10px;background:rgba(0,0,0,.15);border-radius:8px">';
    h += '<strong style="color:var(--muted)">Miksi tärkeä:</strong> ' + dim.miksi;
    h += '</div>';

    // Miten havainnoida
    h += '<div style="font-size:11px;color:var(--teal);margin-bottom:8px">';
    h += '<strong>Havainnointiprotokolla:</strong> ' + dim.miten;
    h += '</div>';

    // Kolme tasoa
    h += '<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px">';
    dim.taso.forEach(function(t) {
      var tc = t.n===3?'var(--green)':t.n===2?'var(--amber)':'var(--red)';
      h += '<div style="display:flex;gap:8px;align-items:flex-start">';
      h += '<div style="min-width:20px;height:20px;border-radius:5px;background:' + tc + '20;';
      h += 'display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:' + tc + ';flex-shrink:0">' + t.n + '</div>';
      h += '<div style="font-size:11px;color:var(--muted2);line-height:1.5">' + t.kuvaus + '</div>';
      h += '</div>';
    });
    h += '</div>';

    // Bias-varoitus
    h += '<div style="font-size:10px;color:var(--amber);padding:6px 10px;background:rgba(245,158,11,.06);border-radius:7px">';
    h += '⚠️ <strong>Tunnettu harha:</strong> ' + dim.harha;
    h += '</div></div>';
  });
  h += '</div>'; // osa 3

  // ── OSA 4: INTER-RATER DELTA-ANALYYSI ───────────────────────────────────
  h += '<div style="margin-bottom:20px">';
  h += '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">4 · Arviointien vertailu — mitä tehdään kun havainnoijat ovat eri mieltä</div>';

  h += '<div style="font-size:11px;color:var(--muted2);line-height:1.7;margin-bottom:12px">';
  h += 'Ero ei tarkoita, että toinen arvioijista on väärässä. Se tarkoittaa, että pelaajalla on dimensio ';
  h += 'jota ympäristö- tai tilannetekijä selittää — ja se on arvokasta informaatiota. ';
  h += 'Höner 2021: strukturoitu arviointityökalu tuotti Cronbach alpha ≥0.72 — mutta tämä vaatii ';
  h += 'molemmat arvioijat käyttämään samaa protokollaa.';
  h += '</div>';

  var deltaRules = [
    { delta: '0–0.5p', vari: 'var(--green)', toimenpide: 'Hyvä yksimielisyys. Kirjataan keskiarvo. Ei lisätoimenpiteitä.' },
    { delta: '0.5–1.0p', vari: 'var(--teal)', toimenpide: 'Normaali hajonta. Lyhyt keskustelu: kummalla oli enemmän havainnointikertoja?' },
    { delta: '1.0–1.5p', vari: 'var(--amber)', toimenpide: 'Merkittävä ero. Selvitä konteksti: joukkuevalmentaja näki harjoitukset, talenttivalmentaja pelin — eri ympäristö selittää eron.' },
    { delta: '≥1.5p', vari: 'var(--red)', toimenpide: '🚨 Bias-hälytys. Lisäobservointi pakollinen ennen päätöksiä. Erityisesti jos RAE Q1-pelaaja arvioidaan korkea / Q4-pelaaja matalalle.' }
  ];

  h += '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">';
  deltaRules.forEach(function(d) {
    h += '<div style="display:grid;grid-template-columns:70px 1fr;gap:10px;align-items:start;padding:8px 12px;background:var(--bg3);border-radius:8px">';
    h += '<div style="font-family:\\"Bebas Neue\\";font-size:14px;color:' + d.vari + '">' + d.delta + '</div>';
    h += '<div style="font-size:11px;color:var(--muted2);line-height:1.5">' + d.toimenpide + '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Pikakortti valmennuspäällikölle
  h += '<div style="padding:12px 14px;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);border-radius:12px">';
  h += '<div style="font-size:12px;font-weight:600;color:var(--teal);margin-bottom:8px">📌 Valmennuspäällikön muistilista — havainnoinnin seuranta kausittain</div>';
  h += '<div style="font-size:11px;color:var(--muted2);line-height:1.8">';
  h += '✓ Kauden alussa: kouluta jokainen joukkuevalmentaja henkilökohtaisesti (20 min/valmentaja)<br>';
  h += '✓ Koearviointiharjoitus: molemmat arvioivat saman pelaajan ensin itsenäisesti<br>';
  h += '✓ 3–4× kauden aikana: talenttivalmentaja arvioi talenttipelaajat itsenäisesti<br>';
  h += '✓ Kauden lopussa: havaintojen vertailu — ketkä valmentajat arvioivat johdonmukaisimmin?<br>';
  h += '✓ Lisähavainnointi: pelaajat joiden arviot eroavat merkittävästi tai joilla on vain yksi arvio';
  h += '</div></div>';
  h += '</div>'; // osa 4

  // ── OSA 5: TALENTTIVALMENTAJAN PÄIVITTÄINEN TYÖNKUVA ──────────────────
  h += '<div style="margin-bottom:16px">';
  h += '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">5 · Talenttivalmentajan päivittäinen työnkuva</div>';

  h += '<div style="font-size:11px;color:var(--muted2);line-height:1.7;margin-bottom:12px">';
  h += 'Talenttivalmentaja ei ole auditoija — hän on tiiviissä tekemisessä talenttipelaajien kanssa päivittäin. ';
  h += 'Tämä on ratkaisevan tärkeää: Höner 2021 osoittaa, että kehityspotentiaali näkyy vain systemaattisessa ';
  h += 'pitkäaikaisessa seurannassa. Kolme kertaa vuodessa "katsastamassa käyvä" talenttivalmentaja ';
  h += 'ei pysty tunnistamaan late bloomereita — tähän tarvitaan päivittäinen kontakti.';
  h += '</div>';

  var talenttiTyonkuva = [
    { paiva: 'Päivittäin', tehtavat: 'Läsnä talenttipelaajien harjoituksissa. Yksi systemaattinen havainto yhdestä dimensiosta yhdestä pelaajasta per harjoitus. Kirjaa lyhyen huomion järjestelmään.' },
    { paiva: 'Viikoittain', tehtavat: 'Yhteinen 15 min VP:n kanssa: mitkä pelaajat nousivat esiin tällä viikolla? Kirjataan delta-analyysit jos valmentajan ja talenttivalmentajan arviot eroavat.' },
    { paiva: 'Kuukausittain', tehtavat: 'Kaikkien talenttipelaajien ADAR-koosteen läpikäynti VP:n kanssa. Tunnistetaanko nousevat pelaajat (x-factor) ja ne joiden kehitys on pysähtynyt (riskiryhmä)?' },
    { paiva: 'Kausittain', tehtavat: 'Talenttikansion päivitys, delta-analyysi kaikista arvioinneista, ristiin-arviointi: onko joku pelaaja talenttiohjelmassa joka ei kuulu sinne, tai jonkun ulkopuolella joka kuuluisi?' }
  ];

  h += '<div style="display:flex;flex-direction:column;gap:6px">';
  talenttiTyonkuva.forEach(function(t) {
    h += '<div style="display:grid;grid-template-columns:100px 1fr;gap:10px;align-items:start;padding:10px 12px;background:var(--bg3);border-radius:8px">';
    h += '<div style="font-size:11px;font-weight:600;color:var(--teal)">' + t.paiva + '</div>';
    h += '<div style="font-size:11px;color:var(--muted2);line-height:1.5">' + t.tehtavat + '</div>';
    h += '</div>';
  });
  h += '</div></div>'; // osa 5

  h += '</div>'; // ADAR-koulutus card

  document.getElementById('tabTavoitetasot').innerHTML = h;
}

function metCard(l,v,col){return '<div class="metric-card"><div class="metric-label">'+l+'</div><div class="metric-value" style="font-size:22px;color:'+(col||'var(--text)')+'">'+v+'</div></div>';}
function suljeMod(){document.getElementById('joukkueModal').classList.remove('open');}
</script>
</body>
</html>
