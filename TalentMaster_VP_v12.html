<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TalentMaster — Valmennuspäällikkö</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0F17;
  --bg2:    #111827;
  --bg3:    #1A2235;
  --card:   #1E2A3D;
  --border: #263347;
  --text:   #E8EDF5;
  --muted:  #8A9BB5;
  --muted2: #5A6A82;
  --teal:   #00D4AA;
  --blue:   #4B9EFF;
  --amber:  #F59E0B;
  --red:    #F87171;
  --green:  #34D399;
  --purple: #A78BFA;

  --taka:   #4B9EFF;
  --etu:    #34D399;
  --sivu:   #F59E0B;
  --kierto: #F87171;
  --sm:     #A78BFA;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#sLogin {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.login-box {
  width: 340px; text-align: center;
}
.login-logo { font-family: 'Bebas Neue'; font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
.login-title { font-family: 'Bebas Neue'; font-size: 36px; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
.pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--border); transition: all .15s; }
.pin-dot.filled { background: var(--teal); border-color: var(--teal); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.pin-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-family: 'Bebas Neue'; font-size: 24px; padding: 14px;
  cursor: pointer; transition: all .1s;
}
.pin-btn:active { transform: scale(.94); background: var(--card); }
.pin-err { font-size: 12px; color: var(--red); height: 18px; }
.pin-demo { margin-top: 16px; }
.pin-demo button {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--teal); font-size: 12px; padding: 8px 16px; cursor: pointer;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ── TOPBAR ── */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-logo { font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: 2px; color: var(--muted); }
.topbar-title { font-family: 'Bebas Neue'; font-size: 20px; color: var(--text); flex: 1; }
.seura-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Sans'; font-size: 13px; padding: 6px 10px;
  cursor: pointer;
}
.logout-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer;
}

/* ── NAV TABS ── */
.nav-tabs {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; padding: 0 20px; overflow-x: auto;
}
.nav-tab {
  padding: 12px 16px; font-size: 13px; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s;
}
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

/* ── CONTENT ── */
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }

/* ── METRIC CARDS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.metric-value { font-family: 'Bebas Neue'; font-size: 32px; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; font-weight: 600; }

/* ── TWO COLUMN ── */
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

/* ── JOUKKUE ROW ── */
.joukkue-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s;
}
.joukkue-row:last-child { border-bottom: none; }
.joukkue-row:hover { background: rgba(255,255,255,.02); border-radius: 8px; padding-left: 8px; }
.joukkue-name { font-size: 13px; font-weight: 500; min-width: 110px; }
.joukkue-meta { font-size: 11px; color: var(--muted2); min-width: 60px; }
.mini-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.mini-bar-row { display: flex; align-items: center; gap: 6px; }
.mini-bar-track { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.mini-bar-label { font-size: 10px; color: var(--muted2); width: 28px; text-align: right; }
.delta-badge { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── KETJU EXPLAINER ── */
.ketju-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.ketju-card { background: var(--bg3); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
.ketju-code { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 8px; }
.ketju-plain { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.ketju-field { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.ketju-bars { display: flex; flex-direction: column; gap: 5px; }
.ketju-bar-row { display: flex; align-items: center; gap: 8px; }
.ketju-bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ketju-bar-fill { height: 100%; border-radius: 3px; }
.ketju-age { font-size: 10px; color: var(--muted2); min-width: 46px; }
.ketju-score { font-size: 11px; font-weight: 500; min-width: 24px; text-align: right; }

/* ── INSIGHT BOX ── */
.insight { background: rgba(0,212,170,.07); border: 1px solid rgba(0,212,170,.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
.insight-label { font-size: 10px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.insight.warn { background: rgba(245,158,11,.07); border-color: rgba(245,158,11,.2); }
.insight.warn .insight-label { color: var(--amber); }

/* ── SEURA COMPARISON TABLE ── */
.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table th { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .5px; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.comp-table td { padding: 9px 8px; border-bottom: 1px solid rgba(38,51,71,.5); vertical-align: middle; }
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: rgba(255,255,255,.02); }
.chain-pill { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; }

/* ── ALERT ROWS ── */
.alert-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.alert-item:last-child { border-bottom: none; }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
</style>
</head>

// Laske pelaajan tavoitetaso yhdessä testissä
// palauttaa: { taso: 1-5, ymparisto: 'alle'/'tasolla'/'yli', raja: numero }
function laskeTavoitetaso(testiNimi, arvo, ikavuosi, sukupuoli) {
  var sp = (sukupuoli === 'female') ? 'tytöt' : 'pojat';
  var testiData = EERIKKILA_NORMIT[sp] && EERIKKILA_NORMIT[sp][testiNimi];
  if (!testiData) return null;
  
  var ika = Math.floor(ikavuosi);
  if (ika < 10) ika = 10;
  if (ika > 19) ika = 19;
  
  var rajat = testiData.tasot[ika];
  if (!rajat) return null;
  
  var alas = testiData.alas;
  
  if (testiData.kolmiportainen) {
    // T2/T3 raja: rajat[0]=T3-raja, rajat[1]=T2-raja
    if (alas) {
      if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo <= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    } else {
      if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo >= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    }
  }
  
  // 5-portainen: rajat = [T3, T4, T5, ref]
  // alempi=parempi: T3 = yläarvo, T4 < T3, T5 < T4
  if (alas) {
    if (arvo <= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo <= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo <= (rajat[0] * 1.05) ? 2 : 1, raja: rajat[0] };
  } else {
    if (arvo >= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo >= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo >= (rajat[0] * 0.95) ? 2 : 1, raja: rajat[0] };
  }
}

// Laske kansallinen tavoitetaso (T3+) kaikista testeistä
// Palloliiton kriteeri: saavutettu jos max 2 testiä alle T3
function laskeKansallinenTavoitetaso(mittaukset, ikavuosi, sukupuoli) {
  var testit = ['Nopeus 5m','Nopeus 10m','Nopeus 30m','Ketteryys','SM-pallo','Kevennyshyppy','Syöttäminen'];
  var tulokset = [];
  var alleT3 = 0;
  
  testit.forEach(function(t) {
    var arvo = mittaukset[t];
    if (arvo == null) return;
    var tulos = laskeTavoitetaso(t, arvo, ikavuosi, sukupuoli);
    if (!tulos) return;
    tulokset.push({ testi: t, arvo: arvo, taso: tulos.taso, raja: tulos.raja });
    if (tulos.taso < 3) alleT3++;
  });
  
  // Palloliiton ehto: kansallisella tavoitetasolla jos max 2 testiä alle T3
  var kansallinen = tulokset.length >= 3 && alleT3 <= 2;
  
  return {
    tulokset: tulokset,
    kansallinen: kansallinen,
    alleT3: alleT3,
    testejaYhteensa: tulokset.length
  };
}

function laskeKriteeri6(s) {
  // Palloliiton hyväksymä tapa: OVR kehittynyt ensimmäisestä viimeiseen testiin
  // Ikäikkuna 10-15v, min 2 testiä, kokonaisia kalenterivuosia
  var seuranta = [], kehittyvat = 0;
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      var hist = p.qs_historia || [];
      if (ika < 10 || ika > 15) return;
      if (hist.length < 2) return;
      var first = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var last  = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (!first || !last) return;
      seuranta.push(last - first);
      if (last > first) kehittyvat++;
    });
  });
  var pct = seuranta.length ? Math.round(kehittyvat/seuranta.length*100) : 0;
  return { pct: pct, kehittyvat: kehittyvat, n: seuranta.length };
}

var TM_SUUNTA = {"Nopeus 5m": true, "Nopeus 10m": true, "Nopeus 30m": true, "Ketteryys": true, "SM ilman palloa": true, "SM-pallo": true, "Kevennyshyppy": false, "Syottaminen": true};

function haePalloliittoNormi(testi, arvo, sukup, ika) {
  var data = TM_PALLOLIITTO[sukup];
  if (!data || !data[testi]) return null;
  var prefix = sukup === "male" ? "P" : "T";
  var v = Math.min(19, Math.max(10, Math.floor(ika)));
  var key = prefix + v;
  var t = data[testi][key];
  if (!t) return null;
  var alas = TM_SUUNTA[testi] !== false;
  var taso;
  if (alas) {
    if (arvo <= t.t5) taso = 5;
    else if (arvo <= t.t4) taso = 4;
    else if (arvo <= t.t3) taso = 3;
    else if (arvo <= t.t2) taso = 2;
    else taso = 1;
  } else {
    if (arvo >= t.t5) taso = 5;
    else if (arvo >= t.t4) taso = 4;
    else if (arvo >= t.t3) taso = 3;
    else if (arvo >= t.t2) taso = 2;
    else taso = 1;
  }
  var t3val = (t.t3 !== null && t.t3 !== undefined) ? t.t3 : t.t4;
  return { taso: taso, tavoitetasolla: taso >= 3, t3: t3val, t5: t.t5, alas: alas };
}

function laskeNormitasoProfiili(fys_historia, sukup, ikaKrono) {
  if (!fys_historia || !fys_historia.length) return null;
  var TESTIT = ["SM-pallo", "SM ilman palloa", "Nopeus 10m", "Nopeus 30m", "Kevennyshyppy"];
  var viimeisin = fys_historia[fys_historia.length - 1].mittaukset || {};
  var tulokset = [], tavoite_n = 0, tehty_n = 0;
  TESTIT.forEach(function(t) {
    var v = viimeisin[t];
    if (v == null) return;
    var r = haePalloliittoNormi(t, v, sukup, ikaKrono);
    if (!r) return;
    tehty_n++;
    if (r.tavoitetasolla) tavoite_n++;
    tulokset.push({ testi: t, arvo: v, taso: r.taso, tavoitetasolla: r.tavoitetasolla, t3: r.t3, alas: r.alas });
  });
  if (tehty_n < 3) return null;
  var alle_normin = tehty_n - tavoite_n;
  return {
    tavoitetasolla: alle_normin <= 2,
    normi_pct: Math.round(tavoite_n / tehty_n * 100),
    normi_n: tavoite_n, tehty_n: tehty_n,
    alle_normin: alle_normin, tulokset: tulokset
  };
}

function laskeNormitasoSeuralle(s) {
  var n = 0, tavoite = 0, kehitysalueet = {};
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika < 12 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var profii = laskeNormitasoProfiili(fys, p.sukupuoli, ika);
      if (!profii) return;
      n++;
      if (profii.tavoitetasolla) tavoite++;
      profii.tulokset.forEach(function(t) {
        if (!t.tavoitetasolla)
          kehitysalueet[t.testi] = (kehitysalueet[t.testi] || 0) + 1;
      });
    });
  });
  if (n < 5) return null;
  var pct = Math.round(tavoite / n * 100);
  var ka = Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  return { pct: pct, tavoite: tavoite, n: n, tavoitetasolla: pct >= 66, kehitysalueet: ka };
}


// ── PIKAKIRJAUS — localStorage-pohjainen kenttähavainnointi ──
// Tallentaa: seura + joukkue + päivämäärä + innostavuus + liikkuminen + toimenpide

function _pikaKey(seura, jnimi) {
  return 'pika_' + seura.replace(/\s/g,'_') + '_' + jnimi.replace(/\s/g,'_');
}

function haePikaKirjaukset(seura, jnimi) {
  // Palauttaa listan kaikista kirjauksista (max 20 viimeistä)
  try {
    var raw = localStorage.getItem(_pikaKey(seura, jnimi));
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function tallennaKirjaus(seura, jnimi, inno, liike, toimenpide, valmentaja, rooli) {
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  kirjaukset.unshift({
    pvm: new Date().toISOString(),
    inno: inno,
    liike: liike,
    toimenpide: toimenpide,
    valmentaja: valmentaja || '',
    rooli: rooli || 'joukkuevalmentaja'
  });
  // Säilytetään max 20 kirjausta per joukkue
  if (kirjaukset.length > 20) kirjaukset = kirjaukset.slice(0, 20);
  try {
    localStorage.setItem(_pikaKey(seura, jnimi), JSON.stringify(kirjaukset));
  } catch(e) { console.warn('localStorage täynnä'); }
}

function viimeisinKirjaus(seura, jnimi) {
  var k = haePikaKirjaukset(seura, jnimi);
  return k.length ? k[0] : null;
}

function kirjausPaiviatten(pvm) {
  // Kuinka monta päivää sitten kirjaus tehtiin
  if (!pvm) return 999;
  return Math.floor((Date.now() - new Date(pvm).getTime()) / 86400000);
}

function liikenneValo(seura, jnimi) {
  var v = viimeisinKirjaus(seura, jnimi);
  if (!v) return { col: 'var(--muted)', label: 'Ei kirjauksia', paivat: 999 };
  var d = kirjausPaiviatten(v.pvm);
  if (d <= 14)  return { col: 'var(--green)', label: d === 0 ? 'Tänään' : d + 'pv sitten', paivat: d };
  if (d <= 30)  return { col: 'var(--amber)', label: d + 'pv sitten', paivat: d };
  return { col: 'var(--red)', label: d + 'pv sitten', paivat: d };
}

// Laske kausikohtainen harjoitteluseuranta-aktiivisuus yhdelle joukkueelle
// Palauttaa: viikot joissa kirjauksia, inno-keskiarvo, liike-keskiarvo,
//            arvio Palloliiton 3pv/vko-kriteerin suunnasta
function laskeKausiAktiivisuus(seura, jnimi) {
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  if (!kirjaukset.length) return null;

  // Ryhmitä kirjaukset viikon tarkkuudella (ISO-viikkonumero)
  function isoViikko(dateStr) {
    var d = new Date(dateStr);
    var jan4 = new Date(d.getFullYear(), 0, 4);
    var startOfWeek = new Date(jan4);
    startOfWeek.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
    return Math.floor((d - startOfWeek) / (7 * 24 * 3600 * 1000));
  }

  var viikot = new Set();
  var innoSumma = 0, liikeSumma = 0, n = 0;
  kirjaukset.forEach(function(k) {
    viikot.add(k.pvm.slice(0,4) + '_' + isoViikko(k.pvm)); // vuosi_viikko
    if (k.inno) { innoSumma += k.inno; liikeSumma += k.liike || 0; n++; }
  });

  var viikoissa = viikot.size;
  var innoKa  = n ? Math.round(innoSumma / n * 10) / 10 : null;
  var liikeKa = n ? Math.round(liikeSumma / n * 10) / 10 : null;

  // Palloliiton 3pv/vko tarkoittaa käytännössä noin 12 viikkoa/kuukausi
  // Kirjaustiheys on suuntaa-antava indikaattori: ei suora mittaus mutta kertoo
  // onko valmentaja seurannut aktiivisesti. Kynnys: 3 viikkoa/kuukausi = hyvä.
  var kuukausia = Math.max(1, Math.round(kirjaukset.length / 2)); // karkea arvio
  var viikoissaKuussa = Math.round(viikoissa / Math.max(1, kuukausia) * 10) / 10;
  var aktiivisuusTaso = viikoissa >= 10 ? 'hyvä' : viikoissa >= 5 ? 'kehittyvä' : 'vähäinen';

  return {
    kirjauksia: kirjaukset.length,
    viikoissa:  viikoissa,
    innoKa:     innoKa,
    liikeKa:    liikeKa,
    taso:       aktiivisuusTaso
  };
}

// Laske koko seuran harjoitteluseuranta-yhteenveto Palloliiton kriteeriä varten
function laskeSeuranHarjoitteluseuranta(seura) {
  var s = _seuraData[seura];
  if (!s) return { lkm: 0, pct: 0, ok: false };
  var yhteensa = 0, joukkueitaSeurannassa = 0;
  Object.keys(s.joukkueet).forEach(function(jnimi) {
    var akt = laskeKausiAktiivisuus(seura, jnimi);
    if (akt && akt.kirjauksia > 0) {
      yhteensa += akt.kirjauksia;
      if (akt.taso !== 'vähäinen') joukkueitaSeurannassa++;
    }
  });
  var joukkueet_n = Object.keys(s.joukkueet).length;
  var pct = joukkueet_n ? Math.round(joukkueitaSeurannassa / joukkueet_n * 100) : 0;
  return { lkm: yhteensa, joukkueitaSeurannassa: joukkueitaSeurannassa,
           joukkueet_n: joukkueet_n, pct: pct, ok: yhteensa >= 150 };
}

// ── TALENTTIPELAAJAT — localStorage-pohjainen nimeäminen ──
// Avain: 'talentit_<seura>_<kausi>' → Set of player IDs
// Kausi = '2025' (nykyinen, voidaan laajentaa)

function _talentKey(seura) {
  return 'talentit_' + seura.replace(/\s+/g,'_') + '_2025';
}

function haeTalentit(seura) {
  try {
    var raw = localStorage.getItem(_talentKey(seura));
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function tallennaталентit(seura, idSet) {
  try {
    localStorage.setItem(_talentKey(seura), JSON.stringify([...idSet]));
  } catch(e) { console.warn('localStorage virhe'); }
}

function onTalentti(seura, pid) {
  return haeTalentit(seura).has(pid);
}

function merkitseTalentti(seura, pid) {
  var set = haeTalentit(seura);
  if (set.has(pid)) {
    set.delete(pid);
  } else {
    set.add(pid);
  }
  tallennaталентit(seura, set);
}

// ── RENDER: Talentit-välilehti ──
function renderTalentit() {
  var s = _seuraData[_aktivSeura];

  var talentSet = haeTalentit(_aktivSeura);
  var NYKY_KAUSI = 2026; // testaushetki — rajaa 12-15v

  // Kerää kaikki 12-15v pelaajat kaikista joukkueista
  var kaikki1215 = [];
  Object.entries(s.joukkueet).forEach(function(entry) {
    var jnimi = entry[0], j = entry[1];
    (j.pelaajatLista || []).forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika >= 12 && ika <= 15) {
        // Laske normitasoanalyysi
        var profii = (typeof laskeNormitasoProfiili === 'function')
          ? laskeNormitasoProfiili(p.fys_historia || [], p.sukupuoli, ika) : null;
        // Kehityspisteet — kausi
        var hist = p.qs_historia || [];
        var delta = null;
        if (hist.length >= 2) {
          var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
          var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
          if (f && l) delta = Math.round((l-f)*100)/100;
        }
        var latestOvr = ovrFromKetjut((hist[hist.length-1]&&(hist[hist.length-1].results||{}).ketjut)||{});
        kaikki1215.push({
          p: p, jnimi: jnimi,
          ika: ika, pid: p.id || p.palloliitoId || (p.etunimi+p.sukunimi),
          profii: profii, delta: delta, ovr: latestOvr,
          isTalentti: talentSet.has(p.id || p.palloliitoId || (p.etunimi+p.sukunimi))
        });
      }
    });
  });

  // Järjestä: ensin talentit (normitaso ensin), sitten muut
  kaikki1215.sort(function(a, b) {
    if (a.isTalentti !== b.isTalentti) return b.isTalentti - a.isTalentti;
    // Normitasostatuksen mukaan: tavoitetasolla > kehittyy > tarkkailu
    var aS = a.profii ? (a.profii.tavoitetasolla ? 2 : a.profii.normi_pct >= 45 ? 1 : 0) : -1;
    var bS = b.profii ? (b.profii.tavoitetasolla ? 2 : b.profii.normi_pct >= 45 ? 1 : 0) : -1;
    if (bS !== aS) return bS - aS;
    return (b.ovr||0) - (a.ovr||0);
  });

  var nimetyt = kaikki1215.filter(function(x){ return x.isTalentti; });
  var pojat = nimetyt.filter(function(x){ return x.p.sukupuoli === 'male'; });
  var tytot = nimetyt.filter(function(x){ return x.p.sukupuoli === 'female'; });
  var PL_MIN = 20; // Palloliiton minimi per sukupuoli

  // ── Laske kaikki metriikat etukäteen ──

  nimetyt.forEach(function(x) {

    if (x.profii.tavoitetasolla) nTavoite++;
    else if (x.profii.normi_pct >= 45) nKehittyy++;
    else nTarkkailu++;
  });
  var ovrNousu = nimetyt.filter(function(x){ return x.delta > 0.2; }).length;
  var ovrTasainen = nimetyt.filter(function(x){ return x.delta !== null && Math.abs(x.delta||0) <= 0.2; }).length;
  var ovrLasku = nimetyt.filter(function(x){ return x.delta !== null && x.delta < -0.2; }).length;
  var riskiRyhma = nimetyt.filter(function(x){
    return (x.delta !== null && x.delta < -0.2) || (x.profii && x.profii.normi_pct < 30);
  });

  var h = '';

  h += '<div class="card" style="margin-bottom:14px">';

  var pCol = pojat.length >= PL_MIN ? 'var(--green)' : 'var(--amber)';
  var tCol = tytot.length >= PL_MIN ? 'var(--green)' : 'var(--amber)';
  var krOk = pojat.length >= PL_MIN && tytot.length >= PL_MIN;
  h += '<div style="background:var(--bg3);border-radius:12px;padding:12px 14px;border:1px solid '+(krOk?'rgba(52,211,153,.3)':'rgba(245,158,11,.3)')+'">';
  h += '<div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Palloliiton kriteeri</div>';
  h += '<div style="display:flex;justify-content:space-around;margin-bottom:8px">';
  h += '<div style="text-align:center"><div style="font-family:\\"Bebas Neue\\";font-size:28px;color:'+pCol+'">'+pojat.length+'<span style="font-size:14px;color:var(--muted2)">/'+PL_MIN+'</span></div><div style="font-size:10px;color:var(--muted2)">Poikia ⭐</div></div>';

    h += '<div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--red)">● Tarkkailu</span><span style="font-weight:700;color:var(--red)">'+nTarkkailu+'</span></div>';

  h += '</div>';

  // P3: Kehityspisteet — kausi
  h += '<div style="background:var(--bg3);border-radius:12px;padding:12px 14px">';
  h += '<div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Kehityspisteet — kausi</div>';
  if (!nimetyt.length) {
    h += '<div style="font-size:12px;color:var(--muted2);text-align:center;padding:8px 0">Ei nimettyjä vielä</div>';
  } else {

    h += '<div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--amber)">→ Tasainen</span><span style="font-weight:700;color:var(--amber)">'+ovrTasainen+'</span></div>';

  h += '</div>';

    if (riskiRyhma.length > 3) h += '<div style="font-size:10px;color:var(--muted2)">+ '+(riskiRyhma.length-3)+' muuta</div>';
    h += '</div>';

  h += '</div>';

  h += '</div></div>'; // grid + card

  // ── PELAAJALISTAUS: kaikki 12-15v, merkkausnappeineen ──
  var nakymassa = kaikki1215;

      } else {

      }
      var ovrCol = x.ovr >= 7 ? 'var(--green)' : x.ovr >= 5 ? 'var(--amber)' : 'var(--muted)';
      var pid = p.id || p.palloliitoId || (p.etunimi + p.sukunimi);
      var deltaStr = x.delta != null ? (x.delta >= 0 ? '+' : '') + x.delta.toFixed(1) : '';
      var deltaCol = x.delta > 0 ? 'var(--green)' : x.delta < 0 ? 'var(--red)' : 'var(--muted)';

      oh += '<div style="display:grid;grid-template-columns:1fr 40px 60px 80px 48px;gap:4px;';
      oh += 'padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:center">';

      // Nimi + joukkue
      oh += '<div>';
      oh += '<div style="font-size:12px;font-weight:500">'+p.etunimi+' '+p.sukunimi+'</div>';
      oh += '<div style="font-size:10px;color:var(--muted2)">'+x.jnimi;
      if (deltaStr) oh += ' · <span style="color:'+deltaCol+'">'+deltaStr+' OVR</span>';
      oh += '</div></div>';

      // Ikä
      oh += '<div style="text-align:center;font-size:11px;color:var(--muted2)">'+x.ika.toFixed(1)+'</div>';

      // OVR
      oh += '<div style="text-align:center;font-family:\\"Bebas Neue\\";font-size:18px;color:'+ovrCol+'">'+((x.ovr||'').toString()||'—')+'</div>';

      // Normitaso
      oh += '<div style="text-align:center">'+normBadge+'</div>';

      // Merkintä-nappi
      var btnStyle = x.isTalentti
        ? 'background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.3);color:var(--teal)'
        : 'background:var(--bg3);border:1px solid var(--border);color:var(--muted)';
      oh += '<div style="text-align:center">';
      oh += '<button onclick="vaihdaTalentti(\''+pid+'\')" data-pid="'+pid+'" ';
      oh += 'style="font-size:11px;border-radius:7px;padding:3px 8px;cursor:pointer;'+btnStyle+';font-family:\\"DM Sans\\"">';
      oh += (x.isTalentti ? '⭐' : '+') + '</button>';
      oh += '</div>';

      oh += '</div>';
    });

    oh += '</div>';
    return oh;
  }

  h += renderOsio(osioNimetyt, '⭐ Nimetyt talenttipelaajat', true);
  h += renderOsio(osioMuut, 'Muut 12–15v pelaajat — merkitse talenttiohjelmaan', false);

  document.getElementById('tabTalentit').innerHTML = h;
}

function aggregateData(lookup) {
  var seurat = {};
  Object.values(lookup).forEach(function(p) {
    var s = p.seura || 'Tuntematon';
    var j = p.joukkue || 'Tuntematon';
    if (!seurat[s]) seurat[s] = { pelaajia:0, testeja:0, joukkueet:{} };
    seurat[s].pelaajia++;
    if (!seurat[s].joukkueet[j]) seurat[s].joukkueet[j] = {
      pelaajia:0, testeja:0, ketjut:{}, deltat:[], gems:0,
      fys:{}, pelaajatLista:[]
    };
    var jd = seurat[s].joukkueet[j];
    jd.pelaajia++;
    jd.pelaajatLista.push(p);
    // Kerää testidatumeja syntymävuosiarvion laskemiseksi
    if (!jd._pvmList) jd._pvmList = [];
    if (!jd._ikaList) jd._ikaList = [];
    (p.fys_historia||[]).forEach(function(fh){ if(fh.date) jd._pvmList.push(parseInt(fh.date.substring(0,4))); });
    var bika = (p.bioIka||{}).krono; if(bika) jd._ikaList.push(bika);
    var hist = p.qs_historia || [];
    jd.testeja += hist.length;
    seurat[s].testeja += hist.length;
    hist.forEach(function(qs) {
      var k = (qs.results||{}).ketjut||{};
      Object.keys(k).forEach(function(kn) {
        if (!jd.ketjut[kn]) jd.ketjut[kn] = [];
        jd.ketjut[kn].push(k[kn].pisteet||0);
      });
      if ((qs.results||{}).gem) jd.gems++;
    });
    if (hist.length >= 2) {
      var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (f && l) jd.deltat.push(l-f);
    }
    (p.fys_historia||[]).forEach(function(fh) {
      Object.keys(fh.mittaukset||{}).forEach(function(mk) {
        var v = fh.mittaukset[mk];
        if (v != null) {
          if (!jd.fys[mk]) jd.fys[mk] = [];
          jd.fys[mk].push(v);
        }
      });
    });
  });
  // Laske keskiarvot
  Object.values(seurat).forEach(function(s) {
    Object.values(s.joukkueet).forEach(function(j) {
      j.avgKetjut = {};
      Object.keys(j.ketjut).forEach(function(k) {
        var arr = j.ketjut[k];
        j.avgKetjut[k] = arr.length ? Math.round(avg(arr)*10)/10 : null;
      });
      j.avgDelta = j.deltat.length ? Math.round(avg(j.deltat)*100)/100 : null;
      j.avgFys = {};
      Object.keys(j.fys).forEach(function(k) {
        j.avgFys[k] = Math.round(avg(j.fys[k])*100)/100;
      });
      j.avgOvr = ovrFromObj(j.avgKetjut);
      // Laske syntymävuosiarvio mediaanitestivuosi - mediaanikrono
      if (j._pvmList && j._pvmList.length && j._ikaList && j._ikaList.length) {
        var pvmS = j._pvmList.slice().sort(); var ikaS = j._ikaList.slice().sort();
        var medPvm = pvmS[Math.floor(pvmS.length/2)];
        var medIka = ikaS[Math.floor(ikaS.length/2)];
        j.syntymaVuosi = Math.round(medPvm - medIka);
      } else { j.syntymaVuosi = null; }
    });
  });
  return seurat;
}

function avg(arr) { return arr.reduce(function(a,b){return a+b;},0)/arr.length; }
function ovrFromKetjut(k) {
  var vals = Object.values(k).map(function(v){return v.pisteet||0;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}
function ovrFromObj(k) {
  var vals = Object.values(k).filter(function(v){return v!=null;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}

function ketjuColor(kn) { return (KETJU[kn]||{}).vari || 'var(--muted)'; }
function statusColor(delta) {
  if (delta == null) return 'var(--muted2)';
  if (delta >= 1.5) return 'var(--green)';
  if (delta >= 0)   return 'var(--amber)';
  return 'var(--red)';
}
function statusLabel(delta) {
  if (delta == null) return 'Ei dataa';
  if (delta >= 1.5) return 'Kehittyy';
  if (delta >= 0)   return 'Tasainen';
  return 'Laskussa';
}

function renderYleiskuva() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;
  var joukkueet = Object.values(s.joukkueet);

  // ── DATALASKENTA ────────────────────────────────
  var kehittyvat = joukkueet.filter(function(j){ return j.avgDelta != null && j.avgDelta >= 0.5; }).length;
  var laskussa   = joukkueet.filter(function(j){ return j.avgDelta != null && j.avgDelta < -0.5; }).length;

  // Paras kehittyjä — kaikki pelaajat
  var kaikkiP = [];
  joukkueet.forEach(function(j) {
    (j.pelaajatLista || []).forEach(function(p) {
      var hist = p.qs_historia || [];
      if (hist.length >= 2) {
        var o1 = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
        var o2 = ovrFromKetjut((hist[hist.length-2].results||{}).ketjut||{});
        var delta = (o1 && o2) ? Math.round((o1-o2)*100)/100 : null;
        kaikkiP.push({ p:p, j:j, delta:delta });
      }
    });
  });
  var paras = kaikkiP.filter(function(x){ return x.delta > 0; })
    .sort(function(a,b){ return (b.delta||0)-(a.delta||0); })[0];

  // Valmentajien aktiivisuus
  var hS = (typeof laskeSeuranHarjoitteluseuranta==='function')
    ? laskeSeuranHarjoitteluseuranta(_aktivSeura) : {lkm:0};
  var pikaLkm = hS.lkm;

  // Talentit + kehitystrendi
  var talentSet = (typeof haeTalentit==='function') ? haeTalentit(_aktivSeura) : new Set();
  var nTalentit = talentSet ? talentSet.size : 0;
  var krit6 = (typeof laskeKriteeri6==='function') ? laskeKriteeri6(s) : {pct:0,kehittyvat:0,n:0};

  // Odottavat asiat
  var odottavat = [];
  joukkueet.forEach(function(j) {
    if (j.avgDelta !== null && j.avgDelta < -0.5) {
      var jNimi = (j.pelaajatLista&&j.pelaajatLista[0]&&j.pelaajatLista[0].joukkue)||j.nimi||'—';
      odottavat.push({ teksti: jNimi + ' — kehitys hidastunut. Tapaa valmentaja tällä viikolla.' });
    }
  });
  if (pikaLkm < 10 && joukkueet.length > 0) {
    odottavat.push({ teksti: 'Valmentajien kirjauksia on vähän — muistuta heitä tällä viikolla.' });
  }

  // ── UI ─────────────────────────────────────────
  var h = '';

  // Tervehdys
  var tunti = new Date().getHours();
  var terv = tunti < 10 ? 'Hyvää huomenta' : tunti < 17 ? 'Hyvää päivää' : 'Hyvää iltaa';
  h += '<div style="margin-bottom:20px">';
  h += '<div style="font-size:12px;color:var(--muted2);margin-bottom:3px">' + terv + ' — seuran tilanne tänään</div>';
  h += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;letter-spacing:.5px">' + _aktivSeura + '</div>';
  h += '</div>';

  // ═══ KERROS 1: SEURAN PULSSI ═══════════════════
  var k6col = krit6.pct >= 60 ? 'var(--green)' : krit6.pct >= 40 ? 'var(--amber)' : 'var(--red)';
  var aktCol = pikaLkm >= 20 ? 'var(--green)' : pikaLkm >= 10 ? 'var(--amber)' : 'var(--red)';
  var talCol = nTalentit >= 20 ? 'var(--green)' : nTalentit >= 10 ? 'var(--amber)' : 'var(--muted)';

  h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">';
  h += ylKPI('📈', krit6.pct + '%', 'kehittyy johdonmukaisesti', k6col, krit6.kehittyvat + '/' + krit6.n + ' pelaajaa');
  h += ylKPI('📝', pikaLkm, 'kirjausta kaudella', aktCol, 'valmentajien havainnot');
  h += ylKPI('⭐', nTalentit, 'talenttia ohjelmassa', talCol, 'yksilöllinen kehityssuunnitelma');
  h += '</div>';

  // ═══ KERROS 2: VIIKON KOHOKOHDAT ═══════════════
  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div class="card-title" style="margin-bottom:12px">✨ Tällä viikolla</div>';
  h += '<div style="display:flex;flex-direction:column;gap:7px">';

  if (paras) {
    var pNimi = ((paras.p.etunimi||'') + ' ' + (paras.p.sukunimi||'')).trim();
    var pJouk = (paras.j.pelaajatLista&&paras.j.pelaajatLista[0]&&paras.j.pelaajatLista[0].joukkue)||'';
    h += ylKoho('🚀', pNimi + ' kehittyi eniten koko seurassa',
      pJouk + ' · +' + paras.delta.toFixed(1) + ' pistettä');
  }
  if (kehittyvat > 0) {
    h += ylKoho('📈', kehittyvat + ' joukkuetta kehittyy positiiviseen suuntaan',
      'Jaa hyvät käytännöt muiden valmentajien kanssa');
  }
  if (odottavat.length === 0) {
    h += ylKoho('🎯', 'Seura on hyvässä vireessä', 'Johdonmukaisuus on tärkein tekijä — jatka samaan malliin');
  }
  h += '</div></div>';

  // ═══ KERROS 3: ODOTTAVAT ASIAT ═════════════════
  if (odottavat.length > 0) {
    h += '<div class="card" style="margin-bottom:14px;border-left:3px solid var(--amber)">';
    h += '<div class="card-title" style="margin-bottom:10px;color:var(--amber)">📋 Odottaa sinua tällä viikolla</div>';

        + '<span style="color:var(--amber);flex-shrink:0">→</span>'
        + '<span>' + o.teksti + '</span></div>';

    h += '<div class="card" style="margin-bottom:14px;border-left:3px solid var(--green)">';
    h += '<div style="font-size:13px;color:var(--muted2);line-height:1.65">'
      + '✅ <strong style="color:var(--text)">Ei kiireellisiä asioita tänään.</strong> '
      + 'Käytä aika valmentajien mentorointiin tai pelaajahavainnoinnin syventämiseen.</div>';
    h += '</div>';
  }

  // ═══ JOUKKUEIDEN TILANNE ════════════════════════
  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div class="card-title" style="margin-bottom:12px">Joukkueiden kehitys</div>';
  h += '<div style="display:flex;flex-direction:column;gap:6px">';
  var jSorted = joukkueet.slice().sort(function(a,b){ return (b.avgDelta||-99)-(a.avgDelta||-99); });
  jSorted.forEach(function(j) {
    var jNimi = (j.pelaajatLista&&j.pelaajatLista[0]&&j.pelaajatLista[0].joukkue)||j.nimi||'—';
    var d   = j.avgDelta;
    var col = d==null?'var(--muted2)':d>=0.5?'var(--green)':d>=0?'var(--amber)':'var(--red)';
    var ik  = d==null?'○':d>=0.5?'↑':d>=0?'→':'↓';
    var lab = d==null?'Ei dataa':d>=0.5?'Kehittyy':d>=0?'Tasainen':'Laskussa';
    h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:7px">';

    h += '<span style="font-size:12px;color:'+col+';font-weight:600">'+lab+'</span>';
    if (d !== null) h += '<span style="font-size:11px;color:var(--muted2);width:44px;text-align:right">'+(d>0?'+':'')+d.toFixed(1)+' p</span>';
    h += '</div>';
  });
  h += '</div></div>';

  document.getElementById('tabYleiskuva').innerHTML = h;
}

    }
    h += '</div>';
    h += '<button onclick="avaaKirjaus(this.dataset.j,event)" data-j="'+jnimi+'" ';
    h += 'style="font-size:11px;color:var(--teal);background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);';
    h += 'border-radius:8px;padding:4px 10px;cursor:pointer;font-family:\"DM Sans\"">+ Kirjaus</button>';
    h += '</div>';

    h += '</div>'; // kortti
  });

  h += '</div>'; // grid
  h += '</div>'; // card
  document.getElementById('tabJoukkueet').innerHTML = h;
}

          focus: 'Voimaharjoittelu + plyometriikka',
          kuvaus: 'PHV-huipussa (13–14v pojilla) lonkkien ja polvien kuorma kasvatetaan hitaasti. 15–17v: Täysi plyometriikka, kyykkyvoima ja CMJ. Lihastasapaino (quadriceps/hamstring) tarkistetaan.',
          harjoitteet: ['Kevennyshypyt (EX_CMJ)', 'Plyometriikka (EX_PLYO)', 'Kyykkyvoima (EX_KYYKKY)', 'Lihastasapainomittaus'] },
        { vaihe: 'Jälkeen (19v+)', vari: 'var(--muted2)',
          focus: 'Räjähtävyyden säilyttäminen',
          kuvaus: 'Korkea voimataso ylläpidetään pienemmällä volyymillä. Vammariski kasvaa väsymyksessä — kuormanhallinnan merkitys korostuu.',
          harjoitteet: ['Voimaharjoittelu 2x/vko', 'CMJ-seuranta kauden aikana'] }
      ]

  };

  var HARJOITTEET = {
    sm:     ['SM-pallo-rata (EX_SM_PALLO)', 'Reaktiolähtö + kosketus (EX_REAKTIO)', 'Dual-task suunnanmuutos (EX_DUAL)'],
    kierto: ['Medicinepallo heitot (EX_MED_HEITTO)', 'Rotaatiosyötöt (EX_ROT_SYOTTO)', 'Laukausvolyymiharjoittelu (EX_LAUKAUS)'],
    taka:   ['Räjähtävät lähdöt (EX_LAHTO)', 'Lonkan ojentajat (EX_LONKKA)', 'Nordic curl (EX_NORDIC)'],
    sivu:   ['Lateraalijuoksu + suunnanmuutos (EX_LATERAL)', 'Sivuttaishypyt (EX_SIVU_HYPPY)', 'Nilkkaharjoittelu (EX_NILKKA)'],
    etu:    ['Kevennyshypyt (EX_CMJ)', 'Plyometriikka (EX_PLYO)', 'Kyykkyvoima (EX_KYYKKY)'],
  };

  // ── AGGREGOI ikäluokittain ────────────────────────────────────────────────
  var ikaryhmät = {};
  Object.values(s.joukkueet).forEach(function(j) {
    var jnimi = (j.pelaajatLista[0] && j.pelaajatLista[0].joukkue) || '';
    var match = jnimi.match(/[PT](\d{2})/);
    if (!match) return;
    var vuosi = parseInt('20' + match[1]);
    var ika = new Date().getFullYear() - vuosi;
    var ikaKey = 'U' + ika;
    if (!ikaryhmät[ikaKey]) ikaryhmät[ikaKey] = { ketjut: {}, ika: ika };
    Object.keys(j.avgKetjut).forEach(function(k) {
      if (j.avgKetjut[k] == null) return;
      if (!ikaryhmät[ikaKey].ketjut[k]) ikaryhmät[ikaKey].ketjut[k] = [];
      ikaryhmät[ikaKey].ketjut[k].push(j.avgKetjut[k]);
    });
  });
  Object.values(ikaryhmät).forEach(function(ig) {
    ig.avgKetjut = {};
    Object.keys(ig.ketjut).forEach(function(k) {
      ig.avgKetjut[k] = ig.ketjut[k].length
        ? Math.round(avg(ig.ketjut[k]) * 10) / 10 : null;
    });
  });

  var h = '';

  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div class="card-title" style="margin-bottom:6px">Liikkumisen viisi osa-aluetta</div>';
  h += '<div style="font-size:12px;color:var(--muted2);line-height:1.7;margin-bottom:12px">';
  h += 'Jokainen pelaaja liikkuu ja toimii viiden perusliikeketjun kautta. ';
  h += 'Nämä eivät ole yksittäisiä ominaisuuksia kuten "nopeus" tai "hyppy" — ';
  h += 'ne ovat liikejärjestelmiä jotka rakentuvat kehonosien yhteistyöstä. ';
  h += 'Väripalkit kertovat missä seuran eri ikäluokat ovat tällä hetkellä, ';
  h += 'ja nuoli osoittaa mitkä ketjut ovat kriittisimmässä kehitysiässä juuri nyt.';
  h += '</div>';

  h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">';
  Object.entries(KETJU).forEach(function(entry) {
    var kn = entry[0], km = entry[1];
    var ik = IKAIKKUNAT[kn] || {};
    h += '<div style="background:var(--bg3);border-radius:10px;padding:8px 10px;border-top:3px solid ' + km.vari + '">';
    h += '<div style="font-size:13px;font-weight:700;color:' + km.vari + ';margin-bottom:2px">' + km.plain + '</div>';
    h += '<div style="font-size:10px;color:var(--muted2);line-height:1.5;margin-bottom:6px">' + km.kentta + '</div>';
    h += '<div style="font-size:10px;background:rgba(0,0,0,.2);border-radius:6px;padding:4px 6px">';
    h += '<span style="color:var(--muted)">Paras ikäikkuna: </span>';
    h += '<span style="color:' + km.vari + ';font-weight:600">' + (ik.paras || '—') + '</span>';
    h += '</div></div>';
  });
  h += '</div></div>'; // grid + intro card

  // ── PER KETJU: ikäluokkavertailu + toimenpiteet ───────────────────────────
  var ikaJarjestetty = Object.keys(ikaryhmät).sort(function(a, b) {
    return parseInt(a.slice(1)) - parseInt(b.slice(1));
  });

  Object.entries(KETJU).forEach(function(entry) {
    var kn = entry[0], km = entry[1];
    var ik = IKAIKKUNAT[kn] || {};
    var harjoitteet = HARJOITTEET[kn] || [];

    h += '<div class="card" style="margin-bottom:12px;border-left:3px solid ' + km.vari + '">';

    // Otsikkorivi
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
    h += '<div>';
    h += '<div style="font-size:15px;font-weight:700;color:' + km.vari + '">' + km.plain + '</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">' + km.nimi + ' · ' + km.kentta + '</div>';
    h += '</div>';
    // Ikäikkuna-badge
    h += '<div style="text-align:right;flex-shrink:0;margin-left:12px">';
    h += '<div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Paras ikäikkuna</div>';
    h += '<div style="font-size:13px;font-weight:700;color:' + km.vari + '">' + (ik.paras || '—') + '</div>';
    h += '</div></div>';

    // Ikäikkunahuomio
    if (ik.huomio) {
      h += '<div style="font-size:11px;color:var(--muted2);padding:6px 10px;background:rgba(0,0,0,.15);border-radius:7px;margin-bottom:10px">';
      h += '💡 ' + ik.huomio;
      h += '</div>';
    }

    // Ikäluokkapalkit
    h += '<div style="margin-bottom:10px">';
    var hasMissing = false;
    ikaJarjestetty.forEach(function(ikaKey) {
      var ig = ikaryhmät[ikaKey];
      var arvo = ig.avgKetjut[kn];
      if (arvo == null) { hasMissing = true; return; }
      var pct = Math.round((arvo / 100) * 100); // 0-100 asteikko
      var col = arvo >= 70 ? 'var(--green)' : arvo >= 45 ? 'var(--amber)' : 'var(--red)';
      var statusTeksti = arvo >= 70 ? 'Hyvä' : arvo >= 45 ? 'Kehittyvä' : 'Kehityskohde';

      // Onko tämä ikäluokka kriittisessä iässä tälle ketjulle?
      var ikaInt = ig.ika;
      var ikaParts = (ik.paras || '').match(/(\d+)–(\d+)/);
      var kriittinen = ikaParts && ikaInt >= parseInt(ikaParts[1]) && ikaInt <= parseInt(ikaParts[2]);

      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
      h += '<div style="width:28px;font-size:11px;color:var(--muted2);flex-shrink:0">' + ikaKey + '</div>';
      h += '<div style="flex:1;height:14px;background:var(--bg);border-radius:7px;overflow:hidden">';
      h += '<div style="height:100%;width:' + Math.min(100, arvo) + '%;background:' + col + ';border-radius:7px;transition:width .4s"></div>';
      h += '</div>';
      h += '<div style="width:32px;font-size:11px;font-weight:600;color:' + col + ';flex-shrink:0">' + arvo + '</div>';
      if (kriittinen) {
        h += '<div style="font-size:10px;background:' + km.vari + '25;color:' + km.vari + ';';

      if (arvo < 45) {

      }
      h += '</div>';
    });
    if (hasMissing) {
      h += '<div style="font-size:10px;color:var(--muted);font-style:italic">Osalla ikäluokista ei dataa.</div>';
    }
    h += '</div>'; // ikäluokkapalkit

    // ── PROGRESSIOAIKAJANA — kolme kehitysvaihetta per ketju ─────────────
    // HPP ELITE -harjoitekirjasto (Excel, 53 harjoitetta) antaa tarkemmat ohjeet.
    // Tässä näytetään pedagoginen polku ja selkokieliset harjoite-esimerkit.
    if (ik.progressio) {
      h += '<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,.07);padding-top:12px">';

      // Otsikkorivi + HPP ELITE -viite
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
      h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Harjoittelun progressio ikävaiheittain</div>';
      h += '<div style="font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);border-radius:6px;padding:3px 8px">HPP ELITE -kirjasto</div>';
      h += '</div>';

      // Kolme vaihekorttia rinnakkain — klikattavia
      var vaiheId = 'prog_' + kn;
      h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">';
      ik.progressio.forEach(function(vaihe, vi) {
        var isActive = vi === 1;
        var borderCol = isActive ? vaihe.vari : 'rgba(255,255,255,.08)';
        var bgCol     = isActive ? vaihe.vari + '18' : 'var(--bg3)';
        var textCol   = isActive ? vaihe.vari : 'var(--muted)';
        h += '<button onclick="toggleProgressio(\'' + vaiheId + '\',' + vi + ',this,\'' + vaihe.vari + '\')" ';
        h += 'data-vi="' + vi + '" data-vari="' + vaihe.vari + '" ';
        h += 'style="padding:10px 8px;border-radius:10px;border:1.5px solid ' + borderCol + ';';
        h += 'background:' + bgCol + ';cursor:pointer;text-align:left;';
        h += 'font-family:\\"DM Sans\\";transition:all .15s">';
        // Vaihenimi
        h += '<div style="font-size:11px;font-weight:600;color:' + textCol + ';margin-bottom:3px">' + vaihe.vaihe + '</div>';
        // Focus-teksti
        h += '<div style="font-size:10px;color:' + (isActive ? 'rgba(255,255,255,.6)' : 'var(--muted)') + ';line-height:1.4">' + vaihe.focus + '</div>';
        h += '</button>';
      });
      h += '</div>';

      // Vaihe-sisältöpaneelit — avattu vaihe näkyy kokonaan
      ik.progressio.forEach(function(vaihe, vi) {
        var isActive = vi === 1;
        h += '<div id="' + vaiheId + '_' + vi + '" ';
        h += 'style="display:' + (isActive ? 'block' : 'none') + ';';
        h += 'background:rgba(0,0,0,.2);border-radius:10px;padding:14px 16px;';
        h += 'border-left:3px solid ' + vaihe.vari + '">';

        // Fokus-otsikko
        h += '<div style="font-size:12px;font-weight:600;color:' + vaihe.vari + ';margin-bottom:6px">' + vaihe.focus + '</div>';

        // Pedagoginen kuvaus
        h += '<div style="font-size:12px;color:var(--muted2);line-height:1.7;margin-bottom:12px">' + vaihe.kuvaus + '</div>';

        // Harjoitteet — selkokielisinä, ilman koodeja
        h += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Esimerkkiharjoitteet</div>';
        h += '<div style="display:flex;flex-direction:column;gap:5px">';
        vaihe.harjoitteet.forEach(function(hr) {
          // Poista sulkeissa olevat koodit: "Nimi (EX_KOODI)" → "Nimi"
          var puhdas = hr.replace(/\s*\([A-Z_]+\)\s*$/, '').trim();
          // Onko HPP ELITE -viite olemassa (alkuperäinen sisälsi EX_-koodin)?
          var onKoodi = /\(EX_[A-Z_]+\)/.test(hr);
          h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:7px">';
          h += '<div style="width:6px;height:6px;border-radius:50%;background:' + vaihe.vari + ';flex-shrink:0"></div>';
          h += '<div style="font-size:12px;color:var(--text);flex:1">' + puhdas + '</div>';
          if (onKoodi) {
            h += '<div style="font-size:10px;color:var(--muted);background:rgba(255,255,255,.06);border-radius:5px;padding:2px 6px;flex-shrink:0">HPP ELITE</div>';
          }
          h += '</div>';
        });
        h += '</div>';
        h += '</div>'; // sisältöpaneeli
      });

      h += '</div>'; // progressio wrap
    } else {
      // Fallback: vanha lista
      h += '<div style="background:var(--bg3);border-radius:9px;padding:9px 12px">';
      h += '<div style="font-size:11px;color:var(--muted2);margin-bottom:4px">' + km.train + '</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      (HARJOITTEET[kn]||[]).forEach(function(hr) {
        h += '<div style="font-size:10px;background:rgba(0,0,0,.2);border-radius:6px;padding:3px 8px;color:var(--muted2)">' + hr + '</div>';
      });
      h += '</div></div>';
    }

    h += '</div>'; // ketju card
  });

  document.getElementById('tabKetjut').innerHTML = h;
}
