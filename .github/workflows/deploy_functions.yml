name: TalentMaster — Deploy Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install functions dependencies
        run: cd functions && npm install

      - name: Create .env file for functions
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "GMAIL_EMAIL=$GMAIL_EMAIL" > functions/.env
          echo "GMAIL_APP_PASSWORD=$GMAIL_APP_PASSWORD" >> functions/.env

      - name: Deploy Cloud Functions
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/service-account.json"
          firebase deploy --only functions --project talentmaster-pilot
