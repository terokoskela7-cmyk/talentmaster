name: TalentMaster — Deploy Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install functions dependencies
        run: |
          cd functions
          npm install

      - name: Set Firebase Functions config and deploy
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/service-account.json"
          firebase functions:config:set \
            gmail.email="$GMAIL_EMAIL" \
            gmail.password="$GMAIL_APP_PASSWORD" \
            --project talentmaster-pilot
          firebase deploy --only functions --project talentmaster-pilot
