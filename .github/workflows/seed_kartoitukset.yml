name: Seed kartoitukset (testipelaajat)

on:
  workflow_dispatch:
    inputs:
      toiminto:
        description: 'Valitse toiminto'
        required: true
        default: 'lisaa'
        type: choice
        options:
          - lisaa
          - poista

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tm_admin

    steps:
      - name: Checkout koodi
        uses: actions/checkout@v4

      - name: Asenna Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Asenna riippuvuudet
        run: npm install

      - name: Luo serviceAccountKey.json secretistä
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json

      - name: Aja seed-skripti (lisää testipelaajat)
        if: github.event.inputs.toiminto == 'lisaa'
        run: node tm_admin/scripts/seed_kartoitukset.js

      - name: Aja seed-skripti (poista testipelaajat)
        if: github.event.inputs.toiminto == 'poista'
        run: node tm_admin/scripts/seed_kartoitukset.js --poista

      - name: Siivoa avaintiedosto
        if: always()
        run: rm -f serviceAccountKey.json
