name: TalentMaster — Firebase Setup

on:
  workflow_dispatch:
    inputs:
      toiminto:
        description: 'Toiminto: setup_seurat / setup_admin / setup_all / deploy_functions / backfill_claims / setup_demo_fc / check_demo'
        required: true
        default: 'setup_admin'
        type: choice
        options:
          - setup_seurat
          - setup_admin
          - setup_all
          - deploy_functions
          - backfill_claims
          - setup_demo_fc
          - check_demo

jobs:
  firebase-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd tm_admin
          npm install firebase-admin

      - name: Run selected action
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd tm_admin
          echo "Ajetaan toiminto: ${{ github.event.inputs.toiminto }}"
          node ${{ github.event.inputs.toiminto }}.js
