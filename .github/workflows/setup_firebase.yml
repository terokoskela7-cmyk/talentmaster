name: TalentMaster — Firebase Setup

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Toiminto: setup_seurat / setup_admin / setup_all'
        required: true
        default: 'setup_admin'

jobs:
  setup-seurat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install
        working-directory: tm_admin
        run: npm install

      - name: Luo serviceAccountKey.json
        working-directory: tm_admin
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json

      - name: Setup seurat
        if: inputs.action == 'setup_seurat' || inputs.action == 'setup_all'
        working-directory: tm_admin
        run: node setup_seurat.js

      - name: Setup super-admin
        if: inputs.action == 'setup_admin' || inputs.action == 'setup_all'
        working-directory: tm_admin
        run: node setup_admin.js

      - name: Siivoa
        if: always()
        working-directory: tm_admin
        run: rm -f serviceAccountKey.json
