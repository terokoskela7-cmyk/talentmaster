name: TalentMaster — Firebase Setup

on:
  workflow_dispatch:
    inputs:
      toiminto:
        description: 'Toiminto valitse listalta'
        required: true
        default: 'check_all_users'
        type: choice
        options:
          - setup_seurat
          - setup_admin
          - setup_all
          - deploy_functions
          - backfill_claims
          - setup_demo_fc
          - check_demo
          - check_all_users

jobs:
  firebase-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4       # päivitetty v3 → v4

      - name: Setup Node.js
        uses: actions/setup-node@v4     # päivitetty v3 → v4
        with:
          node-version: '20'            # päivitetty 18 → 20 (18 on end-of-life)

      - name: Install dependencies
        run: |
          cd tm_admin
          npm install firebase-admin

      - name: Run selected action
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd tm_admin
          echo "Ajetaan toiminto: ${{ github.event.inputs.toiminto }}"
          node ${{ github.event.inputs.toiminto }}.js
