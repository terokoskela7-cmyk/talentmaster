name: TalentMaster — Firebase Setup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Kirjoita KYLLÄ'
        required: true

jobs:
  setup-seurat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install
        working-directory: tm_admin

      - name: Create key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json
        working-directory: tm_admin

      - name: Run setup
        run: node setup_seurat.js
        working-directory: tm_admin

      - name: Cleanup
        if: always()
        run: rm -f serviceAccountKey.json
        working-directory: tm_admin
