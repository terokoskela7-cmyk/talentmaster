<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TalentMaster — Valmennuspäällikkö</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0F17;
  --bg2:    #111827;
  --bg3:    #1A2235;
  --card:   #1E2A3D;
  --border: #263347;
  --text:   #E8EDF5;
  --muted:  #8A9BB5;
  --muted2: #5A6A82;
  --teal:   #00D4AA;
  --blue:   #4B9EFF;
  --amber:  #F59E0B;
  --red:    #F87171;
  --green:  #34D399;
  --purple: #A78BFA;

  --taka:   #4B9EFF;
  --etu:    #34D399;
  --sivu:   #F59E0B;
  --kierto: #F87171;
  --sm:     #A78BFA;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#sLogin {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.login-box {
  width: 340px; text-align: center;
}
.login-logo { font-family: 'Bebas Neue'; font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
.login-title { font-family: 'Bebas Neue'; font-size: 36px; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
.pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--border); transition: all .15s; }
.pin-dot.filled { background: var(--teal); border-color: var(--teal); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.pin-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-family: 'Bebas Neue'; font-size: 24px; padding: 14px;
  cursor: pointer; transition: all .1s;
}
.pin-btn:active { transform: scale(.94); background: var(--card); }
.pin-err { font-size: 12px; color: var(--red); height: 18px; }
.pin-demo { margin-top: 16px; }
.pin-demo button {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--teal); font-size: 12px; padding: 8px 16px; cursor: pointer;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ── TOPBAR ── */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-logo { font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: 2px; color: var(--muted); }
.topbar-title { font-family: 'Bebas Neue'; font-size: 20px; color: var(--text); flex: 1; }
.seura-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Sans'; font-size: 13px; padding: 6px 10px;
  cursor: pointer;
}
.logout-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer;
}

/* ── NAV TABS ── */
.nav-tabs {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; padding: 0 20px; overflow-x: auto;
}
.nav-tab {
  padding: 12px 16px; font-size: 13px; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s;
}
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

/* ── CONTENT ── */
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }

/* ── METRIC CARDS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.metric-value { font-family: 'Bebas Neue'; font-size: 32px; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; font-weight: 600; }

/* ── TWO COLUMN ── */
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

/* ── JOUKKUE ROW ── */
.joukkue-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s;
}
.joukkue-row:last-child { border-bottom: none; }
.joukkue-row:hover { background: rgba(255,255,255,.02); border-radius: 8px; padding-left: 8px; }
.joukkue-name { font-size: 13px; font-weight: 500; min-width: 110px; }
.joukkue-meta { font-size: 11px; color: var(--muted2); min-width: 60px; }
.mini-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.mini-bar-row { display: flex; align-items: center; gap: 6px; }
.mini-bar-track { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.mini-bar-label { font-size: 10px; color: var(--muted2); width: 28px; text-align: right; }
.delta-badge { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── KETJU EXPLAINER ── */
.ketju-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.ketju-card { background: var(--bg3); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
.ketju-code { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 8px; }
.ketju-plain { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.ketju-field { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.ketju-bars { display: flex; flex-direction: column; gap: 5px; }
.ketju-bar-row { display: flex; align-items: center; gap: 8px; }
.ketju-bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ketju-bar-fill { height: 100%; border-radius: 3px; }
.ketju-age { font-size: 10px; color: var(--muted2); min-width: 46px; }
.ketju-score { font-size: 11px; font-weight: 500; min-width: 24px; text-align: right; }

/* ── INSIGHT BOX ── */
.insight { background: rgba(0,212,170,.07); border: 1px solid rgba(0,212,170,.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
.insight-label { font-size: 10px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.insight.warn { background: rgba(245,158,11,.07); border-color: rgba(245,158,11,.2); }
.insight.warn .insight-label { color: var(--amber); }

/* ── SEURA COMPARISON TABLE ── */
.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table th { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .5px; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.comp-table td { padding: 9px 8px; border-bottom: 1px solid rgba(38,51,71,.5); vertical-align: middle; }
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: rgba(255,255,255,.02); }
.chain-pill { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; }

/* ── ALERT ROWS ── */
.alert-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.alert-item:last-child { border-bottom: none; }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="sLogin" class="screen active">
  <div class="login-box">
    <div class="login-logo">TALENTMASTER™</div>
    <div class="login-title">Valmennuspäällikkö</div>
    <div class="login-sub">Syötä PIN-koodi</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="addVpPin('1')">1</button>
      <button class="pin-btn" onclick="addVpPin('2')">2</button>
      <button class="pin-btn" onclick="addVpPin('3')">3</button>
      <button class="pin-btn" onclick="addVpPin('4')">4</button>
      <button class="pin-btn" onclick="addVpPin('5')">5</button>
      <button class="pin-btn" onclick="addVpPin('6')">6</button>
      <button class="pin-btn" onclick="addVpPin('7')">7</button>
      <button class="pin-btn" onclick="addVpPin('8')">8</button>
      <button class="pin-btn" onclick="addVpPin('9')">9</button>
      <button class="pin-btn" onclick="clearVpPin()" style="color:var(--muted);font-size:16px">⌫</button>
      <button class="pin-btn" onclick="addVpPin('0')">0</button>
      <button class="pin-btn" onclick="clearVpPin()" style="color:var(--muted);font-size:14px">CLR</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-demo">
      <button onclick="addVpPin('5');addVpPin('5');addVpPin('5');addVpPin('5')">Demo: PIN 5555</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="sDash" class="screen">
  <div class="topbar">
    <div>
      <div class="topbar-logo">TALENTMASTER™</div>
      <div class="topbar-title">Valmennuspäällikkö</div>
    </div>
    <select class="seura-select" id="seuraSelect" onchange="vaihdaSeura(this.value)"></select>
    <button class="logout-btn" onclick="kirjauduUlos()">Kirjaudu ulos</button>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="vaihda(0,this)">Yleiskuva</div>
    <div class="nav-tab" onclick="vaihda(1,this)">Joukkueet</div>
    <div class="nav-tab" onclick="vaihda(2,this)">Ketjuanalyysi</div>
    <div class="nav-tab" onclick="vaihda(3,this)">Seuravertailu</div>
    <div class="nav-tab" onclick="vaihda(4,this)">Palloliiton kriteerit</div>
  </div>
  <div class="content">
    <div id="tabYleiskuva"></div>
    <div id="tabJoukkueet" style="display:none"></div>
    <div id="tabKetjut" style="display:none"></div>
    <div id="tabVertailu" style="display:none"></div>
    <div id="tabKriteerit" style="display:none"></div>
  </div>
</div>

<!-- JOUKKUE MODAL -->
<div class="modal-overlay" id="joukkueModal" onclick="if(event.target===this)suljeMod()">
  <div class="modal-box">
    <div class="modal-drag"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="tm_data.js"></script>
<script>
// ── PIN ──
var _vpPin = '';
var VP_PINS = { '5555': 'demo', '6666': 'fcl', '7777': 'sjk' };

function addVpPin(n) {
  if (_vpPin.length >= 4) return;
  _vpPin += n;
  updateDots();
  if (_vpPin.length === 4) setTimeout(checkPin, 150);
}
function clearVpPin() {
  _vpPin = _vpPin.slice(0,-1);
  updateDots();
  document.getElementById('pinErr').textContent = '';
}
function updateDots() {
  for(var i=0;i<4;i++) {
    document.getElementById('pd'+i).className = 'pin-dot' + (i < _vpPin.length ? ' filled' : '');
  }
}
function checkPin() {
  if (VP_PINS[_vpPin]) {
    document.getElementById('sLogin').classList.remove('active');
    document.getElementById('sDash').classList.add('active');
    initDash();
  } else {
    document.getElementById('pinErr').textContent = 'Väärä PIN-koodi';
    _vpPin = '';
    updateDots();
  }
}
function kirjauduUlos() {
  _vpPin = '';
  updateDots();
  document.getElementById('sDash').classList.remove('active');
  document.getElementById('sLogin').classList.add('active');
}

// ── DATA PROCESSING ──
var _seuraData = {};   // aggregated per seura
var _aktivSeura = '';
var _aktivTab = 0;

function initDash() {
  if (!window.TM_DATA) { alert('tm_data.js ei latautunut'); return; }
  _seuraData = aggregateData(window.TM_DATA.lookup);
  
  var sel = document.getElementById('seuraSelect');
  sel.innerHTML = '';
  var seurat = Object.keys(_seuraData).sort();
  seurat.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s; opt.textContent = s + ' (' + _seuraData[s].pelaajia + 'p)';
    sel.appendChild(opt);
  });
  
  // Valitse seura PINin mukaan
  var pinSeura = { '6666':'FC Lahti Juniorit', '7777':'SJK -juniorit' };
  var defaultSeura = pinSeura[_vpPin] || seurat[0];
  if (_seuraData[defaultSeura]) sel.value = defaultSeura;
  
  _aktivSeura = sel.value;
  renderAll();
}

function aggregateData(lookup) {
  var seurat = {};
  Object.values(lookup).forEach(function(p) {
    var s = p.seura || 'Tuntematon';
    var j = p.joukkue || 'Tuntematon';
    if (!seurat[s]) seurat[s] = { pelaajia:0, testeja:0, joukkueet:{} };
    seurat[s].pelaajia++;
    if (!seurat[s].joukkueet[j]) seurat[s].joukkueet[j] = {
      pelaajia:0, testeja:0, ketjut:{}, deltat:[], gems:0,
      fys:{}, pelaajatLista:[]
    };
    var jd = seurat[s].joukkueet[j];
    jd.pelaajia++;
    jd.pelaajatLista.push(p);
    var hist = p.qs_historia || [];
    jd.testeja += hist.length;
    seurat[s].testeja += hist.length;
    hist.forEach(function(qs) {
      var k = (qs.results||{}).ketjut||{};
      Object.keys(k).forEach(function(kn) {
        if (!jd.ketjut[kn]) jd.ketjut[kn] = [];
        jd.ketjut[kn].push(k[kn].pisteet||0);
      });
      if ((qs.results||{}).gem) jd.gems++;
    });
    if (hist.length >= 2) {
      var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (f && l) jd.deltat.push(l-f);
    }
    (p.fys_historia||[]).forEach(function(fh) {
      Object.keys(fh.mittaukset||{}).forEach(function(mk) {
        var v = fh.mittaukset[mk];
        if (v != null) {
          if (!jd.fys[mk]) jd.fys[mk] = [];
          jd.fys[mk].push(v);
        }
      });
    });
  });
  // Laske keskiarvot
  Object.values(seurat).forEach(function(s) {
    Object.values(s.joukkueet).forEach(function(j) {
      j.avgKetjut = {};
      Object.keys(j.ketjut).forEach(function(k) {
        var arr = j.ketjut[k];
        j.avgKetjut[k] = arr.length ? Math.round(avg(arr)*10)/10 : null;
      });
      j.avgDelta = j.deltat.length ? Math.round(avg(j.deltat)*100)/100 : null;
      j.avgFys = {};
      Object.keys(j.fys).forEach(function(k) {
        j.avgFys[k] = Math.round(avg(j.fys[k])*100)/100;
      });
      j.avgOvr = ovrFromObj(j.avgKetjut);
    });
  });
  return seurat;
}

function avg(arr) { return arr.reduce(function(a,b){return a+b;},0)/arr.length; }
function ovrFromKetjut(k) {
  var vals = Object.values(k).map(function(v){return v.pisteet||0;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}
function ovrFromObj(k) {
  var vals = Object.values(k).filter(function(v){return v!=null;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}

// ── NAVIGATION ──
var _tabs = ['tabYleiskuva','tabJoukkueet','tabKetjut','tabVertailu','tabKriteerit'];
function vaihda(idx, el) {
  _aktivTab = idx;
  _tabs.forEach(function(t){ document.getElementById(t).style.display='none'; });
  document.getElementById(_tabs[idx]).style.display='block';
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  renderTab(idx);
}
function vaihdaSeura(s) {
  _aktivSeura = s;
  renderAll();
}
function renderAll() {
  renderTab(0);
  // Muut tabit renderöidään tarvittaessa
}
function renderTab(idx) {
  if (idx===0) renderYleiskuva();
  else if (idx===1) renderJoukkueet();
  else if (idx===2) renderKetjut();
  else if (idx===3) renderVertailu();
}

// ── KETJU META ──
var KETJU = {
  taka:   { nimi:'Takaketju', plain:'Kiihdytys ja jarrutus', vari:'var(--taka)', kentta:'Lähtönopeus, paineen alla pakeneminen, läpäisypassin katkaisu.', train:'Räjähtävät lähdöt, lonkan voima, eksentrinen harjoittelu.' },
  etu:    { nimi:'Etuketju',  plain:'Hyppy ja ponnistus',    vari:'var(--etu)',  kentta:'Ilmapallot, hypyt maalilla ja puolustuksessa.', train:'Kyykyt, plyometriikka. Huom: PHV-huipussa kuormitus alas.' },
  sivu:   { nimi:'Sivuketju', plain:'Suunnanmuutos ja 1v1',  vari:'var(--sivu)', kentta:'1v1-puolustus, sivuttainen ketteryys, laidanhallinta.', train:'Sivuttaishypyt, lateraaliset radat, nilkan stabiliteetti.' },
  kierto: { nimi:'Kiertoketju',plain:'Laukaus ja syöttövoima',vari:'var(--kierto)',kentta:'Laukausnopeus, pitkä syöttö, vartalon kiertoliike.', train:'Rotaatioharjoittelu, medicinepallot. Hitain ketju kehittyä.' },
  sm:     { nimi:'SM-ketju',  plain:'Pallollinen reaktio',   vari:'var(--sm)',   kentta:'Ensimmäinen kosketus, pallollinen suunnanmuutos alle 1s.', train:'SM-pallo-harjoitteet, reaktiolähdöt. Paras ikäikkuna 10–14v.' }
};

function ketjuColor(kn) { return (KETJU[kn]||{}).vari || 'var(--muted)'; }
function statusColor(delta) {
  if (delta == null) return 'var(--muted2)';
  if (delta >= 1.5) return 'var(--green)';
  if (delta >= 0)   return 'var(--amber)';
  return 'var(--red)';
}
function statusLabel(delta) {
  if (delta == null) return 'Ei dataa';
  if (delta >= 1.5) return 'Kehittyy';
  if (delta >= 0)   return 'Tasainen';
  return 'Laskussa';
}

// ── YLEISKUVA ──
function renderYleiskuva() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;
  var joukkueet = Object.values(s.joukkueet);
  var kokonaisTesteja = s.testeja;
  var kehittyvat = joukkueet.filter(function(j){return j.avgDelta!=null&&j.avgDelta>=1;}).length;
  var laskussa   = joukkueet.filter(function(j){return j.avgDelta!=null&&j.avgDelta<0;}).length;
  var gemsTotal  = joukkueet.reduce(function(a,j){return a+j.gems;},0);

  // Ketjupuutteet seuratasolla
  var sKetjut = {};
  joukkueet.forEach(function(j){
    Object.keys(j.avgKetjut).forEach(function(k){
      if (!sKetjut[k]) sKetjut[k] = [];
      if (j.avgKetjut[k] != null) sKetjut[k].push(j.avgKetjut[k]);
    });
  });
  var sAvgKetjut = {};
  Object.keys(sKetjut).forEach(function(k){
    sAvgKetjut[k] = sKetjut[k].length ? Math.round(avg(sKetjut[k])*10)/10 : null;
  });

  // Löydä heikoin ketju
  var ketjuSorted = Object.entries(sAvgKetjut).filter(function(e){return e[1]!=null;}).sort(function(a,b){return a[1]-b[1];});
  var heikoin = ketjuSorted[0];
  var vahvin  = ketjuSorted[ketjuSorted.length-1];

  // Toimenpiteet
  var toimenpiteet = [];
  joukkueet.sort(function(a,b){return (a.avgDelta||0)-(b.avgDelta||0);}).forEach(function(j){
    if (j.avgDelta != null && j.avgDelta < 0)
      toimenpiteet.push({ vari:'var(--red)',   teksti: j.pelaajatLista[0].joukkue+' — OVR laskussa (Δ'+j.avgDelta.toFixed(1)+'). Tapaa valmentaja.' });
  });

// ── KETJUANALYYSI ──
function renderKetjut() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;

  // Aggregoi ikäluokittain (P05=~18v, P06=~17v jne.)
  var ikaryhmät = {};
  Object.values(s.joukkueet).forEach(function(j) {
    var jnimi = j.pelaajatLista[0]&&j.pelaajatLista[0].joukkue || '';
    var match = jnimi.match(/[PT](\d{2})/);
    if (!match) return;
    var vuosi = parseInt('20'+match[1]);
    var ika = new Date().getFullYear() - vuosi;
    var ikaKey = 'U'+ika;
    if (!ikaryhmät[ikaKey]) ikaryhmät[ikaKey] = { ketjut: {} };
    Object.keys(j.avgKetjut).forEach(function(k){
      if (j.avgKetjut[k] == null) return;
      if (!ikaryhmät[ikaKey].ketjut[k]) ikaryhmät[ikaKey].ketjut[k] = [];
      ikaryhmät[ikaKey].ketjut[k].push(j.avgKetjut[k]);
    });
  });
  Object.values(ikaryhmät).forEach(function(ig){
    ig.avgKetjut = {};
    Object.keys(ig.ketjut).forEach(function(k){
      ig.avgKetjut[k] = ig.ketjut[k].length ? Math.round(avg(ig.ketjut[k])*10)/10 : null;
    });
  });
  var ikaJarjestetty = Object.keys(ikaryhmät).sort();

  var h = '';

  // Ketjukortit selityksineen
  h += '<div class="ketju-grid" style="margin-bottom:20px">';
  Object.entries(KETJU).forEach(function(entry) {
    var kn = entry[0], km = entry[1];
    // Laske seuratasolla
    var vals = [];
    Object.values(s.joukkueet).forEach(function(j){
      if (j.avgKetjut[kn]!=null) vals.push(j.avgKetjut[kn]);
    });
    var sAvg = vals.length ? Math.round(avg(vals)*10)/10 : null;

    h += '<div class="ketju-card">';
    h += '<div class="ketju-code" style="background:'+km.vari+'22;color:'+km.vari+'">'+km.nimi+'</div>';
    h += '<div class="ketju-plain">'+km.plain+'</div>';
    h += '<div class="ketju-field">'+km.kentta+'</div>';
    h += '<div style="font-size:11px;color:var(--muted2);font-style:italic;margin-bottom:10px">'+km.train+'</div>';

    if (sAvg != null) {
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
      h += '<div style="flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden">';
      h += '<div style="height:100%;width:'+Math.round(sAvg*10)+'%;background:'+km.vari+';border-radius:3px"></div></div>';
      h += '<span style="font-family:\'Bebas Neue\';font-size:22px;color:'+km.vari+'">'+sAvg+'</span>';
      h += '</div>';
    }

    // Ikäluokat
    if (ikaJarjestetty.length > 1) {
      h += '<div class="ketju-bars">';
      ikaJarjestetty.forEach(function(ik){
        var v = ikaryhmät[ik].avgKetjut[kn];
        if (v == null) return;
        h += '<div class="ketju-bar-row">';
        h += '<span class="ketju-age">'+ik+'</span>';
        h += '<div class="ketju-bar-track"><div class="ketju-bar-fill" style="width:'+Math.round(v*10)+'%;background:'+km.vari+'"></div></div>';
        h += '<span class="ketju-score" style="color:'+km.vari+'">'+v+'</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  h += '</div>';

  // Systemaattinen löydös
  var allVals = {};
  Object.values(s.joukkueet).forEach(function(j){
    Object.keys(j.avgKetjut).forEach(function(k){
      if (j.avgKetjut[k]==null) return;
      if (!allVals[k]) allVals[k]=[];
      allVals[k].push(j.avgKetjut[k]);
    });
  });
  var sorted = Object.entries(allVals).map(function(e){
    return { k:e[0], v: Math.round(avg(e[1])*10)/10 };
  }).sort(function(a,b){return a.v-b.v;});

  if (sorted.length >= 2) {
    var heikin = sorted[0], vahvin2 = sorted[sorted.length-1];
    var gap = Math.round((vahvin2.v - heikin.v)*10)/10;
    h += '<div class="insight warn">';
    h += '<div class="insight-label">Rakenteellinen havainto</div>';
    h += (KETJU[heikin.k]||{plain:heikin.k}).plain+' ('+heikin.v+'/10) ja '+(KETJU[vahvin2.k]||{plain:vahvin2.k}).plain+' ('+vahvin2.v+'/10) välinen ero on '+gap+' pistettä. ';
    h += 'Tämä kertoo, että harjoittelu painottuu selvästi tiettyihin liikeketjuihin. ';
    h += 'Tasapainoisempi kehitys vaatii tietoisen ohjauksen muutoksen.';
    h += '</div>';
  }

  document.getElementById('tabKetjut').innerHTML = h;
}

// ── PALLOLIITON KRITEERI 6 -LASKENTA ─────────────────────────
function laskeKriteeri6(s) {
  // Palloliiton hyväksymä tapa: OVR kehittynyt ensimmäisestä viimeiseen testiin
  // Ikäikkuna 10-15v, min 2 testiä, kokonaisia kalenterivuosia
  var seuranta = [], kehittyvat = 0;
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      var hist = p.qs_historia || [];
      if (ika < 10 || ika > 15) return;
      if (hist.length < 2) return;
      var first = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var last  = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (!first || !last) return;
      seuranta.push(last - first);
      if (last > first) kehittyvat++;
    });
  });
  var pct = seuranta.length ? Math.round(kehittyvat/seuranta.length*100) : 0;
  return { pct: pct, kehittyvat: kehittyvat, n: seuranta.length };
}

  if (!s) return;
  var joukkueet = Object.values(s.joukkueet);
  var krit6 = laskeKriteeri6(s);

  // Ketjukeskiarvot seuratasolla
  var sKetjut = {};
  joukkueet.forEach(function(j) {
    Object.keys(j.avgKetjut).forEach(function(k) {
      if (!sKetjut[k]) sKetjut[k] = [];
      if (j.avgKetjut[k] != null) sKetjut[k].push(j.avgKetjut[k]);
    });
  });
  var sAvg = {};
  Object.keys(sKetjut).forEach(function(k) {
    sAvg[k] = Math.round(avg(sKetjut[k])*10)/10;
  });

  // Liikeketjujen hyväksyttävyys Palloliiton testistöön
  var palloliitonTestit = {
    'SM-pallo':       { kriteeri: true, lbl: 'SM-pallo' },
    'SM ilman palloa':{ kriteeri: true, lbl: 'SM ilman palloa' },
    'Nopeus 5m':      { kriteeri: true, lbl: 'Nopeus 5m' },
    'Nopeus 10m':     { kriteeri: true, lbl: 'Nopeus 10m' },
    'Nopeus 30m':     { kriteeri: true, lbl: 'Nopeus 30m' },
    'Ketteryys':      { kriteeri: true, lbl: 'Ketteryys (kasirata)' },
    'Kevennyshyppy':  { kriteeri: true, lbl: 'Nopeusvoima (KH)' },
    'Syöttäminen':    { kriteeri: true, lbl: 'Lajitekniikka (syöttö)' }
  };

  // Kuinka monella pelaajalla on fys-dataa (Palloliitto-hyväksyttyjä testejä)
  var fysN = 0;
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      if ((p.fys_historia||[]).length > 0) fysN++;
    });
  });

  var kriteerit = [
    {
      id: '3', nimi: 'Dokumentoitu valmennuslinja', kategoria: 'TOIMINTA',
      kuvaus: 'Seuralla on ikäkausikohtaiset tavoitteet, sisällöt ja vastaava henkilö.',
      tm_rooli: 'TalentMaster 5D Framework™ + Pelaajapolku U7–U19 on dokumentoitu metodologia ikäkausikohtaisine ketjutavoitteineen.',
      status: 'strong', pisteet: '65–85',
      naytto: 'VP-näkymän ketjuanalyysi per ikäluokka + TalentMaster Method Manual'
    },
    {
      id: '4', nimi: 'Valmennetaan valmennuslinjan mukaisesti', kategoria: 'TOIMINTA',
      kuvaus: 'Joukkuevalmentajien ymmärrystä seuran linjasta edistetään järjestelmällisesti.',
      tm_rooli: 'Valmentajan viikkosuunnitelma + ketjudata osoittaa mihin harjoittelu kohdistuu. VP-näkymä paljastaa poikkeamat.',
      status: 'medium', pisteet: '40–60',
      naytto: joukkueet.length+' joukkueen ketjudata · '+joukkueet.reduce(function(a,j){return a+j.testeja;},0)+' testiä'
    },
    {
      id: '5', nimi: 'Arvoperusteiset toimintatavat', kategoria: 'TOIMINTA',
      kuvaus: 'Johtamisjärjestelmä: strateginen, taktinen ja operatiivinen taso jäsenneltynä.',
      tm_rooli: 'VP-dashboard on seuran johtamisjärjestelmä: seuran ketjuprofiili (strateginen) → joukkueen tila (taktinen) → viikon toimenpiteet (operatiivinen).',
      status: 'strong', pisteet: '65–85',
      naytto: 'TalentMaster_VP.html — valmennuspäällikön johtamisnäkymä'
    },
    {
      id: '6', nimi: 'Pelaajien suorituskyky kehittynyt', kategoria: 'TULOKSET',
      kuvaus: 'Yli 60% seurannan pelaajista (10–15v) kehittyy johdonmukaisesti 3–5 vuoden aikana.',
      tm_rooli: 'Palloliiton hyväksymät testit (SM-pallo, nopeus, ketteryys) mitattu ja aikasarjat 2017–2020.',
      status: krit6.pct >= 60 ? 'strong' : krit6.pct >= 45 ? 'medium' : 'weak',
      pisteet: krit6.pct >= 60 ? '65–85' : krit6.pct >= 45 ? '40–60' : '15–35',
      naytto: krit6.pct+'% kehittyy · '+krit6.kehittyvat+'/'+krit6.n+' pelaajaa · '+fysN+' pelaajalla fyysinen aikasarja'
    },
    {
      id: '7', nimi: 'Tavoitteet saavutettu, jäsenet tyytyväisiä', kategoria: 'TULOKSET',
      kuvaus: 'Aikasarjoja 3–5v, graafit joilla mittaustulokset jalostetaan, vertailutieto kilpailijoista.',
      tm_rooli: 'Seuravertailu 24 seuraa — vertailutieto on se lisäpisteytekijä jonka Palloliitto mainitsee eksplisiittisesti.',
      status: 'strong', pisteet: '75–85 (lisäpisteet)',
      naytto: '24 seuran ketjuvertailu · aikasarjat 2017–2020 · graafit VP-näkymässä'
    }
  ];

  var statusCol = { strong: 'var(--green)', medium: 'var(--amber)', weak: 'var(--red)' };
  var statusLbl = { strong: '✅ Vahva näyttö', medium: '⚠️ Osittainen', weak: '❌ Puuttuu' };

  var h = '';

  // Päämetriikka ylhäällä — se yksi luku
  var k6col = krit6.pct >= 60 ? 'var(--green)' : krit6.pct >= 45 ? 'var(--amber)' : 'var(--red)';
  h += '<div class="card" style="border-color:'+(krit6.pct>=60?'rgba(52,211,153,.4)':'rgba(248,113,113,.3)')+';margin-bottom:20px">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">';
  h += '<div><div class="card-title">Palloliiton kriteeri 6 — pelaajien kehittyminen</div>';
  h += '<div style="font-size:12px;color:var(--muted2)">10–15-vuotiaat · min. 2 testiä · OVR kehittynyt ensimmäisestä viimeiseen testiin</div></div>';
  h += '<div style="text-align:right">';
  h += '<div style="font-family:'Bebas Neue';font-size:60px;line-height:1;color:'+k6col+'">'+krit6.pct+'%</div>';
  h += '<div style="font-size:12px;color:'+k6col+'">'+(krit6.pct>=60?'✅ Täyttää Palloliiton 60% vaatimuksen':'❌ Alle 60% vaatimuksen')+'</div>';
  h += '</div></div>';
  // Mini-progress
  h += '<div style="margin-top:14px">';
  h += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:4px">';
  h += '<span>0%</span><span style="color:var(--amber)">60% kynnys</span><span>100%</span></div>';
  h += '<div style="height:10px;background:var(--bg);border-radius:5px;overflow:visible;position:relative">';
  h += '<div style="height:100%;width:'+krit6.pct+'%;background:'+k6col+';border-radius:5px;transition:width .6s"></div>';
  h += '<div style="position:absolute;top:-3px;left:60%;width:2px;height:16px;background:var(--amber);border-radius:1px"></div>';
  h += '</div>';
  h += '<div style="margin-top:6px;font-size:12px;color:var(--muted2)">'+krit6.kehittyvat+' pelaajaa kehittyy / '+krit6.n+' seurannassa · '+_aktivSeura+'</div>';
  h += '</div></div>';

  // Kriteerikortit
  h += '<div class="card-title" style="margin-bottom:12px">TalentMaster ja Palloliiton arviointikriteerit</div>';
  kriteerit.forEach(function(k) {
    var sc = statusCol[k.status];
    var sl = statusLbl[k.status];
    h += '<div class="card" style="border-left:3px solid '+sc+';border-radius:0 14px 14px 0;margin-bottom:12px">';
    h += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px">';
    h += '<div><div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">'+k.kategoria+' · Kriteeri '+k.id+'</div>';
    h += '<div style="font-size:15px;font-weight:600">'+k.nimi+'</div>';
    h += '<div style="font-size:12px;color:var(--muted2);margin-top:3px">'+k.kuvaus+'</div></div>';
    h += '<div style="text-align:right;flex-shrink:0">';
    h += '<div style="font-size:11px;color:'+sc+';font-weight:600">'+sl+'</div>';
    h += '<div style="font-family:'Bebas Neue';font-size:20px;color:'+sc+'">'+k.pisteet+' p</div>';
    h += '</div></div>';
    h += '<div style="background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px">';
    h += '<div style="font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">TalentMaster vastaa tähän</div>';
    h += '<div style="font-size:12px;color:var(--text);line-height:1.6">'+k.tm_rooli+'</div>';
    h += '</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">📊 Näyttö: '+k.naytto+'</div>';
    h += '</div>';
  });

  // Puuttuvat osa-alueet
  h += '<div class="card" style="border-color:rgba(248,113,113,.2)">';
  h += '<div class="card-title">Osa-alueet jotka TalentMaster ei vielä kata</div>';
  var puuttuvat = [
    {id:'4', asia:'Harjoittelunseurantamalli', selite:'Palloliiton malli: liikkumisen määrä, pallokosketukset, intensiteetti harjoituksessa. Vaatii paikan päällä tehtävän havainnoinnin.'},
    {id:'7', asia:'Jäsentyytyväisyyskyselyt', selite:'Pelaajien, vanhempien ja valmentajien tyytyväisyyskysely — oma prosessi jota TalentMaster ei tue.'},
    {id:'7', asia:'H&H-polku (psykososiaalinen)', selite:'Hyvä ihminen & Hyvä pelaaja -kehityspolku. Tulevaisuuden kehityskohde TalentMasteriin.'}
  ];
  puuttuvat.forEach(function(p) {
    h += '<div class="alert-item">';
    h += '<div class="alert-dot" style="background:var(--red)"></div>';
    h += '<div><div style="font-size:13px;font-weight:500;color:var(--text)">Kriteeri '+p.id+': '+p.asia+'</div>';
    h += '<div style="font-size:12px;color:var(--muted2);margin-top:2px">'+p.selite+'</div></div>';
    h += '</div>';
  });
  h += '</div>';

  document.getElementById('tabKriteerit').innerHTML = h;
}

function metCard(l,v,col){return '<div class="metric-card"><div class="metric-label">'+l+'</div><div class="metric-value" style="font-size:22px;color:'+(col||'var(--text)')+'">'+v+'</div></div>';}
function suljeMod(){document.getElementById('joukkueModal').classList.remove('open');}
</script>
</body>
