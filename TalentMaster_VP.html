<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TalentMaster — Valmennuspäällikkö</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0F17;
  --bg2:    #111827;
  --bg3:    #1A2235;
  --card:   #1E2A3D;
  --border: #263347;
  --text:   #E8EDF5;
  --muted:  #8A9BB5;
  --muted2: #5A6A82;
  --teal:   #00D4AA;
  --blue:   #4B9EFF;
  --amber:  #F59E0B;
  --red:    #F87171;
  --green:  #34D399;
  --purple: #A78BFA;

  --taka:   #4B9EFF;
  --etu:    #34D399;
  --sivu:   #F59E0B;
  --kierto: #F87171;
  --sm:     #A78BFA;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#sLogin {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.login-box {
  width: 340px; text-align: center;
}
.login-logo { font-family: 'Bebas Neue'; font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
.login-title { font-family: 'Bebas Neue'; font-size: 36px; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
.pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--border); transition: all .15s; }
.pin-dot.filled { background: var(--teal); border-color: var(--teal); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.pin-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-family: 'Bebas Neue'; font-size: 24px; padding: 14px;
  cursor: pointer; transition: all .1s;
}
.pin-btn:active { transform: scale(.94); background: var(--card); }
.pin-err { font-size: 12px; color: var(--red); height: 18px; }
.pin-demo { margin-top: 16px; }
.pin-demo button {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--teal); font-size: 12px; padding: 8px 16px; cursor: pointer;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ── TOPBAR ── */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-logo { font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: 2px; color: var(--muted); }
.topbar-title { font-family: 'Bebas Neue'; font-size: 20px; color: var(--text); flex: 1; }
.seura-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Sans'; font-size: 13px; padding: 6px 10px;
  cursor: pointer;
}
.logout-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer;
}

/* ── NAV TABS ── */
.nav-tabs {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; padding: 0 20px; overflow-x: auto;
}
.nav-tab {
  padding: 12px 16px; font-size: 13px; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s;
}
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

/* ── CONTENT ── */
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }

/* ── METRIC CARDS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.metric-value { font-family: 'Bebas Neue'; font-size: 32px; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; font-weight: 600; }

/* ── TWO COLUMN ── */
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

/* ── JOUKKUE ROW ── */
.joukkue-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s;
}
.joukkue-row:last-child { border-bottom: none; }
.joukkue-row:hover { background: rgba(255,255,255,.02); border-radius: 8px; padding-left: 8px; }
.joukkue-name { font-size: 13px; font-weight: 500; min-width: 110px; }
.joukkue-meta { font-size: 11px; color: var(--muted2); min-width: 60px; }
.mini-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.mini-bar-row { display: flex; align-items: center; gap: 6px; }
.mini-bar-track { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.mini-bar-label { font-size: 10px; color: var(--muted2); width: 28px; text-align: right; }
.delta-badge { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── KETJU EXPLAINER ── */
.ketju-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.ketju-card { background: var(--bg3); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
.ketju-code { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 8px; }
.ketju-plain { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.ketju-field { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.ketju-bars { display: flex; flex-direction: column; gap: 5px; }
.ketju-bar-row { display: flex; align-items: center; gap: 8px; }
.ketju-bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ketju-bar-fill { height: 100%; border-radius: 3px; }
.ketju-age { font-size: 10px; color: var(--muted2); min-width: 46px; }
.ketju-score { font-size: 11px; font-weight: 500; min-width: 24px; text-align: right; }

/* ── INSIGHT BOX ── */
.insight { background: rgba(0,212,170,.07); border: 1px solid rgba(0,212,170,.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
.insight-label { font-size: 10px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.insight.warn { background: rgba(245,158,11,.07); border-color: rgba(245,158,11,.2); }
.insight.warn .insight-label { color: var(--amber); }

/* ── SEURA COMPARISON TABLE ── */
.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table th { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .5px; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.comp-table td { padding: 9px 8px; border-bottom: 1px solid rgba(38,51,71,.5); vertical-align: middle; }
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: rgba(255,255,255,.02); }
.chain-pill { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; }

/* ── ALERT ROWS ── */
.alert-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.alert-item:last-child { border-bottom: none; }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
</style>
</head>

// Laske pelaajan tavoitetaso yhdessä testissä
// palauttaa: { taso: 1-5, ymparisto: 'alle'/'tasolla'/'yli', raja: numero }
function laskeTavoitetaso(testiNimi, arvo, ikavuosi, sukupuoli) {
  var sp = (sukupuoli === 'female') ? 'tytöt' : 'pojat';
  var testiData = EERIKKILA_NORMIT[sp] && EERIKKILA_NORMIT[sp][testiNimi];
  if (!testiData) return null;
  
  var ika = Math.floor(ikavuosi);
  if (ika < 10) ika = 10;
  if (ika > 19) ika = 19;
  
  var rajat = testiData.tasot[ika];
  if (!rajat) return null;
  
  var alas = testiData.alas;
  
  if (testiData.kolmiportainen) {
    // T2/T3 raja: rajat[0]=T3-raja, rajat[1]=T2-raja
    if (alas) {
      if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo <= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    } else {
      if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo >= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    }
  }
  
  // 5-portainen: rajat = [T3, T4, T5, ref]
  // alempi=parempi: T3 = yläarvo, T4 < T3, T5 < T4
  if (alas) {
    if (arvo <= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo <= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo <= (rajat[0] * 1.05) ? 2 : 1, raja: rajat[0] };
  } else {
    if (arvo >= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo >= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo >= (rajat[0] * 0.95) ? 2 : 1, raja: rajat[0] };
  }
}

// Laske kansallinen tavoitetaso (T3+) kaikista testeistä
// Palloliiton kriteeri: saavutettu jos max 2 testiä alle T3
function laskeKansallinenTavoitetaso(mittaukset, ikavuosi, sukupuoli) {
  var testit = ['Nopeus 5m','Nopeus 10m','Nopeus 30m','Ketteryys','SM-pallo','Kevennyshyppy','Syöttäminen'];
  var tulokset = [];
  var alleT3 = 0;
  
  testit.forEach(function(t) {
    var arvo = mittaukset[t];
    if (arvo == null) return;
    var tulos = laskeTavoitetaso(t, arvo, ikavuosi, sukupuoli);
    if (!tulos) return;
    tulokset.push({ testi: t, arvo: arvo, taso: tulos.taso, raja: tulos.raja });
    if (tulos.taso < 3) alleT3++;
  });
  
  // Palloliiton ehto: kansallisella tavoitetasolla jos max 2 testiä alle T3
  var kansallinen = tulokset.length >= 3 && alleT3 <= 2;
  
  return {
    tulokset: tulokset,
    kansallinen: kansallinen,
    alleT3: alleT3,
    testejaYhteensa: tulokset.length
  };
}

var TM_SUUNTA = {"Nopeus 5m": true, "Nopeus 10m": true, "Nopeus 30m": true, "Ketteryys": true, "SM ilman palloa": true, "SM-pallo": true, "Kevennyshyppy": false, "Syottaminen": true};

function haePalloliittoNormi(testi, arvo, sukup, ika) {
  var data = TM_PALLOLIITTO[sukup];
  if (!data || !data[testi]) return null;
  var prefix = sukup === "male" ? "P" : "T";
  var v = Math.min(19, Math.max(10, Math.floor(ika)));
  var key = prefix + v;
  var t = data[testi][key];
  if (!t) return null;
  var alas = TM_SUUNTA[testi] !== false;
  var taso;
  if (alas) {
    if (arvo <= t.t5) taso = 5;
    else if (arvo <= t.t4) taso = 4;
    else if (arvo <= t.t3) taso = 3;
    else if (arvo <= t.t2) taso = 2;
    else taso = 1;
  } else {
    if (arvo >= t.t5) taso = 5;
    else if (arvo >= t.t4) taso = 4;
    else if (arvo >= t.t3) taso = 3;
    else if (arvo >= t.t2) taso = 2;
    else taso = 1;
  }
  var t3val = (t.t3 !== null && t.t3 !== undefined) ? t.t3 : t.t4;
  return { taso: taso, tavoitetasolla: taso >= 3, t3: t3val, t5: t.t5, alas: alas };
}

function laskeNormitasoProfiili(fys_historia, sukup, ikaKrono) {
  if (!fys_historia || !fys_historia.length) return null;
  var TESTIT = ["SM-pallo", "SM ilman palloa", "Nopeus 10m", "Nopeus 30m", "Kevennyshyppy"];
  var viimeisin = fys_historia[fys_historia.length - 1].mittaukset || {};
  var tulokset = [], tavoite_n = 0, tehty_n = 0;
  TESTIT.forEach(function(t) {
    var v = viimeisin[t];
    if (v == null) return;
    var r = haePalloliittoNormi(t, v, sukup, ikaKrono);
    if (!r) return;
    tehty_n++;
    if (r.tavoitetasolla) tavoite_n++;
    tulokset.push({ testi: t, arvo: v, taso: r.taso, tavoitetasolla: r.tavoitetasolla, t3: r.t3, alas: r.alas });
  });
  if (tehty_n < 3) return null;
  var alle_normin = tehty_n - tavoite_n;
  return {
    tavoitetasolla: alle_normin <= 2,
    normi_pct: Math.round(tavoite_n / tehty_n * 100),
    normi_n: tavoite_n, tehty_n: tehty_n,
    alle_normin: alle_normin, tulokset: tulokset
  };
}

function laskeNormitasoSeuralle(s) {
  var n = 0, tavoite = 0, kehitysalueet = {};
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika < 12 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var profii = laskeNormitasoProfiili(fys, p.sukupuoli, ika);
      if (!profii) return;
      n++;
      if (profii.tavoitetasolla) tavoite++;
      profii.tulokset.forEach(function(t) {
        if (!t.tavoitetasolla)
          kehitysalueet[t.testi] = (kehitysalueet[t.testi] || 0) + 1;
      });
    });
  });
  if (n < 5) return null;
  var pct = Math.round(tavoite / n * 100);
  var ka = Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  return { pct: pct, tavoite: tavoite, n: n, tavoitetasolla: pct >= 66, kehitysalueet: ka };
}


// ── PIKAKIRJAUS — localStorage-pohjainen kenttähavainnointi ──
// Tallentaa: seura + joukkue + päivämäärä + innostavuus + liikkuminen + toimenpide

function _pikaKey(seura, jnimi) {
  return 'pika_' + seura.replace(/\s/g,'_') + '_' + jnimi.replace(/\s/g,'_');
}

function haePikaKirjaukset(seura, jnimi) {
  // Palauttaa listan kaikista kirjauksista (max 20 viimeistä)
  try {
    var raw = localStorage.getItem(_pikaKey(seura, jnimi));
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function tallennaKirjaus(seura, jnimi, inno, liike, toimenpide) {
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  kirjaukset.unshift({
    pvm: new Date().toISOString(),
    inno: inno,
    liike: liike,
    toimenpide: toimenpide,
    tekija: 'VP'
  });
  // Säilytetään max 20 kirjausta per joukkue
  if (kirjaukset.length > 20) kirjaukset = kirjaukset.slice(0, 20);
  try {
    localStorage.setItem(_pikaKey(seura, jnimi), JSON.stringify(kirjaukset));
  } catch(e) { console.warn('localStorage täynnä'); }
}

function viimeisinKirjaus(seura, jnimi) {
  var k = haePikaKirjaukset(seura, jnimi);
  return k.length ? k[0] : null;
}

function kirjausPaiviatten(pvm) {
  // Kuinka monta päivää sitten kirjaus tehtiin
  if (!pvm) return 999;
  return Math.floor((Date.now() - new Date(pvm).getTime()) / 86400000);
}

function liikenneValo(seura, jnimi) {
  // Palauttaa {col, label, paivat} liikennevalo-logiikalla
  var v = viimeisinKirjaus(seura, jnimi);
  if (!v) return { col: 'var(--muted)', label: 'Ei kirjauksia', paivat: 999 };
  var d = kirjausPaiviatten(v.pvm);
  if (d <= 14)  return { col: 'var(--green)', label: d === 0 ? 'Tänään' : d + 'pv sitten', paivat: d };
  if (d <= 30)  return { col: 'var(--amber)', label: d + 'pv sitten', paivat: d };
  return { col: 'var(--red)', label: d + 'pv sitten', paivat: d };
}

// ── TALENTTIPELAAJAT — localStorage-pohjainen nimeäminen ──
// Avain: 'talentit_<seura>_<kausi>' → Set of player IDs
// Kausi = '2025' (nykyinen, voidaan laajentaa)

function _talentKey(seura) {
  return 'talentit_' + seura.replace(/\s+/g,'_') + '_2025';
}

function haeTalentit(seura) {
  try {
    var raw = localStorage.getItem(_talentKey(seura));
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function tallennaталентit(seura, idSet) {
  try {
    localStorage.setItem(_talentKey(seura), JSON.stringify([...idSet]));
  } catch(e) { console.warn('localStorage virhe'); }
}

function onTalentti(seura, pid) {
  return haeTalentit(seura).has(pid);
}

function merkitseTalentti(seura, pid) {
  var set = haeTalentit(seura);
  if (set.has(pid)) {
    set.delete(pid);
  } else {
    set.add(pid);
  }
  tallennaталентit(seura, set);
}

// ── RENDER: Talentit-välilehti ──
function renderTalentit() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;

        // OVR-kehitys

          var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
          var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
          if (f && l) delta = Math.round((l-f)*100)/100;

        var latestOvr = ovrFromKetjut((hist[hist.length-1]&&(hist[hist.length-1].results||{}).ketjut)||{});

  // Järjestä: ensin talentit (normitaso ensin), sitten muut

    // Normitasostatuksen mukaan: tavoitetasolla > kehittyy > tarkkailu

  var ovrNousu = nimetyt.filter(function(x){ return x.delta > 0.2; }).length;

  var ovrLasku = nimetyt.filter(function(x){ return x.delta !== null && x.delta < -0.2; }).length;
  var riskiRyhma = nimetyt.filter(function(x){

  h += '<div style="font-size:11px;color:var(--muted2);margin-top:4px">pelaajaa tarkkailussa</div>';
  if (riskiRyhma.length) {
    h += '<div style="margin-top:6px;display:flex;flex-direction:column;gap:2px">';
    riskiRyhma.slice(0,3).forEach(function(x){ h += '<div style="font-size:10px;color:var(--red)">'+x.p.etunimi+' '+x.p.sukunimi+'</div>'; });
    if (riskiRyhma.length > 3) h += '<div style="font-size:10px;color:var(--muted2)">+ '+(riskiRyhma.length-3)+' muuta</div>';
    h += '</div>';

  }
  h += '</div>';

  h += '</div></div>'; // grid + card

  // ── PELAAJALISTAUS: kaikki 12-15v, merkkausnappeineen ──
  var nakymassa = kaikki1215;
  var osioNimetyt = nakymassa.filter(function(x){ return x.isTalentti; });
  var osioMuut = nakymassa.filter(function(x){ return !x.isTalentti; });

  function renderOsio(lista, title, showAdd) {
    if (!lista.length && !showAdd) return '';
    var oh = '<div class="card" style="margin-bottom:12px">';
    oh += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">';
    oh += title + ' <span style="color:var(--muted2)">(' + lista.length + ')</span></div>';

    // Otsikkorivi
    oh += '<div style="display:grid;grid-template-columns:1fr 40px 60px 80px 48px;gap:4px;';

    oh += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase">Pelaaja</div>';

    oh += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;text-align:center">OVR</div>';

      if (x.profii) {
        normCol = x.profii.tavoitetasolla ? 'var(--green)' : x.profii.normi_pct >= 45 ? 'var(--amber)' : 'var(--red)';
        normBadge = '<span style="font-size:11px;font-weight:700;color:'+normCol+'">'+x.profii.normi_pct+'%</span>';
      } else {
        normCol = 'var(--muted)'; normBadge = '<span style="color:var(--muted2)">—</span>';
      }
      var ovrCol = x.ovr >= 7 ? 'var(--green)' : x.ovr >= 5 ? 'var(--amber)' : 'var(--muted)';
      var pid = p.id || p.palloliitoId || (p.etunimi + p.sukunimi);
      var deltaStr = x.delta != null ? (x.delta >= 0 ? '+' : '') + x.delta.toFixed(1) : '';
      var deltaCol = x.delta > 0 ? 'var(--green)' : x.delta < 0 ? 'var(--red)' : 'var(--muted)';

      oh += '<div style="display:grid;grid-template-columns:1fr 40px 60px 80px 48px;gap:4px;';
      oh += 'padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:center">';

      // Nimi + joukkue
      oh += '<div>';
      oh += '<div style="font-size:12px;font-weight:500">'+p.etunimi+' '+p.sukunimi+'</div>';
      oh += '<div style="font-size:10px;color:var(--muted2)">'+x.jnimi;
      if (deltaStr) oh += ' · <span style="color:'+deltaCol+'">'+deltaStr+' OVR</span>';
      oh += '</div></div>';

      // Ikä
      oh += '<div style="text-align:center;font-size:11px;color:var(--muted2)">'+x.ika.toFixed(1)+'</div>';

      // OVR
      oh += '<div style="text-align:center;font-family:\\"Bebas Neue\\";font-size:18px;color:'+ovrCol+'">'+((x.ovr||'').toString()||'—')+'</div>';

      // Normitaso
      oh += '<div style="text-align:center">'+normBadge+'</div>';

      // Merkintä-nappi
      var btnStyle = x.isTalentti
        ? 'background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.3);color:var(--teal)'
        : 'background:var(--bg3);border:1px solid var(--border);color:var(--muted)';
      oh += '<div style="text-align:center">';
      oh += '<button onclick="vaihdaTalentti(\''+pid+'\')" data-pid="'+pid+'" ';
      oh += 'style="font-size:11px;border-radius:7px;padding:3px 8px;cursor:pointer;'+btnStyle+';font-family:\\"DM Sans\\"">';
      oh += (x.isTalentti ? '⭐' : '+') + '</button>';
      oh += '</div>';

      oh += '</div>';
    });

    oh += '</div>';
    return oh;
  }

  h += renderOsio(osioNimetyt, '⭐ Nimetyt talenttipelaajat', true);
  h += renderOsio(osioMuut, 'Muut 12–15v pelaajat — merkitse talenttiohjelmaan', false);

  document.getElementById('tabTalentit').innerHTML = h;
}

var _vpPin = '';
var VP_PINS = { '5555': 'demo', '6666': 'fcl', '7777': 'sjk', '8888': 'uj_demo' };
// Roolit: 'vp' = valmennuspäällikkö, 'uj' = urheilujohtaja
// UJ näkee kaikki seurat ja talenttikansion muttei kirjaa pikakirjauksia
var VP_ROOLIT = { '5555': 'vp', '6666': 'vp', '7777': 'vp', '8888': 'uj' };
var _vpRooli = 'vp'; // oletusrooli

function addVpPin(n) {
  if (_vpPin.length >= 4) return;
  _vpPin += n;
  updateDots();
  if (_vpPin.length === 4) setTimeout(checkPin, 150);
}
function clearVpPin() {
  _vpPin = _vpPin.slice(0,-1);
  updateDots();
  document.getElementById('pinErr').textContent = '';
}
function updateDots() {
  for(var i=0;i<4;i++) {
    document.getElementById('pd'+i).className = 'pin-dot' + (i < _vpPin.length ? ' filled' : '');
  }
}
function checkPin() {
  if (VP_PINS[_vpPin]) {
    _vpRooli = VP_ROOLIT[_vpPin] || 'vp';
    document.getElementById('sLogin').classList.remove('active');
    document.getElementById('sDash').classList.add('active');
    initDash();
  } else {
    document.getElementById('pinErr').textContent = 'Väärä PIN-koodi';
    _vpPin = '';
    updateDots();
  }
}
function kirjauduUlos() {
  _vpPin = '';
  updateDots();
  document.getElementById('sDash').classList.remove('active');
  document.getElementById('sLogin').classList.add('active');
}

// ── DATA PROCESSING ──
var _seuraData = {};   // aggregated per seura
var _aktivSeura = '';
var _aktivTab = 0;

    // Näytä selkeä viesti käyttäjälle sisällön sijaan

      '<div style="padding:40px;text-align:center;color:var(--muted2)">' +

function aggregateData(lookup) {
  var seurat = {};
  Object.values(lookup).forEach(function(p) {
    var s = p.seura || 'Tuntematon';
    var j = p.joukkue || 'Tuntematon';
    if (!seurat[s]) seurat[s] = { pelaajia:0, testeja:0, joukkueet:{} };
    seurat[s].pelaajia++;
    if (!seurat[s].joukkueet[j]) seurat[s].joukkueet[j] = {
      pelaajia:0, testeja:0, ketjut:{}, deltat:[], gems:0,
      fys:{}, pelaajatLista:[]
    };
    var jd = seurat[s].joukkueet[j];
    jd.pelaajia++;
    jd.pelaajatLista.push(p);
    // Kerää testidatumeja syntymävuosiarvion laskemiseksi
    if (!jd._pvmList) jd._pvmList = [];
    if (!jd._ikaList) jd._ikaList = [];
    (p.fys_historia||[]).forEach(function(fh){ if(fh.date) jd._pvmList.push(parseInt(fh.date.substring(0,4))); });
    var bika = (p.bioIka||{}).krono; if(bika) jd._ikaList.push(bika);
    var hist = p.qs_historia || [];
    jd.testeja += hist.length;
    seurat[s].testeja += hist.length;
    hist.forEach(function(qs) {
      var k = (qs.results||{}).ketjut||{};
      Object.keys(k).forEach(function(kn) {
        if (!jd.ketjut[kn]) jd.ketjut[kn] = [];
        jd.ketjut[kn].push(k[kn].pisteet||0);
      });
      if ((qs.results||{}).gem) jd.gems++;
    });
    if (hist.length >= 2) {
      var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (f && l) jd.deltat.push(l-f);
    }
    (p.fys_historia||[]).forEach(function(fh) {
      Object.keys(fh.mittaukset||{}).forEach(function(mk) {
        var v = fh.mittaukset[mk];
        if (v != null) {
          if (!jd.fys[mk]) jd.fys[mk] = [];
          jd.fys[mk].push(v);
        }
      });
    });
  });
  // Laske keskiarvot
  Object.values(seurat).forEach(function(s) {
    Object.values(s.joukkueet).forEach(function(j) {
      j.avgKetjut = {};
      Object.keys(j.ketjut).forEach(function(k) {
        var arr = j.ketjut[k];
        j.avgKetjut[k] = arr.length ? Math.round(avg(arr)*10)/10 : null;
      });
      j.avgDelta = j.deltat.length ? Math.round(avg(j.deltat)*100)/100 : null;
      j.avgFys = {};
      Object.keys(j.fys).forEach(function(k) {
        j.avgFys[k] = Math.round(avg(j.fys[k])*100)/100;
      });
      j.avgOvr = ovrFromObj(j.avgKetjut);
      // Laske syntymävuosiarvio mediaanitestivuosi - mediaanikrono
      if (j._pvmList && j._pvmList.length && j._ikaList && j._ikaList.length) {
        var pvmS = j._pvmList.slice().sort(); var ikaS = j._ikaList.slice().sort();
        var medPvm = pvmS[Math.floor(pvmS.length/2)];
        var medIka = ikaS[Math.floor(ikaS.length/2)];
        j.syntymaVuosi = Math.round(medPvm - medIka);
      } else { j.syntymaVuosi = null; }
    });
  });
  return seurat;
}

function avg(arr) { return arr.reduce(function(a,b){return a+b;},0)/arr.length; }
function ovrFromKetjut(k) {
  var vals = Object.values(k).map(function(v){return v.pisteet||0;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}
function ovrFromObj(k) {
  var vals = Object.values(k).filter(function(v){return v!=null;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}

// ── NAVIGATION ──
var _tabs = ['tabYleiskuva','tabJoukkueet','tabKetjut','tabVertailu','tabKriteerit','tabTalentit','tabTavoitetasot','tabNormitasot'];
function vaihda(idx, el) {
  _aktivTab = idx;
  _tabs.forEach(function(t){ document.getElementById(t).style.display='none'; });
  document.getElementById(_tabs[idx]).style.display='block';
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  renderTab(idx);
}
function vaihdaSeura(s) {
  _aktivSeura = s;
  renderAll();
}
function renderAll() {
  renderTab(0);
  // Muut tabit renderöidään tarvittaessa
}
function renderTab(idx) {
  if      (idx===0) renderYleiskuva();
  else if (idx===1) renderJoukkueet();
  else if (idx===2) renderKetjut();
  else if (idx===3) renderVertailu();
  else if (idx===4) renderKriteerit();
  else if (idx===5) renderTalentit();
  else if (idx===6) renderTavoitetasot();
  else if (idx===7) renderNormitasot();
}

// ── KETJU META ──
var KETJU = {
  taka:   { nimi:'Takaketju', plain:'Kiihdytys ja jarrutus', vari:'var(--taka)', kentta:'Lähtönopeus, paineen alla pakeneminen, läpäisypassin katkaisu.', train:'Räjähtävät lähdöt, lonkan voima, eksentrinen harjoittelu.' },
  etu:    { nimi:'Etuketju',  plain:'Hyppy ja ponnistus',    vari:'var(--etu)',  kentta:'Ilmapallot, hypyt maalilla ja puolustuksessa.', train:'Kyykyt, plyometriikka. Huom: PHV-huipussa kuormitus alas.' },
  sivu:   { nimi:'Sivuketju', plain:'Suunnanmuutos ja 1v1',  vari:'var(--sivu)', kentta:'1v1-puolustus, sivuttainen ketteryys, laidanhallinta.', train:'Sivuttaishypyt, lateraaliset radat, nilkan stabiliteetti.' },
  kierto: { nimi:'Kiertoketju',plain:'Laukaus ja syöttövoima',vari:'var(--kierto)',kentta:'Laukausnopeus, pitkä syöttö, vartalon kiertoliike.', train:'Rotaatioharjoittelu, medicinepallot. Hitain ketju kehittyä.' },
  sm:     { nimi:'SM-ketju',  plain:'Pallollinen reaktio',   vari:'var(--sm)',   kentta:'Ensimmäinen kosketus, pallollinen suunnanmuutos alle 1s.', train:'SM-pallo-harjoitteet, reaktiolähdöt. Paras ikäikkuna 10–14v.' }
};

function ketjuColor(kn) { return (KETJU[kn]||{}).vari || 'var(--muted)'; }
function statusColor(delta) {
  if (delta == null) return 'var(--muted2)';
  if (delta >= 1.5) return 'var(--green)';
  if (delta >= 0)   return 'var(--amber)';
  return 'var(--red)';
}
function statusLabel(delta) {
  if (delta == null) return 'Ei dataa';
  if (delta >= 1.5) return 'Kehittyy';
  if (delta >= 0)   return 'Tasainen';
  return 'Laskussa';
}

// ── YLEISKUVA ──
function renderYleiskuva() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;
  var joukkueet = Object.values(s.joukkueet);
  var kokonaisTesteja = s.testeja;
  var kehittyvat = joukkueet.filter(function(j){return j.avgDelta!=null&&j.avgDelta>=1;}).length;
  var laskussa   = joukkueet.filter(function(j){return j.avgDelta!=null&&j.avgDelta<0;}).length;
  var gemsTotal  = joukkueet.reduce(function(a,j){return a+j.gems;},0);

  // Ketjupuutteet seuratasolla
  var sKetjut = {};
  joukkueet.forEach(function(j){
    Object.keys(j.avgKetjut).forEach(function(k){
      if (!sKetjut[k]) sKetjut[k] = [];
      if (j.avgKetjut[k] != null) sKetjut[k].push(j.avgKetjut[k]);
    });
  });
  var sAvgKetjut = {};

  });

  // Löydä heikoin ketju
  var ketjuSorted = Object.entries(sAvgKetjut).filter(function(e){return e[1]!=null;}).sort(function(a,b){return a[1]-b[1];});

  var vahvin  = ketjuSorted[ketjuSorted.length-1];

  // Toimenpiteet
  var toimenpiteet = [];
  joukkueet.sort(function(a,b){return (a.avgDelta||0)-(b.avgDelta||0);}).forEach(function(j){
    if (j.avgDelta != null && j.avgDelta < 0)
      toimenpiteet.push({ vari:'var(--red)',   teksti: j.pelaajatLista[0].joukkue+' — OVR laskussa (Δ'+j.avgDelta.toFixed(1)+'). Tapaa valmentaja.' });
  });
  if (heikoin) toimenpiteet.push({ vari:'var(--amber)', teksti: (KETJU[heikoin[0]]||{plain:heikoin[0]}).plain+' on seuran heikoin ketju ('+heikoin[1]+'). Päivitä harjoitusohjelma.' });
  if (kehittyvat > 0) toimenpiteet.push({ vari:'var(--green)', teksti: kehittyvat+' joukkuetta kehittyy hyvin. Jaa hyvät käytännöt muille valmentajille.' });

  var h = '';

  // Metrics
  // Laske Palloliiton kriteeri 6: kehittyvien % (10-15v, min 2 testiä)
  var krit6 = laskeKriteeri6(s);
  var normAnalyysi = (typeof laskeNormitasoSeuralle==='function') ? laskeNormitasoSeuralle(s) : null;
  var normData = normAnalyysi ? normAnalyysi.pct : '—';

  h += '<div class="metrics-grid">';
  h += metricCard('Pelaajia', s.pelaajia, _aktivSeura);
  h += metricCard('Joukkueet', joukkueet.length, 'Kaudella');
  h += metricCard('Testejä', kokonaisTesteja, 'Yhteensä');
  // Palloliiton kriteeri 6 — kehittyvien % isoimpana metriikkakorttina
  var k6border = krit6.pct >= 60 ? "rgba(52,211,153,.3)" : "rgba(248,113,113,.3)";
  var k6col = krit6.pct >= 60 ? "var(--green)" : krit6.pct >= 45 ? "var(--amber)" : "var(--red)";
  var k6label = krit6.pct >= 60 ? "\u2705 T\u00e4ytt\u00e4\u00e4 60% kynnyksen" : "\u274c Alle 60% kynnyksen";
  h += '<div class="metric-card" style="grid-column:span 2;border:1px solid ' + k6border + '">';
  h += '<div class="metric-label">Kehittyy — Palloliiton kriteeri 6</div>';
  h += '<div style="display:flex;align-items:baseline;gap:8px">';
  h += '<div class="metric-value" style="font-size:44px;color:' + k6col + '">' + krit6.pct + '%</div>';
  h += '<div style="font-size:13px;color:var(--muted2)">pelaajista (' + krit6.kehittyvat + '/' + krit6.n + ')</div>';
  h += '</div>';
  h += '<div class="metric-sub" style="color:' + k6col + '">' + k6label + ' · 10–15v pelaajat</div>';
  h += '</div>';
    h += metricCard('Kehittyy', kehittyvat, 'joukkuetta ↑', 'var(--green)');
  h += metricCard('Gems', gemsTotal, 'tunnistettua', 'var(--blue)');
  h += '</div>';

  // Insights
  if (heikoin) {
    var km = KETJU[heikoin[0]] || { plain: heikoin[0], train: '' };
    h += '<div class="insight warn">';
    h += '<div class="insight-label">Seuran kehitysprioriteetti</div>';
    h += km.plain + ' on ' + _aktivSeura + ':n heikoin liikeketju (' + heikoin[1] + '/10). ';
    h += 'Tämä tarkoittaa kentällä: ' + (km.kentta||'') +
    'Toimenpide: ' + (km.train||'');
    h += '</div>';
  }
  if (vahvin) {
    var vm = KETJU[vahvin[0]] || { plain: vahvin[0] };
    h += '<div class="insight">';
    h += '<div class="insight-label">Seuran vahvuus</div>';
    h += vm.plain + ' on vahvin (' + vahvin[1] + '/10). Hyödynnä tätä rekrytoinnissa ja joukkueen identiteetissä.';
    h += '</div>';
  }

  // Kaksi saraketta
  h += '<div class="two-col">';

  // Joukkueet pikayhteenveto
  h += '<div class="card">';
  h += '<div class="card-title">Joukkueet — kehitystila</div>';
  var sortedJ = joukkueet.slice().sort(function(a,b){return (b.avgDelta||0)-(a.avgDelta||0);});
  sortedJ.forEach(function(j) {
    var dc = statusColor(j.avgDelta);
    var dl = statusLabel(j.avgDelta);
    var jnimi = j.pelaajatLista[0] ? j.pelaajatLista[0].joukkue : '?';
    h += '<div class="joukkue-row" onclick="avaaJoukkue(\''+jnimi+'\')">';
    h += '<div class="status-dot" style="background:'+dc+'"></div>';
    h += '<div class="joukkue-name">'+jnimi+'</div>';
    h += '<div class="joukkue-meta">'+j.pelaajia+'p · '+j.testeja+'t</div>';
    h += '<div class="mini-bars">';
    ['taka','sivu','kierto'].forEach(function(k){
      var v = j.avgKetjut[k];
      if (v == null) return;
      h += '<div class="mini-bar-row">';
      h += '<div class="mini-bar-track"><div class="mini-bar-fill" style="width:'+Math.round(v*10)+'%;background:'+ketjuColor(k)+'"></div></div>';
      h += '</div>';
    });
    h += '</div>';
    h += '<div class="delta-badge" style="color:'+dc+'">'+(j.avgDelta!=null?(j.avgDelta>=0?'+':'')+j.avgDelta.toFixed(1):'—')+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // Toimenpiteet
  h += '<div>';
  h += '<div class="card">';
  h += '<div class="card-title">Toimenpiteet tällä viikolla</div>';
  toimenpiteet.forEach(function(t) {
    h += '<div class="alert-item">';
    h += '<div class="alert-dot" style="background:'+t.vari+'"></div>';
    h += '<div style="font-size:13px;line-height:1.6;color:var(--text)">'+t.teksti+'</div>';
    h += '</div>';
  });
  if (!toimenpiteet.length) h += '<div style="font-size:13px;color:var(--muted)">Ei kiireellisiä toimenpiteitä.</div>';
  h += '</div>';

  // Ketjuprofiili kompakti
  h += '<div class="card">';
  h += '<div class="card-title">Seuran ketjuprofiili</div>';
  Object.entries(sAvgKetjut).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){
    var km2 = KETJU[e[0]] || { plain: e[0] };
    h += '<div style="margin-bottom:10px">';
    h += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">';
    h += '<span style="color:var(--muted)">'+km2.plain+'</span>';
    h += '<span style="font-weight:500;color:'+ketjuColor(e[0])+'">'+e[1]+'</span>';
    h += '</div>';
    h += '<div style="height:5px;background:var(--bg);border-radius:3px;overflow:hidden">';
    h += '<div style="height:100%;width:'+Math.round(e[1]*10)+'%;background:'+ketjuColor(e[0])+';border-radius:3px"></div>';
    h += '</div></div>';
  });
  h += '</div>';
  h += '</div>'; // end col 2

  h += '</div>'; // end two-col

  // ── KANSALLINEN VERTAILU — Palloliiton viralliset taso 3 -normit ──
  // Lähde: Eerikkilä / Suomen Palloliitto, päivitetty 2024
  // Normit löytyvät TM_PALLOLIITTO-objektista (tm_normit.js)
  // Näytetään: per testi per ikäluokka, seuran tulos vs taso 3
  // Ei lasketa mediaania datasta — käytetään virallisia arvoja suoraan

  var VERTAILU_TESTIT = [
    { testi: 'Nopeus 10m',       alas: true  },
    { testi: 'Nopeus 30m',       alas: true  },
    { testi: 'SM ilman palloa',  alas: true  },
    { testi: 'SM-pallo',         alas: true  },
    { testi: 'Kevennyshyppy',    alas: false },
  ];
  // Ketteryys jätetty pois: csv-aineiston protokolla ≠ Palloliiton kasirata

  // Kerää seuran 10–15v pelaajien viimeisin tulos per testi per ikäluokka
  // Rakenne: ikäTulokset[P13][Nopeus 10m] = [arvo1, arvo2, ...]
  var ikaTulokset = {};
  ['P10','P11','P12','P13','P14','P15'].forEach(function(ik) { ikaTulokset[ik] = {}; });

  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika < 10 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var mitat = fys[fys.length - 1].mittaukset || {};
      var ikaKey = 'P' + Math.min(15, Math.max(10, Math.floor(ika)));

      VERTAILU_TESTIT.forEach(function(tm) {
        var v = mitat[tm.testi];
        if (v == null) return;
        if (!ikaTulokset[ikaKey][tm.testi]) ikaTulokset[ikaKey][tm.testi] = [];
        ikaTulokset[ikaKey][tm.testi].push(v);
      });
    });
  });

  // Laske per ikäluokka per testi: seuran mediaani vs Palloliiton taso 3
  // Näytetään vain ikäluokat joissa on vähintään 3 pelaajaa testissä
  var ikaRivit = [];
  ['P10','P11','P12','P13','P14','P15'].forEach(function(ikaKey) {
    VERTAILU_TESTIT.forEach(function(tm) {
      var vals = ikaTulokset[ikaKey][tm.testi] || [];
      if (vals.length < 3) return;
      var t3 = (TM_PALLOLIITTO['male'][tm.testi] || {})[ikaKey];
      if (!t3 || t3.t3 == null) return;

      // Laske seuran mediaani tässä ikä+testi -yhdistelmässä
      var sorted = vals.slice().sort(function(a,b){return a-b;});
      var med = sorted[Math.floor(sorted.length/2)];
      var t3val = t3.t3;

      // Kuinka moni on tasolla 3 tai parempi
      var okN = vals.filter(function(v){ return tm.alas ? v <= t3val : v >= t3val; }).length;
      var okPct = Math.round(okN / vals.length * 100);

      ikaRivit.push({
        ika: ikaKey, testi: tm.testi, alas: tm.alas,
        n: vals.length, med: med, t3: t3val,
        okN: okN, okPct: okPct
      });
    });
  });

  if (ikaRivit.length > 0) {
    h += '<div class="card" style="margin-top:14px">';
    h += '<div style="margin-bottom:6px">';
    h += '<div class="card-title" style="margin:0">Seuran tulokset vs Palloliiton taso 3</div>';
    h += '</div>';
    h += '<div style="font-size:11px;color:var(--muted2);margin-bottom:16px">';
    h += 'Lähde: Eerikkilä / Suomen Palloliitto 2024 (tm_normit.js) · Seuran mediaani vs kansallinen tavoitetaso (taso 3) · 10–15v pelaajat';
    h += '</div>';

    // Ryhmittele ikäluokan mukaan
    var ikaGroups = {};
    ikaRivit.forEach(function(r) {
      if (!ikaGroups[r.ika]) ikaGroups[r.ika] = [];
      ikaGroups[r.ika].push(r);
    });

    Object.keys(ikaGroups).sort().forEach(function(ikaKey) {
      var rivit = ikaGroups[ikaKey];
      var okYhteensa = rivit.reduce(function(a,r){return a+r.okN;},0);
      var nYhteensa  = rivit.reduce(function(a,r){return a+r.n;},0);
      var kokonPct   = Math.round(okYhteensa/nYhteensa*100);
      var headerCol  = kokonPct >= 66 ? 'var(--green)' : kokonPct >= 40 ? 'var(--amber)' : 'var(--red)';

      // Ikäluokan otsikko
      h += '<div style="display:flex;justify-content:space-between;align-items:center;';
      h += 'padding:8px 0 6px;border-top:1px solid var(--border);margin-top:4px">';
      h += '<div style="font-size:12px;font-weight:600;color:var(--text)">'+ikaKey+'</div>';
      h += '<div style="font-size:11px;color:'+headerCol+';font-weight:600">'+kokonPct+'% tasolla 3+ ('+okYhteensa+'/'+nYhteensa+')</div>';
      h += '</div>';

      // Testit tässä ikäluokassa
      rivit.forEach(function(r) {
        var parMode = r.alas ? r.med <= r.t3 : r.med >= r.t3;
        var medCol  = parMode ? 'var(--green)' : 'var(--red)';
        var pctCol  = r.okPct >= 66 ? 'var(--green)' : r.okPct >= 40 ? 'var(--amber)' : 'var(--red)';
        var arrow   = r.alas
          ? (r.med <= r.t3 ? '✓' : '✗')
          : (r.med >= r.t3 ? '✓' : '✗');

        h += '<div style="display:grid;grid-template-columns:130px 50px 50px 1fr 44px;gap:6px;';
        h += 'align-items:center;padding:5px 0 5px 10px">';

        // Testin nimi
        h += '<div style="font-size:11px;color:var(--muted2)">'+r.testi+'</div>';
        // Seuran mediaani
        h += '<div style="text-align:center">';
        h += '<div style="font-size:12px;font-weight:600;color:'+medCol+'">'+r.med+'</div>';
        h += '<div style="font-size:9px;color:var(--muted2)">seura</div>';
        h += '</div>';
        // Palloliiton taso 3
        h += '<div style="text-align:center">';
        h += '<div style="font-size:12px;color:var(--muted2)">'+r.t3+'</div>';
        h += '<div style="font-size:9px;color:var(--muted2)">taso 3</div>';
        h += '</div>';
        // Progress bar — % pelaajista tasolla 3+
        h += '<div style="position:relative;height:6px;background:var(--bg);border-radius:3px;overflow:visible">';
        h += '<div style="height:100%;width:'+r.okPct+'%;background:'+pctCol+';border-radius:3px"></div>';
        h += '<div style="position:absolute;top:-3px;left:66%;width:2px;height:12px;background:var(--amber);opacity:.7"></div>';
        h += '</div>';
        // Prosentti
        h += '<div style="text-align:right;font-size:11px;font-weight:600;color:'+pctCol+'">'+r.okPct+'%</div>';

        h += '</div>';
      });
    });

    h += '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);';
    h += 'font-size:11px;color:var(--muted2)">⚑ Oranssi viiva = 66% kynnys · ✓/✗ = seuran mediaani suhteessa taso 3:een</div>';
    h += '</div>';
  }

    document.getElementById('tabYleiskuva').innerHTML = h;
}

function metricCard(label, value, sub, color) {
  return '<div class="metric-card"><div class="metric-label">'+label+'</div>'
    + '<div class="metric-value" style="color:'+(color||'var(--text)')+'">'+value+'</div>'
    + '<div class="metric-sub">'+sub+'</div></div>';
}

function renderKetjut() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;

  // Aggregoi ikäluokittain (P05=~18v, P06=~17v jne.)
  var ikaryhmät = {};
  Object.values(s.joukkueet).forEach(function(j) {
    var jnimi = j.pelaajatLista[0]&&j.pelaajatLista[0].joukkue || '';
    var match = jnimi.match(/[PT](\d{2})/);
    if (!match) return;
    var vuosi = parseInt('20'+match[1]);
    var ika = new Date().getFullYear() - vuosi;
    var ikaKey = 'U'+ika;
    if (!ikaryhmät[ikaKey]) ikaryhmät[ikaKey] = { ketjut: {} };
    Object.keys(j.avgKetjut).forEach(function(k){
      if (j.avgKetjut[k] == null) return;
      if (!ikaryhmät[ikaKey].ketjut[k]) ikaryhmät[ikaKey].ketjut[k] = [];
      ikaryhmät[ikaKey].ketjut[k].push(j.avgKetjut[k]);
    });
  });
  Object.values(ikaryhmät).forEach(function(ig){
    ig.avgKetjut = {};
    Object.keys(ig.ketjut).forEach(function(k){
      ig.avgKetjut[k] = ig.ketjut[k].length ? Math.round(avg(ig.ketjut[k])*10)/10 : null;
    });
  });
  var ikaJarjestetty = Object.keys(ikaryhmät).sort();

  var h = '';

  // Ketjukortit selityksineen
  h += '<div class="ketju-grid" style="margin-bottom:20px">';
  Object.entries(KETJU).forEach(function(entry) {
    var kn = entry[0], km = entry[1];
    // Laske seuratasolla
    var vals = [];
    Object.values(s.joukkueet).forEach(function(j){
      if (j.avgKetjut[kn]!=null) vals.push(j.avgKetjut[kn]);
    });
    var sAvg = vals.length ? Math.round(avg(vals)*10)/10 : null;

    h += '<div class="ketju-card">';
    h += '<div class="ketju-code" style="background:'+km.vari+'22;color:'+km.vari+'">'+km.nimi+'</div>';
    h += '<div class="ketju-plain">'+km.plain+'</div>';
    h += '<div class="ketju-field">'+km.kentta+'</div>';
    h += '<div style="font-size:11px;color:var(--muted2);font-style:italic;margin-bottom:10px">'+km.train+'</div>';

    if (sAvg != null) {
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
      h += '<div style="flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden">';
      h += '<div style="height:100%;width:'+Math.round(sAvg*10)+'%;background:'+km.vari+';border-radius:3px"></div></div>';
      h += '<span style="font-family:\'Bebas Neue\';font-size:22px;color:'+km.vari+'">'+sAvg+'</span>';
      h += '</div>';
    }

    // Ikäluokat
    if (ikaJarjestetty.length > 1) {
      h += '<div class="ketju-bars">';
      ikaJarjestetty.forEach(function(ik){
        var v = ikaryhmät[ik].avgKetjut[kn];
        if (v == null) return;
        h += '<div class="ketju-bar-row">';
        h += '<span class="ketju-age">'+ik+'</span>';
        h += '<div class="ketju-bar-track"><div class="ketju-bar-fill" style="width:'+Math.round(v*10)+'%;background:'+km.vari+'"></div></div>';
        h += '<span class="ketju-score" style="color:'+km.vari+'">'+v+'</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  h += '</div>';

  // Systemaattinen löydös
  var allVals = {};
  Object.values(s.joukkueet).forEach(function(j){
    Object.keys(j.avgKetjut).forEach(function(k){
      if (j.avgKetjut[k]==null) return;
      if (!allVals[k]) allVals[k]=[];
      allVals[k].push(j.avgKetjut[k]);
    });
  });
  var sorted = Object.entries(allVals).map(function(e){
    return { k:e[0], v: Math.round(avg(e[1])*10)/10 };
  }).sort(function(a,b){return a.v-b.v;});

  if (sorted.length >= 2) {
    var heikin = sorted[0], vahvin2 = sorted[sorted.length-1];
    var gap = Math.round((vahvin2.v - heikin.v)*10)/10;
    h += '<div class="insight warn">';
    h += '<div class="insight-label">Rakenteellinen havainto</div>';
    h += (KETJU[heikin.k]||{plain:heikin.k}).plain+' ('+heikin.v+'/10) ja '+(KETJU[vahvin2.k]||{plain:vahvin2.k}).plain+' ('+vahvin2.v+'/10) välinen ero on '+gap+' pistettä. ';
    h += 'Tämä kertoo, että harjoittelu painottuu selvästi tiettyihin liikeketjuihin. ';
    h += 'Tasapainoisempi kehitys vaatii tietoisen ohjauksen muutoksen.';
    h += '</div>';
  }

  document.getElementById('tabKetjut').innerHTML = h;
}

// ── PALLOLIITON KRITEERI 6 -LASKENTA ─────────────────────────
function laskeKriteeri6(s) {
  // Palloliiton hyväksymä tapa: OVR kehittynyt ensimmäisestä viimeiseen testiin
  // Ikäikkuna 10-15v, min 2 testiä, kokonaisia kalenterivuosia
  var seuranta = [], kehittyvat = 0;
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      var hist = p.qs_historia || [];
      if (ika < 10 || ika > 15) return;
      if (hist.length < 2) return;
      var first = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var last  = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (!first || !last) return;
      seuranta.push(last - first);
      if (last > first) kehittyvat++;
    });
  });
  var pct = seuranta.length ? Math.round(kehittyvat/seuranta.length*100) : 0;
  return { pct: pct, kehittyvat: kehittyvat, n: seuranta.length };
}

  Object.values(s.joukkueet).forEach(function(j){
    j.pelaajatLista.forEach(function(p){
      var ika=(p.bioIka&&p.bioIka.krono)||0;
      if(ika<12||ika>15) return;
      var fys=p.fys_historia||[];
      if(!fys.length) return;

      var profii=laskeNormitasoProfiili(fys, p.sukupuoli, ika);
      if(!profii) return;
      n++;
      if(profii.tavoitetasolla) tavoite++;
      else alle.push({nimi:p.etunimi+' '+p.sukunimi, pct:profii.normi_pct});

      // Kerää kehitysalueet — mitkä testit useimmiten alle normin
      profii.tulokset.forEach(function(t){
        if(!t.ok){
          kehitysalueet[t.testi]=(kehitysalueet[t.testi]||0)+1;
        }
      });
    });
  });

  if(n<5) return null;
  var pct=Math.round(tavoite/n*100);
  // Järjestä kehitysalueet — eniten esiintyvä ensin
  var ka=Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  return { pct:pct, tavoite:tavoite, n:n, tavoitetasolla:pct>=66,
           kehitysalueet:ka, heikoimmat:alle.slice(0,5) };
}

var TESTIT_PALLOLIITON = ['Ketteryys','Nopeus 30m','SM-pallo','Kevennyshyppy','Syöttäminen','SM ilman palloa'];
var TESTI_NIMET = {
  'Ketteryys':'Ketteryys','Nopeus 30m':'Nopeus 30m','SM-pallo':'SM-pallo',
  'Kevennyshyppy':'Kevennyshyppy','Syöttäminen':'Syöttäminen',
  'SM ilman palloa':'SM (ilman palloa)','Nopeus 5m':'Nopeus 5m'
};

function laskeNormitilanne(s) {
  var testiTulokset = {};
  TESTIT_PALLOLIITON.forEach(function(t){ testiTulokset[t]={saavutti:0,total:0}; });
  var pelaajaKokonais = [];

  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka&&p.bioIka.krono)||0;
      if(ika<12||ika>15) return;
      var fys = p.fys_historia||[];
      if(!fys.length) return;
      var mitt = fys[fys.length-1].mittaukset||{};
      var ikaInt = String(Math.floor(ika));
      var pelLapi=0, pelTest=0;

      TESTIT_PALLOLIITON.forEach(function(testi) {
        var arvo = mitt[testi];
        if(arvo==null) return;
        var normi = TM_NORMIT[testi];
        if(!normi) return;
        var ikk = normi.ikaryhmät[ikaInt];
        if(!ikk) return;
        var raja = ikk['3'];
        var alas = normi.alas;
        var ok = alas ? (arvo<=raja) : (arvo>=raja);
        testiTulokset[testi].total++;
        if(ok) testiTulokset[testi].saavutti++;
        pelTest++;
        if(ok) pelLapi++;
      });

      if(pelTest>=3) pelaajaKokonais.push((pelTest-pelLapi)<=2);
    });
  });

  var testiPct = {};
  TESTIT_PALLOLIITON.forEach(function(t) {
    var r=testiTulokset[t];
    testiPct[t] = r.total>=5 ? Math.round(r.saavutti/r.total*100) : null;
  });
  var kokonaisPct = pelaajaKokonais.length>=5
    ? Math.round(pelaajaKokonais.filter(Boolean).length/pelaajaKokonais.length*100)
    : null;

  return {kokonaisPct:kokonaisPct, n:pelaajaKokonais.length,
          testiPct:testiPct, kori2Ok:(kokonaisPct||0)>=66};
}

  h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);margin-top:3px">';
  h+='<span>0%</span><span style="color:var(--amber)">66% kynnys</span><span>100%</span></div>';
  h+='</div></div>';

  // Testi-kohtainen analyysi
  h+='<div class="card">';
  h+='<div class="card-title">Testi-kohtainen T3-saavutusprosentti</div>';
  h+='<div style="font-size:12px;color:var(--muted2);margin-bottom:14px">T3 = kansallinen tavoitetaso · palkkien tulisi olla ≥66% kori 2:n täyttämiseksi</div>';

  var testiMeta = {
    'Ketteryys':      {ikoni:'⚡',ketju:'Takaketju – kiihdytys'},
    'Nopeus 30m':     {ikoni:'🏃',ketju:'Takaketju – huippunopeus'},
    'SM-pallo':       {ikoni:'⚽',ketju:'SM-ketju – pallollinen liike'},
    'SM ilman palloa':{ikoni:'🔄',ketju:'SM-ketju – suunnanmuutos'},
    'Kevennyshyppy':  {ikoni:'⬆️',ketju:'Etuketju – ponnistusvoima'},
    'Syöttäminen':    {ikoni:'🎯',ketju:'Kiertoketju – syöttötaito'}
  };

  // Järjestä tulokset pct:n mukaan
  var testit = Object.keys(norm.testiPct).filter(function(t){return norm.testiPct[t]!=null;});
  testit.sort(function(a,b){return (norm.testiPct[b]||0)-(norm.testiPct[a]||0);});

  testit.forEach(function(testi) {
    var pct = norm.testiPct[testi];
    if(pct==null) return;
    var col = pct>=66?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    var meta = testiMeta[testi]||{ikoni:'📊',ketju:''};
    h+='<div style="margin-bottom:12px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<span style="font-size:14px">'+meta.ikoni+'</span>';
    h+='<div><div style="font-size:13px;font-weight:500">'+testi+'</div>';
    h+='<div style="font-size:11px;color:var(--muted2)">'+meta.ketju+'</div></div></div>';
    h+='<span style="font-size:16px;font-weight:600;color:'+col+'">'+pct+'%</span></div>';
    h+='<div style="height:8px;background:var(--bg);border-radius:4px;overflow:visible;position:relative">';
    h+='<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:4px;transition:width .4s"></div>';
    h+='<div style="position:absolute;top:-2px;left:66%;width:1.5px;height:12px;background:var(--amber)"></div>';
    h+='</div></div>';
  });

  // Puuttuvat testit → toimintasuositus
  var puuttuvat = Object.keys(norm.testiPct).filter(function(t){return norm.testiPct[t]==null;});
  if(puuttuvat.length>0) {
    h+='<div style="background:rgba(255,184,48,.07);border:1px solid rgba(255,184,48,.2);border-radius:10px;padding:10px 12px;margin-top:12px">';
    h+='<div style="font-size:10px;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Ei riittävästi dataa</div>';
    h+='<div style="font-size:12px;color:var(--text)">'+puuttuvat.join(', ')+' — alle 5 mittausta. Lisää testikattavuus.</div>';
    h+='</div>';
  }

  // Toimintasuositus heikoimman perusteella
  if(testit.length>0) {
    var heikin = testit[testit.length-1];
    var hPct = norm.testiPct[heikin];
    var ketjuOhje = {
      'Ketteryys':      'Takaketjuharjoittelu: räjähtävät lähdöt, lonkan voima',
      'Nopeus 30m':     'Takaketjuharjoittelu: huippunopeusharjoitteet, flyingit',
      'SM-pallo':       'SM-harjoitteet: pallollinen suunnanmuutos, reaktiolähdöt',
      'SM ilman palloa':'SM-harjoitteet: ketteryysradat, sivuttaisliike',
      'Kevennyshyppy':  'Etuketjuharjoittelu: plyometriikka, kyykkyprogressio',
      'Syöttäminen':    'Kiertoketjuharjoittelu: syöttöpenkki, pitkä syöttö, rotaatio'
    };
    h+='<div style="background:rgba(0,229,204,.07);border:1px solid rgba(0,229,204,.2);border-radius:10px;padding:10px 12px;margin-top:12px">';
    h+='<div style="font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Kehitysprioriteetti</div>';
    h+='<div style="font-size:13px;color:var(--text)"><strong>'+heikin+'</strong> ('+hPct+'%) on seuran heikoin testi. ';
    h+=ketjuOhje[heikin]||'Kohdista harjoittelu tähän osa-alueeseen.';
    h+='</div></div>';
  }
  h+='</div>';

  document.getElementById('tabNormitasot').innerHTML=h;
}


// ── TAVOITETASOT TAB ─────────────────────────────────────────
function renderTavoitetasot() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;

  // Laske kansallinen tavoitetaso per pelaaja (12-15v)
  var pelaajatData = [];
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      var sp = p.sukupuoli || 'male';
      if (ika < 12 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var viimeisin = fys[fys.length-1];
      var m = viimeisin.mittaukset || {};
      
      var testit = ['Nopeus 5m','Nopeus 10m','Nopeus 30m','Ketteryys','SM-pallo','Kevennyshyppy'];
      var tulokset = [];
      var alleT3 = 0;
      
      testit.forEach(function(t) {
        var v = m[t];
        if (v == null) return;
        var tulos = laskeTavoitetaso(t, v, ika, sp);
        if (!tulos) return;
        tulokset.push({testi:t, arvo:v, taso:tulos.taso, raja:tulos.raja});
        if (tulos.taso < 3) alleT3++;
      });
      
      if (tulokset.length < 3) return;
      var kansallinen = alleT3 <= 2;
      
      pelaajatData.push({
        nimi: p.etunimi+' '+p.sukunimi,
        joukkue: p.joukkue,
        ika: Math.floor(ika),
        sp: sp,
        tulokset: tulokset,
        alleT3: alleT3,
        kansallinen: kansallinen,
        pvm: viimeisin.date
      });
    });
  });

  var kansalliset = pelaajatData.filter(function(p){return p.kansallinen;}).length;
  var pct = pelaajatData.length ? Math.round(kansalliset/pelaajatData.length*100) : 0;
  var pctCol = pct >= 66 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';

  var TESTI_META = {
    'Nopeus 5m':     {lbl:'Nopeus 5m',    yks:'s', ikoni:'💥'},
    'Nopeus 10m':    {lbl:'Nopeus 10m',   yks:'s', ikoni:'🏃'},
    'Nopeus 30m':    {lbl:'Nopeus 30m',   yks:'s', ikoni:'🏃'},
    'Ketteryys':     {lbl:'Ketteryys',    yks:'s', ikoni:'⚡'},
    'SM-pallo':      {lbl:'SM-pallo',     yks:'s', ikoni:'⚽'},
    'Kevennyshyppy': {lbl:'Kevennyshyppy',yks:'cm',ikoni:'⬆️'}
  };
  var TASO_COL = ['','var(--red)','var(--amber)','var(--teal)','var(--blue)','#A855F7'];
  var TASO_LBL = ['','T1','T2','T3','T4','T5'];

  var h = '';

  // Päämetriikka
  h += '<div class="card" style="margin-bottom:16px;border-color:'+(pct>=66?'rgba(52,211,153,.3)':'rgba(248,113,113,.2)')+'">';
  h += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">';
  h += '<div>';
  h += '<div class="card-title">Kansallinen tavoitetaso — Eerikkilä 2024</div>';
  h += '<div style="font-size:12px;color:var(--muted2);max-width:420px">Tavoitetaso 3 = paras 45% ikäluokassa. Palloliitto edellyttää: max 2 testiä alle T3:n kuudesta testistä. Talenttipelaajat 12–15v.</div>';
  h += '</div>';
  h += '<div style="text-align:right;flex-shrink:0">';
  h += '<div style="font-family:"Bebas Neue";font-size:56px;line-height:1;color:'+pctCol+'">'+pct+'%</div>';
  h += '<div style="font-size:11px;color:'+pctCol+'">'+(pct>=66?'✅ Täyttää 66% kynnyksen':'❌ Alle 66% kynnyksen')+'</div>';
  h += '<div style="font-size:11px;color:var(--muted2)">'+kansalliset+'/'+pelaajatData.length+' pelaajaa</div>';
  h += '</div></div>';
  
  // Progress bar ja kynnys
  h += '<div style="margin-top:12px">';
  h += '<div style="height:8px;background:var(--bg);border-radius:4px;overflow:visible;position:relative">';
  h += '<div style="height:100%;width:'+pct+'%;background:'+pctCol+';border-radius:4px"></div>';
  h += '<div style="position:absolute;top:-4px;left:66%;width:2px;height:16px;background:var(--amber);border-radius:1px"></div>';
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);margin-top:4px">';
  h += '<span>0%</span><span style="color:var(--amber)">66% Kori 2 kynnys</span><span>80% Kori 1 kynnys</span><span>100%</span>';
  h += '</div></div>';
  h += '</div>';

  // Huomio datalaadusta
  if (pelaajatData.length < 10) {
    h += '<div class="insight warn">';
    h += '<div class="insight-label">Datahuomio</div>';
    h += 'Seuratukikriteerin laskentaan löytyi '+pelaajatData.length+' talenttipelaajaa (12–15v) joilla on fyysiset testit. ';
    h += 'Palloliiton seuratukihakua varten tarvitaan standardisoitu testaussessio Eerikkilän protokollan mukaisesti.';
    h += '</div>';
  }

  // Testikohtainen analyysi
  var testiStats = {};
  Object.keys(TESTI_META).forEach(function(t){ testiStats[t]={n:0,t3:0,yhteensa:0}; });
  pelaajatData.forEach(function(p){
    p.tulokset.forEach(function(tr){
      if (!testiStats[tr.testi]) return;
      testiStats[tr.testi].n++;
      testiStats[tr.testi].yhteensa += tr.taso;
      if (tr.taso >= 3) testiStats[tr.testi].t3++;
    });
  });

  h += '<div class="card" style="margin-bottom:16px">';
  h += '<div class="card-title">Testi-analyysi — missä kehitettävää?</div>';
  h += '<div style="display:flex;flex-direction:column;gap:10px">';
  Object.entries(testiStats).sort(function(a,b){
    if(!a[1].n) return 1; if(!b[1].n) return -1;
    return (a[1].t3/a[1].n)-(b[1].t3/b[1].n);
  }).forEach(function(entry){
    var t = entry[0], ts = entry[1];
    if (!ts.n) return;
    var tPct = Math.round(ts.t3/ts.n*100);
    var meta = TESTI_META[t];
    var col = tPct >= 45?'var(--green)':tPct>=25?'var(--amber)':'var(--red)';
    h += '<div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">';
    h += '<span style="color:var(--text)">'+meta.ikoni+' '+meta.lbl+'</span>';
    h += '<span style="color:'+col+';font-weight:500">'+tPct+'% T3-tasolla ('+ts.t3+'/'+ts.n+')</span>';
    h += '</div>';
    h += '<div style="height:5px;background:var(--bg);border-radius:3px;overflow:visible;position:relative">';
    h += '<div style="height:100%;width:'+tPct+'%;background:'+col+';border-radius:3px"></div>';
    h += '<div style="position:absolute;top:-2px;left:45%;width:1px;height:9px;background:var(--muted2);opacity:.5"></div>';
    h += '</div></div>';
  });
  h += '</div></div>';

  // Pelaajalistaus
  h += '<div class="card">';
  h += '<div class="card-title">Pelaajat — tavoitetasostatus ('+pelaajatData.length+')</div>';
  
  pelaajatData.sort(function(a,b){ return b.tulokset.length - a.tulokset.length; });
  
  pelaajatData.slice(0,30).forEach(function(p) {
    var dc = p.kansallinen ? 'var(--green)' : 'var(--red)';
    var dlbl = p.kansallinen ? '✅ Kansallisella tasolla' : '❌ '+p.alleT3+' testiä alle T3';
    h += '<div style="padding:10px 0;border-bottom:1px solid var(--border)">';
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
    h += '<div style="flex:1"><div style="font-size:13px;font-weight:500">'+p.nimi+'</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">'+p.joukkue+' · '+p.ika+'v · '+p.pvm+'</div></div>';
    h += '<div style="font-size:11px;color:'+dc+'">'+dlbl+'</div>';
    h += '</div>';
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
    p.tulokset.forEach(function(tr){
      var tc = TASO_COL[tr.taso] || 'var(--muted)';
      var tl = TESTI_META[tr.testi] ? TESTI_META[tr.testi].lbl : tr.testi;
      h += '<div style="background:var(--bg3);border-radius:6px;padding:3px 8px;font-size:10px;border:1px solid '+tc+'44">';
      h += '<span style="color:var(--muted2)">'+tl+'</span> ';
      h += '<span style="color:'+tc+';font-weight:600">'+TASO_LBL[tr.taso]+'</span>';
      h += ' <span style="color:var(--muted2)">'+tr.arvo+'</span>';
      h += '</div>';
    });
    h += '</div></div>';
  });
  if (pelaajatData.length > 30) {
    h += '<div style="font-size:12px;color:var(--muted2);text-align:center;padding:10px">+'+(pelaajatData.length-30)+' muuta pelaajaa</div>';
  }
  h += '</div>';

  document.getElementById('tabTavoitetasot').innerHTML = h;
}

function metCard(l,v,col){return '<div class="metric-card"><div class="metric-label">'+l+'</div><div class="metric-value" style="font-size:22px;color:'+(col||'var(--text)')+'">'+v+'</div></div>';}
function suljeMod(){document.getElementById('joukkueModal').classList.remove('open');}
</script>
