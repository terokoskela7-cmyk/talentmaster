<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TalentMaster — Valmennuspäällikkö</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0F17;
  --bg2:    #111827;
  --bg3:    #1A2235;
  --card:   #1E2A3D;
  --border: #263347;
  --text:   #E8EDF5;
  --muted:  #8A9BB5;
  --muted2: #5A6A82;
  --teal:   #00D4AA;
  --blue:   #4B9EFF;
  --amber:  #F59E0B;
  --red:    #F87171;
  --green:  #34D399;
  --purple: #A78BFA;

  --taka:   #4B9EFF;
  --etu:    #34D399;
  --sivu:   #F59E0B;
  --kierto: #F87171;
  --sm:     #A78BFA;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── LOGIN ── */
#sLogin {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.login-box {
  width: 340px; text-align: center;
}
.login-logo { font-family: 'Bebas Neue'; font-size: 13px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
.login-title { font-family: 'Bebas Neue'; font-size: 36px; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; }
.pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--border); transition: all .15s; }
.pin-dot.filled { background: var(--teal); border-color: var(--teal); }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.pin-btn {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-family: 'Bebas Neue'; font-size: 24px; padding: 14px;
  cursor: pointer; transition: all .1s;
}
.pin-btn:active { transform: scale(.94); background: var(--card); }
.pin-err { font-size: 12px; color: var(--red); height: 18px; }
.pin-demo { margin-top: 16px; }
.pin-demo button {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--teal); font-size: 12px; padding: 8px 16px; cursor: pointer;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ── TOPBAR ── */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-logo { font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: 2px; color: var(--muted); }
.topbar-title { font-family: 'Bebas Neue'; font-size: 20px; color: var(--text); flex: 1; }
.seura-select {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Sans'; font-size: 13px; padding: 6px 10px;
  cursor: pointer;
}
.logout-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer;
}

/* ── NAV TABS ── */
.nav-tabs {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; padding: 0 20px; overflow-x: auto;
}
.nav-tab {
  padding: 12px 16px; font-size: 13px; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s;
}
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }

/* ── CONTENT ── */
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }

/* ── METRIC CARDS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.metric-value { font-family: 'Bebas Neue'; font-size: 32px; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; font-weight: 600; }

/* ── TWO COLUMN ── */
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

/* ── JOUKKUE ROW ── */
.joukkue-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s;
}
.joukkue-row:last-child { border-bottom: none; }
.joukkue-row:hover { background: rgba(255,255,255,.02); border-radius: 8px; padding-left: 8px; }
.joukkue-name { font-size: 13px; font-weight: 500; min-width: 110px; }
.joukkue-meta { font-size: 11px; color: var(--muted2); min-width: 60px; }
.mini-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.mini-bar-row { display: flex; align-items: center; gap: 6px; }
.mini-bar-track { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
.mini-bar-label { font-size: 10px; color: var(--muted2); width: 28px; text-align: right; }
.delta-badge { font-size: 12px; font-weight: 600; min-width: 36px; text-align: right; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── KETJU EXPLAINER ── */
.ketju-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.ketju-card { background: var(--bg3); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
.ketju-code { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 8px; }
.ketju-plain { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.ketju-field { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.ketju-bars { display: flex; flex-direction: column; gap: 5px; }
.ketju-bar-row { display: flex; align-items: center; gap: 8px; }
.ketju-bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.ketju-bar-fill { height: 100%; border-radius: 3px; }
.ketju-age { font-size: 10px; color: var(--muted2); min-width: 46px; }
.ketju-score { font-size: 11px; font-weight: 500; min-width: 24px; text-align: right; }

/* ── INSIGHT BOX ── */
.insight { background: rgba(0,212,170,.07); border: 1px solid rgba(0,212,170,.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
.insight-label { font-size: 10px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.insight.warn { background: rgba(245,158,11,.07); border-color: rgba(245,158,11,.2); }
.insight.warn .insight-label { color: var(--amber); }

/* ── SEURA COMPARISON TABLE ── */
.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table th { font-size: 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .5px; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.comp-table td { padding: 9px 8px; border-bottom: 1px solid rgba(38,51,71,.5); vertical-align: middle; }
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: rgba(255,255,255,.02); }
.chain-pill { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; }

/* ── ALERT ROWS ── */
.alert-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.alert-item:last-child { border-bottom: none; }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
</style>

<!-- Firebase compat SDK — toimii ilman ES-moduuleja (type=module) -->
<!-- Compat-versio sopii VP-dashboardin perinteiseen JS-rakenteeseen -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
// ── FIREBASE KONFIGURAATIO & ALUSTUS ──────────────────────────────
// Koko alustus on try/catch-lohkossa — jos Firebase epäonnistuu
// mistä tahansa syystä, sovellus jatkaa normaalisti LocalStoragella.
// Tämä on tärkeää: Firebase ei saa koskaan kaataa pääsovellusta.
var _fbDb     = null;   // null = ei yhteyttä vielä
var _fbAuth   = null;   // Firebase Authentication -viite
var _fbUser   = null;   // Kirjautunut käyttäjä (null = ei kirjautunut)
var _fbOnline = false;  // false kunnes yhteys on varmistettu

try {
  var _fbConfig = {
    apiKey:            "AIzaSyAp471lOIntzP33p9bIW3y4KbeEyBt5kIo",
    authDomain:        "talentmaster-pilot.firebaseapp.com",
    projectId:         "talentmaster-pilot",
    storageBucket:     "talentmaster-pilot.firebasestorage.app",
    messagingSenderId: "872561784446",
    appId:             "1:872561784446:web:05c4c7996dfd46ddd14a2f"
  };

  // Alustetaan vain kerran — Firebase heittää virheen jos yritetään
  // alustaa uudelleen, joten tarkistetaan ensin
  if (!firebase.apps.length) {
    firebase.initializeApp(_fbConfig);
  }

  // Firebase-viitteet
  _fbDb   = firebase.firestore();
  _fbAuth = firebase.auth();
  _fbOnline = true;
  console.log('[FB] Firebase OK');

  // ── AUTH STATE HANDLER ─────────────────────────────────────────────────────
  // Firebase Auth kutsuu tätä kahdessa tilanteessa:
  // 1) Sivun latautuessa — palauttaa tallennetun session (tai null jos ei sessiota)
  // 2) Kirjautumisen/uloskirjautumisen jälkeen
  //
  // Firebase takaa: jos sessio on olemassa, user != null.
  // Meidän tehtävä: kun user löytyy, näytä dashboard. Muuten näytä login.
  //
  // KRIITTINEN: Ei kutsuta kirjauduUlos() tässä koskaan.
  // kirjauduUlos() kutsutaan VAIN käyttäjän napista.

  _fbAuth.onAuthStateChanged(function(user) {
    if (!user) {
      // Ei sessiota — näytä login-näkymä
      console.log('[AUTH] Ei sessiota — näytetään login');
      var sl = document.getElementById('sLogin');
      if (sl) { sl.style.display = ''; sl.classList.add('active'); }
      return;
    }

    // Sessio löytyy — haetaan seura ja siirrytään dashboardiin
    console.log('[AUTH] Sessio löytyi:', user.email);

    // Haetaan seura Firestoresta UID:n perusteella
    _fbDb.collection('seurat')
      .where('vp_uid', '==', user.uid)
      .limit(1)
      .get()
      .then(function(snap) {
        if (snap.empty) {
          console.warn('[AUTH] Seuraa ei löydy UID:llä:', user.uid);
          // Jos super-admin tai tuntematon käyttäjä — kirjaa ulos VP-dashboardista
          // VP-dashboard ei ole tarkoitettu super-adminille
          // Näytetään login-näkymä normaalisti (ei jäädä jumiin)
          console.log('[AUTH] Ei VP-tunnusta — näytetään login');
          _fbAuth.signOut();
          return;
        }
        var data = snap.docs[0].data();
        data.id = snap.docs[0].id;
        window._fbSeuraDoc = data;
        console.log('[AUTH] Seura:', data.nimi, '— odotetaan tm_data.js');

        // Odotetaan tm_data.js + _lataaPilottiDashboard ennen näkymänvaihtoa
        _odotaJaSiirryDashboardiin();
      })
      .catch(function(e) {
        console.warn('[AUTH] Seura-haku virhe:', e.message);
      });
  });

function _odotaJaSiirryDashboardiin() {
  // Tarkistetaan 100ms välein kunnes kaikki on ladattu
  if (!window._tmDataReady || typeof _lataaPilottiDashboard !== 'function') {
    setTimeout(_odotaJaSiirryDashboardiin, 100);
    return;
  }
  // Kaikki valmis — vaihda näkymä
  // HUOM: #sLogin CSS-sääntö (display:flex) ylikirjoittaa .screen-luokan
  // Siksi käytetään style.display suoraan — se voittaa kaiken muun
  console.log('[AUTH] Kaikki ladattu — siirrytään dashboardiin:', window._fbSeuraDoc.nimi);
  var _sl = document.getElementById('sLogin');
  var _sd = document.getElementById('sDash');
  if (_sl) { _sl.classList.remove('active'); _sl.style.display = 'none'; }
  if (_sd) { _sd.classList.add('active'); _sd.style.display = ''; }
  _lataaPilottiDashboard();
}

} catch(e) {
  // Firebase ei latautunut (esim. verkkoyhteys poikki tai skripti ei latautunut)
  // Sovellus toimii normaalisti LocalStoragen varassa
  _fbDb     = null;
  _fbOnline = false;
  console.warn('[FB] Firebase-alustus epäonnistui — LocalStorage-tila:', e.message);
}
</script>
</head>

// Laske pelaajan tavoitetaso yhdessä testissä
// palauttaa: { taso: 1-5, ymparisto: 'alle'/'tasolla'/'yli', raja: numero }
function laskeTavoitetaso(testiNimi, arvo, ikavuosi, sukupuoli) {
  var sp = (sukupuoli === 'female') ? 'tytöt' : 'pojat';
  var testiData = EERIKKILA_NORMIT[sp] && EERIKKILA_NORMIT[sp][testiNimi];
  if (!testiData) return null;
  
  var ika = Math.floor(ikavuosi);
  if (ika < 10) ika = 10;
  if (ika > 19) ika = 19;
  
  var rajat = testiData.tasot[ika];
  if (!rajat) return null;
  
  var alas = testiData.alas;
  
  if (testiData.kolmiportainen) {
    // T2/T3 raja: rajat[0]=T3-raja, rajat[1]=T2-raja
    if (alas) {
      if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo <= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    } else {
      if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
      if (arvo >= rajat[1]) return { taso: 2, raja: rajat[1] };
      return { taso: 1, raja: rajat[1] };
    }
  }
  
  // 5-portainen: rajat = [T3, T4, T5, ref]
  // alempi=parempi: T3 = yläarvo, T4 < T3, T5 < T4
  if (alas) {
    if (arvo <= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo <= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo <= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo <= (rajat[0] * 1.05) ? 2 : 1, raja: rajat[0] };
  } else {
    if (arvo >= rajat[2]) return { taso: 5, raja: rajat[2] };
    if (arvo >= rajat[1]) return { taso: 4, raja: rajat[1] };
    if (arvo >= rajat[0]) return { taso: 3, raja: rajat[0] };
    return { taso: arvo >= (rajat[0] * 0.95) ? 2 : 1, raja: rajat[0] };
  }
}

// Laske kansallinen tavoitetaso (T3+) kaikista testeistä
// Palloliiton kriteeri: saavutettu jos max 2 testiä alle T3
function laskeKansallinenTavoitetaso(mittaukset, ikavuosi, sukupuoli) {
  var testit = ['Nopeus 5m','Nopeus 10m','Nopeus 30m','Ketteryys','SM-pallo','Kevennyshyppy','Syöttäminen'];
  var tulokset = [];
  var alleT3 = 0;
  
  testit.forEach(function(t) {
    var arvo = mittaukset[t];
    if (arvo == null) return;
    var tulos = laskeTavoitetaso(t, arvo, ikavuosi, sukupuoli);
    if (!tulos) return;
    tulokset.push({ testi: t, arvo: arvo, taso: tulos.taso, raja: tulos.raja });
    if (tulos.taso < 3) alleT3++;
  });
  
  // Palloliiton ehto: kansallisella tavoitetasolla jos max 2 testiä alle T3
  var kansallinen = tulokset.length >= 3 && alleT3 <= 2;
  
  return {
    tulokset: tulokset,
    kansallinen: kansallinen,
    alleT3: alleT3,
    testejaYhteensa: tulokset.length
  };
}

var TM_SUUNTA = {"Nopeus 5m": true, "Nopeus 10m": true, "Nopeus 30m": true, "Ketteryys": true, "SM ilman palloa": true, "SM-pallo": true, "Kevennyshyppy": false, "Syottaminen": true};

function haePalloliittoNormi(testi, arvo, sukup, ika) {
  var data = TM_PALLOLIITTO[sukup];
  if (!data || !data[testi]) return null;
  var prefix = sukup === "male" ? "P" : "T";
  var v = Math.min(19, Math.max(10, Math.floor(ika)));
  var key = prefix + v;
  var t = data[testi][key];
  if (!t) return null;
  var alas = TM_SUUNTA[testi] !== false;
  var taso;
  if (alas) {
    if (arvo <= t.t5) taso = 5;
    else if (arvo <= t.t4) taso = 4;
    else if (arvo <= t.t3) taso = 3;
    else if (arvo <= t.t2) taso = 2;
    else taso = 1;
  } else {
    if (arvo >= t.t5) taso = 5;
    else if (arvo >= t.t4) taso = 4;
    else if (arvo >= t.t3) taso = 3;
    else if (arvo >= t.t2) taso = 2;
    else taso = 1;
  }
  var t3val = (t.t3 !== null && t.t3 !== undefined) ? t.t3 : t.t4;
  return { taso: taso, tavoitetasolla: taso >= 3, t3: t3val, t5: t.t5, alas: alas };
}

function laskeNormitasoProfiili(fys_historia, sukup, ikaKrono) {
  if (!fys_historia || !fys_historia.length) return null;
  var TESTIT = ["SM-pallo", "SM ilman palloa", "Nopeus 10m", "Nopeus 30m", "Kevennyshyppy"];
  var viimeisin = fys_historia[fys_historia.length - 1].mittaukset || {};
  var tulokset = [], tavoite_n = 0, tehty_n = 0;
  TESTIT.forEach(function(t) {
    var v = viimeisin[t];
    if (v == null) return;
    var r = haePalloliittoNormi(t, v, sukup, ikaKrono);
    if (!r) return;
    tehty_n++;
    if (r.tavoitetasolla) tavoite_n++;
    tulokset.push({ testi: t, arvo: v, taso: r.taso, tavoitetasolla: r.tavoitetasolla, t3: r.t3, alas: r.alas });
  });
  if (tehty_n < 3) return null;
  var alle_normin = tehty_n - tavoite_n;
  return {
    tavoitetasolla: alle_normin <= 2,
    normi_pct: Math.round(tavoite_n / tehty_n * 100),
    normi_n: tavoite_n, tehty_n: tehty_n,
    alle_normin: alle_normin, tulokset: tulokset
  };
}

function laskeNormitasoSeuralle(s) {
  var n = 0, tavoite = 0, kehitysalueet = {};
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika < 12 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var profii = laskeNormitasoProfiili(fys, p.sukupuoli, ika);
      if (!profii) return;
      n++;
      if (profii.tavoitetasolla) tavoite++;
      profii.tulokset.forEach(function(t) {
        if (!t.tavoitetasolla)
          kehitysalueet[t.testi] = (kehitysalueet[t.testi] || 0) + 1;
      });
    });
  });
  if (n < 5) return null;
  var pct = Math.round(tavoite / n * 100);
  var ka = Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  return { pct: pct, tavoite: tavoite, n: n, tavoitetasolla: pct >= 66, kehitysalueet: ka };
}


// ── PIKAKIRJAUS — localStorage-pohjainen kenttähavainnointi ──
// Tallentaa: seura + joukkue + päivämäärä + innostavuus + liikkuminen + toimenpide

function _pikaKey(seura, jnimi) {
  return 'pika_' + seura.replace(/\s/g,'_') + '_' + jnimi.replace(/\s/g,'_');
}

function haePikaKirjaukset(seura, jnimi) {
  // Palauttaa LocalStoragen kirjaukset — käytetään synkronisesti UI:ssa
  // Firebase-data synkronoidaan erikseen asynkronisesti (ks. haePikaKirjauksetFB)
  try {
    var raw = localStorage.getItem(_pikaKey(seura, jnimi));
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

// Hakee kirjaukset Firebasesta ja päivittää LocalStoragen välimuistin
// Kutsutaan kun modal avataan — UI päivittyy kun data saapuu
function haePikaKirjauksetFB(seura, jnimi, callback) {
  if (!_fbOnline || !_fbDb) {
    // Offline — palautetaan LocalStorage-data
    callback(haePikaKirjaukset(seura, jnimi));
    return;
  }
  // Rakennetaan Firestore-dokumentin avain samalla logiikalla kuin LocalStorage
  var docId = (seura + '_' + jnimi).replace(/[^a-zA-Z0-9_\-]/g, '_');
  _fbDb.collection('kirjaukset_joukkue').doc(docId).get()
    .then(function(doc) {
      if (doc.exists) {
        var data = doc.data();
        var kirjaukset = data.kirjaukset || [];
        // Päivitetään LocalStorage välimuisti Firebasen datalla
        try {
          localStorage.setItem(_pikaKey(seura, jnimi), JSON.stringify(kirjaukset));
        } catch(e) {}
        callback(kirjaukset);
      } else {
        // Ei dataa Firebasessa — palautetaan LocalStorage
        callback(haePikaKirjaukset(seura, jnimi));
      }
    })
    .catch(function(e) {
      console.warn('[FB] Haku epäonnistui, käytetään LocalStoragea:', e.message);
      callback(haePikaKirjaukset(seura, jnimi));
    });
}

function tallennaKirjaus(seura, jnimi, inno, liike, toimenpide, valmentaja, rooli, ekstra) {
  var merkinta = {
    pvm:        new Date().toISOString(),
    inno:       inno,
    liike:      liike,
    toimenpide: toimenpide,
    valmentaja: valmentaja || '',
    rooli:      rooli || 'joukkuevalmentaja',
    seura:      seura,
    joukkue:    jnimi
  };
  if (ekstra) {
    ['pallokosketukset','teknisTaktiset','pelilleHeit','maalinteko','seuraOma','ikavaihe'].forEach(function(k){
      if (ekstra[k] != null) merkinta[k] = ekstra[k];
    });
    if (rooli === 'valmennuspäällikkö') merkinta.vpKatselmus = true;
  }

  // VAIHE 1: LocalStorage — nopea, toimii offline
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  kirjaukset.unshift(merkinta);
  if (kirjaukset.length > 30) kirjaukset = kirjaukset.slice(0, 30);
  try {
    localStorage.setItem(_pikaKey(seura, jnimi), JSON.stringify(kirjaukset));
  } catch(e) { console.warn('localStorage täynnä'); }

  // VAIHE 2: Firebase — pilvi, jaettu kaikille laitteille
  if (typeof _fbDb !== 'undefined' && _fbOnline && _fbDb) {
    var docId = (seura + '_' + jnimi).replace(/[^a-zA-Z0-9_\-]/g, '_');
    _fbDb.collection('kirjaukset_joukkue').doc(docId).set({
      seura:      seura,
      joukkue:    jnimi,
      kirjaukset: kirjaukset,
      paivitetty: new Date().toISOString()
    }).then(function() {
      console.log('[FB] Kirjaus tallennettu: ' + seura + '/' + jnimi);
    }).catch(function(e) {
      console.warn('[FB] Pilvi-tallennus epäonnistui:', e.message);
    });

    // Yksittäinen tapahtuma tilastoja varten
    _fbDb.collection('kirjaukset_tapahtumat').add(merkinta)
      .catch(function(e) { console.warn('[FB] Tapahtuma epäonnistui:', e.message); });
  }
}

function viimeisinKirjaus(seura, jnimi) {
  var k = haePikaKirjaukset(seura, jnimi);
  return k.length ? k[0] : null;
}

function kirjausPaiviatten(pvm) {
  // Kuinka monta päivää sitten kirjaus tehtiin
  if (!pvm) return 999;
  return Math.floor((Date.now() - new Date(pvm).getTime()) / 86400000);
}

// == TESTAUSVUOSIKELLO HELPERS ==
function _kelloKey(seura, jnimi) {
  var b = 'testikello_'+seura.replace(/\s+/g,'_');
  return jnimi ? b+'_'+jnimi.replace(/\s+/g,'_') : b;
}
function haeTestiKello(seura, jnimi) {
  try {
    var r = jnimi ? localStorage.getItem(_kelloKey(seura,jnimi)) : null;
    if (r) return JSON.parse(r);
    var s = localStorage.getItem(_kelloKey(seura,null));
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { testipäivät: [] };
}
function tallennaTestiKello(seura, jnimi, data) {
  try { localStorage.setItem(_kelloKey(seura,jnimi), JSON.stringify(data)); }
  catch(e) { console.warn('localStorage täynnä'); }
}
function seuraavaTesti(seura, jnimi) {
  var k = haeTestiKello(seura, jnimi);
  var nyt = new Date();
  var tuleva = (k.testipäivät||[]).map(function(d){return new Date(d);})
    .filter(function(d){return d>=nyt;}).sort(function(a,b){return a-b;});
  if (!tuleva.length) return null;
  var pv = tuleva[0];
  var j2 = Math.ceil((pv-nyt)/86400000);
  return { pvm:pv, paiviaJaljella:j2,
    label: j2<=7 ? '⚠️ '+j2+'pv' : j2<=30 ? j2+'pv' : pv.toLocaleDateString('fi-FI') };
}

// == 4-KOMPONENTTINEN AKTIIVISUUSSIGNAALI ==
function laskeAktiivisuusSignaali(seura, jnimi) {
  var j = _seuraData[seura] && _seuraData[seura].joukkueet[jnimi];
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  var nyt = Date.now();
  var kirj60 = kirjaukset.filter(function(k){
    return (nyt-new Date(k.pvm).getTime())<60*86400000;
  }).length;
  var kirjTaso = kirj60>=6?3:kirj60>=3?2:kirj60>=1?1:0;
  var qsLkm = 0;
  if (j) (j.pelaajatLista||[]).forEach(function(p){ qsLkm+=(p.qs_historia||[]).length; });
  var qsTaso = qsLkm>=10?3:qsLkm>=4?2:qsLkm>=1?1:0;
  var viimePvm = kirjaukset[0] ? kirjausPaiviatten(kirjaukset[0].pvm) : 999;
  var kirjTiheys = viimePvm<=7?3:viimePvm<=21?2:viimePvm<=45?1:0;
  var vpKat = kirjaukset.filter(function(k){
    return k.vpKatselmus&&(nyt-new Date(k.pvm).getTime())<60*86400000;
  }).length;
  var vpTaso = vpKat>=2?3:vpKat>=1?2:0;
  var yht = kirjTaso+qsTaso+kirjTiheys+vpTaso;
  var taso = yht>=9?'vihr':yht>=5?'kelt':'pun';
  var col = taso==='vihr'?'var(--green)':taso==='kelt'?'var(--amber)':'var(--red)';
  return { taso:taso, col:col, pisteet:yht,
    komp:{ kirj:{n:kirj60,p:kirjTaso}, qs:{n:qsLkm,p:qsTaso},
           tiheys:{pv:viimePvm,p:kirjTiheys}, vpKat:{n:vpKat,p:vpTaso} } };
}

function liikenneValo(seura, jnimi) {
  var sig = laskeAktiivisuusSignaali(seura, jnimi);
  var pv = sig.komp.tiheys.pv;
  var pvLabel = pv<999 ? pv+'pv sitten' : 'Ei kirjauksia';
  var label = sig.taso==='vihr' ? 'OK · '+pvLabel :
              sig.taso==='kelt' ? 'Seuraa · '+pvLabel : 'Toimenpide · '+pvLabel;
  return { col:sig.col, label:label, paivat:pv, signaali:sig };
}

// Laske kausikohtainen harjoitteluseuranta-aktiivisuus yhdelle joukkueelle
// Palauttaa: viikot joissa kirjauksia, inno-keskiarvo, liike-keskiarvo,
//            arvio Palloliiton 3pv/vko-kriteerin suunnasta
function laskeKausiAktiivisuus(seura, jnimi) {
  var kirjaukset = haePikaKirjaukset(seura, jnimi);
  if (!kirjaukset.length) return null;

  // Ryhmitä kirjaukset viikon tarkkuudella (ISO-viikkonumero)
  function isoViikko(dateStr) {
    var d = new Date(dateStr);
    var jan4 = new Date(d.getFullYear(), 0, 4);
    var startOfWeek = new Date(jan4);
    startOfWeek.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
    return Math.floor((d - startOfWeek) / (7 * 24 * 3600 * 1000));
  }

  var viikot = new Set();
  var innoSumma = 0, liikeSumma = 0, n = 0;
  kirjaukset.forEach(function(k) {
    viikot.add(k.pvm.slice(0,4) + '_' + isoViikko(k.pvm)); // vuosi_viikko
    if (k.inno) { innoSumma += k.inno; liikeSumma += k.liike || 0; n++; }
  });

  var viikoissa = viikot.size;
  var innoKa  = n ? Math.round(innoSumma / n * 10) / 10 : null;
  var liikeKa = n ? Math.round(liikeSumma / n * 10) / 10 : null;

  // Palloliiton 3pv/vko tarkoittaa käytännössä noin 12 viikkoa/kuukausi
  // Kirjaustiheys on suuntaa-antava indikaattori: ei suora mittaus mutta kertoo
  // onko valmentaja seurannut aktiivisesti. Kynnys: 3 viikkoa/kuukausi = hyvä.
  var kuukausia = Math.max(1, Math.round(kirjaukset.length / 2)); // karkea arvio
  var viikoissaKuussa = Math.round(viikoissa / Math.max(1, kuukausia) * 10) / 10;
  var aktiivisuusTaso = viikoissa >= 10 ? 'hyvä' : viikoissa >= 5 ? 'kehittyvä' : 'vähäinen';

  return {
    kirjauksia: kirjaukset.length,
    viikoissa:  viikoissa,
    innoKa:     innoKa,
    liikeKa:    liikeKa,
    taso:       aktiivisuusTaso
  };
}

// Laske koko seuran harjoitteluseuranta-yhteenveto Palloliiton kriteeriä varten
function laskeSeuranHarjoitteluseuranta(seura) {
  var s = _seuraData[seura];
  if (!s) return { lkm: 0, pct: 0, ok: false };
  var yhteensa = 0, joukkueitaSeurannassa = 0;
  Object.keys(s.joukkueet).forEach(function(jnimi) {
    var akt = laskeKausiAktiivisuus(seura, jnimi);
    if (akt && akt.kirjauksia > 0) {
      yhteensa += akt.kirjauksia;
      if (akt.taso !== 'vähäinen') joukkueitaSeurannassa++;
    }
  });
  var joukkueet_n = Object.keys(s.joukkueet).length;
  var pct = joukkueet_n ? Math.round(joukkueitaSeurannassa / joukkueet_n * 100) : 0;
  return { lkm: yhteensa, joukkueitaSeurannassa: joukkueitaSeurannassa,
           joukkueet_n: joukkueet_n, pct: pct, ok: yhteensa >= 150 };
}

    h += '<div id="pikaHistoria">';
    kirjaukset.slice(1, 5).forEach(function(k) {
      var d = new Date(k.pvm).toLocaleDateString("fi-FI");
      var iCol = k.inno >= 8 ? 'var(--green)' : k.inno >= 6 ? 'var(--amber)' : 'var(--red)';
      var lCol = k.liike >= 8 ? 'var(--green)' : k.liike >= 6 ? 'var(--amber)' : 'var(--red)';
      h += '<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">';
      h += '<div style="display:flex;justify-content:space-between;margin-bottom:3px">';
      h += '<span style="font-size:11px;color:var(--muted2)">' + d + (k.valmentaja ? ' · <strong>' + k.valmentaja + '</strong>' : '') + (k.rooli && k.rooli !== 'joukkuevalmentaja' ? ' <span style="font-size:9px;color:var(--teal)">(' + k.rooli + ')</span>' : '') + '</span>';
      h += '<span style="font-size:11px">Inno <strong style="color:' + iCol + '">' + k.inno + '</strong> · Liike <strong style="color:' + lCol + '">' + k.liike + '</strong></span>';
      h += '</div>';
      if (k.toimenpide) h += '<div style="font-size:11px;color:var(--muted2)">'+k.toimenpide+'</div>';
      h += '</div>';
    });
    h += '</div>'; // pikaHistoria
    h += '</div>';
  }

  document.getElementById('pikaBody').innerHTML = h;
  document.getElementById('pikaModal').style.display = 'flex';
}

function valitseRooli(btn, rooliId) {

// ── TALENTTIPELAAJAT — localStorage-pohjainen nimeäminen ──
// Avain: 'talentit_<seura>_<kausi>' → Set of player IDs
// Kausi = '2025' (nykyinen, voidaan laajentaa)

function _talentKey(seura) {
  return 'talentit_' + seura.replace(/\s+/g,'_') + '_2025';
}

function haeTalentit(seura) {
  try {
    var raw = localStorage.getItem(_talentKey(seura));
    return raw ? new Set(JSON.parse(raw)) : new Set();
  } catch(e) { return new Set(); }
}

function tallennaTalentit(seura, idSet) {
  try {
    localStorage.setItem(_talentKey(seura), JSON.stringify([...idSet]));
  } catch(e) { console.warn('localStorage virhe'); }
}

function onTalentti(seura, pid) {
  return haeTalentit(seura).has(pid);
}

function merkitseTalentti(seura, pid) {
  var set = haeTalentit(seura);
  if (set.has(pid)) {
    set.delete(pid);
  } else {
    set.add(pid);
  }
  tallennaTalentit(seura, set);
}

// ── RENDER: Talentit-välilehti ──
function renderTalentit() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;

  var talentSet = haeTalentit(_aktivSeura);
  var NYKY_KAUSI = 2026; // testaushetki — rajaa 12-15v

  // Kerää kaikki 12-15v pelaajat kaikista joukkueista
  var kaikki1215 = [];
  Object.entries(s.joukkueet).forEach(function(entry) {
    var jnimi = entry[0], j = entry[1];
    (j.pelaajatLista || []).forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika >= 12 && ika <= 15) {
        // Laske normitasoanalyysi
        var profii = (typeof laskeNormitasoProfiili === 'function')
          ? laskeNormitasoProfiili(p.fys_historia || [], p.sukupuoli, ika) : null;
        // Kehityspisteet — kausi
        var hist = p.qs_historia || [];
        var delta = null;
        if (hist.length >= 2) {
          var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
          var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
          if (f && l) delta = Math.round((l-f)*100)/100;
        }
        var latestOvr = ovrFromKetjut((hist[hist.length-1]&&(hist[hist.length-1].results||{}).ketjut)||{});
        kaikki1215.push({
          p: p, jnimi: jnimi,
          ika: ika, pid: p.id || p.palloliitoId || (p.etunimi+p.sukunimi),
          profii: profii, delta: delta, ovr: latestOvr,
          isTalentti: talentSet.has(p.id || p.palloliitoId || (p.etunimi+p.sukunimi))
        });
      }
    });
  });

  // Järjestä: ensin talentit (normitaso ensin), sitten muut
  kaikki1215.sort(function(a, b) {
    if (a.isTalentti !== b.isTalentti) return b.isTalentti - a.isTalentti;
    // Normitasostatuksen mukaan: tavoitetasolla > kehittyy > tarkkailu
    var aS = a.profii ? (a.profii.tavoitetasolla ? 2 : a.profii.normi_pct >= 45 ? 1 : 0) : -1;
    var bS = b.profii ? (b.profii.tavoitetasolla ? 2 : b.profii.normi_pct >= 45 ? 1 : 0) : -1;
    if (bS !== aS) return bS - aS;
    return (b.ovr||0) - (a.ovr||0);
  });

  var nimetyt = kaikki1215.filter(function(x){ return x.isTalentti; });
  var pojat = nimetyt.filter(function(x){ return x.p.sukupuoli === 'male'; });
  var tytot = nimetyt.filter(function(x){ return x.p.sukupuoli === 'female'; });
  var PL_MIN = 20; // Palloliiton minimi per sukupuoli

  // ── Laske kaikki metriikat etukäteen ──
  var nTavoite = 0, nKehittyy = 0, nTarkkailu = 0, nEiDataa = 0;
  nimetyt.forEach(function(x) {
    if (!x.profii) { nEiDataa++; return; }
    if (x.profii.tavoitetasolla) nTavoite++;
    else if (x.profii.normi_pct >= 45) nKehittyy++;
    else nTarkkailu++;
  });
  var ovrNousu = nimetyt.filter(function(x){ return x.delta > 0.2; }).length;
  var ovrTasainen = nimetyt.filter(function(x){ return x.delta !== null && Math.abs(x.delta||0) <= 0.2; }).length;
  var ovrLasku = nimetyt.filter(function(x){ return x.delta !== null && x.delta < -0.2; }).length;
  var riskiRyhma = nimetyt.filter(function(x){
    return (x.delta !== null && x.delta < -0.2) || (x.profii && x.profii.normi_pct < 30);
  });

  var h = '';

  // ── YLÄNÄKYMÄ: 4 paneelia — kaikki kerralla ──
  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h += '<div><div class="card-title" style="margin:0">Talenttiohjelma — '+_aktivSeura+'</div>';
  h += '<div style="font-size:11px;color:var(--muted2);margin-top:3px">Kausi 2025–26 · Palloliiton toimintakriteeri: min. 20 poikaa + 20 tyttöä</div></div>';
  if (_vpRooli === 'uj') h += '<div style="font-size:11px;color:var(--muted2);background:var(--bg3);border-radius:8px;padding:4px 10px">👤 Urheilujohtaja</div>';
  h += '</div>';

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">';

  // P1: Palloliiton kriteeri
  var pCol = pojat.length >= PL_MIN ? 'var(--green)' : 'var(--amber)';
  var tCol = tytot.length >= PL_MIN ? 'var(--green)' : 'var(--amber)';
  var krOk = pojat.length >= PL_MIN && tytot.length >= PL_MIN;
  h += '<div style="background:var(--bg3);border-radius:12px;padding:12px 14px;border:1px solid '+(krOk?'rgba(52,211,153,.3)':'rgba(245,158,11,.3)')+'">';
  h += '<div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Palloliiton kriteeri</div>';
  h += '<div style="display:flex;justify-content:space-around;margin-bottom:8px">';
  h += '<div style="text-align:center"><div style="font-family:\\"Bebas Neue\\";font-size:28px;color:'+pCol+'">'+pojat.length+'<span style="font-size:14px;color:var(--muted2)">/'+PL_MIN+'</span></div><div style="font-size:10px;color:var(--muted2)">Poikia ⭐</div></div>';
  h += '<div style="width:1px;background:var(--border)"></div>';
  h += '<div style="text-align:center"><div style="font-family:\\"Bebas Neue\\";font-size:28px;color:'+tCol+'">'+tytot.length+'<span style="font-size:14px;color:var(--muted2)">/'+PL_MIN+'</span></div><div style="font-size:10px;color:var(--muted2)">Tyttöjä ⭐</div></div>';
  h += '</div>';
  h += '<div style="font-size:11px;text-align:center;color:'+(krOk?'var(--green)':'var(--amber)')+'">'+(krOk?'✅ Kriteeri täyttyy':'⏳ Nimeä lisää pelaajia')+'</div>';
  h += '</div>';

  // P2: Normitasostatus
  var normPct = nimetyt.length ? Math.round(nTavoite/nimetyt.length*100) : 0;

    h += '<div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--amber)">● Kehittyy</span><span style="font-weight:700;color:var(--amber)">'+nKehittyy+'</span></div>';
    h += '<div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--red)">● Tarkkailu</span><span style="font-weight:700;color:var(--red)">'+nTarkkailu+'</span></div>';
    h += '</div>';
    h += '<div style="margin-top:6px;font-size:11px;color:'+nCol2+';border-top:1px solid var(--border);padding-top:6px;font-weight:600">'+normPct+'% tavoitetasolla · min. 66%</div>';
  }
  h += '</div>';

  // P3: Kehityspisteet — kausi
  h += '<div style="background:var(--bg3);border-radius:12px;padding:12px 14px">';
  h += '<div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Kehityspisteet — kausi</div>';
  if (!nimetyt.length) {
    h += '<div style="font-size:12px;color:var(--muted2);text-align:center;padding:8px 0">Ei nimettyjä vielä</div>';
  } else {
    h += '<div style="display:flex;flex-direction:column;gap:4px">';
    h += '<div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--green)">↑ Kehittyy</span><span style="font-weight:700;color:var(--green)">'+ovrNousu+'</span></div>';
    h += '<div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--amber)">→ Tasainen</span><span style="font-weight:700;color:var(--amber)">'+ovrTasainen+'</span></div>';
    h += '<div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--red)">↓ Laskee</span><span style="font-weight:700;color:var(--red)">'+ovrLasku+'</span></div>';
    h += '</div>';
    h += '<div style="margin-top:6px;font-size:11px;color:var(--muted2);border-top:1px solid var(--border);padding-top:6px">'+nimetyt.length+' nimettyä yhteensä</div>';
  }
  h += '</div>';

  // P4: Riskiryhmä
  var riskiCol = riskiRyhma.length === 0 ? 'var(--green)' : riskiRyhma.length <= 3 ? 'var(--amber)' : 'var(--red)';
  h += '<div style="background:var(--bg3);border-radius:12px;padding:12px 14px;border:1px solid '+(riskiRyhma.length?'rgba(248,113,113,.2)':'rgba(52,211,153,.15)')+'">';

    if (riskiRyhma.length > 3) h += '<div style="font-size:10px;color:var(--muted2)">+ '+(riskiRyhma.length-3)+' muuta</div>';
    h += '</div>';
  } else {

  }
  h += '</div>';

  h += '</div></div>'; // grid + card

  // ── PELAAJALISTAUS: kaikki 12-15v, merkkausnappeineen ──
  var nakymassa = kaikki1215;

  var osioMuut = nakymassa.filter(function(x){ return !x.isTalentti; });

  function renderOsio(lista, title, showAdd) {

    var oh = '<div class="card" style="margin-bottom:12px">';

    oh += '<div style="display:grid;grid-template-columns:1fr 40px 60px 80px 48px;gap:4px;';
    oh += 'padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px">';
    oh += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase">Pelaaja</div>';
    oh += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;text-align:center">Ikä</div>';
    oh += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;text-align:center">OVR</div>';
    oh += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;text-align:center">Normitaso</div>';

      } else {
        normCol = 'var(--muted)'; normBadge = '<span style="color:var(--muted2)">—</span>';
      }
      var ovrCol = x.ovr >= 7 ? 'var(--green)' : x.ovr >= 5 ? 'var(--amber)' : 'var(--muted)';
      var pid = p.id || p.palloliitoId || (p.etunimi + p.sukunimi);
      var deltaStr = x.delta != null ? (x.delta >= 0 ? '+' : '') + x.delta.toFixed(1) : '';
      var deltaCol = x.delta > 0 ? 'var(--green)' : x.delta < 0 ? 'var(--red)' : 'var(--muted)';

      oh += '<div style="display:grid;grid-template-columns:1fr 40px 60px 80px 48px;gap:4px;';
      oh += 'padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:center">';

      // Nimi + joukkue
      oh += '<div>';
      oh += '<div style="font-size:12px;font-weight:500">'+p.etunimi+' '+p.sukunimi+'</div>';
      oh += '<div style="font-size:10px;color:var(--muted2)">'+x.jnimi;
      if (deltaStr) oh += ' · <span style="color:'+deltaCol+'">'+deltaStr+' OVR</span>';
      oh += '</div></div>';

      // Ikä
      oh += '<div style="text-align:center;font-size:11px;color:var(--muted2)">'+x.ika.toFixed(1)+'</div>';

      // OVR
      oh += '<div style="text-align:center;font-family:\\"Bebas Neue\\";font-size:18px;color:'+ovrCol+'">'+((x.ovr||'').toString()||'—')+'</div>';

      // Normitaso
      oh += '<div style="text-align:center">'+normBadge+'</div>';

      // Merkintä-nappi
      var btnStyle = x.isTalentti
        ? 'background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.3);color:var(--teal)'
        : 'background:var(--bg3);border:1px solid var(--border);color:var(--muted)';
      oh += '<div style="text-align:center">';
      oh += '<button onclick="vaihdaTalentti(\''+pid+'\')" data-pid="'+pid+'" ';
      oh += 'style="font-size:11px;border-radius:7px;padding:3px 8px;cursor:pointer;'+btnStyle+';font-family:\\"DM Sans\\"">';
      oh += (x.isTalentti ? '⭐' : '+') + '</button>';
      oh += '</div>';

      oh += '</div>';
    });

    oh += '</div>';
    return oh;
  }

  h += renderOsio(osioNimetyt, '⭐ Nimetyt talenttipelaajat', true);
  h += renderOsio(osioMuut, 'Muut 12–15v pelaajat — merkitse talenttiohjelmaan', false);

  document.getElementById('tabTalentit').innerHTML = h;
}

function vaihdaTalentti(pid) {
  merkitseTalentti(_aktivSeura, pid);
  renderTalentit(); // päivitä näkymä
}

var _vpPin = '';

var VP_ROOLIT = { '5555': 'vp', '6666': 'vp', '7777': 'vp', '8888': 'uj' };

function addVpPin(n) {

function clearVpPin() {
  _vpPin = _vpPin.slice(0,-1);
  updateDots();
  document.getElementById('pinErr').textContent = '';
}
function updateDots() {
  for(var i=0;i<4;i++) {
    document.getElementById('pd'+i).className = 'pin-dot' + (i < _vpPin.length ? ' filled' : '');
  }
}
function checkPin() {
  if (VP_PINS[_vpPin]) {
    _vpRooli = VP_ROOLIT[_vpPin] || 'vp';

    document.getElementById('sDash').classList.add('active');

    document.getElementById('pinErr').textContent = 'Väärä PIN-koodi';
    _vpPin = '';
    updateDots();
  }
}
function kirjauduUlos() {

  if (_fbAuth && _fbUser) {
    _fbAuth.signOut().catch(function(e) {
      console.warn('[AUTH] Uloskirjautuminen epäonnistui:', e.message);
    });
    _fbUser = null;
  }
  // Nollaa session tila
  window._fbSeuraDoc = null;
  window._pilottiAlustettu = false;
  _vpPin = '';
  updateDots();
  // Tyhjennetään sähköpostikentät

// Pääfunktio — kirjautuu sähköpostilla ja salasanalla
function kirjauduEmaililla() {
  var email    = (document.getElementById('emailInput').value || '').trim();
  var password = document.getElementById('passwordInput').value || '';
  var errDiv   = document.getElementById('pinErr');

  if (!email) { errDiv.textContent = 'Syötä sähköpostiosoite'; return; }
  if (!password) { errDiv.textContent = 'Syötä salasana'; return; }
  if (!_fbAuth) { errDiv.textContent = 'Firebase ei ole valmis — yritä uudelleen'; return; }

  errDiv.textContent = 'Kirjaudutaan...';
  errDiv.style.color = 'var(--teal)';

  _fbAuth.signInWithEmailAndPassword(email, password)
    .then(function(userCredential) {
      _fbUser = userCredential.user;
      errDiv.style.color = '';
      console.log('[AUTH] Kirjautuminen onnistui:', _fbUser.email);
      _fbOnline = true; // Kirjautuminen onnistui — Firebase on käytettävissä

      // Haetaan käyttäjän seura Firestore-dokumentista
      // custom claims eivät välttämättä ole heti saatavilla
      // joten luetaan seura suoraan seurat-kokoelmasta VP:n UID:n perusteella
      _fbDb.collection('seurat')
        .where('vp_uid', '==', _fbUser.uid)
        .get()
        .then(function(snap) {
          if (snap && !snap.empty) {
            var seuraDoc = snap.docs[0].data();
            var seuraId  = snap.docs[0].id;  // KORJATTU: .id tulee dokumentilta, ei datalta
            var rooli    = 'vp';

            console.log('[AUTH] Seura tunnistettu:', seuraId);

            // Asetetaan aktiviinen seura VP:n seuran mukaan
            // Tämä ohittaa PIN-pohjaisen seuravalinnan
            _vpRooli = rooli;

            // Päivitetään topbarin käyttäjätiedot
            var rooliLabel = document.getElementById('vpRooliLabel');
            if (rooliLabel) {
              rooliLabel.textContent = '👤 ' + _fbUser.email.split('@')[0].replace('vp.','').toUpperCase();
            }

            // KRIITTINEN JÄRJESTYS:
            // 1. Aseta _fbSeuraDoc ENSIN
            // 2. Sitten initDash — se lukee _fbSeuraDoc ja valitsee oikean seuran
            window._fbSeuraDoc = seuraDoc;
            // Tallenna seuraDoc localStorage:een — palautetaan refreshissa
            try { localStorage.setItem('tm_seuraDoc', JSON.stringify({id: seuraDoc.id, nimi: seuraDoc.nimi})); } catch(e) {}
            console.log('[AUTH] Seura asetettu:', seuraDoc.nimi, '(id:', seuraDoc.id, ')');

            // Siirrytään dashboardiin
            var loginEl = document.getElementById('sLogin');
            loginEl.classList.remove('active');
            loginEl.style.display = 'none';
            document.getElementById('sDash').classList.add('active');

            // Alustetaan dashboard — _fbSeuraDoc on nyt valmis
            initDash();

          } else {
            // Käyttäjä löytyy Firebasesta mutta ei seurat-kokoelmasta
            // Tämä ei pitäisi tapahtua normaalisti
            errDiv.style.color = 'var(--red)';
            errDiv.textContent = 'Käyttäjätili ei ole liitetty seuraan. Ota yhteyttä TalentMaster-tukeen.';
            _fbAuth.signOut();
          }
        })
        .catch(function(e) {
          errDiv.style.color = 'var(--red)';
          errDiv.textContent = 'Seurahaun virhe: ' + e.message;
        });
    })
    .catch(function(error) {
      errDiv.style.color = 'var(--red)';
      // Näytetään käyttäjäystävällinen virheilmoitus
      var viesti = 'Kirjautuminen epäonnistui';
      if (error.code === 'auth/user-not-found')     viesti = 'Sähköpostiosoitetta ei löydy';
      if (error.code === 'auth/wrong-password')      viesti = 'Väärä salasana';
      if (error.code === 'auth/invalid-email')       viesti = 'Virheellinen sähköpostiosoite';
      if (error.code === 'auth/too-many-requests')   viesti = 'Liian monta yritystä — odota hetki';
      if (error.code === 'auth/invalid-credential')  viesti = 'Väärä sähköposti tai salasana';
      if (error.code === 'auth/network-request-failed') viesti = 'Verkkovirhe — tarkista yhteys';
      errDiv.textContent = viesti;
      console.warn('[AUTH] Virhe:', error.code, error.message);
    });
}

function _lataaPilottiDashboard() {
  var seura = window._fbSeuraDoc;
  if (!seura) return;
  // Estetään toistuvat alustukset — onAuthStateChanged voi laukaista tämän useasti
  // mutta onSnapshot-kuuntelijaa ei pidä avata uudelleen jos se on jo aktiivinen
  if (window._pilottiAlustettu && window._joukkueetUnsubscribe) {
    console.log('[VP] Pilotti jo alustettu — ohitetaan uudelleenalustus');
    return;
  }
  window._pilottiAlustettu = true;

  // Vaihda näkymä login → dashboard (tarvitaan refreshissa jossa onAuthStateChanged
  // palauttaa session mutta kirjauduEmaililla() ei ole kutsuttu)
  var _loginEl = document.getElementById('sLogin');
  var _dashEl  = document.getElementById('sDash');
  // Näkyvyys perustuu CSS-luokkaan 'active' — style.display ei riitä
  if (_loginEl) _loginEl.classList.remove('active');
  if (_dashEl)  _dashEl.classList.add('active');

  var seuraId  = seura.id;
  var seuraNimi = seura.nimi || seuraId;

  // Päivitä seuravalikko
  var sel = document.getElementById('seuraSelect');
  if (sel) sel.innerHTML = '<option value="' + seuraId + '">' + seuraNimi + '</option>';
  window._aktivSeura = seuraId;

  // ── Firebase-only seurat (ei tm_data.js:ssä) ──────────────────────
  // Rekisteröidään seura _seuraData:han niin että kaikki dashboard-tabsit
  // toimivat — ne odottavat löytävänsä seuran tästä rakenteesta.
  // Joukkueet haetaan Firestoresta erikseen onSnapshot-kuuntelijalla.
  if (!_seuraData[seuraId]) {
    _seuraData[seuraId] = {
      nimi:       seuraNimi,
      _seuraId:   seuraId,
      _fbOnly:    true,          // merkitään: ei tm_data.js -dataa
      joukkueet:  {},            // täytetään Firestoresta alla
      pelaajia:   seura.tilastot && seura.tilastot.pelaajia  || 0,
      kirjauksia: seura.tilastot && seura.tilastot.kartoituksia || 0
    };
    console.log('[VP] Firebase-only seura rekisteröity _seuraData:han:', seuraId);

    // Haetaan joukkueet Firestoresta ja täytetään rakenne
    _fbDb.collection('seurat').doc(seuraId)
      .collection('kartoitukset')
      .limit(100).get()  // orderBy poistettu — alikokoelmat eivät tarvitse composiitti-indeksiä
      .catch(function(e){ console.warn('[VP] Kartoitukset-haku virhe:', e.message); return null; })
      .then(function(snap) {
        if (!snap) return;
        var joukkueetSet = {};
        snap.forEach(function(doc) {
          var d = doc.data();
          var jNimi = d.joukkue || 'Joukkue';
          if (!joukkueetSet[jNimi]) {
            joukkueetSet[jNimi] = { nimi: jNimi, pelaajia: 0, kartoituksia: 0 };
          }
          joukkueetSet[jNimi].kartoituksia++;
        });
        _seuraData[seuraId].joukkueet = joukkueetSet;
        console.log('[VP] Joukkueet haettu Firestoresta:', Object.keys(joukkueetSet));
        // Päivitetään joukkueet-tab jos se on auki
        if (typeof renderJoukkueet === 'function') renderJoukkueet();
      });
  }
  // ─────────────────────────────────────────────────────────────────────

  // Yleiskuva-tab
  var yleiskuva = document.getElementById('tabYleiskuva');
  if (yleiskuva) {
    // Rakennetaan KPI-kortit Firestoren tilastot-kentästä
    var til = seura.tilastot || {};
    var nPelaajia    = til.pelaajia    || 0;
    var nJoukkueita  = til.joukkueita  || 0;

      kpiHtml =

          '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 22px;text-align:center">' +
            '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:32px;color:var(--teal)">' + nPelaajia + '</div>' +
            '<div style="font-size:11px;color:var(--muted)">Pelaajaa</div></div>' +
          '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 22px;text-align:center">' +
            '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:32px;color:var(--teal)">' + nJoukkueita + '</div>' +
            '<div style="font-size:11px;color:var(--muted)">Joukkuetta</div></div>' +
          '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 22px;text-align:center">' +
            '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:32px;color:var(--gold)">' + nKartoituksia + '</div>' +
            '<div style="font-size:11px;color:var(--muted)">Kartoitusta</div></div>' +
        '</div>';
    }
    yleiskuva.innerHTML =
      '<div style="padding:32px;text-align:center">' +
      '<div style="font-size:40px;margin-bottom:12px">🏟️</div>' +
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--teal);margin-bottom:4px">' + seuraNimi + '</div>' +
      '<div style="font-size:13px;color:var(--muted);margin-bottom:20px">TalentMaster™ — Pilottivaihe</div>' +
      kpiHtml +
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">' +
      '<button onclick="vaihda(1,document.querySelectorAll(\'.nav-tab\')[1])" ' +
        'style="padding:12px 20px;background:var(--teal);color:#000;border:none;border-radius:10px;font-weight:700;cursor:pointer">' +

        'style="padding:12px 20px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">' +
        '🏋️ Kartoitukset</button>' +

  // Joukkueet-tab: käynnistä realtime listener
  var container = document.getElementById('tabJoukkueet');
  if (!container) return;

  container.innerHTML =
    '<div style="padding:40px;text-align:center;color:var(--muted)">' +
    '<div style="font-size:24px;margin-bottom:8px">⏳</div>' +
    '<div>Ladataan joukkueita...</div></div>';

  // Lopeta vanha kuuntelija jos on
  if (_joukkueetUnsubscribe) { _joukkueetUnsubscribe(); _joukkueetUnsubscribe = null; }

  // Käynnistä realtime listener — päivittyy automaattisesti
  _joukkueetUnsubscribe = window._fbDb
    .collection('seurat').doc(seuraId).collection('joukkueet')
    .orderBy('nimi')
    .onSnapshot(function(snap) {
      console.log('[VP] Joukkueet päivitetty:', snap.size, 'kpl');
      _renderJoukkueetLista(snap, seuraNimi, container);
    }, function(err) {
      container.innerHTML =
        '<div style="padding:30px;text-align:center;color:var(--red)">⚠️ ' + err.message + '</div>';
      console.error('[VP] Joukkueet onSnapshot virhe:', err);
    });
}

function initDash() {
  if (!window._tmDataReady) {
    // Data latautuu vielä — odota ja yritä uudelleen ilman kirjaudu()-kutsua
    // kirjaudu() näyttäisi login-näkymän, mikä kirjaisi käyttäjän ulos refreshissa
    console.log('[VP] Odotetaan tm_data.js latautumista...');
    setTimeout(function() { initDash(); }, 300);
    return;
  }
  // Null-safe data-lataus: käytä TM_DATA jos saatavilla, muuten tyhjä lookup
  var lookup = (window.TM_DATA && window.TM_DATA.lookup) ? window.TM_DATA.lookup : {};
  if (!Object.keys(lookup).length) {
    if (window._fbSeuraDoc) {
      _lataaPilottiDashboard();
      return;
    }
    console.warn('[VP] Ei pelaajadataa — tm_data.js puuttuu.');
    document.getElementById('tabYleiskuva').innerHTML =
      '<div style="padding:40px;text-align:center;color:var(--muted2)">' +
      '<div style="font-size:48px;margin-bottom:16px">📂</div>' +
      '<div style="font-size:18px;font-weight:600;margin-bottom:8px">tm_data.js ei löydy</div>' +
      '<div style="font-size:13px;line-height:1.7">Avaa tiedosto GitHub-sivustolta.</div>' +
      '</div>';
    return;
  }
  _seuraData = aggregateData(lookup);
  
  var sel = document.getElementById('seuraSelect');
  sel.innerHTML = '';
  var seurat = Object.keys(_seuraData).sort();
  seurat.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s; opt.textContent = s + ' (' + _seuraData[s].pelaajia + 'p)';
    sel.appendChild(opt);
  });
  
  // Valitse seura PINin mukaan
  var pinSeura = { '6666':'FC Lahti Juniorit', '7777':'SJK -juniorit', '8888': seurat[0] };

  // Jos kirjauduttu sähköpostilla Firebase-tunnuksella
  if (window._fbSeuraDoc) {
    var fbNimi = window._fbSeuraDoc.nimi;
    var fbId   = window._fbSeuraDoc.id;
    console.log('[AUTH] initDash käyttää FB-seuraa:', fbNimi);

    // Jos seura ei ole tm_data.js:ssä, lisätään se listaan
    // Tämä mahdollistaa pilottiseurojen käytön vaikka niillä ei ole historiadataa
    if (!seurat.includes(fbNimi)) {
      console.log('[AUTH] Seura ei ole tm_data.js:ssä — lisätään listaan:', fbNimi);
      seurat.push(fbNimi);
      // Lisätään myös _seuraData:an tyhjällä rakenteella
      _seuraData[fbNimi] = {
        pelaajia:  0,
        testeja:   0,
        joukkueet: {},
        // Merkitään Firebase-seuraksi myöhempää käyttöä varten
        _firebaseSeura: true,
        _seuraId: fbId
      };
    }

    pinSeura['__fb__'] = fbNimi;
    _vpPin = '__fb__';
    console.log('[AUTH] ✅ Seura asetettu:', fbNimi);
  }
  // Näytä roolitunniste header:issa
  var rooliLabel = document.getElementById('vpRooliLabel');
  if (rooliLabel) {
    rooliLabel.textContent = _vpRooli === 'uj' ? '👤 Urheilujohtaja' : '👤 Valmennuspäällikkö';
  }
  // Näytä/piilota UJ-Strategia-tabi roolin mukaan
  var navUJ = document.getElementById('navUJStrategia');
  if (navUJ) navUJ.style.display = _vpRooli === 'uj' ? '' : 'none';
  var defaultSeura = pinSeura[_vpPin] || seurat[0];
  if (_seuraData[defaultSeura]) sel.value = defaultSeura;
  
  _aktivSeura = sel.value;

  // ── SESSION-LOAD: Hae Firebase-data taustalla ─────────────────────
  // Haetaan kaikki aktiivisen seuran joukkueiden kirjaukset Firebasesta
  // heti kirjautumisen jälkeen. UI renderöidään ensin LocalStoragesta
  // (nopea), Firebase päivittää välimuistin taustalla (tarkka).
  if (_fbOnline && _fbDb) {
    lataaSeuraFirebasesta(_aktivSeura, function(lkm) {
      if (lkm > 0) {
        console.log('[FB] Session-load: ' + lkm + ' joukkuetta päivitetty');
        // Päivitetään liikennevalot uudella datalla hiljaisesti
        renderTab(_aktivTab);
      }
    });
  }

  // Firebase-pilottiseura: jos kirjauduttu Firebasella eikä seura ole tm_data.js:ssä → pilotti-dashboard
  // Tarkistetaan _fbSeuraDoc suoraan, ei _aktivSeura:n kautta (voi olla tyhjä tässä vaiheessa)
  if (window._fbSeuraDoc) {
    var _fbNimiCheck = window._fbSeuraDoc.nimi;
    var _onTmData = seurat.some(function(s) { 
      return s === _fbNimiCheck && !(_seuraData[s] && _seuraData[s]._firebaseSeura); 
    });
    if (!_onTmData) {
      console.log('[VP] Firebase-pilottiseura — käynnistetään pilotti-dashboard:', _fbNimiCheck);
      _lataaPilottiDashboard();
      return;
    }
  }

  renderAll();
}

// Hakee kaikki seuran joukkueiden kirjaukset Firebasesta kerralla
// ja päivittää LocalStorage-välimuistin. Kutsutaan kerran per istunto.
function lataaSeuraFirebasesta(seura, callback) {
  if (!_fbOnline || !_fbDb) { if(callback) callback(0); return; }

  // Haetaan kaikki dokumentit joiden seura-kenttä täsmää
  // kirjaukset_joukkue-kokoelmasta — yksi dokumentti per joukkue
  _fbDb.collection('kirjaukset_joukkue')
    .where('seura', '==', seura)
    .get()
    .then(function(snapshot) {
      var paivitetty = 0;
      snapshot.forEach(function(doc) {
        var data = doc.data();
        var jnimi = data.joukkue;
        var kirjaukset = data.kirjaukset || [];
        if (jnimi && kirjaukset.length > 0) {
          // Päivitetään LocalStorage välimuisti Firebasen datalla
          // Firebasen data voittaa aina — se on aina tuorein
          try {
            var avain = 'pika_' + seura.replace(/\s/g,'_') + '_' + jnimi.replace(/\s/g,'_');
            var nykyinen = localStorage.getItem(avain);
            var nykyinenData = nykyinen ? JSON.parse(nykyinen) : [];
            // Yhdistetään: Firebase-kirjaukset ensin, lisätään paikalliset
            // kirjaukset jotka eivät vielä ole Firebasessa
            var fbPvmSet = new Set(kirjaukset.map(function(k){ return k.pvm; }));
            var vainPaikalliset = nykyinenData.filter(function(k){
              return !fbPvmSet.has(k.pvm);
            });
            var yhdistetty = kirjaukset.concat(vainPaikalliset)
              .sort(function(a,b){ return b.pvm > a.pvm ? 1 : -1; })
              .slice(0, 30);
            localStorage.setItem(avain, JSON.stringify(yhdistetty));
            paivitetty++;
          } catch(e) {
            console.warn('[FB] LocalStorage-päivitys epäonnistui:', e.message);
          }
        }
      });
      if (callback) callback(paivitetty);
    })
    .catch(function(e) {
      console.warn('[FB] Session-load epäonnistui:', e.message);
      if (callback) callback(0);
    });
}

function aggregateData(lookup) {
  var seurat = {};
  Object.values(lookup).forEach(function(p) {
    var s = p.seura || 'Tuntematon';
    var j = p.joukkue || 'Tuntematon';
    if (!seurat[s]) seurat[s] = { pelaajia:0, testeja:0, joukkueet:{} };
    seurat[s].pelaajia++;
    if (!seurat[s].joukkueet[j]) seurat[s].joukkueet[j] = {
      pelaajia:0, testeja:0, ketjut:{}, deltat:[], gems:0,
      fys:{}, pelaajatLista:[]
    };
    var jd = seurat[s].joukkueet[j];
    jd.pelaajia++;
    jd.pelaajatLista.push(p);
    // Kerää testidatumeja syntymävuosiarvion laskemiseksi
    if (!jd._pvmList) jd._pvmList = [];
    if (!jd._ikaList) jd._ikaList = [];
    (p.fys_historia||[]).forEach(function(fh){ if(fh.date) jd._pvmList.push(parseInt(fh.date.substring(0,4))); });
    var bika = (p.bioIka||{}).krono; if(bika) jd._ikaList.push(bika);
    var hist = p.qs_historia || [];
    jd.testeja += hist.length;
    seurat[s].testeja += hist.length;
    hist.forEach(function(qs) {
      var k = (qs.results||{}).ketjut||{};
      Object.keys(k).forEach(function(kn) {
        if (!jd.ketjut[kn]) jd.ketjut[kn] = [];
        jd.ketjut[kn].push(k[kn].pisteet||0);
      });
      if ((qs.results||{}).gem) jd.gems++;
    });
    if (hist.length >= 2) {
      var f = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var l = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (f && l) jd.deltat.push(l-f);
    }
    (p.fys_historia||[]).forEach(function(fh) {
      Object.keys(fh.mittaukset||{}).forEach(function(mk) {
        var v = fh.mittaukset[mk];
        if (v != null) {
          if (!jd.fys[mk]) jd.fys[mk] = [];
          jd.fys[mk].push(v);
        }
      });
    });
  });
  // Laske keskiarvot
  Object.values(seurat).forEach(function(s) {
    Object.values(s.joukkueet).forEach(function(j) {
      j.avgKetjut = {};
      Object.keys(j.ketjut).forEach(function(k) {
        var arr = j.ketjut[k];
        j.avgKetjut[k] = arr.length ? Math.round(avg(arr)*10)/10 : null;
      });
      j.avgDelta = j.deltat.length ? Math.round(avg(j.deltat)*100)/100 : null;
      j.avgFys = {};
      Object.keys(j.fys).forEach(function(k) {
        j.avgFys[k] = Math.round(avg(j.fys[k])*100)/100;
      });
      j.avgOvr = ovrFromObj(j.avgKetjut);
      // Laske syntymävuosiarvio mediaanitestivuosi - mediaanikrono
      if (j._pvmList && j._pvmList.length && j._ikaList && j._ikaList.length) {
        var pvmS = j._pvmList.slice().sort(); var ikaS = j._ikaList.slice().sort();
        var medPvm = pvmS[Math.floor(pvmS.length/2)];
        var medIka = ikaS[Math.floor(ikaS.length/2)];
        j.syntymaVuosi = Math.round(medPvm - medIka);
      } else { j.syntymaVuosi = null; }
    });
  });
  return seurat;
}

function avg(arr) { return arr.reduce(function(a,b){return a+b;},0)/arr.length; }
function ovrFromKetjut(k) {
  var vals = Object.values(k).map(function(v){return v.pisteet||0;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}
function ovrFromObj(k) {
  var vals = Object.values(k).filter(function(v){return v!=null;});
  return vals.length ? Math.round(avg(vals)*10)/10 : null;
}

    h += '<div style="display:flex;gap:6px;align-items:center">';
    muut.forEach(function(e) {
      var km = KETJU[e[0]] || { vari: 'var(--muted)' };

    var lv = liikenneValo(_aktivSeura, jnimi);
    var akt = laskeKausiAktiivisuus(_aktivSeura, jnimi);

      var sg = lv.signaali.komp;
      h += '<div style="font-size:9px;color:var(--muted2);opacity:.7">';
      h += '&#128203;'+sg.kirj.n+' &#128295;'+sg.qs.n+' &#128065;'+sg.vpKat.n;

    }

      h += '<div style="font-size:10px;color:'+aktCol+';background:rgba(0,0,0,.2);border-radius:5px;padding:2px 6px;margin-left:4px">';
      h += akt.viikoissa+'vk · '+akt.kirjauksia+'krt';
      if (akt.innoKa) h += ' · inno '+akt.innoKa;
      h += '</div>';
    }
    h += '</div>';
    h += '<button onclick="avaaKirjaus(this.dataset.j,event)" data-j="'+jnimi+'" ';
    h += 'style="font-size:11px;color:var(--teal);background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);';
    h += 'border-radius:8px;padding:4px 10px;cursor:pointer;font-family:\"DM Sans\"">+ Kirjaus</button>';
    h += '</div>';

    h += '</div>'; // kortti
  });

  h += '</div>'; // grid
  h += '</div>'; // card
  document.getElementById('tabJoukkueet').innerHTML = h;

  // Haetaan painopisteet Firestoresta asynkronisesti
  // ja päivitetään kortit kun data saapuu
  lataaJoukkuePainopisteet();
}

// ── JOUKKUEEN KEHITYSTAVOITE / PAINOPISTE ────────────────────────────────────

var _joukkuePainopisteet = {};

function joukkueNimiToId(seuraId, jnimi) {
  return (seuraId + '_' + jnimi).toLowerCase()
    .replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
}

function lataaJoukkuePainopisteet() {
  var fbDb = _fbDb || (typeof firebase !== 'undefined' && firebase.firestore ? firebase.firestore() : null);
  var seuraId = (window._fbSeuraDoc && window._fbSeuraDoc.id) || null;
  if (!fbDb || !seuraId) return;

  fbDb.collection('seurat').doc(seuraId)
    .collection('joukkueet')
    .get()
    .then(function(snap) {
      if (!snap) return;  // null-guard: orderBy saattaa epäonnistua
      var paivitetty = false;
      snap.forEach(function(doc) {
        var d = doc.data();
        if (d.painopiste && d.painopiste.teksti) {
          _joukkuePainopisteet[doc.id] = d.painopiste;
          if (d.nimi) _joukkuePainopisteet[d.nimi] = d.painopiste;
          paivitetty = true;
        }
      });
      if (paivitetty) {
        var el = document.getElementById('tabJoukkueet');
        if (el && el.style.display !== 'none') renderJoukkueet();
      }
    })
    .catch(function() {});
}

function avaaPainopisteModaali(jnimi, event) {
  if (event) event.stopPropagation();
  var pp = _joukkuePainopisteet[jnimi] || {};
  var seuraId = (window._fbSeuraDoc && window._fbSeuraDoc.id) || null;
  var modal = document.getElementById('kartoitusModal');
  var body  = document.getElementById('kartoitusModalBody');
  if (!modal || !body) return;

  body.innerHTML =
    '<div style="padding:24px">'
    + '<div style="font-family:\'Bebas Neue\';font-size:22px;letter-spacing:1px;margin-bottom:4px">🎯 Kehitystavoite</div>'
    + '<div style="font-size:13px;color:var(--muted);margin-bottom:20px">' + jnimi + '</div>'
    + '<div style="margin-bottom:16px">'
    + '<label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Kauden painopiste</label>'
    + '<textarea id="ppTeksti" rows="3" placeholder="esim. Intensiivisyys ja aloitteellisuus pelissä ilman palloa" '
    + 'style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;'
    + 'padding:10px 12px;color:var(--text);font-family:\'DM Sans\';font-size:13px;resize:vertical;outline:none;box-sizing:border-box">'
    + (pp.teksti || '') + '</textarea>'
    + '</div>'
    + '<div style="margin-bottom:24px">'
    + '<label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Linkki jaksosuunnitelmaan (valinnainen)</label>'
    + '<input id="ppLinkki" type="url" placeholder="https://docs.google.com/..." '
    + 'value="' + (pp.linkki || '') + '" '
    + 'style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;'
    + 'padding:10px 12px;color:var(--text);font-family:\'DM Sans\';font-size:13px;outline:none;box-sizing:border-box">'
    + '</div>'
    + '<div style="display:flex;gap:8px">'
    + '<button onclick="tallennaPainopiste(\'' + jnimi + '\',\'' + seuraId + '\')" '
    + 'style="flex:1;background:var(--teal);color:var(--bg);border:none;border-radius:8px;'
    + 'padding:12px;font-family:\'Bebas Neue\';font-size:18px;cursor:pointer">Tallenna</button>'
    + '<button onclick="document.getElementById(\'kartoitusModal\').style.display=\'none\'" '
    + 'style="background:var(--bg3);color:var(--muted);border:1px solid var(--border);'
    + 'border-radius:8px;padding:12px 20px;cursor:pointer;font-family:\'DM Sans\'">Peruuta</button>'

function tallennaPainopiste(jnimi, seuraId) {
  var teksti = (document.getElementById('ppTeksti').value || '').trim();
  var linkki = (document.getElementById('ppLinkki').value || '').trim();
  var fbDb   = _fbDb || (typeof firebase !== 'undefined' && firebase.firestore ? firebase.firestore() : null);
  var fbUser = (typeof firebase !== 'undefined' && firebase.auth) ? firebase.auth().currentUser : null;
  if (!fbDb || !seuraId) { alert('Ei Firebase-yhteyttä.'); return; }

  fbDb.collection('seurat').doc(seuraId)
    .collection('joukkueet')
    .where('nimi', '==', jnimi)
    .limit(1)
    .get()
    .then(function(snap) {
      var ref = snap.empty
        ? fbDb.collection('seurat').doc(seuraId).collection('joukkueet').doc(joukkueNimiToId(seuraId, jnimi))
        : snap.docs[0].ref;
      return ref.set({
        nimi: jnimi,
        painopiste: {
          teksti:    teksti,
          linkki:    linkki || null,
          paivitetty: firebase.firestore.FieldValue.serverTimestamp(),
          paivittaja: fbUser ? fbUser.email : 'VP'
        }
      }, { merge: true });
    })
    .then(function() {
      _joukkuePainopisteet[jnimi] = { teksti: teksti, linkki: linkki };
      document.getElementById('kartoitusModal').style.display = 'none';
      renderJoukkueet();
      var t = document.getElementById('toast');
      if (t) {
        t.textContent = '✅ Painopiste tallennettu — ' + jnimi;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2500);
      }
    })
    .catch(function(err) { alert('Tallennus epäonnistui: ' + err.message); });
}

      var ig = ikaryhmät[ikaKey];

      if (arvo == null) { hasMissing = true; return; }
      var pct = Math.round((arvo / 100) * 100); // 0-100 asteikko
      var col = arvo >= 70 ? 'var(--green)' : arvo >= 45 ? 'var(--amber)' : 'var(--red)';
      var statusTeksti = arvo >= 70 ? 'Hyvä' : arvo >= 45 ? 'Kehittyvä' : 'Kehityskohde';

      // Onko tämä ikäluokka kriittisessä iässä tälle ketjulle?
      var ikaInt = ig.ika;
      var ikaParts = (ik.paras || '').match(/(\d+)–(\d+)/);
      var kriittinen = ikaParts && ikaInt >= parseInt(ikaParts[1]) && ikaInt <= parseInt(ikaParts[2]);

      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
      h += '<div style="width:28px;font-size:11px;color:var(--muted2);flex-shrink:0">' + ikaKey + '</div>';
      h += '<div style="flex:1;height:14px;background:var(--bg);border-radius:7px;overflow:hidden">';
      h += '<div style="height:100%;width:' + Math.min(100, arvo) + '%;background:' + col + ';border-radius:7px;transition:width .4s"></div>';
      h += '</div>';
      h += '<div style="width:32px;font-size:11px;font-weight:600;color:' + col + ';flex-shrink:0">' + arvo + '</div>';
      if (kriittinen) {
        h += '<div style="font-size:10px;background:' + km.vari + '25;color:' + km.vari + ';';
        h += 'border-radius:5px;padding:1px 5px;flex-shrink:0">🔥 nyt</div>';
      }
      if (arvo < 45) {
        h += '<div style="font-size:10px;color:var(--red);flex-shrink:0">⚠️ ' + statusTeksti + '</div>';
      }
      h += '</div>';
    });
    if (hasMissing) {
      h += '<div style="font-size:10px;color:var(--muted);font-style:italic">Osalla ikäluokista ei dataa.</div>';
    }
    h += '</div>'; // ikäluokkapalkit

    // ── PROGRESSIOAIKAJANA — kolme kehitysvaihetta per ketju ─────────────
    // HPP ELITE -harjoitekirjasto (Excel, 53 harjoitetta) antaa tarkemmat ohjeet.
    // Tässä näytetään pedagoginen polku ja selkokieliset harjoite-esimerkit.
    if (ik.progressio) {
      h += '<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,.07);padding-top:12px">';

      // Otsikkorivi + HPP ELITE -viite
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
      h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Harjoittelun progressio ikävaiheittain</div>';
      h += '<div style="font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);border-radius:6px;padding:3px 8px">HPP ELITE -kirjasto</div>';
      h += '</div>';

      // Kolme vaihekorttia rinnakkain — klikattavia
      var vaiheId = 'prog_' + kn;
      h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">';
      ik.progressio.forEach(function(vaihe, vi) {
        var isActive = vi === 1;
        var borderCol = isActive ? vaihe.vari : 'rgba(255,255,255,.08)';
        var bgCol     = isActive ? vaihe.vari + '18' : 'var(--bg3)';
        var textCol   = isActive ? vaihe.vari : 'var(--muted)';
        h += '<button onclick="toggleProgressio(\'' + vaiheId + '\',' + vi + ',this,\'' + vaihe.vari + '\')" ';
        h += 'data-vi="' + vi + '" data-vari="' + vaihe.vari + '" ';
        h += 'style="padding:10px 8px;border-radius:10px;border:1.5px solid ' + borderCol + ';';
        h += 'background:' + bgCol + ';cursor:pointer;text-align:left;';
        h += 'font-family:\\"DM Sans\\";transition:all .15s">';
        // Vaihenimi
        h += '<div style="font-size:11px;font-weight:600;color:' + textCol + ';margin-bottom:3px">' + vaihe.vaihe + '</div>';
        // Focus-teksti
        h += '<div style="font-size:10px;color:' + (isActive ? 'rgba(255,255,255,.6)' : 'var(--muted)') + ';line-height:1.4">' + vaihe.focus + '</div>';
        h += '</button>';
      });
      h += '</div>';

      // Vaihe-sisältöpaneelit — avattu vaihe näkyy kokonaan
      ik.progressio.forEach(function(vaihe, vi) {
        var isActive = vi === 1;
        h += '<div id="' + vaiheId + '_' + vi + '" ';
        h += 'style="display:' + (isActive ? 'block' : 'none') + ';';
        h += 'background:rgba(0,0,0,.2);border-radius:10px;padding:14px 16px;';
        h += 'border-left:3px solid ' + vaihe.vari + '">';

        // Fokus-otsikko
        h += '<div style="font-size:12px;font-weight:600;color:' + vaihe.vari + ';margin-bottom:6px">' + vaihe.focus + '</div>';

        // Pedagoginen kuvaus
        h += '<div style="font-size:12px;color:var(--muted2);line-height:1.7;margin-bottom:12px">' + vaihe.kuvaus + '</div>';

        // Harjoitteet — selkokielisinä, ilman koodeja
        h += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Esimerkkiharjoitteet</div>';
        h += '<div style="display:flex;flex-direction:column;gap:5px">';
        vaihe.harjoitteet.forEach(function(hr) {
          // Poista sulkeissa olevat koodit: "Nimi (EX_KOODI)" → "Nimi"
          var puhdas = hr.replace(/\s*\([A-Z_]+\)\s*$/, '').trim();
          // Onko HPP ELITE -viite olemassa (alkuperäinen sisälsi EX_-koodin)?
          var onKoodi = /\(EX_[A-Z_]+\)/.test(hr);
          h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:7px">';
          h += '<div style="width:6px;height:6px;border-radius:50%;background:' + vaihe.vari + ';flex-shrink:0"></div>';
          h += '<div style="font-size:12px;color:var(--text);flex:1">' + puhdas + '</div>';
          if (onKoodi) {
            h += '<div style="font-size:10px;color:var(--muted);background:rgba(255,255,255,.06);border-radius:5px;padding:2px 6px;flex-shrink:0">HPP ELITE</div>';
          }
          h += '</div>';
        });
        h += '</div>';
        h += '</div>'; // sisältöpaneeli
      });

      h += '</div>'; // progressio wrap
    } else {
      // Fallback: vanha lista
      h += '<div style="background:var(--bg3);border-radius:9px;padding:9px 12px">';
      h += '<div style="font-size:11px;color:var(--muted2);margin-bottom:4px">' + km.train + '</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">';
      (HARJOITTEET[kn]||[]).forEach(function(hr) {
        h += '<div style="font-size:10px;background:rgba(0,0,0,.2);border-radius:6px;padding:3px 8px;color:var(--muted2)">' + hr + '</div>';
      });
      h += '</div></div>';
    }

    h += '</div>'; // ketju card
  });

  document.getElementById('tabKetjut').innerHTML = h;
}
