  h += '</table></div>';

  // Tuontinappi — tallennetaan data globaaliin muuttujaan onclick-attribuutin sijaan.
  // JSON.stringify HTML-attribuutissa aiheuttaa SyntaxError kun data sisältää
  // erikoismerkkejä tai lainausmerkkejä.
  var virheellisia = ongelmat.filter(function(o) { return o.indexOf('VIRHE') === 0; }).length;
  if (virheellisia > 0) {
    h += '<div style="color:var(--red);font-size:12px;padding:8px">❌ Korjaa virheet Excel-pohjassa ennen tuontia.</div>';
  } else {
    // Tallennetaan data globaaleihin muuttujiin joita tuontinappi käyttää
    window._tuontiRivit  = rivit;
    window._tuontiTyyppi = tyyppi;
    window._tuontiSeura  = seuraId;
    h += '<button onclick="tuontiAloita(window._tuontiRivit, window._tuontiTyyppi, window._tuontiSeura)" '
       + 'id="tuontiNappi" style="width:100%;background:var(--teal);color:var(--bg);border:none;border-radius:10px;'
       + 'padding:14px;font-family:\'Bebas Neue\';font-size:18px;cursor:pointer">'
       + '📥 Tuo ' + rivit.length + ' ' + meta.nimi.toLowerCase() + ' Firestoreen'
       + '</button>';
  }

  h += '</div>';
  esikatseluEl.innerHTML = h;
}

// ── VALIDOINTI ────────────────────────────────────────────────────────────────
// Validointi tehdään kahdessa vaiheessa:
// 1. Perusvalidointi (tämä funktio): tarkistaa pakolliset kentät,
//    kirjoitusmuodot ja duplikaatit — ei vaadi Firestore-yhteyttä.
// 2. Joukkuevalidointi (tuontiValidoiJoukkueet): tarkistaa että joukkueen
//    nimi löytyy Firestoresta — ajetaan esikatselun yhteydessä.

function tuontiValidoi(rivit, tyyppi) {
  var ongelmat = [];
  var palloidSet = {};

  rivit.forEach(function(rivi, i) {
    var riviNro = i + 1;
    var palloId = String(rivi['PalloID *'] || rivi['PalloID'] || '').trim();

    if (!palloId) {
      ongelmat.push('VIRHE rivi ' + riviNro + ': PalloID puuttuu');
      return;
    }
    if (palloidSet[palloId]) {
      ongelmat.push('Varoitus rivi ' + riviNro + ': PalloID ' + palloId + ' esiintyy kahdesti');
    }
    palloidSet[palloId] = true;

    if (tyyppi === 'pelaajat') {
      // Tarkistetaan pakolliset tekstikentät
      var sukunimi = String(rivi['Sukunimi *'] || '').trim();
      var etunimi  = String(rivi['Etunimi *']  || '').trim();
      var syntyma  = String(rivi['Syntymäaika *'] || '').trim();
      var sukup    = String(rivi['Sukupuoli *'] || '').trim().toUpperCase();
      var joukkue  = String(rivi['Joukkue *']   || '').trim();

      if (!sukunimi) ongelmat.push('VIRHE rivi ' + riviNro + ': Sukunimi puuttuu (PalloID: ' + palloId + ')');
      if (!etunimi)  ongelmat.push('VIRHE rivi ' + riviNro + ': Etunimi puuttuu (PalloID: ' + palloId + ')');
      if (!syntyma)  ongelmat.push('VIRHE rivi ' + riviNro + ': Syntymäaika puuttuu (PalloID: ' + palloId + ')');
      if (!joukkue)  ongelmat.push('VIRHE rivi ' + riviNro + ': Joukkue puuttuu (PalloID: ' + palloId + ')');

      // Sukupuoli pitää olla P tai T (hyväksytään myös pienet kirjaimet)
      if (sukup && sukup !== 'P' && sukup !== 'T') {
        ongelmat.push('VIRHE rivi ' + riviNro + ': Sukupuoli "' + rivi['Sukupuoli *'] + '" ei kelpaa — käytä P tai T');
      }

      // Syntymäaika: tarkistetaan perusmuoto (joko pp.kk.vvvv tai vvvv-kk-pp)
      if (syntyma) {
        var okMuoto = /^\d{1,2}\.\d{1,2}\.\d{4}$/.test(syntyma) ||
                      /^\d{4}-\d{2}-\d{2}$/.test(syntyma);
        if (!okMuoto) {
          ongelmat.push('VIRHE rivi ' + riviNro + ': Syntymäaika "' + syntyma +
            '" väärässä muodossa — käytä pp.kk.vvvv (esim. 15.3.2013)');
        }
      }
    }
  });

  return ongelmat;
}

// ── NÄYTETTÄVÄT KENTÄT ESIKATSELUSSA ─────────────────────────────────────────

function tuontiNakyvat(rivi, tyyppi) {
  if (!rivi) return [];
  var kaikki = Object.keys(rivi).filter(function(k) { return k.indexOf('_') !== 0; });

  var prioriteetti = {
    // Uusi pohjarakenne: PalloID, nimet, syntymäaika, sukupuoli, joukkue, huoltajan sposti
    pelaajat:        ['PalloID *','Sukunimi *','Etunimi *','Syntymäaika *',
                      'Sukupuoli *','Joukkue *','Huoltajan sähköposti *','_joukkueOk'],
    harjoitettavuus: ['PalloID *','Nimi *','Syntymäaika *','Sukupuoli *','Joukkue *','Kausi *'],
    hh_testit:       ['PalloID *','Nimi *','Syntymäaika *','Sukupuoli *',
                      'Joukkue *','Testauspvm *','5m (s)','CMJ (cm)','Bronco (m/s)']
  };

  var prio = prioriteetti[tyyppi] || [];
  var nakyy = [];
  prio.forEach(function(k) { if (kaikki.indexOf(k) !== -1) nakyy.push(k); });
  kaikki.forEach(function(k) { if (nakyy.indexOf(k) === -1 && nakyy.length < 12) nakyy.push(k); });
  return nakyy;
}

// ── JOUKKUEIDEN ESIVALIDOINTI FIRESTORESTA ────────────────────────────────────
// Ennen esikatselun näyttämistä haetaan Firestoresta seuran joukkuenimet
// ja verrataan niihin. Tämä korvaa Excel-dropdownin puuttumisen —
// seurasihteeri saa selkeän virheilmoituksen jos nimi on väärin kirjoitettu.

function tuontiHaeJoukkueetJaNaytaEsikatselu(rivit, tyyppi, seuraId, tiedostoNimi) {
  var fbDb = _fbDb || (typeof firebase !== 'undefined' && firebase.firestore ? firebase.firestore() : null);
  if (tyyppi !== 'pelaajat' || !fbDb) {
    tuontiNaytaEsikatselu(rivit, tyyppi, seuraId, tiedostoNimi);
    return;
  }
  if (!_fbDb) _fbDb = fbDb;

  // Haetaan joukkueet Firestoresta
  _fbDb.collection('seurat').doc(seuraId)
    .collection('joukkueet')
    .get()
    .then(function(snap) {
      if (!snap) return {};  // null-guard
      // Rakennetaan hakurakenne: avain on joukkueen nimi normalisoituna
      // (pienet kirjaimet, ylimääräiset välilyönnit poistettu)
      var joukkueMap = {};
      snap.forEach(function(doc) {
        var d = doc.data();
        if (d.nimi) {
          var avain = d.nimi.toLowerCase().trim();
          joukkueMap[avain] = { nimi: d.nimi, id: doc.id };
        }
      });

      // Lisätään jokaiselle riville tieto joukkueen löytymisestä
      // sekä korjattu joukkueId ja normalisoitu nimi
      rivit = rivit.map(function(rivi) {
        var joukkueNimi = String(rivi['Joukkue *'] || '').trim();
        var avain = joukkueNimi.toLowerCase().trim();
        var osuma = joukkueMap[avain];

        var paivitettyRivi = Object.assign({}, rivi);
        if (osuma) {
          // Täsmää — korjataan isot/pienet kirjaimet ja lisätään joukkueId
          paivitettyRivi['Joukkue *'] = osuma.nimi;
          paivitettyRivi['JoukkueId'] = osuma.id;
          paivitettyRivi['_joukkueOk'] = '✅ ' + osuma.nimi;
        } else if (joukkueNimi) {
          // Ei täsmää — näytetään selkeä virhe
          paivitettyRivi['_joukkueOk'] = '❌ "' + joukkueNimi + '" ei löydy';
        } else {
          paivitettyRivi['_joukkueOk'] = '❌ Puuttuu';
        }
        return paivitettyRivi;
      });

      tuontiNaytaEsikatselu(rivit, tyyppi, seuraId, tiedostoNimi);
    })
    .catch(function(err) {
      // Jos joukkuehaku epäonnistuu, jatketaan ilman validointia
      console.warn('[TUONTI] Joukkuehaku epäonnistui:', err.message);
      tuontiNaytaEsikatselu(rivit, tyyppi, seuraId, tiedostoNimi);
    });
}

// ── FIRESTORE-TALLENNUS ───────────────────────────────────────────────────────

function tuontiAloita(rivit, tyyppi, seuraId) {
  // Tarkistetaan Firebase-yhteys useammalla tavalla koska _fbOnline
  // saattaa olla false vaikka kirjautuminen on onnistunut
  var fbDb = _fbDb || (typeof firebase !== 'undefined' && firebase.firestore ? firebase.firestore() : null);
  var fbUser = (typeof firebase !== 'undefined' && firebase.auth) ? firebase.auth().currentUser : null;

  if (!fbDb || !fbUser) {
    alert('Ei Firebase-yhteyttä. Kirjaudu sisään sähköpostilla ennen tuontia.');
    return;
  }

  // Päivitetään _fbDb jos se oli null
  if (!_fbDb) _fbDb = fbDb;

  var nappi = document.getElementById('tuontiNappi');
  if (nappi) { nappi.disabled = true; nappi.textContent = 'Tuodaan...'; }

  var tuloksetEl = document.getElementById('tuontiTulokset');
  tuloksetEl.style.display = 'block';
  tuloksetEl.innerHTML = '<div class="card"><div style="color:var(--muted);padding:8px">⏳ Tarkistetaan joukkueet...</div></div>';

  // Pelaajapohjan tuonnissa tarkistetaan ensin joukkueet Firestoresta
  // jotta kirjoitusvirheet havaitaan ennen tallennusta
  var joukkueValidointiPromise = Promise.resolve({});

  if (tyyppi === 'pelaajat') {
    joukkueValidointiPromise = _fbDb
      .collection('seurat').doc(seuraId)
      .collection('joukkueet').get()
      .then(function(snap) {
        if (!snap) return;  // null-guard
        var joukkueMap = {};
        snap.forEach(function(doc) {
          var nimi = (doc.data().nimi || '').trim();
          joukkueMap[nimi] = doc.id;
          // Myös case-insensitive vertailua varten
          joukkueMap[nimi.toLowerCase()] = doc.id;
        });
        return joukkueMap;
      })
      .catch(function() { return {}; });
  }

  joukkueValidointiPromise.then(function(joukkueMap) {
    // Tarkistetaan onko riveihin kirjoitettu tuntemattomia joukkueita
    if (tyyppi === 'pelaajat' && Object.keys(joukkueMap).length > 0) {
      var tuntemattomat = [];
      rivit.forEach(function(rivi, i) {
        var jNimi = String(rivi['Joukkue *'] || '').trim();
        if (jNimi && !joukkueMap[jNimi] && !joukkueMap[jNimi.toLowerCase()]) {
          tuntemattomat.push('Rivi ' + (i+1) + ': "' + jNimi + '"');
        }
      });

      if (tuntemattomat.length > 0) {
        // Näytetään varoitus mutta annetaan jatkaa — joukkueId jää tyhjäksi
        tuloksetEl.innerHTML = '<div class="card">'
          + '<div style="color:var(--amber);padding:12px;font-weight:600">'
          + '⚠️ Tuntemattomia joukkueita (' + tuntemattomat.length + ' kpl)</div>'
          + '<div style="padding:0 12px;font-size:12px;color:var(--muted);line-height:1.8">'
          + tuntemattomat.slice(0, 5).join('<br>') + '</div>'
          + '<div style="padding:8px 12px 12px;font-size:12px;color:var(--muted)">'
          + 'Tarkista joukkueiden nimet ohjesivulta. Pelaajat tuodaan mutta '
          + 'joukkueyhteys puuttuu näiltä riveiltä.'
          + '</div>'
          + '<div style="padding:0 12px 12px;display:flex;gap:8px">'
          + '<button onclick="suoritaTuonti(' + JSON.stringify(rivit).replace(/</g,'\\u003c')
          + ', \'' + tyyppi + '\', \'' + seuraId + '\', ' + JSON.stringify(joukkueMap) + ')" '
          + 'style="flex:1;background:var(--amber);color:var(--bg);border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:12px;font-weight:600">'
          + 'Tuo silti</button>'
          + '<button onclick="document.getElementById(\'tuontiTulokset\').style.display=\'none\';'
          + 'if(document.getElementById(\'tuontiNappi\')){document.getElementById(\'tuontiNappi\').disabled=false;document.getElementById(\'tuontiNappi\').textContent=\'📥 Tuo Firestoreen\'}" '
          + 'style="flex:1;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;font-size:12px">'
          + 'Peruuta ja korjaa</button>'
          + '</div></div>';
        if (nappi) { nappi.disabled = false; nappi.textContent = '📥 Tuo Firestoreen'; }
        return;
      }
    }

    // Kaikki ok — aloitetaan tallennus
    suoritaTuonti(rivit, tyyppi, seuraId, joukkueMap);
  });
}

function suoritaTuonti(rivit, tyyppi, seuraId, joukkueMap) {
  var nappi = document.getElementById('tuontiNappi');
  var tuloksetEl = document.getElementById('tuontiTulokset');
  tuloksetEl.style.display = 'block';
  tuloksetEl.innerHTML = '<div class="card"><div style="color:var(--muted);padding:8px">⏳ Tallennetaan Firestoreen...</div></div>';

  var onnistui = 0, paivitetty = 0, virheet = 0;
  var promises = rivit.map(function(rivi) {
    return tuontiTallennaNyt(rivi, tyyppi, seuraId, joukkueMap || {})
      .then(function(tulos) {
        if (tulos === 'uusi') onnistui++;
        else if (tulos === 'päivitys') paivitetty++;
      })
      .catch(function(err) {
        virheet++;
        console.error('[TUONTI] Virhe rivillä:', err);
      });
  });

  Promise.all(promises).then(function() {
    var h = '<div class="card">';
    h += '<div class="card-title">✅ Tuonti valmis</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">';
    h += '<div style="text-align:center"><div style="font-family:\'Bebas Neue\';font-size:32px;color:var(--green)">' + onnistui + '</div><div style="font-size:11px;color:var(--muted)">Uutta</div></div>';
    h += '<div style="text-align:center"><div style="font-family:\'Bebas Neue\';font-size:32px;color:var(--amber)">' + paivitetty + '</div><div style="font-size:11px;color:var(--muted)">Päivitetty</div></div>';
    h += '<div style="text-align:center"><div style="font-family:\'Bebas Neue\';font-size:32px;color:var(--red)">' + virheet + '</div><div style="font-size:11px;color:var(--muted)">Virheitä</div></div>';
    h += '</div>';
    if (tyyppi === 'harjoitettavuus') {
      h += '<button onclick="vaihda(9,document.querySelectorAll(\'.nav-tab\')[9])" '
         + 'style="width:100%;background:var(--teal);color:var(--bg);border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:13px">'
         + '→ Siirry Kartoitukset-välilehdelle</button>';
    }
    h += '</div>';
    tuloksetEl.innerHTML = h;
    if (nappi) { nappi.disabled = false; nappi.textContent = '📥 Tuo uudelleen'; }
  });
}

// ── YKSITTÄISEN RIVIN TALLENNUS ───────────────────────────────────────────────

function tuontiTallennaNyt(rivi, tyyppi, seuraId, joukkueMap) {
  var palloId = String(rivi['PalloID *'] || rivi['PalloID'] || '').trim();
  if (!palloId) return Promise.resolve('ohitettu');

  joukkueMap = joukkueMap || {};
  var nyt = firebase.firestore.FieldValue.serverTimestamp();
  var kirjaajaUid = (_fbUser && _fbUser.uid) || 'tuonti';

  if (tyyppi === 'pelaajat') {
    var syntymaika = rivi['Syntymäaika *'] ? new Date(rivi['Syntymäaika *']) : null;

    // Joukkueen nimi ja ID — haetaan kahdella tavalla:
    // 1. Dynaaminen pohja: 'JoukkueId'-sarake on täytetty automaattisesti
    //    (seurasihteeri valitsi dropdownista, tuontitoiminto täytti JoukkueId-sarakkeen)
    // 2. Staattinen pohja: vain joukkueen nimi, ei ID:tä — ID jää tyhjäksi
    //    ja liitetään myöhemmin kun joukkueet on luotu
    var joukkueNimi = String(rivi['Joukkue *'] || '').trim();
    var joukkueId   = String(rivi['JoukkueId'] || '').trim() || null;

    // Jos joukkueId puuttuu Excel-riviltä, etsitään se joukkueMap:sta nimen perusteella
    // (case-insensitive vertailu kirjoitusvirheiden varalle)
    if (!joukkueId && joukkueNimi && joukkueMap) {
      joukkueId = joukkueMap[joukkueNimi] || joukkueMap[joukkueNimi.toLowerCase()] || null;
    }

    var pelaajaDoc = {
      palloID:    palloId,
      sukunimi:   String(rivi['Sukunimi *'] || '').trim(),
      etunimi:    String(rivi['Etunimi *']  || '').trim(),
      nimi:       (String(rivi['Etunimi *'] ||'').trim()+' '+String(rivi['Sukunimi *']||'').trim()).trim(),
      syntymaaika: syntymaika ? firebase.firestore.Timestamp.fromDate(syntymaika) : null,
      sukupuoli:  String(rivi['Sukupuoli *'] || '').trim().toUpperCase(),
      joukkue:    joukkueNimi,
      joukkueId:  joukkueId,    // null jos staattinen pohja, täytetään myöhemmin
      seuraId:    seuraId,
      kausi:      String(rivi['Kausi'] || '2026').trim(),
      muokattu:   nyt,
      tuonutUid:  kirjaajaUid,
    };

    // Mirwald-mittaukset jos löytyy Excelistä (uusi pohjarakenne)
    var pit   = parseFloat(rivi['Pituus (cm)'])         || null;
    var istu  = parseFloat(rivi['Istumapituus (cm)'])   || null;
    var penk  = parseFloat(rivi['Penkin korkeus (cm)']) || null;
    var pain  = parseFloat(rivi['Paino (kg)'])          || null;
    var aitiP = parseFloat(rivi['Äidin pituus (cm)'])   || null;
    var isaP  = parseFloat(rivi['Isän pituus (cm)'])    || null;

    if (pit || istu || pain) {
      pelaajaDoc.biologinenIka = {
        laskentamenetelma: 'mirwald',
        mirwald: {
          pituus:        pit,
          istumapituus:  istu,
          penkinkorkeus: penk,
          paino:         pain,
          aidinPituus:   aitiP,
          isanPituus:    isaP,
        },
        rae: syntymaika ? tuontiLaskeRAE(syntymaika) : null
      };
    }

    // set() merge:true = päivittää olemassa olevan tai luo uuden
    var ref = _fbDb.collection('seurat').doc(seuraId)
                   .collection('pelaajat').doc(palloId);
    return ref.get().then(function(snap) {
      var isNew = !snap.exists;
      var writeData = Object.assign({}, pelaajaDoc);
      if (isNew) writeData.luotu = nyt;
      return ref.set(writeData, { merge: true }).then(function() {
        return isNew ? 'uusi' : 'päivitys';
      });
    });
  }

  else if (tyyppi === 'harjoitettavuus') {
    // Harjoitettavuuskartoitukset tallennetaan add():lla (uusi dokumentti per rivi)
    // Koska sama pelaaja voi olla testattu useaan kertaan eri kausilla
    var ikl = rivi['_ikäluokka'] || 'U12';
    var testipvm = rivi['Testauspvm *'] ? new Date(rivi['Testauspvm *']) : new Date();

    var kartoitusDoc = {
      seuraId:      seuraId,
      pelaajaId:    palloId,
      nimi:         String(rivi['Nimi *'] || '').trim(),
      sukupuoli:    String(rivi['Sukupuoli *'] || '').trim().toUpperCase(),
      syntymavuosi: rivi['Syntymäaika *'] ? new Date(rivi['Syntymäaika *']).getFullYear() : null,
      ikäluokka:    ikl,
      joukkue:      String(rivi['Joukkue *'] || '').trim(),
      kausi:        String(rivi['Kausi *'] || 'kevat_2026').trim(),
      phvTila:      String(rivi['PHV-tila'] || 'Ei tiedossa').trim(),
      arvioija:     String(rivi['Arvioija'] || '').trim(),
      testauspvm:   firebase.firestore.Timestamp.fromDate(testipvm),
      luotu:        nyt,
      luonutUid:    kirjaajaUid,
    };

    // Testit ikäluokan mukaan — rakennetaan testimap
    var testiMap = {};
    var pisteetYhteensa = 0;
    var pisteetMaksimi = ikl === 'U12' ? 27 : ikl === 'U15' ? 30 : 39;

    // Käydään läpi kaikki rivikentät ja kerätään testien tulokset
    Object.keys(rivi).forEach(function(key) {
      if (key.indexOf('_') === 0) return;
      var arvo = String(rivi[key] || '').trim();
      if (!arvo || arvo === '') return;
      // Poimitaan pisteet-sarakkeet (format: "1", "2" tai "3")
      var pisteet = parseInt(arvo);
      if (pisteet >= 1 && pisteet <= 3) {
        var testiNimi = key.replace(' *','').replace(/\n.*/,'').trim().toLowerCase()
          .replace(/\s+/g,'_');
        if (!testiMap[testiNimi]) testiMap[testiNimi] = {};
        testiMap[testiNimi].pisteet = pisteet;
        pisteetYhteensa += pisteet;
      }
    });

    var fleiPct = pisteetMaksimi > 0 ? Math.round(pisteetYhteensa / pisteetMaksimi * 100) : 0;
    var fleiTaso = fleiPct >= 75 ? 'hyvä' : fleiPct >= 60 ? 'kehitys' : 'prioriteetti';

    kartoitusDoc[ikl.toLowerCase()] = testiMap;
    kartoitusDoc.yhteenveto = {
      pisteetYhteensa: pisteetYhteensa,
      pisteetMaksimi:  pisteetMaksimi,
      fleiProsentti:   fleiPct,
      fleiTaso:        fleiTaso,
      kuormaRajoitin:  kartoitusDoc.phvTila === 'PHV-huippu' ? '⚠️ 60% — PHV-huippu'
                       : fleiTaso === 'hyvä' ? '✅ Normaali'
                       : fleiTaso === 'kehitys' ? '🟡 80% — Kehitysohjelma'
                       : '🔴 60% — Prioriteetti',
      asiHuomio: ''
    };

    return _fbDb.collection('seurat').doc(seuraId)
                .collection('kartoitukset').add(kartoitusDoc)
                .then(function() { return 'uusi'; });
  }

  else if (tyyppi === 'hh_testit') {
    // H-H testit tallennetaan testit-kokoelmaan
    var testipvm2 = rivi['Testauspvm *'] ? new Date(rivi['Testauspvm *']) : new Date();
    var syntymaika2 = rivi['Syntymäaika *'] ? new Date(rivi['Syntymäaika *']) : null;

    var testiDoc = {
      seuraId:     seuraId,
      pelaajaId:   palloId,
      nimi:        String(rivi['Nimi *'] || '').trim(),
      sukupuoli:   String(rivi['Sukupuoli *'] || '').trim().toUpperCase(),
      syntymaaika: syntymaika2 ? firebase.firestore.Timestamp.fromDate(syntymaika2) : null,
      joukkue:     String(rivi['Joukkue *'] || '').trim(),
      testauspvm:  firebase.firestore.Timestamp.fromDate(testipvm2),
      arvioija:    String(rivi['Arvioija'] || '').trim(),
      tyyppi:      'hh_fyysistekniset',
      luotu:       nyt,
      luonutUid:   kirjaajaUid,
      // Fyysistekniset tulokset
      lin5m:    parseFloat(rivi['5m (s)'])         || null,
      lin10m:   parseFloat(rivi['10m (s)'])        || null,
      lin20m:   parseFloat(rivi['20m (s)'])        || null,
      lin30m:   parseFloat(rivi['30m (s)'])        || null,
      kasirata: parseFloat(rivi['Kasirata (s)'])   || null,
      smjuoksu: parseFloat(rivi['SM-juoksu (s)'])  || null,
      smpallo:  parseFloat(rivi['SM-pallo (s)'])   || null,
      cmj:      parseFloat(rivi['CMJ (cm)'])       || null,
      bronco:   parseFloat(rivi['Bronco (m/s)'])   || null,
      pujottelu:parseFloat(rivi['Pujottelu (s)'])  || null,
      syotto:   parseFloat(rivi['Syöttö (s)'])     || null,
      // Tasot (jos laskettu Excelissä)
      tasot: {
        lin5m:    parseInt(rivi['Taso\n5m'])      || null,
        lin10m:   parseInt(rivi['Taso\n10m'])     || null,
        lin20m:   parseInt(rivi['Taso\n20m'])     || null,
        lin30m:   parseInt(rivi['Taso\n30m'])     || null,
        kasirata: parseInt(rivi['Taso\nKasi'])    || null,
        smjuoksu: parseInt(rivi['Taso\nSM-j'])    || null,
        smpallo:  parseInt(rivi['Taso\nSM-p'])    || null,
        cmj:      parseInt(rivi['Taso\nCMJ'])     || null,
        bronco:   parseInt(rivi['Taso\nBronco'])  || null,
      }
    };

    return _fbDb.collection('seurat').doc(seuraId)
                .collection('testit').add(testiDoc)
                .then(function() { return 'uusi'; });
  }

  return Promise.resolve('ohitettu');
}

// ── APUFUNKTIOT ───────────────────────────────────────────────────────────────

// Laskee syntymäpäivämäärästä syntymäkvartaalin (Q1-Q4)
function tuontiLaskeRAE(syntymaaika) {
  var kk = syntymaaika.getMonth() + 1; // 1-12
  if (kk <= 3) return 'Q1';
  if (kk <= 6) return 'Q2';
  if (kk <= 9) return 'Q3';
  return 'Q4';
}

function tuontiNaytaVirhe(viesti) {
  var el = document.getElementById('tuontiEsikatselu');
  el.style.display = 'block';
  el.innerHTML = '<div class="card"><div style="color:var(--red);padding:8px">❌ ' + viesti + '</div></div>';
}

// ── DYNAAMINEN PELAAJAPOHJA ───────────────────────────────────────────────────
//
// Tämä funktio ratkaisee joukkueiden nimen täsmäämisongelman kerralla.
//
// Ongelma: jos seurasihteeri kirjoittaa Excel-pohjaan "KPV u13" tai "KPV U 13"
// (pieni kirjain tai ylimääräinen välilyönti), tuontitoiminto ei löydä oikeaa
// joukkuetta Firestoresta, koska vertailu tehdään täsmäämällä tekstiä.
//
// Ratkaisu: generoidaan Excel dynaamisesti Firestoressa olevista joukkueista.
// Joukkue-sarake on Excel-validointi-dropdown jonka lista tulee suoraan
// Firestoresta — ei kirjoiteta käsin, valitaan listalta.
// Tällöin kirjoitusvirhe on teknisesti mahdoton.

function luoSeuranPelaajaPohja(seuraId) {
  var fbDb = _fbDb || (typeof firebase !== 'undefined' && firebase.firestore ? firebase.firestore() : null);
  if (!fbDb) {
    alert('Ei Firebase-yhteyttä. Kirjaudu sisään sähköpostilla.');
    return;
  }
  if (!_fbDb) _fbDb = fbDb;

  // Näytetään latausviesti
  var esikatseluEl = document.getElementById('tuontiEsikatselu');
  esikatseluEl.style.display = 'block';
  esikatseluEl.innerHTML = '<div class="card"><div style="color:var(--muted);padding:12px">'
    + '⏳ Haetaan joukkueet järjestelmästä...</div></div>';

  // Tarkistetaan ensin että SheetJS on ladattu — tarvitaan Excel-generointiin
  function generoiKunValmis(joukkueet) {
    if (typeof XLSX === 'undefined') {
      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = function() { rakennaPelaajaPohja(joukkueet, seuraId); };
      document.head.appendChild(script);
    } else {
      rakennaPelaajaPohja(joukkueet, seuraId);
    }
  }

  // Haetaan seuran joukkueet Firestoresta
  // Huom: ei käytetä .where('aktiivinen'...).orderBy('nimi') yhdistelmää
  // koska se vaatii Firestore-indeksin jota ei ole luotu.
  // Suodatus ja järjestys tehdään JavaScriptissä.
  _fbDb.collection('seurat').doc(seuraId)
    .collection('joukkueet')
    .get()
      .catch(function(e) { console.warn("[VP] orderBy FAILED_PRECONDITION:", e.message); })
    .then(function(snap) {
      if (!snap) { esikatseluEl.style.display = 'block'; return; }  // null-guard
      // Varmistetaan että elementti on näkyvissä ennen kirjoittamista
      esikatseluEl.style.display = 'block';

      if (snap.empty) {
        esikatseluEl.innerHTML = '<div class="card">'
          + '<div style="color:var(--amber);padding:16px;font-size:13px;line-height:1.6">'
          + '⚠️ <strong>Seuralle ei ole luotu joukkueita vielä.</strong><br><br>'
          + 'Ennen kuin voit generoida pelaajapohjan, luo joukkueet järjestelmään:<br>'
          + '1. Avaa <strong>TalentMaster_Admin.html</strong><br>'
          + '2. Kirjaudu sisään ja luo joukkueet (KPV U10, KPV U12 jne.)<br>'
          + '3. Tule takaisin tähän ja paina "Luo seuran pohja" uudelleen'
          + '</div></div>';
        return;
      }

      // Suodatetaan aktiiviset ja järjestetään nimen mukaan JavaScriptissä
      var joukkueet = snap.docs
        .filter(function(doc) {
          var d = doc.data();
          return d.aktiivinen !== false; // undefined tai true = aktiivinen
        })
        .map(function(doc) {
          var d = doc.data();
          return {
            id:    doc.id,
            nimi:  d.nimi,
            ikl:   d.ikäluokka || '',
            sukup: d.sukupuoli || 'P',
            kausi: d.kausi    || '2026'
          };
        })
        .sort(function(a, b) { return a.nimi.localeCompare(b.nimi, 'fi'); });

      esikatseluEl.innerHTML = '<div class="card">'
        + '<div style="color:var(--teal);padding:12px">'
        + '✅ Löydettiin ' + joukkueet.length + ' joukkuetta — generoidaan Excel...</div></div>';

      generoiKunValmis(joukkueet);
    })
    .catch(function(err) {
      esikatseluEl.style.display = 'block';
      esikatseluEl.innerHTML = '<div class="card">'
        + '<div style="color:var(--red);padding:12px">❌ Virhe joukkueiden haussa: ' + err.message + '</div></div>';
    });
}

function rakennaPelaajaPohja(joukkueet, seuraId) {
  var wb = XLSX.utils.book_new();

  // ── OHJESIVU ──────────────────────────────────────────────────────────────
  var ohjeetData = [
    ['TalentMaster™ — Pelaajatietolomake'],
    ['Generoitu: ' + new Date().toLocaleDateString('fi-FI') + ' | Seura: ' + seuraId.toUpperCase()],
    [''],
    ['TÄYTTÖOHJE'],
    [''],
    ['1. Siirry Pelaajat-välilehdelle.'],
    ['2. PalloID löytyy Palloliiton pelipassista. Pakollinen.'],
    ['3. Syntymäaika: muodossa pp.kk.vvvv (esim. 15.3.2013).'],
    ['4. Sukupuoli: iso P (Poika) tai iso T (Tyttö).'],
    ['5. Joukkue: kopioi TARKKAAN alla olevasta listasta.'],
    ['   Järjestelmä tarkistaa nimen automaattisesti tuonnin yhteydessä.'],
    ['6. Huoltajan sähköposti: tähän lähetetään suostumuslomake.'],
    [''],
    ['SEURAN JOUKKUEET — kopioi nämä TARKKAAN Joukkue-sarakkeeseen:'],
    [''],
  ];
  joukkueet.forEach(function(j, i) {
    ohjeetData.push([
      '  ' + (i+1) + '. ' + j.nimi +
      (j.ikl ? '  (' + j.ikl + ')' : '') +
      (j.sukup === 'T' ? '  — Tytöt' : '  — Pojat')
    ]);
  });
  var wsOhjeet = XLSX.utils.aoa_to_sheet(ohjeetData);
  wsOhjeet['!cols'] = [{ wch: 65 }];
  XLSX.utils.book_append_sheet(wb, wsOhjeet, 'Ohjeet');

  // ── PELAAJAT-VÄLILEHTI ────────────────────────────────────────────────────
  var SARAKKEET = [
    ['PalloID *',              12],
    ['Sukunimi *',             14],
    ['Etunimi *',              12],
    ['Syntymäaika *',          14],
    ['Sukupuoli *',             9],
    ['Joukkue *',              20],
    ['JoukkueId',              20],
    ['Huoltajan sähköposti *', 28],
    ['Huomio',                 20],
  ];

  // Otsikkorivi + ohjerivi (harmaa) + 60 datariviä
  var ohjeRivi = [
    'esim. 34650191',
    'esim. Korhonen',
    'esim. Matti',
    'esim. 15.3.2013',
    'P tai T',
    joukkueet.length > 0 ? joukkueet[0].nimi : 'esim. KPV U13',
    '(automaattinen)',
    'esim. huoltaja@email.fi',
    '',
  ];

  var data = [ SARAKKEET.map(function(s) { return s[0]; }), ohjeRivi ];
  for (var i = 0; i < 60; i++) {
    data.push(new Array(SARAKKEET.length).fill(''));
  }

  var wsPelaajat = XLSX.utils.aoa_to_sheet(data);
  wsPelaajat['!cols'] = SARAKKEET.map(function(s) { return { wch: s[1] }; });

  // D-sarake tekstimuotoiseksi jotta Excel ei muuta syntymäaikaa
  for (var r = 2; r <= 62; r++) {
    var dAddr = XLSX.utils.encode_cell({ r: r, c: 3 });
    if (!wsPelaajat[dAddr]) wsPelaajat[dAddr] = { t: 's', v: '' };
    wsPelaajat[dAddr].z = '@';
    wsPelaajat[dAddr].t = 's';
  }

  XLSX.utils.book_append_sheet(wb, wsPelaajat, 'Pelaajat');

  wb.Workbook = {
    Sheets: [
      { name: 'Ohjeet',   Hidden: 0 },
      { name: 'Pelaajat', Hidden: 0 },
    ]
  };
  wb.Workbook.active = 1;

  var pvm  = new Date().toISOString().slice(0, 10);
  var nimi = 'TM_Pelaajat_' + seuraId.toUpperCase() + '_' + pvm + '.xlsx';
  XLSX.writeFile(wb, nimi);

  var esikatseluEl = document.getElementById('tuontiEsikatselu');
  if (esikatseluEl) {
    esikatseluEl.style.display = 'block';
    esikatseluEl.innerHTML = '<div class="card">'
      + '<div style="color:var(--green);padding:12px;font-weight:600">'
      + '\u2705 ' + nimi + ' ladattu!</div>'
      + '<div style="padding:0 12px 12px;font-size:12px;color:var(--muted);line-height:1.6">'
      + 'Pohja sis\u00e4lt\u00e4\u00e4 ' + joukkueet.length + ' joukkuetta. '
      + 'Kirjoita Joukkue-sarake t\u00e4sm\u00e4lleen kuten ohjesivulla. '
      + 'J\u00e4rjestelm\u00e4 tarkistaa nimen automaattisesti kun lataat takaisin.'
      + '</div></div>';
  }
}
</script>
