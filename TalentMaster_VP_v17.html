// ── JOUKKUE MODAL ──
function avaaJoukkue(jnimi) {
  var s = _seuraData[_aktivSeura];
  if (!s) return;
  var j = s.joukkueet[jnimi];
  if (!j) return;

  var dc = statusColor(j.avgDelta);
  var ovrCol = j.avgOvr >= 7 ? 'var(--green)' : j.avgOvr >= 5 ? 'var(--amber)' : 'var(--red)';

  var h = '';
  h += '<div style="font-size:11px;color:var(--muted);margin-bottom:2px">'+_aktivSeura+'</div>';
  h += '<div style="font-family:\\"Bebas Neue\\";font-size:28px;margin-bottom:10px">'+jnimi+'</div>';

  // 3 statskorttia
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">';
  h += metCard('Pelaajia', j.pelaajia);
  h += metCard('Testejä', j.testeja);
  h += metCard('OVR', j.avgOvr ? j.avgOvr.toFixed(1) : '—', ovrCol);
  h += '</div>';

  // Laske normitasodata tälle joukkueelle
  var pelaajat = j.pelaajatLista || [];
  var ika12_15 = pelaajat.filter(function(p){ var ika=(p.bioIka&&p.bioIka.krono)||0; return ika>=12&&ika<=15; });

  var n=0, tavoite=0, kehitysalueet={};
  var TESTIT_JARJESTYS=['SM-pallo','SM ilman palloa','Nopeus 10m','Nopeus 30m','Kevennyshyppy'];
  var testTavoite={}, testN={};
  TESTIT_JARJESTYS.forEach(function(t){ testTavoite[t]=0; testN[t]=0; });

  ika12_15.forEach(function(p) {
    var ika=(p.bioIka&&p.bioIka.krono)||0;
    var profii=(typeof laskeNormitasoProfiili==='function')
      ? laskeNormitasoProfiili(p.fys_historia||[],p.sukupuoli,ika) : null;
    if(!profii) return;
    n++;
    if(profii.tavoitetasolla) tavoite++;
    profii.tulokset.forEach(function(t){
      if(testN[t.testi]!==undefined){
        testN[t.testi]++;
        if(t.tavoitetasolla) testTavoite[t.testi]++;
        else kehitysalueet[t.testi]=(kehitysalueet[t.testi]||0)+1;
      }
    });
  });

  // ── PALLOLIITON KRITEERI — iso numero ──
  h += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">';
  h += 'Palloliiton kriteeri — talenttipelaajat kansallisella tavoitetasolla (12–15v)</div>';

  if (n < 1) {
    h += '<div style="background:var(--bg3);border-radius:12px;padding:14px;text-align:center;margin-bottom:16px;color:var(--muted2);font-size:12px">';
    h += 'Ei vertailutasodataa 12–15v pelaajille · '+ika12_15.length+' pelaajaa ikähaarukassa</div>';
  } else {
    var pct = Math.round(tavoite/n*100);
    var pkCol = pct >= 66 ? 'var(--green)' : pct >= 45 ? 'var(--amber)' : 'var(--red)';

    h += '<div style="background:var(--bg3);border:1px solid '+(pct>=66?'rgba(52,211,153,.3)':'rgba(248,113,113,.2)')+';';
    h += 'border-radius:12px;padding:14px 16px;margin-bottom:16px">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between">';
    h += '<div>';
    h += '<div style="font-family:\\"Bebas Neue\\";font-size:52px;line-height:1;color:'+pkCol+'">'+pct+'%</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">'+tavoite+'/'+n+' pelaajaa tavoitetasolla</div>';
    h += '</div>';
    h += '<div style="text-align:right">';
    h += '<div style="font-size:12px;color:'+pkCol+';font-weight:600">'+(pct>=66?'✅ Täyttää':'❌ Alle')+'</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">66% kynnys</div>';
    h += '<div style="font-size:11px;color:var(--muted2)">Kehitystaso 1 & 2</div>';
    h += '</div>';
    h += '</div>';

    // Progress bar
    h += '<div style="margin-top:10px;position:relative;height:6px;background:var(--bg);border-radius:3px">';
    h += '<div style="height:100%;width:'+pct+'%;background:'+pkCol+';border-radius:3px"></div>';
    h += '<div style="position:absolute;top:-3px;left:66%;width:2px;height:12px;background:var(--amber)"></div>';
    h += '</div>';
    h += '</div>';
  }

  // ── TESTIKOHTAINEN — vihreä/keltainen/punainen ──
  if (n >= 3) {
    h += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Testikohtainen normitaso</div>';
    h += '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:16px">';

    TESTIT_JARJESTYS.forEach(function(testi) {
      var tn = testN[testi];
      if (!tn) return;
      var tpct = Math.round(testTavoite[testi]/tn*100);
      var tc = tpct >= 66 ? 'var(--green)' : tpct >= 40 ? 'var(--amber)' : 'var(--red)';
      var tbg = tpct >= 66 ? 'rgba(52,211,153,.08)' : tpct >= 40 ? 'rgba(245,158,11,.08)' : 'rgba(248,113,113,.08)';
      var ticon = tpct >= 66 ? '●' : tpct >= 40 ? '●' : '●';

      h += '<div style="display:grid;grid-template-columns:1fr 36px 80px;gap:8px;align-items:center;';
      h += 'background:'+tbg+';border-radius:8px;padding:7px 10px">';
      h += '<div style="font-size:12px">'+testi+'</div>';
      h += '<div style="font-size:11px;font-weight:700;color:'+tc+';text-align:right">'+tpct+'%</div>';
      h += '<div style="height:5px;background:var(--bg);border-radius:3px;overflow:hidden">';
      h += '<div style="height:100%;width:'+tpct+'%;background:'+tc+';border-radius:3px"></div>';
      h += '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // ── KEHITYSSUUNNITELMA ──
  var ka = Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  if (ka.length) {
    h += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Harjoitusprioriteetti</div>';
    var HARJOITUS = {
      'SM-pallo':         'Reaktiolähtö pallon kanssa, suunnanmuutos 1v1-tilanteessa',
      'SM ilman palloa':  'Paineen alla pakeneminen, lähtönopeus, ketteryysradat',
      'Nopeus 10m':       'Räjähtävä lähtö, 1-3 askeleen kiihdytysharjoitteet',
      'Nopeus 30m':       'Maksiminopeus, vetoharjoitteet, nopeusvoimatyö',
      'Kevennyshyppy':    'Nopeusvoima — hypyt, laskeutumiset, plyometria'
    };
    ka.forEach(function(e, i) {
      var harj = HARJOITUS[e[0]] || 'Harjoittele lajitestiin';
      var badge = ['🔴 Prioriteetti 1','🟡 Prioriteetti 2','🔵 Prioriteetti 3'][i] || '';
      h += '<div style="margin-bottom:8px;background:var(--bg3);border-radius:10px;padding:10px 12px">';
      h += '<div style="display:flex;justify-content:space-between;margin-bottom:3px">';
      h += '<span style="font-size:12px;font-weight:600">'+e[0]+'</span>';
      h += '<span style="font-size:10px;color:var(--muted2)">'+badge+'</span>';
      h += '</div>';
      h += '<div style="font-size:11px;color:var(--muted2);line-height:1.5">'+harj+'</div>';
      h += '<div style="font-size:10px;color:var(--red);margin-top:3px">'+e[1]+'/'+n+' pelaajaa alle normin</div>';
      h += '</div>';
    });
  }

  // Liikeketjut kompaktisti
  h += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px">Liikeketjut</div>';
  h += '<div style="display:flex;flex-direction:column;gap:7px">';
  Object.entries(j.avgKetjut).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){
    var km = KETJU[e[0]]||{plain:e[0],vari:'var(--muted)'};
    var col = e[1] >= 7 ? km.vari : e[1] >= 5 ? 'var(--amber)' : 'var(--red)';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<div style="min-width:110px;font-size:11px;color:var(--muted2)">'+km.plain+'</div>';
    h += '<div style="flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden">';
    h += '<div style="height:100%;width:'+Math.round((e[1]||0)*10)+'%;background:'+col+';border-radius:3px"></div></div>';
    h += '<div style="min-width:24px;font-size:12px;font-weight:700;color:'+col+';text-align:right">'+e[1]+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // ── HARJOITTELUSEURANNAN TRENDI-ANALYYSI ──────────────────────────────────
  var kirjaukset = haePikaKirjaukset(_aktivSeura, jnimi);
  if (kirjaukset.length >= 2) {
    h += '<div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">';
    h += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">';
    h += '&#128203; SPL Harjoitteluseuranta — historia &amp; trendi</div>';

    // Laske trendi: vertaa viimeisimpiä 3 kirjausta vanhempiin 3:een
    var KRITEERIT = [
      { avain: 'inno',             nimi: 'Innostavuus',         vari: 'var(--teal)' },
      { avain: 'liike',            nimi: 'Liikkuminen %',       vari: 'var(--blue)' },
      { avain: 'pallokosketukset', nimi: 'Pallokosketukset',    vari: 'var(--green)' },
      { avain: 'teknisTaktiset',   nimi: 'Teknis-taktiset',     vari: 'var(--purple)' },
      { avain: 'pelilleHeit',      nimi: 'Pelille heittäytyminen', vari: 'var(--amber)' },
      { avain: 'maalinteko',       nimi: 'Maalinteko / Täysivauhti', vari: 'var(--sivu)' },
      { avain: 'seuraOma',         nimi: 'Seuran painopiste',   vari: 'var(--muted)' }
    ];

    function kaAvain(lista, avain) {
      var vals = lista.map(function(k){ return k[avain]; }).filter(function(v){ return v != null; });
      return vals.length ? Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*10)/10 : null;
    }

    var uudet = kirjaukset.slice(0, Math.min(3, kirjaukset.length));
    var vanhat = kirjaukset.slice(3, Math.min(6, kirjaukset.length));

    h += '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">';
    KRITEERIT.forEach(function(kr) {
      var uKa = kaAvain(uudet, kr.avain);
      if (uKa === null) return; // ei dataa tästä kriteeristä
      var vKa = kaAvain(vanhat, kr.avain);
      var delta = (vKa !== null) ? Math.round((uKa - vKa) * 10) / 10 : null;
      var nuoli = delta === null ? '' : delta > 0.3 ? ' &#8593;' : delta < -0.3 ? ' &#8595;' : ' &#8594;';
      var nuoliCol = delta === null ? 'var(--muted2)' : delta > 0.3 ? 'var(--green)' : delta < -0.3 ? 'var(--red)' : 'var(--muted2)';
      var barPct = Math.round(uKa * 10);
      var barCol = uKa >= 8 ? 'var(--green)' : uKa >= 6 ? kr.vari : 'var(--amber)';

      h += '<div style="padding:7px 10px;background:var(--bg3);border-radius:8px">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
      h += '<span style="font-size:11px;color:var(--muted2)">' + kr.nimi + '</span>';
      h += '<span style="font-size:12px;font-weight:700;color:' + barCol + '">' + uKa;
      if (delta !== null) h += '<span style="font-size:10px;color:' + nuoliCol + '">' + nuoli + (Math.abs(delta)>0?'('+delta+')':'')+'</span>';
      h += '</span>';
      h += '</div>';
      h += '<div style="height:4px;background:var(--bg);border-radius:2px;overflow:hidden">';
      h += '<div style="height:100%;width:' + barPct + '%;background:' + barCol + ';border-radius:2px;transition:width .4s"></div>';
      h += '</div></div>';
    });
    h += '</div>';

    // Aikajana: viimeiset 8 kirjausta pisteinä
    var naytettavat = kirjaukset.slice(0, Math.min(8, kirjaukset.length)).reverse();
    if (naytettavat.length >= 2) {
      h += '<div style="font-size:10px;color:var(--muted2);margin-bottom:6px">Innostavuus-aikajana (viim. ' + naytettavat.length + ' kirjausta)</div>';
      h += '<div style="display:flex;align-items:flex-end;gap:4px;height:40px;margin-bottom:4px">';
      naytettavat.forEach(function(k) {
        var v = k.inno || 0;
        var hPct = Math.round(v / 10 * 100);
        var col = v >= 8 ? 'var(--green)' : v >= 6 ? 'var(--teal)' : 'var(--amber)';
        var pvm = new Date(k.pvm).toLocaleDateString('fi-FI',{day:'numeric',month:'numeric'});
        h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">';
        h += '<div style="width:100%;height:' + hPct + '%;background:' + col + ';border-radius:2px 2px 0 0;min-height:3px"></div>';
        h += '<div style="font-size:8px;color:var(--muted2);writing-mode:vertical-lr;transform:rotate(180deg)">' + pvm + '</div>';
        h += '</div>';
      });
      h += '</div>';

      // VP-katselmus-merkinnät aikajanalla
      var vpKats = kirjaukset.filter(function(k){ return k.vpKatselmus; }).length;
      if (vpKats > 0) {
        h += '<div style="font-size:10px;color:var(--purple);margin-top:4px">&#128065; ' + vpKats + ' VP-katselmus kirjattuna</div>';
      }
    }

    // Valmentajakohtainen erittely jos useita valmentajia
    var valmentajat = {};
    kirjaukset.forEach(function(k) {
      var vm = k.valmentaja || 'Tuntematon';
      if (!valmentajat[vm]) valmentajat[vm] = { n: 0, innoSumma: 0 };
      valmentajat[vm].n++;
      if (k.inno) valmentajat[vm].innoSumma += k.inno;
    });
    var vmLista = Object.entries(valmentajat).sort(function(a,b){return b[1].n-a[1].n;});
    if (vmLista.length > 1) {

// ── PALLOLIITON KRITEERI 6 -LASKENTA ─────────────────────────
function laskeKriteeri6(s) {
  // Palloliiton hyväksymä tapa: OVR kehittynyt ensimmäisestä viimeiseen testiin
  // Ikäikkuna 10-15v, min 2 testiä, kokonaisia kalenterivuosia
  var seuranta = [], kehittyvat = 0;
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      var hist = p.qs_historia || [];
      if (ika < 10 || ika > 15) return;
      if (hist.length < 2) return;
      var first = ovrFromKetjut((hist[0].results||{}).ketjut||{});
      var last  = ovrFromKetjut((hist[hist.length-1].results||{}).ketjut||{});
      if (!first || !last) return;
      seuranta.push(last - first);
      if (last > first) kehittyvat++;
    });
  });
  var pct = seuranta.length ? Math.round(kehittyvat/seuranta.length*100) : 0;
  return { pct: pct, kehittyvat: kehittyvat, n: seuranta.length };
}

// Laskee seuran talenttipelaajien normitasojakauman (12-15v)
// Palloliiton kriteeri kori 1+2: 66% tavoitetasolla
function laskeNormitasoSeuralle(s) {
  if(typeof laskeNormitasoProfiili !== 'function') return null;
  var n=0, tavoite=0, alle=[], kehitysalueet={};
  var TESTIT=['SM-pallo','SM ilman palloa','Nopeus 10m','Nopeus 30m','Ketteryys','Kevennyshyppy','Syöttäminen'];

  Object.values(s.joukkueet).forEach(function(j){
    j.pelaajatLista.forEach(function(p){
      var ika=(p.bioIka&&p.bioIka.krono)||0;
      if(ika<12||ika>15) return;
      var fys=p.fys_historia||[];
      if(!fys.length) return;

      var profii=laskeNormitasoProfiili(fys, p.sukupuoli, ika);
      if(!profii) return;
      n++;
      if(profii.tavoitetasolla) tavoite++;
      else alle.push({nimi:p.etunimi+' '+p.sukunimi, pct:profii.normi_pct});

      // Kerää kehitysalueet — mitkä testit useimmiten alle normin
      profii.tulokset.forEach(function(t){
        if(!t.ok){
          kehitysalueet[t.testi]=(kehitysalueet[t.testi]||0)+1;
        }
      });
    });
  });

  if(n<5) return null;
  var pct=Math.round(tavoite/n*100);
  // Järjestä kehitysalueet — eniten esiintyvä ensin
  var ka=Object.entries(kehitysalueet).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  return { pct:pct, tavoite:tavoite, n:n, tavoitetasolla:pct>=66,
           kehitysalueet:ka, heikoimmat:alle.slice(0,5) };
}

  // ── NORMITASOANALYYSI ─────────────────────────────────────────────────
  // Upotetaan tähän se mitä aiemmin oli renderNormitasot:ssa
  h += '<div class="card" style="margin-bottom:14px">';
  h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Normitasoanalyysi — Palloliiton viralliset tasot 1–5</div>';
  h += '<div style="font-size:11px;color:var(--muted2);margin-bottom:12px">Eerikkilä / Palloliitto 2024 · % pelaajista saavuttaa tason 3 (kansallinen tavoitetaso)</div>';

  // Laske per testi per ikäluokka — kompakti versio
  var VERT_TESTIT = [
    { testi: 'Nopeus 10m',       alas: true  },
    { testi: 'Nopeus 30m',       alas: true  },
    { testi: 'SM ilman palloa',  alas: true  },
    { testi: 'SM-pallo',         alas: true  },
    { testi: 'Kevennyshyppy',    alas: false },
  ];

  var ikaData = {};
  ['P10','P11','P12','P13','P14','P15'].forEach(function(ik) { ikaData[ik] = {}; });
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      if (ika < 10 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var mitat = fys[fys.length-1].mittaukset || {};
      var ikaKey = 'P' + Math.min(15, Math.max(10, Math.floor(ika)));
      VERT_TESTIT.forEach(function(tm2) {
        var v = mitat[tm2.testi];
        if (v == null) return;
        if (!ikaData[ikaKey][tm2.testi]) ikaData[ikaKey][tm2.testi] = [];
        ikaData[ikaKey][tm2.testi].push(v);
      });
    });
  });

  var hasData = false;
  ['P10','P11','P12','P13','P14','P15'].forEach(function(ikaKey) {
    var rivit = [];
    VERT_TESTIT.forEach(function(tm2) {
      var vals = ikaData[ikaKey][tm2.testi] || [];
      if (vals.length < 3) return;
      var t3obj = (TM_PALLOLIITTO['male'][tm2.testi] || {})[ikaKey];
      if (!t3obj || t3obj.t3 == null) return;
      var t3 = t3obj.t3;
      var sorted = vals.slice().sort(function(a,b){return a-b;});
      var med = sorted[Math.floor(sorted.length/2)];
      var okN = vals.filter(function(v){ return tm2.alas ? v<=t3 : v>=t3; }).length;
      var okPct = Math.round(okN/vals.length*100);
      rivit.push({ testi: tm2.testi, med: med, t3: t3, okPct: okPct, n: vals.length });
    });
    if (!rivit.length) return;
    hasData = true;

    var kokonPct = Math.round(rivit.reduce(function(a,r){return a+r.okPct;},0)/rivit.length);
    var headerCol = kokonPct>=66?'var(--green)':kokonPct>=40?'var(--amber)':'var(--red)';

    h += '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:6px">';
    h += '<div style="font-size:12px;font-weight:600">' + ikaKey + '</div>';
    h += '<div style="font-size:11px;color:' + headerCol + ';font-weight:600">' + kokonPct + '% tasolla 3+</div>';
    h += '</div>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px">';
    rivit.forEach(function(r) {
      var col = r.okPct>=66?'var(--green)':r.okPct>=40?'var(--amber)':'var(--red)';
      h += '<div style="background:var(--bg3);border-radius:8px;padding:6px 8px">';
      h += '<div style="font-size:10px;color:var(--muted2);margin-bottom:2px">' + r.testi + '</div>';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<span style="font-size:12px;font-weight:600;color:' + col + '">' + r.okPct + '%</span>';
      h += '<span style="font-size:10px;color:var(--muted2)">' + r.med + ' / ' + r.t3 + '</span>';
      h += '</div></div>';
    });
    h += '</div></div>';
  });

  if (!hasData) {
    h += '<div style="font-size:12px;color:var(--muted2);text-align:center;padding:16px">Ei normidataa 10–15v pelaajille</div>';
  }
  h += '</div>'; // normitaso card

  document.getElementById('tabSeuratavoitteet').innerHTML = h;
}

// Perustuu samaan dataan kuin Masterissa
var VP_TK_REFERENSSIT = {
  P8:  { mediaani:120, top10:97  }, P9:  { mediaani:102, top10:82  },
  P10: { mediaani:130, top10:105 }, P11: { mediaani:118, top10:95  },
  P12: { mediaani:95,  top10:77  }, P13: { mediaani:88,  top10:71  },
  T8:  { mediaani:132, top10:107 }, T9:  { mediaani:114, top10:92  },
  T10: { mediaani:143, top10:115 }, T11: { mediaani:132, top10:107 },
  T12: { mediaani:108, top10:87  }, T13: { mediaani:100, top10:81  }
};

// Laske prosenttipiste yksinkertaisella lineaarisella interpolaatiolla
// (tarkempi versio on Masterissa, tässä riittää karkea arvio VP:tä varten)
function vpProsenttipiste(kokonaisaika, avain) {
  var ref = VP_TK_REFERENSSIT[avain];
  if (!ref) return null;
  if (kokonaisaika <= ref.top10)  return 92; // top 10%
  if (kokonaisaika <= ref.mediaani) {
    // Interpoloi top10-rajan ja mediaanin välillä → 50–92%
    var t = (ref.mediaani - kokonaisaika) / (ref.mediaani - ref.top10);
    return Math.round(50 + t * 42);
  }
  // Alle mediaanin: 0–50%
  var heikkoRaja = ref.mediaani * 1.35; // karkea arvio pronssitason alapuolesta
  var t2 = Math.max(0, (heikkoRaja - kokonaisaika) / (heikkoRaja - ref.mediaani));
  return Math.round(t2 * 50);
}

// ── TAVOITETASOT TAB ─────────────────────────────────────────
function renderTavoitetasot() {
  var s = _seuraData[_aktivSeura];
  if (!s) return;

  // Laske kansallinen tavoitetaso per pelaaja (12-15v)
  var pelaajatData = [];
  Object.values(s.joukkueet).forEach(function(j) {
    j.pelaajatLista.forEach(function(p) {
      var ika = (p.bioIka && p.bioIka.krono) || 0;
      var sp = p.sukupuoli || 'male';
      if (ika < 12 || ika > 15) return;
      var fys = p.fys_historia || [];
      if (!fys.length) return;
      var viimeisin = fys[fys.length-1];
      var m = viimeisin.mittaukset || {};
      
      var testit = ['Nopeus 5m','Nopeus 10m','Nopeus 30m','Ketteryys','SM-pallo','Kevennyshyppy'];
      var tulokset = [];
      var alleT3 = 0;
      
      testit.forEach(function(t) {
        var v = m[t];
        if (v == null) return;
        var tulos = laskeTavoitetaso(t, v, ika, sp);
        if (!tulos) return;
        tulokset.push({testi:t, arvo:v, taso:tulos.taso, raja:tulos.raja});
        if (tulos.taso < 3) alleT3++;
      });
      
      if (tulokset.length < 3) return;
      var kansallinen = alleT3 <= 2;
      
      pelaajatData.push({
        nimi: p.etunimi+' '+p.sukunimi,
        joukkue: p.joukkue,
        ika: Math.floor(ika),
        sp: sp,
        tulokset: tulokset,
        alleT3: alleT3,
        kansallinen: kansallinen,
        pvm: viimeisin.date
      });
    });
  });

  var kansalliset = pelaajatData.filter(function(p){return p.kansallinen;}).length;
  var pct = pelaajatData.length ? Math.round(kansalliset/pelaajatData.length*100) : 0;
  var pctCol = pct >= 66 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';

  var TESTI_META = {
    'Nopeus 5m':     {lbl:'Nopeus 5m',    yks:'s', ikoni:'💥'},
    'Nopeus 10m':    {lbl:'Nopeus 10m',   yks:'s', ikoni:'🏃'},
    'Nopeus 30m':    {lbl:'Nopeus 30m',   yks:'s', ikoni:'🏃'},
    'Ketteryys':     {lbl:'Ketteryys',    yks:'s', ikoni:'⚡'},
    'SM-pallo':      {lbl:'SM-pallo',     yks:'s', ikoni:'⚽'},
    'Kevennyshyppy': {lbl:'Kevennyshyppy',yks:'cm',ikoni:'⬆️'}
  };
  var TASO_COL = ['','var(--red)','var(--amber)','var(--teal)','var(--blue)','#A855F7'];
  var TASO_LBL = ['','T1','T2','T3','T4','T5'];

  var h = '';

  // Päämetriikka
  h += '<div class="card" style="margin-bottom:16px;border-color:'+(pct>=66?'rgba(52,211,153,.3)':'rgba(248,113,113,.2)')+'">';
  h += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">';
  h += '<div>';
  h += '<div class="card-title">Kansallinen tavoitetaso — Eerikkilä 2024</div>';
  h += '<div style="font-size:12px;color:var(--muted2);max-width:420px">Tavoitetaso 3 = paras 45% ikäluokassa. Palloliitto edellyttää: max 2 testiä alle T3:n kuudesta testistä. Talenttipelaajat 12–15v.</div>';
  h += '</div>';
  h += '<div style="text-align:right;flex-shrink:0">';
  h += '<div style="font-family:"Bebas Neue";font-size:56px;line-height:1;color:'+pctCol+'">'+pct+'%</div>';
  h += '<div style="font-size:11px;color:'+pctCol+'">'+(pct>=66?'✅ Täyttää 66% kynnyksen':'❌ Alle 66% kynnyksen')+'</div>';
  h += '<div style="font-size:11px;color:var(--muted2)">'+kansalliset+'/'+pelaajatData.length+' pelaajaa</div>';
  h += '</div></div>';
  
  // Progress bar ja kynnys
  h += '<div style="margin-top:12px">';
  h += '<div style="height:8px;background:var(--bg);border-radius:4px;overflow:visible;position:relative">';
  h += '<div style="height:100%;width:'+pct+'%;background:'+pctCol+';border-radius:4px"></div>';
  h += '<div style="position:absolute;top:-4px;left:66%;width:2px;height:16px;background:var(--amber);border-radius:1px"></div>';
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);margin-top:4px">';
  h += '<span>0%</span><span style="color:var(--amber)">66% Kori 2 kynnys</span><span>80% Kori 1 kynnys</span><span>100%</span>';
  h += '</div></div>';
  h += '</div>';

  // Huomio datalaadusta
  if (pelaajatData.length < 10) {
    h += '<div class="insight warn">';
    h += '<div class="insight-label">Datahuomio</div>';
    h += 'Seuratukikriteerin laskentaan löytyi '+pelaajatData.length+' talenttipelaajaa (12–15v) joilla on fyysiset testit. ';
    h += 'Palloliiton seuratukihakua varten tarvitaan standardisoitu testaussessio Eerikkilän protokollan mukaisesti.';
    h += '</div>';
  }

  // Testikohtainen analyysi
  var testiStats = {};
  Object.keys(TESTI_META).forEach(function(t){ testiStats[t]={n:0,t3:0,yhteensa:0}; });
  pelaajatData.forEach(function(p){
    p.tulokset.forEach(function(tr){
      if (!testiStats[tr.testi]) return;
      testiStats[tr.testi].n++;
      testiStats[tr.testi].yhteensa += tr.taso;
      if (tr.taso >= 3) testiStats[tr.testi].t3++;
    });
  });

  h += '<div class="card" style="margin-bottom:16px">';
  h += '<div class="card-title">Testi-analyysi — missä kehitettävää?</div>';

/**
 * Laskee testin pisteet (1-3) viitearvoista.
 * Laadullisille testeille (valakyykky jne.) palautetaan null — käyttäjä valitsee itse.
 * Numeerisille: arvo < raja1 → 1, raja1 ≤ arvo < raja2 → 2, arvo ≥ raja2 → 3
 */
function krtLaskePisteet(testiNimi, arvo, sukupuoli, ikäluokka, testi4valinta, testi6valinta) {
  if (arvo === null || arvo === undefined || arvo === '') return null;

  var vl = KRT_VIITEARVOT[ikäluokka];
  if (!vl) return null;

  // U15:n vaihtoehtoistestien käsittely — testi4 ja testi6 ratkeavat valinnan mukaan
  var avain = testiNimi;
  if (testiNimi === 'testi4') avain = testi4valinta;
  if (testiNimi === 'testi6') avain = testi6valinta;

  var ref = vl[avain];
  if (!ref) return null;
  if (ref.tyyppi === 'laatu') return null; // Laadulliset: käyttäjä valitsee

  var sukKey = (sukupuoli === 'T') ? 'T' : 'P';
  var rajat = ref[sukKey];
  if (!rajat) return null;

  var n = parseFloat(arvo);
  if (isNaN(n)) return null;
  if (n < rajat[0]) return 1;
  if (n < rajat[1]) return 2;
  return 3;
}

/**
 * Brzycki 1RM-laskenta: 1RM = kg5rm / (1.0278 - 0.0278 * toistot)
 * Suhteellinen 1RM = 1RM / kehonpaino
 */
function krtBrzycki(kg5rm, toistot) {
  toistot = toistot || 5;
  return kg5rm / (1.0278 - (0.0278 * toistot));
}
function krtSuhteellinen1RM(kg5rm, kehonpaino, toistot) {
  var rm1 = krtBrzycki(kg5rm, toistot || 5);
  return parseFloat((rm1 / kehonpaino).toFixed(3));
}

/**
 * U19 voimatestin pisteet suhteellisesta 1RM-arvosta.
 * Ikä rajataan 16-19 välille viitearvojen puitteissa.
 */
function krtVoimaPisteet(testiNimi, rel1rm, sukupuoli, ika) {
  var vr = KRT_VIITEARVOT.VOIMA_RAJAT[testiNimi];
  if (!vr) return null;
  var sukKey = (sukupuoli === 'T') ? 'T' : 'P';
  var ikaKey = Math.min(Math.max(parseInt(ika), 16), 19);
  var rajat = vr[sukKey][ikaKey];
  if (!rajat) return null;
  if (rel1rm < rajat[0]) return 1;
  if (rel1rm < rajat[1]) return 2;
  return 3;
}

// ── FLEI-LASKENTA ────────────────────────────────────────────────────────────

/**
 * FLEI = Functional Load & Exercise Index
 * Pisteet lasketaan suhteellisena prosenttina maksimista.
 * Tasoluokitus: ≥75% = hyvä, 60-74% = kehitys, <60% = prioriteetti
 * Kuormarajoitin: PHV-huippu saa aina 60pct riippumatta pisteistä.
 */
function krtLaskeFlei(pisteetYhteensa, pisteetMaksimi, phvTila) {
  var pct = Math.round((pisteetYhteensa / pisteetMaksimi) * 100);
  var taso, kuorma;

  if (phvTila === 'PHV-huippu') {
    // PHV-huippu = kasvupyrähdyksen huippu → kuormarajoitus aina
    kuorma = '⚠️ 60% — PHV-huippu';
    taso = pct >= 75 ? 'hyvä' : pct >= 60 ? 'kehitys' : 'prioriteetti';
  } else {
    taso = pct >= 75 ? 'hyvä' : pct >= 60 ? 'kehitys' : 'prioriteetti';
    kuorma = taso === 'hyvä'    ? '✅ Normaali'
           : taso === 'kehitys'  ? '🟡 80% — Kehitysohjelma'
           : '🔴 60% — Prioriteetti';
  }

  return { fleiProsentti: pct, fleiTaso: taso, kuormaRajoitin: kuorma };
}

/**
 * Renderöi kartoitusten listausnäkymä.
 * Hakee Firestoresta seuran kartoitukset ja näyttää ne kortteina.
 */
function renderKartoitukset() {
  var el = document.getElementById('tabKartoitukset');
  if (!el) return;

  // Haetaan seuran Firestore-id luotettavasti samalla logiikalla kuin muuallakin dashboardissa.
  // window._fbSeuraDoc.id on paras lähde (asetettu Firebase-kirjautumisessa),
  // _seuraData._seuraId on varavalinta (tallennettu initDash():ssa dynaamista seuraa varten).
  var seuraId = (window._fbSeuraDoc && window._fbSeuraDoc.id)
             || ((_seuraData[_aktivSeura] || {})._seuraId)
             || null;
  if (!seuraId) {
    el.innerHTML = '<div style="color:var(--red);padding:20px">⚠️ Seuran tunnistetta ei löydy. Kirjaudu sisään sähköpostilla.</div>';
    return;
  }

  var h = '<div class="card" style="margin-bottom:16px">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  h += '<div class="card-title" style="margin:0">🏋️ Harjoitettavuuskartoitukset — ' + _aktivSeura + '</div>';
  h += '<button onclick="avaaTyhjäKartoitus()" style="background:var(--teal);color:var(--bg);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer">+ Uusi kartoitus</button>';
  h += '</div>';
  h += '<div style="font-size:12px;color:var(--muted)">FLEI = Functional Load & Exercise Index | U12 / U15 / U19 | Eerikkilä-protokolla 2026</div>';
  h += '</div>';

  h += '<div id="kartoitusLista"><div style="color:var(--muted);padding:20px;text-align:center">Ladataan kartoituksia...</div></div>';

  el.innerHTML = h;

  // Haetaan Firestoresta
  if (_fbOnline && _fbDb) {
    _fbDb.collection('seurat').doc(seuraId)
      .collection('kartoitukset')
      .limit(100)
      .get()
      .catch(function(e) { console.warn('[VP] Kartoitukset-haku virhe:', e.message); return null; })
      .then(function(snap) {
        var lista = document.getElementById('kartoitusLista');
        if (!lista) return;
        // null-guard: kysely saattaa epäonnistua verkkovirheellä
        // Järjestetään tulokset JS:ssä (ei tarvita Firestore-indeksiä)
        // null-guard: orderBy epäonnistuu jos indeksi puuttuu → snap on null
        if (!snap) {
          lista.innerHTML = '<div style="color:var(--amber);padding:32px;text-align:center">'
            + '<div style="font-size:28px;margin-bottom:8px">⚠️</div>'
            + '<div style="font-size:14px;font-weight:600;margin-bottom:6px">Firestore-indeksi puuttuu</div>'
            + '<div style="font-size:12px;color:var(--muted)">Lisää <code>kartoitukset</code>-kokoelmaan composiitti-indeksi:<br>'
            + '<code>luotu DESC</code> — katso konsolin virheviesti linkistä.</div>'
            + '</div>';
          return;
        }
        if (snap.empty) {
          lista.innerHTML = '<div style="color:var(--muted);padding:32px;text-align:center">'
            + '<div style="font-size:32px;margin-bottom:8px">📋</div>'
            + '<div>Ei vielä kartoituksia.<br>Aloita klikkaamalla + Uusi kartoitus.</div>'
            + '</div>';
          return;
        }

        // Ryhmitellään ikäluokan mukaan
        var ryhmät = { U12:[], U15:[], U19:[] };
        snap.forEach(function(doc) {
          var d = doc.data();
          d._docId = doc.id;
          var ikl = d.ikäluokka || 'U12';
          if (ryhmät[ikl]) ryhmät[ikl].push(d);
        });

        // Järjestetään jokainen ryhmä JS:ssä uusimmasta vanhimpaan
        // (orderBy poistettiin Firestore-kyselystä indeksiongelman takia)
        ['U12','U15','U19'].forEach(function(ikl) {
          ryhmät[ikl].sort(function(a, b) {
            var ta = a.luotu && a.luotu.toDate ? a.luotu.toDate().getTime()
                   : a.testauspvm ? new Date(a.testauspvm.seconds ? a.testauspvm.seconds*1000 : a.testauspvm).getTime()
                   : 0;
            var tb = b.luotu && b.luotu.toDate ? b.luotu.toDate().getTime()
                   : b.testauspvm ? new Date(b.testauspvm.seconds ? b.testauspvm.seconds*1000 : b.testauspvm).getTime()
                   : 0;
            return tb - ta;  // uusin ensin
          });
        });

        var out = '';
        ['U12','U15','U19'].forEach(function(ikl) {
          if (ryhmät[ikl].length === 0) return;
          out += '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px">'
               + ikl + ' — ' + ryhmät[ikl].length + ' kartoitusta</div>';
          out += '<div style="display:grid;gap:8px">';
          ryhmät[ikl].forEach(function(d) {
            var yh = d.yhteenveto || {};
            var fleiPct = yh.fleiProsentti || 0;
            var fleiTaso = yh.fleiTaso || '—';
            var fleiVäri = fleiTaso === 'hyvä' ? 'var(--green)'
                         : fleiTaso === 'kehitys' ? 'var(--amber)' : 'var(--red)';
            var pvmStr = d.testauspvm
              ? (d.testauspvm.toDate ? d.testauspvm.toDate().toLocaleDateString('fi-FI') : d.testauspvm.slice(0,10))
              : '—';

            out += '<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;'
                 + 'display:flex;align-items:center;justify-content:space-between;cursor:pointer" '
                 + 'onclick="avaaKartoitusYhteenveto(\'' + d._docId + '\',\'' + seuraId + '\')">';
            out += '<div>';
            out += '<div style="font-weight:600;font-size:13px">' + (d.nimi || '—') + '</div>';
            out += '<div style="font-size:11px;color:var(--muted);margin-top:2px">'
                 + (d.joukkue || '—') + ' · ' + pvmStr + ' · ' + (d.sukupuoli === 'T' ? '♀' : '♂') + '</div>';
            out += '</div>';
            out += '<div style="text-align:right">';
            out += '<div style="font-family:\'Bebas Neue\';font-size:22px;color:' + fleiVäri + '">' + fleiPct + '%</div>';
            out += '<div style="font-size:10px;color:' + fleiVäri + '">' + fleiTaso.toUpperCase() + '</div>';
            out += '</div>';
            out += '</div>';
          });
          out += '</div>';
        });

        lista.innerHTML = out;
      })
      .catch(function(err) {
        document.getElementById('kartoitusLista').innerHTML =
          '<div style="color:var(--red);padding:20px">Virhe ladattaessa: ' + err.message + '</div>';
      });
  } else {
    document.getElementById('kartoitusLista').innerHTML =
      '<div style="color:var(--amber);padding:20px">⚠️ Ei Firebase-yhteyttä. Kirjaudu sisään sähköpostilla.</div>';
  }
}

 * Vaihe 3: Yhteenveto + tallennus

function krtRenderöiVaihe() {

/**
 * Laskee ikäluokan syntymävuodesta.
 * Logiikka: ikä = tänäVuosi - syntymävuosi, ja:
 *   ika <= 12 → U12, 13 ≤ ika ≤ 15 → U15, ika >= 16 → U19
 */
function krtLaskeIkäluokka(syntymavuosi) {
  if (!syntymavuosi) return null;
  var ika = new Date().getFullYear() - parseInt(syntymavuosi);
  if (ika <= 12) return 'U12';
  if (ika <= 15) return 'U15';
  return 'U19';
}

function krtPäivitäIkäluokka() {
  var ikl = krtLaskeIkäluokka(_krtData.syntymavuosi);
  if (ikl) {
    _krtData.ikäluokka = ikl;
    _krtData.ika = new Date().getFullYear() - _krtData.syntymavuosi;
    var tag = document.getElementById('krt_ikäluokka_tag');
    if (tag) tag.textContent = ikl;
  }
}

function krtSiirrySuorituksiin() {
  // Validointi ennen siirtymistä
  if (!_krtData.nimi.trim()) { alert('Syötä pelaajan nimi.'); return; }
  if (!_krtData.syntymavuosi) { alert('Syötä syntymävuosi.'); return; }
  if (!_krtData.testauspvm) { alert('Syötä testauspäivä.'); return; }

  // Lasketaan lopullinen ikä ja ikäluokka
  krtPäivitäIkäluokka();

  // Tallennetaan sarjakonteksti — nämä säilyvät koko testisession ajan
  _krtSarja.aktiivinen  = true;
  _krtSarja.joukkue     = _krtData.joukkue;
  _krtSarja.ikäluokka   = _krtData.ikäluokka;
  _krtSarja.testauspvm  = _krtData.testauspvm;
  _krtSarja.arvioija    = _krtData.arvioija;
  _krtSarja.kausi       = _krtData.kausi;
  _krtSarja.testi4valinta = _krtData.testi4valinta;
  _krtSarja.testi6valinta = _krtData.testi6valinta;

  _krtData.vaihe = 2;
  krtRenderöiVaihe();
}

// ── TESTIRIVIT JA APUKOMPONENTIT ─────────────────────────────────────────────

/**
 * Rakentaa yhden testirivin HTML:n.
 * Laadulliset testit (tyyppi:'laatu') näyttävät 1/2/3-painikkeet suoraan.
 * Numeeriset testit näyttävät syöttökentän + pisteet.
 */
function krtTestiRivi(testiNimi, ikäluokka, sukupuoli) {
  var ref = (KRT_VIITEARVOT[ikäluokka] || {})[testiNimi];
  var onLaatu = !ref || ref.tyyppi === 'laatu';
  var td = _krtData.testit[testiNimi] || {};
  var yksikkö = krtYksikkö(testiNimi);

  var h = '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  h += '<div style="font-weight:600;font-size:13px">' + (KRT_NIMET[testiNimi]||testiNimi) + '</div>';

  // Viitearvot tooltipinä jos numeerinen
  if (!onLaatu && ref) {
    var sukKey = sukupuoli === 'T' ? 'T' : 'P';
    var rajat = ref[sukKey] || ref.T;
    if (rajat) {
      h += '<div style="font-size:10px;color:var(--muted2)">< ' + rajat[0] + ' · ' + rajat[0] + '–' + rajat[1] + ' · ≥' + rajat[1] + '</div>';
    }
  }
  h += '</div>';

  if (onLaatu) {
    // Laadullinen: suora 1/2/3-valinta
    h += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Laadullinen arvio (1=kehitettävä, 2=ok, 3=hyvä)</div>';
    h += krtPisteetValinta(testiNimi);
  } else {
    // Numeerinen: syöttökenttä + automaattinen pisteytys
    h += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">';
    h += '<input type="number" step="0.01" placeholder="Tulos" ' + krtInputStyle('flex:1')
       + ' value="' + (td.tulos !== undefined && td.tulos !== null ? td.tulos : '') + '" '
       + 'oninput="krtTallennaTestiTulos(\'' + testiNimi + '\',this.value,\'' + testiNimi + '\',\'' + ikäluokka + '\')">';
    h += '<span style="font-size:12px;color:var(--muted);width:60px">' + yksikkö + '</span>';
    h += '<div id="krt_pisteet_auto_' + testiNimi + '" style="font-family:\'Bebas Neue\';font-size:20px;color:var(--teal);width:24px;text-align:center">'
       + (td.pisteet || '—') + '</div>';
    h += '</div>';
    h += krtPisteetValinta(testiNimi);
  }

  h += krtHuomioKenttä(testiNimi);
  h += '</div>';
  return h;
}

// Pisteet-valintapainikkeet (1/2/3) — käyttäjä voi korjata automaattisen pisteet
// Container saa id="krt_pisteet_{avain}" jotta krtPäivitäPistePainikkeet löytää sen DOM:ista
function krtPisteetValinta(avain) {
  var nykyinen = (_krtData.testit[avain] || {}).pisteet;
  var h = '<div id="krt_pisteet_' + avain + '" style="display:flex;gap:6px;margin-top:4px">';
  [1,2,3].forEach(function(p) {
    var aktiivi = nykyinen === p;
    var väri = p===1 ? 'var(--red)' : p===2 ? 'var(--amber)' : 'var(--green)';
    h += '<button onclick="krtAsetaPisteet(\'' + avain + '\',' + p + ')" '
       + 'style="flex:1;padding:6px;border-radius:6px;border:1px solid '
       + (aktiivi ? väri : 'var(--border)') + ';background:'
       + (aktiivi ? väri + '33' : 'var(--bg)') + ';color:'
       + (aktiivi ? väri : 'var(--muted)') + ';font-weight:600;cursor:pointer;font-size:13px">'
       + p + '</button>';
  });
  h += '</div>';
  return h;
}

// Huomio-tekstikenttä jokaiselle testille
function krtHuomioKenttä(avain) {
  var nykyinen = (_krtData.testit[avain] || {}).huomio || '';
  return '<input type="text" placeholder="Huomio (valinnainen)" '
    + krtInputStyle('margin-top:6px;font-size:11px') + ' value="' + nykyinen + '" '
    + 'oninput="if(!_krtData.testit[\'' + avain + '\'])_krtData.testit[\'' + avain + '\']={}; _krtData.testit[\'' + avain + '\'].huomio=this.value">';
}

// ── TIETOJEN TALLENNUS MUISTIIN ───────────────────────────────────────────────

function krtAsetaPisteet(avain, pisteet) {
  if (!_krtData.testit[avain]) _krtData.testit[avain] = {};

function krtPäivitäPistePainikkeet(avain, aktiviPisteet) {

  var containerId = 'krt_pisteet_' + avain;

  if (!container) return; // Container ei löydy — ei hätää, re-render hoitaa

  var napit = container.querySelectorAll('button');
  napit.forEach(function(btn, i) {
    var p = i + 1; // 1, 2, 3
    var aktiivi = p === aktiviPisteet;
    var väri = p===1 ? 'var(--red)' : p===2 ? 'var(--amber)' : 'var(--green)';
    btn.style.borderColor = aktiivi ? väri : 'var(--border)';
    btn.style.background  = aktiivi ? väri.replace(')', ',0.2)').replace('var(','rgba(').replace('--red','244,113,113').replace('--amber','245,158,11').replace('--green','52,211,153') : 'var(--bg)';

// ── FASCIA-KETJUPISTEET — lasketaan kartoituksen testeistä ───────────────────
// Ryhmittää testipisteet fascia-linjoittain ja laskee kunkin linjan keskiarvon
function krtLaskeKetjupisteet(ikl) {
  var testit = _krtData.testit || {};
  var ketjut = { SBL: [], SFL: [], LL: [], SL: [], DFL: [], FL: [] };

  // Käydään kaikki testit läpi ja ryhmitellään fascia-linjoittain
  Object.keys(testit).forEach(function(nimi) {
    var td = testit[nimi];
    if (!td || td.pisteet == null) return;
    var linja = krtFasciaLinja(nimi);
    if (ketjut[linja]) {
      ketjut[linja].push(Number(td.pisteet));
    }
  });

  // Lasketaan kunkin linjan keskiarvo (1 desimaalin tarkkuudella)
  var tulos = {};
  var heikoin = { linja: null, ka: 99 };
  var vahvin  = { linja: null, ka: 0 };

  Object.keys(ketjut).forEach(function(linja) {
    var arr = ketjut[linja];
    if (arr.length === 0) { tulos[linja] = null; return; }
    var ka = arr.reduce(function(s,v){ return s+v; }, 0) / arr.length;
    tulos[linja] = Math.round(ka * 10) / 10;
    if (tulos[linja] < heikoin.ka) { heikoin = { linja: linja, ka: tulos[linja] }; }
    if (tulos[linja] > vahvin.ka)  { vahvin  = { linja: linja, ka: tulos[linja] }; }
  });

  tulos.heikoin = heikoin.linja;
  tulos.vahvin  = vahvin.linja;
  tulos.paivitetty = new Date().toISOString();
  return tulos;
}

function krtTallenna() {
  // bugfix 2026-03-27: nappi määritellään heti funktion alussa
  var nappi = document.getElementById('krtTallennaNappi');

  if (!_fbOnline || !_fbDb) {
    alert('Ei Firebase-yhteyttä. Tarkista kirjautuminen.');
    return;
  }

  // Haetaan seuran Firestore-id samalla luotettavalla logiikalla kuin renderKartoitukset:ssa
  var seuraId = (window._fbSeuraDoc && window._fbSeuraDoc.id)
             || ((_seuraData[_aktivSeura] || {})._seuraId)
             || null;
  if (!seuraId) {
    alert('Seuran tunnistetta ei löydy. Kirjaudu sisään sähköpostilla.');
    if (nappi) { nappi.disabled = false; nappi.textContent = '💾 Tallenna Firestoreen'; }
    return;
  }

  if (nappi) { nappi.disabled = true; nappi.textContent = 'Tallennetaan...'; }

  var ikl = _krtData.ikäluokka;
  var ps = _krtData._pisteetYhteensa || 0;
  var pm = _krtData._pisteetMaksimi || 27;
  var flei = krtLaskeFlei(ps, pm, _krtData.phvTila);

  // Rakennetaan Firestore-dokumentti schemaa noudattaen
  var doc = {
    seuraId:      seuraId,
    luotu:        firebase.firestore.FieldValue.serverTimestamp(),
    muokattu:     firebase.firestore.FieldValue.serverTimestamp(),
    luonutUid:    (_fbUser && _fbUser.uid) || 'pin_user',

    // Pelaajan tiedot
    pelaajaId:    _krtData.pelaajaId || '',
    nimi:         _krtData.nimi.trim(),
    sukupuoli:    _krtData.sukupuoli,
    ika:          _krtData.ika || (new Date().getFullYear() - (_krtData.syntymavuosi||0)),
    syntymavuosi: _krtData.syntymavuosi || null,
    ikäluokka:    ikl,
    joukkue:      _krtData.joukkue || '',
    phvTila:      _krtData.phvTila,

    // Testin meta
    testauspvm:   _krtData.testauspvm
                    ? firebase.firestore.Timestamp.fromDate(new Date(_krtData.testauspvm))
                    : firebase.firestore.FieldValue.serverTimestamp(),
    arvioija:     _krtData.arvioija || '',
    kausi:        _krtData.kausi,

    // Yhteenveto
    yhteenveto: {
      pisteetYhteensa: ps,
      pisteetMaksimi:  pm,
      fleiProsentti:   flei.fleiProsentti,
      fleiTaso:        flei.fleiTaso,
      kuormaRajoitin:  flei.kuormaRajoitin,
      asiHuomio:       ''
    },

    u15: null,

    ketjupisteet_yhteenveto: krtLaskeKetjupisteet(ikl),

    // Automaattinen harjoitusohjelma heikoimman ketjun perusteella — 2026-03-27
    auto_ohjelma: krtLaskeAutoOhjelma(ikl, flei)
  };

  // Lisätään testit oikeaan ikäluokka-mapiin
  doc[ikl.toLowerCase()] = krtRakennaTestiMap(ikl);

  // Tallennetaan Firestoreen
  _fbDb.collection('seurat').doc(seuraId)
    .collection('kartoitukset')
    .add(doc)
    .then(function(ref) {
      console.log('[KRT] Tallennettu:', ref.id);

      _krtSarja.testatut.push({
        nimi:          _krtData.nimi,

/**
 * Rakentaa ikäluokkakohtaisen testimapin Firestore-dokumenttiin.
 * U12 ja U15: { testiNimi: { tulos, pisteet, huomio } }
 * U19 voimatestit: { testiNimi: { kg5rm, kehonpaino, rel1rm, pisteet } }
 */
function krtRakennaTestiMap(ikl) {
  var testit = _krtData.testit;
  var map = {};

  if (ikl === 'U12') {
    ['valakyykky','luistelijanKyykky','askelkyykky','hyvaaHuomenta',
     'etunojapunnerrus','lankku60s','naruhypyt15s','pituushyppy','loikka5'].forEach(function(t) {
      map[t] = krtTestiArvo(testit[t], t);  // fascia_linja tunnistetaan testiNimen avulla
    });
  }

  else if (ikl === 'U15') {
    ['pistoolikyykky','etunojapunnerrus','leuanveto'].forEach(function(t) {
      map[t] = krtTestiArvo(testit[t], t);
    });
    map['testi4_valinta'] = _krtData.testi4valinta;
    map['testi4_tulos']   = krtTestiArvo(testit['testi4']);
    map['lantionnosto']   = krtTestiArvo(testit['lantionnosto'], 'lantionnosto');
    map['testi6_valinta'] = _krtData.testi6valinta;
    map['testi6_tulos']   = krtTestiArvo(testit['testi6']);
    ['slr','thomasTesti','pituushyppy','loikka5'].forEach(function(t) {
      map[t] = krtTestiArvo(testit[t], t);
    });
  }

  else if (ikl === 'U19') {
    // Voimatestit — erityinen rakenne
    ['takakyykky','maastaveto','rinnalleveto','yhdenJalanKyykky','penkkipunnerrus'].forEach(function(t) {
      var td = testit[t] || {};
      map[t] = {
        kg5rm:      td.kg5rm || null,
        kehonpaino: td.kehonpaino || null,
        rel1rm:     td.rel1rm || null,
        pisteet:    td.pisteet || null
      };
    });
    ['leuanveto','jalkojenNosto','pakianousu','lonkanOjennus','slr',
     'thomasTesti','pituushyppy','loikka5'].forEach(function(t) {
      map[t] = krtTestiArvo(testit[t], t);
    });
  }

  return map;
}

// Muodostaa testiobjektin Firestore-rakenteeseen — fascia_linja lisätty 2026-03-27
function krtTestiArvo(td, testiNimi) {
  if (!td) return { tulos: null, pisteet: null, huomio: '', fascia_linja: krtFasciaLinja(testiNimi || '') };
  return {
    tulos:        td.tulos !== undefined ? td.tulos : null,
    pisteet:      td.pisteet || null,
    huomio:       td.huomio || '',
    fascia_linja: krtFasciaLinja(testiNimi || '')  // HPP ELITE 14_TESTIPATTERISTO
  };
}

/**
 * Avaa tallennetun kartoituksen yhteenvetonäkymän modalissa.
 * Hakee dokumentin Firestoresta doc-id:llä.
 */
function avaaKartoitusYhteenveto(docId, seuraId) {
  var modal = document.getElementById('kartoitusModal');
  var body  = document.getElementById('kartoitusModalBody');
  modal.classList.add('open');
  body.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted)">Ladataan...</div>';

  _fbDb.collection('seurat').doc(seuraId)
    .collection('kartoitukset').doc(docId)
    .get()
    .then(function(snap) {
      if (!snap.exists) {
        body.innerHTML = '<div style="color:var(--red);padding:20px">Dokumenttia ei löydy.</div>';
        return;
      }
      var d = snap.data();
      var yh = d.yhteenveto || {};
      var fleiVäri = yh.fleiTaso==='hyvä'?'var(--green)':yh.fleiTaso==='kehitys'?'var(--amber)':'var(--red)';
      var pvmStr = d.testauspvm ? (d.testauspvm.toDate ? d.testauspvm.toDate().toLocaleDateString('fi-FI') : d.testauspvm.slice(0,10)) : '—';

      var h = '';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
      h += '<div style="font-family:\'Bebas Neue\';font-size:22px">' + d.nimi + '</div>';
      h += '<button onclick="suljeKartoitusModal()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>';
      h += '</div>';

      // FLEI-banneri
      h += '<div style="background:var(--card);border:2px solid ' + fleiVäri + ';border-radius:14px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">';
      h += '<div>'
         + '<div style="font-size:11px;color:var(--muted)">FLEI · ' + d.ikäluokka + ' · ' + pvmStr + '</div>'
         + '<div style="font-family:\'Bebas Neue\';font-size:36px;color:' + fleiVäri + ';line-height:1">' + (yh.fleiProsentti||'—') + '%</div>'
         + '<div style="font-size:12px;color:' + fleiVäri + '">' + (yh.fleiTaso||'—').toUpperCase() + '</div>'
         + '</div>';
      h += '<div style="text-align:right">'
         + '<div style="font-size:12px">' + (yh.pisteetYhteensa||0) + ' / ' + (yh.pisteetMaksimi||'—') + ' p.</div>'
         + '<div style="font-size:12px;margin-top:4px">' + (yh.kuormaRajoitin||'—') + '</div>'
         + '</div>';
      h += '</div>';

      // Pelaajatiedot
      h += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">'
         + d.joukkue + ' · s.' + d.syntymavuosi + ' · PHV: ' + (d.phvTila||'—')
         + ' · Arvioija: ' + (d.arvioija||'—') + '</div>';

      // Testit
      var testiMap = d[d.ikäluokka ? d.ikäluokka.toLowerCase() : 'u12'] || {};
      h += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Testit</div>';
      h += '<div style="display:grid;gap:4px">';
      Object.entries(testiMap).forEach(function(kv) {
        var avain = kv[0], td = kv[1];
        if (!td || typeof td !== 'object' || !td.pisteet) return;
        var pVäri = td.pisteet===3?'var(--green)':td.pisteet===2?'var(--amber)':'var(--red)';
        h += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">';
        h += '<div style="font-size:12px">' + (KRT_NIMET[avain]||avain) + '</div>';
        h += '<div style="display:flex;gap:8px;align-items:center">';
        if (td.tulos !== null && td.tulos !== undefined) h += '<div style="font-size:11px;color:var(--muted)">' + td.tulos + '</div>';
        h += '<div style="font-family:\'Bebas Neue\';font-size:18px;color:' + pVäri + '">' + td.pisteet + '</div>';
        h += '</div></div>';
      });
      h += '</div>';

      body.innerHTML = h;
    })
    .catch(function(err) {
      body.innerHTML = '<div style="color:var(--red);padding:20px">Virhe: ' + err.message + '</div>';
    });
}

var HH_SUUREMPI = { cmj: true, bronco: true };

/**
 * Laskee yksittäisen testituloksen tason (1-5) viitearvoista.
 *
 * Ikä rajataan 10-19 välille koska viitearvoja ei ole alle 10-vuotiaille.
 * Jos ikä on yli 19, käytetään P19/T19 arvoja (lähimmät saatavilla olevat).
 * Jos tulos on tyhjä tai ikä ei löydy taulukosta, palautetaan null.
 *
 * @param {string} testi    - Testin avain, esim. "lin5m", "cmj"
 * @param {number} tulos    - Mitattu tulos
 * @param {string} sukup    - "P" tai "T"
 * @param {number} ika      - Ikä vuosina (desimaalitarkkuudella ok, pyöristetään)
 * @returns {number|null}   - Taso 1-5 tai null jos ei voida laskea
 */
function hhLaskeTaso(testi, tulos, sukup, ika) {
  if (tulos === null || tulos === undefined || tulos === '') return null;
  if (!ika || isNaN(ika)) return null;

  // Pyöristetään ikä kokonaisluvuksi ja rajataan 10-19 välille
  var ikaInt = Math.min(19, Math.max(10, Math.round(ika)));
  var avain  = (sukup === 'T' ? 'T' : 'P') + ikaInt;
  var ref    = HH_VIITEARVOT[avain];
  if (!ref || !ref[testi]) return null;

  var rajat = ref[testi]; // [raja5, raja4, raja3, raja2]
  var n = parseFloat(tulos);
  if (isNaN(n)) return null;

  // Kasvavat testit (cmj, bronco): suurempi on parempi
  if (HH_SUUREMPI[testi]) {
    if (n >= rajat[0]) return 5;
    if (n >= rajat[1]) return 4;
    if (n >= rajat[2]) return 3;
    if (n >= rajat[3]) return 2;
    return 1;
  }
  // Laskevat testit (nopeus, ketteryys): pienempi on parempi
  if (n <= rajat[0]) return 5;
  if (n <= rajat[1]) return 4;
  if (n <= rajat[2]) return 3;
  if (n <= rajat[3]) return 2;
  return 1;
}

/**
 * Laskee pelaajan kaikkien testien keskitason sekä kronologisen
 * että biologisen iän mukaan.
 *
 * Tätä käytetään sekä yksittäisen pelaajan profiilissa
 * että joukkueen kehitysindeksin laskennassa.
 *
 * @param {Object} testitulokset - { lin5m: 3.28, cmj: 35.0, ... }
 * @param {string} sukup         - "P" tai "T"
 * @param {number} kronoIka      - Kronologinen ikä
 * @param {number|null} bioIka   - Biologinen ikä (null jos ei mitattu)
 * @returns {Object} { kronoTasot, kronoKa, bioTasot, bioKa, tasero }
 */
function hhLaskePelaajanTasot(testitulokset, sukup, kronoIka, bioIka) {
  var testit = ['lin5m','lin10m','lin20m','lin30m','kasirata',
                'smjuoksu','smpallo','cmj','bronco'];

  var kronoTasot = {}, bioTasot = {};
  var kronoSumma = 0, kronoN = 0;
  var bioSumma   = 0, bioN   = 0;

  testit.forEach(function(t) {
    var tulos = testitulokset[t];
    if (tulos === null || tulos === undefined || tulos === '') return;

    // Kronologinen taso
    var kt = hhLaskeTaso(t, tulos, sukup, kronoIka);
    if (kt !== null) {
      kronoTasot[t] = kt;
      kronoSumma += kt;
      kronoN++;
    }

    // Biologinen taso (vain jos bio-ikä on saatavilla)
    if (bioIka !== null && bioIka !== undefined) {
      var bt = hhLaskeTaso(t, tulos, sukup, bioIka);
      if (bt !== null) {
        bioTasot[t] = bt;
        bioSumma += bt;
        bioN++;
      }
    }
  });

  var kronoKa = kronoN > 0 ? Math.round((kronoSumma / kronoN) * 10) / 10 : null;
  var bioKa   = bioN   > 0 ? Math.round((bioSumma   / bioN)   * 10) / 10 : null;
  var tasero  = (kronoKa !== null && bioKa !== null)
                ? Math.round((bioKa - kronoKa) * 10) / 10 : null;

  return {
    kronoTasot: kronoTasot,   // testi → taso kronologisen iän mukaan
    kronoKa:    kronoKa,      // kaikkien testien keskiarvo (krono)
    bioTasot:   bioTasot,     // testi → taso biologisen iän mukaan
    bioKa:      bioKa,        // kaikkien testien keskiarvo (bio)
    tasero:     tasero        // bioKa - kronoKa (positiivinen = yli ikätason)
  };
}

/**
 * Laskee joukkueen kehitysindeksin kaikista joukkueen testituloksista.
 *
 * Kehitysindeksi on joukkueen kaikkien pelaajien tasojen keskiarvo.
 * Lasketaan erikseen kronologisen ja biologisen iän mukaan.
 * Erotus kertoo kuinka paljon biologinen kypsyysjakauma vaikuttaa.
 *
 * Tyypillinen tilanne: joukkue jossa on biologisesti nuoria pelaajia
 * näyttää kronologisesti heikolta mutta biologisesti vahvalta.
 * Tämä on tärkeä tieto VP:lle — pelaajat eivät ole "huonoja"
 * vaan vasta kehityksensä alkuvaiheessa.
 *
 * @param {Array} pelaajat - Array pelaajadokumenteista Firestoresta
 * @param {Array} testit   - Array testituloksista Firestoresta
 * @returns {Object} Kehitysindeksiraportti
 */
function hhLaskeJoukkuenKehitysindeksi(pelaajat, testit) {
  // Indeksoidaan pelaajat PalloID:llä nopeaa hakua varten
  var pelaajaMap = {};
  pelaajat.forEach(function(p) {
    pelaajaMap[p.pelaajaId || p.palloID] = p;
  });

  var kronoSummat = {}, bioSummat = {}, kronoN = {}, bioN = {};
  var testiAvaimet = ['lin5m','lin10m','lin20m','lin30m','kasirata',
                      'smjuoksu','smpallo','cmj','bronco'];
  testiAvaimet.forEach(function(t) {
    kronoSummat[t] = 0; bioSummat[t] = 0; kronoN[t] = 0; bioN[t] = 0;
  });

  var pelaajaRaportit = [];

  testit.forEach(function(testi) {
    var pelaaja = pelaajaMap[testi.pelaajaId];
    if (!pelaaja) return;

    // Laske ikä testituloksesta
    var testipvm = testi.testauspvm
      ? (testi.testauspvm.toDate ? testi.testauspvm.toDate() : new Date(testi.testauspvm))
      : new Date();
    var syntyma = pelaaja.syntymaaika
      ? (pelaaja.syntymaaika.toDate ? pelaaja.syntymaaika.toDate() : new Date(pelaaja.syntymaaika))
      : null;

    if (!syntyma) return;

    var kronoIka = (testipvm - syntyma) / (365.25 * 24 * 3600 * 1000);
    var bioIka   = (pelaaja.biologinenIka && pelaaja.biologinenIka.bio)
                   ? pelaaja.biologinenIka.bio : null;

    var tulokset = {
      lin5m:    testi.lin5m,    lin10m:   testi.lin10m,
      lin20m:   testi.lin20m,   lin30m:   testi.lin30m,
      kasirata: testi.kasirata, smjuoksu: testi.smjuoksu,
      smpallo:  testi.smpallo,  cmj:      testi.cmj,
      bronco:   testi.bronco
    };

    var tasot = hhLaskePelaajanTasot(
      tulokset, pelaaja.sukupuoli, kronoIka, bioIka
    );

    // Kumuloidaan joukkueen summiin
    testiAvaimet.forEach(function(t) {
      if (tasot.kronoTasot[t] !== undefined) {
        kronoSummat[t] += tasot.kronoTasot[t]; kronoN[t]++;
      }
      if (tasot.bioTasot[t] !== undefined) {
        bioSummat[t] += tasot.bioTasot[t]; bioN[t]++;
      }
    });

    pelaajaRaportit.push({
      nimi:      pelaaja.nimi,
      kronoIka:  Math.round(kronoIka * 10) / 10,
      bioIka:    bioIka ? Math.round(bioIka * 10) / 10 : null,
      kronoKa:   tasot.kronoKa,
      bioKa:     tasot.bioKa,
      tasero:    tasot.tasero
    });
  });

  // Laske joukkueen keskiarvot per testi
  var kronoIndeksi = {}, bioIndeksi = {};
  testiAvaimet.forEach(function(t) {
    kronoIndeksi[t] = kronoN[t] > 0
      ? Math.round(kronoSummat[t] / kronoN[t] * 10) / 10 : null;
    bioIndeksi[t]   = bioN[t]   > 0
      ? Math.round(bioSummat[t]  / bioN[t]   * 10) / 10 : null;
  });

  // Kokonaisindeksit (kaikkien testien ka)
  var kronoKokonais = hhKeskiarvo(Object.values(kronoIndeksi).filter(function(v) { return v !== null; }));
  var bioKokonais   = hhKeskiarvo(Object.values(bioIndeksi).filter(function(v) { return v !== null; }));

  return {
    // Joukkuetason luvut
    kronoIndeksi:   kronoIndeksi,    // per testi, kronologinen
    bioIndeksi:     bioIndeksi,      // per testi, biologinen
    kronoKokonais:  kronoKokonais,   // kaikkien testien ka, kronologinen
    bioKokonais:    bioKokonais,     // kaikkien testien ka, biologinen
    tasero:         (kronoKokonais !== null && bioKokonais !== null)
                    ? Math.round((bioKokonais - kronoKokonais) * 10) / 10 : null,
    // Pelaajatason raportit
    pelaajat:       pelaajaRaportit,
    // Metatieto
    pelaajaMaara:   pelaajaRaportit.length,
    bioIkaMitattu:  pelaajaRaportit.filter(function(p) { return p.bioIka !== null; }).length
  };
}

// Apufunktio: laskee taulukon keskiarvon
function hhKeskiarvo(arvot) {
  if (!arvot || arvot.length === 0) return null;
  var summa = arvot.reduce(function(a, b) { return a + b; }, 0);
  return Math.round(summa / arvot.length * 10) / 10;
}

/**
 * Renderöi joukkueen kehitysindeksikortin VP-dashboardiin.
 * Näyttää molemmat indeksit rinnakkain selityksineen.
 *
 * @param {Object} indeksi - hhLaskeJoukkuenKehitysindeksi():n tulos
 * @param {string} joukkueNimi
 * @returns {string} HTML-merkkijono
 */
function hhRenderKehitysindeksi(indeksi, joukkueNimi) {
  if (!indeksi || indeksi.pelaajaMaara === 0) {
    return '<div style="color:var(--muted);padding:16px;text-align:center">'
         + 'Ei testituloksia tällä joukkueella.</div>';
  }

  var h = '';
  h += '<div style="background:var(--card);border:1px solid var(--border);'
     + 'border-radius:12px;padding:16px;margin-bottom:12px">';
  h += '<div style="font-size:11px;color:var(--muted);margin-bottom:12px">'
     + joukkueNimi + ' — ' + indeksi.pelaajaMaara + ' pelaajaa testattu'
     + (indeksi.bioIkaMitattu < indeksi.pelaajaMaara
        ? ' · Bio-ikä mitattu ' + indeksi.bioIkaMitattu + '/' + indeksi.pelaajaMaara
        : '') + '</div>';

  // Kaksi isoa lukua rinnakkain
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">';

  // Kronologinen indeksi
  var kronoVari = hhTasoVari(indeksi.kronoKokonais);
  h += '<div style="text-align:center;padding:12px;background:var(--bg3);border-radius:10px">';
  h += '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">KRONO-INDEKSI</div>';
  h += '<div style="font-family:\'Bebas Neue\';font-size:36px;line-height:1;color:' + kronoVari + '">'
     + (indeksi.kronoKokonais || '—') + '</div>';
  h += '<div style="font-size:10px;color:var(--muted2);margin-top:4px">/ 5.0</div>';
  h += '</div>';

  // Biologinen indeksi
  var bioVari = hhTasoVari(indeksi.bioKokonais);
  h += '<div style="text-align:center;padding:12px;background:var(--bg3);border-radius:10px">';
  h += '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">BIO-INDEKSI</div>';
  if (indeksi.bioKokonais !== null) {
    h += '<div style="font-family:\'Bebas Neue\';font-size:36px;line-height:1;color:' + bioVari + '">'
       + indeksi.bioKokonais + '</div>';
    h += '<div style="font-size:10px;color:var(--muted2);margin-top:4px">/ 5.0</div>';
  } else {
    h += '<div style="font-size:13px;color:var(--muted2);padding-top:8px">Ei mitattu</div>';
  }
  h += '</div>';

  // Taso-ero
  h += '<div style="text-align:center;padding:12px;background:var(--bg3);border-radius:10px">';
  h += '<div style="font-size:10px;color:var(--muted);margin-bottom:4px">TASERO (bio-krono)</div>';
  if (indeksi.tasero !== null) {
    var eroVari = indeksi.tasero > 0 ? 'var(--green)' : indeksi.tasero < 0 ? 'var(--red)' : 'var(--muted)';
    var eroMerkki = indeksi.tasero > 0 ? '+' : '';
    h += '<div style="font-family:\'Bebas Neue\';font-size:36px;line-height:1;color:' + eroVari + '">'
       + eroMerkki + indeksi.tasero + '</div>';
    h += '<div style="font-size:10px;color:var(--muted2);margin-top:4px">'
       + (indeksi.tasero > 0 ? 'yli ikätason' : indeksi.tasero < 0 ? 'alla ikätason' : 'ikätasolla')
       + '</div>';
  } else {
    h += '<div style="font-size:13px;color:var(--muted2);padding-top:8px">—</div>';
  }
  h += '</div>';
  h += '</div>';

  // Tulkinta-teksti
  if (indeksi.tasero !== null) {
    var tulkinta = '';
    if (indeksi.tasero >= 0.5) {
      tulkinta = '📈 Joukkueessa on biologisesti nuorempia pelaajia jotka suoriutuvat hyvin suhteessa kehitysvaiheeseen. Kronologinen indeksi aliarvioi joukkueen potentiaalia.';
    } else if (indeksi.tasero <= -0.5) {
      tulkinta = '📉 Joukkueessa on biologisesti kypsempiä pelaajia. Kronologinen indeksi yliarvioi joukkueen pitkän aikavälin potentiaalia.';
    } else {
      tulkinta = '✅ Biologinen ja kronologinen ikäjakauma ovat tasapainossa joukkueessa.';
    }
    h += '<div style="font-size:11px;color:var(--muted);line-height:1.5;padding:8px 12px;'
       + 'background:var(--bg3);border-radius:8px">' + tulkinta + '</div>';
  }

  h += '</div>';
  return h;
}

// Palauttaa värin tason perusteella (1-5)
function hhTasoVari(taso) {
  if (taso === null || taso === undefined) return 'var(--muted)';
  if (taso >= 4.0) return 'var(--green)';
  if (taso >= 3.0) return 'var(--teal)';
  if (taso >= 2.0) return 'var(--amber)';
  return 'var(--red)';
}

function tuontiLueTiedosto(input, seuraId) {
  var tiedosto = input.files[0];
  if (!tiedosto) return;

  // Tarkistetaan että SheetJS on ladattu
  if (typeof XLSX === 'undefined') {
    document.getElementById('tuontiEsikatselu').innerHTML =
      '<div style="color:var(--amber);padding:16px">⏳ Ladataan Excel-kirjastoa, yritä hetken päästä uudelleen...</div>';
    document.getElementById('tuontiEsikatselu').style.display = 'block';
    setTimeout(function() { tuontiLueTiedosto(input, seuraId); }, 1500);
    return;
  }

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var workbook = XLSX.read(data, { type: 'array', cellDates: true });
      var sheets = workbook.SheetNames;

      // Tunnistetaan pohjatyyppi välilehtien nimistä
      var tyyppi = tuontiTunnistaTyyppi(sheets);

      if (!tyyppi) {
        tuontiNaytaVirhe('Tiedostoa ei tunnistettu TalentMaster-pohjaksi. '
          + 'Välilehtien nimien pitää olla U12/U15/U19, Harjoitettavuus_U12 jne. tai H-H Testit.');
        return;
      }

      // Luetaan ja validoidaan data
      var rivit = tuontiLueRivit(workbook, tyyppi);
      // Pelaajatiedoille käytetään joukkuevalidointia Firestoresta ennen esikatselua.
      // Muille tyypeille mennään suoraan esikatseluun.
      tuontiHaeJoukkueetJaNaytaEsikatselu(rivit, tyyppi, seuraId, tiedosto.name);

    } catch(err) {
      tuontiNaytaVirhe('Tiedoston lukeminen epäonnistui: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(tiedosto);
}

// ── POHJATYPIN TUNNISTUS ─────────────────────────────────────────────────────

function tuontiTunnistaTyyppi(sheets) {
  // Harjoitettavuus
  var onHarjoitettavuus = sheets.some(function(s) {
    return s.indexOf('Harjoitettavuus_') === 0;
  });
  if (onHarjoitettavuus) return 'harjoitettavuus';

  // H-H testit
  var onHH = sheets.some(function(s) { return s === 'H-H Testit'; });
  if (onHH) return 'hh_testit';

  // Uusi pelaajapohja: "Pelaajat"-välilehti (dynaaminen seuran pohja)
  var onPelaajatUusi = sheets.some(function(s) { return s === 'Pelaajat'; });
  if (onPelaajatUusi) return 'pelaajat';

  // Vanha pelaajapohja: U12/U15/U19-välilehdet (yhteensopivuus)
  var onPelaajatVanha = sheets.some(function(s) {
    return s === 'U12' || s === 'U15' || s === 'U19';
  });
  if (onPelaajatVanha) return 'pelaajat';

  return null;
}

// ── RIVIEN LUKEMINEN ─────────────────────────────────────────────────────────

function tuontiLueRivit(workbook, tyyppi) {
  var kaikki = [];

  if (tyyppi === 'pelaajat') {

    // ── UUSI POHJA: "Pelaajat"-välilehti ─────────────────────────────────────
    // Rakenne: rivi 1 = sarakeotsikot, rivi 2 = esimerkkirivi, data alkaa riviltä 3
    if (workbook.SheetNames.indexOf('Pelaajat') !== -1) {
      var ws = workbook.Sheets['Pelaajat'];
      var rivit = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
      var otsikot = rivit[0] || [];  // Rivi 1 = otsikot (indeksi 0)

      for (var i = 1; i < rivit.length; i++) {
        var rivi = rivit[i];
        var palloId = String(rivi[0] || '').trim();
        // Ohitetaan tyhjät rivit ja esimerkkirivin (sisältää "esim.")
        if (!palloId || palloId.toLowerCase().indexOf('esim') === 0) continue;
        var obj = { _tyyppi: 'pelaaja' };
        otsikot.forEach(function(ots, j) {
          if (ots) obj[String(ots).trim()] = rivi[j] !== undefined ? rivi[j] : '';
        });
        kaikki.push(obj);
      }
      return kaikki;
    }

    // ── VANHA POHJA: U12/U15/U19-välilehdet (yhteensopivuus) ─────────────────
    ['U12','U15','U19'].forEach(function(ikl) {
      if (workbook.SheetNames.indexOf(ikl) === -1) return;
      var ws = workbook.Sheets[ikl];
      var rivit = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
      var otsikot = rivit[3] || [];  // Vanhassa pohjassa otsikot rivillä 4 (indeksi 3)
      for (var i = 4; i < rivit.length; i++) {
        var rivi = rivit[i];
        if (!rivi[0] || String(rivi[0]).trim() === '') continue;
        var obj = { _ikäluokka: ikl, _tyyppi: 'pelaaja' };
        otsikot.forEach(function(ots, j) {
          if (ots) obj[String(ots).trim()] = rivi[j] !== undefined ? rivi[j] : '';
        });
        kaikki.push(obj);
      }
    });
  }

  else if (tyyppi === 'harjoitettavuus') {
    ['Harjoitettavuus_U12','Harjoitettavuus_U15','Harjoitettavuus_U19'].forEach(function(lehti) {
      if (workbook.SheetNames.indexOf(lehti) === -1) return;
      var ikl = lehti.replace('Harjoitettavuus_', '');
      var ws = workbook.Sheets[lehti];
      var rivit = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
      var otsikot = rivit[2] || [];
      for (var i = 3; i < rivit.length; i++) {
        var rivi = rivit[i];
        if (!rivi[0] || String(rivi[0]).trim() === '') continue;
        var obj = { _ikäluokka: ikl, _tyyppi: 'harjoitettavuus' };
        otsikot.forEach(function(ots, j) {
          if (ots) obj[String(ots).trim()] = rivi[j] !== undefined ? rivi[j] : '';
        });
        kaikki.push(obj);
      }
    });
  }

  else if (tyyppi === 'hh_testit') {
    var ws = workbook.Sheets['H-H Testit'];
    var rivit = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
    var otsikot = rivit[3] || [];
    for (var i = 4; i < rivit.length; i++) {
      var rivi = rivit[i];
      if (!rivi[0] || String(rivi[0]).trim() === '') continue;
      var obj = { _tyyppi: 'hh_testit' };
      otsikot.forEach(function(ots, j) {
        if (ots) obj[String(ots).trim()] = rivi[j] !== undefined ? rivi[j] : '';
      });
      kaikki.push(obj);
    }
  }

  return kaikki;
}

// ── ESIKATSELU ────────────────────────────────────────────────────────────────

function tuontiNaytaEsikatselu(rivit, tyyppi, seuraId, tiedostoNimi) {
  var esikatseluEl = document.getElementById('tuontiEsikatselu');
  esikatseluEl.style.display = 'block';

    esikatseluEl.innerHTML = '<div class="card"><div style="color:var(--amber);padding:8px">'

      + '</div></div>';
    return;
  }

  // Tyyppikohtaiset ikonit ja nimet
  var tyypit = {
    pelaajat: { ikoni:'👤', nimi:'Pelaajaprofiileja', polku:'seurat/' + seuraId + '/pelaajat/' },
    harjoitettavuus: { ikoni:'🏋️', nimi:'Harjoitettavuuskartoituksia', polku:'seurat/' + seuraId + '/kartoitukset/' },
    hh_testit: { ikoni:'⚡', nimi:'H-H testituloksia', polku:'seurat/' + seuraId + '/testit/' }
  };

  var h = '<div class="card" style="margin-bottom:16px">';
  h += '<div class="card-title">2. Esikatselu — tarkista ennen tuontia</div>';

  // Yhteenveto
  h += '<div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  h += '<div><div style="font-size:11px;color:var(--muted)">TIEDOSTO</div>'
     + '<div style="font-weight:600;font-size:13px">' + tiedostoNimi + '</div></div>';
  h += '<div><div style="font-size:11px;color:var(--muted)">TYYPPI</div>'
     + '<div style="font-weight:600;font-size:13px">' + meta.ikoni + ' ' + meta.nimi + '</div></div>';
  h += '<div><div style="font-size:11px;color:var(--muted)">RIVEJÄ</div>'
     + '<div style="font-family:\'Bebas Neue\';font-size:20px;color:var(--teal)">' + rivit.length + '</div></div>';
  h += '<div><div style="font-size:11px;color:var(--muted)">KOHDE</div>'
     + '<div style="font-size:11px;color:var(--muted2);font-family:\'DM Mono\'">' + meta.polku + '</div></div>';
  h += '</div>';

  // Validointivaroitukset
  if (ongelmat.length > 0) {
    h += '<div style="background:rgba(248,113,113,0.1);border:1px solid var(--red);border-radius:8px;padding:10px;margin-bottom:12px">';
    h += '<div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:6px">⚠️ Huomioita (' + ongelmat.length + ' kpl)</div>';
    ongelmat.slice(0, 5).forEach(function(o) {
      h += '<div style="font-size:11px;color:var(--red);margin-top:2px">• ' + o + '</div>';
    });
    if (ongelmat.length > 5) {
      h += '<div style="font-size:11px;color:var(--muted);margin-top:4px">...ja ' + (ongelmat.length - 5) + ' muuta.</div>';
    }
    h += '</div>';
  }

  // Ensimmäiset 5 riviä esikatselu
  h += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Ensimmäiset rivit:</div>';
  h += '<div style="overflow-x:auto;margin-bottom:12px"><table style="width:100%;border-collapse:collapse;font-size:11px">';

  // Otsikot taulukkoon (näytetään vain tärkeimmät kentät)
  var nakyvat = tuontiNakyvat(rivit[0], tyyppi);
  h += '<tr>';
  nakyvat.forEach(function(k) {
    h += '<th style="background:var(--bg3);color:var(--muted);padding:4px 8px;text-align:left;border:1px solid var(--border);white-space:nowrap">' + k + '</th>';
  });
  h += '</tr>';

  rivit.slice(0, 5).forEach(function(rivi, i) {
    h += '<tr style="background:' + (i%2===0 ? 'var(--card)' : 'var(--bg3)') + '">';
    nakyvat.forEach(function(k) {
      var arvo = rivi[k] !== undefined ? String(rivi[k]) : '';
      h += '<td style="padding:4px 8px;border:1px solid var(--border);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + arvo + '</td>';
    });
    h += '</tr>';
